<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>围棋游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0078D7',
                        secondary: '#E6F2FF',
                        board: '#E8D5B5',
                        black: '#1E1E1E',
                        white: '#F5F6F8',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    // 强制所有圆角为0
                    borderRadius: {
                        'none': '0px',
                        'sm': '0px',
                        'DEFAULT': '0px',
                        'md': '0px',
                        'lg': '0px',
                        'xl': '0px',
                        '2xl': '0px',
                        '3xl': '0px',
                        'full': '0px',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .board-grid-bg {
                background-size: 100% 100%;
                background-image: linear-gradient(to right, #5D4037 1.2px, transparent 1.2px),
                                  linear-gradient(to bottom, #5D4037 1.2px, transparent 1.2px);
            }
            .piece-shadow {
                filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15)) drop-shadow(0 1px 2px rgba(0,0,0,0.1));
            }
            .btn-hover {
                transition: all 0.15s ease;
            }
            .btn-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 12px -4px rgba(0,0,0,0.1);
            }
            /* 确保所有圆角强制为0 */
            .rounded-none, .rounded-sm, .rounded, .rounded-md, .rounded-lg, .rounded-xl, .rounded-2xl, .rounded-3xl, .rounded-full {
                border-radius: 0px !important;
            }
        }
        /* 全局强制圆角为0 */
        * {
            border-radius: 0px !important;
        }
        /* 棋子保持圆形（使用border-radius: 50% 不受影响） */
        .piece-shadow, #currentPlayerIcon, #statusIndicator, .w-5.h-5.rounded-full, .w-7.h-7.rounded-full {
            border-radius: 50% !important;
        }
        /* 状态指示器圆点保持圆形 */
        .rounded-full {
            border-radius: 50% !important;
        }
        /* 但除了棋子相关，其他强制0 */
        .bg-white\/90, .shadow-2xl, .border, .btn-hover, button, .modal-content, #gameOverModal > div {
            border-radius: 0px !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-stone-100 to-stone-200 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

<div class="max-w-5xl w-full bg-white/90 backdrop-blur-sm shadow-2xl overflow-hidden border border-stone-200" style="border-radius:0px !important;">
    <!-- 头部 -->
    <div class="bg-primary text-white p-5 text-center" style="border-radius:0px;">
        <h1 class="text-4xl font-bold tracking-wide flex items-center justify-center gap-3">
            <i class="fa-solid fa-circle-nodes text-amber-300"></i>
            围 棋 游 戏
            <i class="fa-solid fa-circle-nodes text-amber-300"></i>
        </h1>
        <p class="text-secondary/90 mt-1 text-sm">双人 · 提子规则 · 标准19路</p>
    </div>

    <!-- 主体 -->
    <div class="p-5 md:p-8 flex flex-col lg:flex-row gap-6">
        <!-- 棋盘区域 -->
        <div class="flex-1 flex flex-col items-center">
            <div class="relative w-full max-w-[min(75vh,75vw)] aspect-square board-grid-bg shadow-2xl" 
                 style="background-size: calc(100% / 18) calc(100% / 18); background-color: #E8D5B5; border-radius:0px;">
                <canvas id="goBoardCanvas" class="w-full h-full block cursor-pointer" style="border-radius:0px;"></canvas>
            </div>
            <!-- 状态栏 -->
            <div id="gameStatusBar" class="mt-4 w-full max-w-md bg-white/80 p-3 shadow-sm border border-stone-200 text-center" style="border-radius:0px;">
                <p id="statusMessage" class="font-semibold text-gray-800 text-lg flex items-center justify-center gap-2">
                    <span id="statusIndicator" class="w-5 h-5 rounded-full bg-black shadow-sm"></span>
                    <span id="statusText">黑棋落子</span>
                </p>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="w-full lg:w-72 flex flex-col gap-5">
            <!-- 信息卡 -->
            <div class="bg-white/80 p-5 shadow-sm border border-stone-200" style="border-radius:0px;">
                <h2 class="text-lg font-semibold mb-3 flex items-center text-primary">
                    <i class="fa-regular fa-circle-check mr-2"></i>对局信息
                </h2>
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-600">当前手数</span>
                        <span id="moveCountDisplay" class="font-mono font-bold text-lg">0</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-600">轮到</span>
                        <div class="flex items-center gap-2">
                            <div id="currentPlayerIcon" class="w-7 h-7 rounded-full bg-black border border-gray-300 piece-shadow"></div>
                            <span id="currentPlayerName" class="font-medium">黑棋</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-600">提子 (黑)</span>
                        <span id="blackCaptures" class="font-mono">0</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-600">提子 (白)</span>
                        <span id="whiteCaptures" class="font-mono">0</span>
                    </div>
                </div>
            </div>

            <!-- 规则简述 -->
            <div class="bg-white/80 p-5 shadow-sm border border-stone-200" style="border-radius:0px;">
                <h2 class="text-lg font-semibold mb-3 flex items-center text-primary">
                    <i class="fa-regular fa-bookmark mr-2"></i>围棋规则
                </h2>
                <ul class="text-sm text-gray-700 space-y-2">
                    <li class="flex items-start"><i class="fa-solid fa-circle text-[8px] mt-1.5 mr-2 text-primary"></i>黑先白后，轮流落子</li>
                    <li class="flex items-start"><i class="fa-solid fa-circle text-[8px] mt-1.5 mr-2 text-primary"></i>无气之子将被提走</li>
                    <li class="flex items-start"><i class="fa-solid fa-circle text-[8px] mt-1.5 mr-2 text-primary"></i>禁止全局同形 (简易禁全同)</li>
                    <li class="flex items-start"><i class="fa-solid fa-circle text-[8px] mt-1.5 mr-2 text-primary"></i>点击交叉点落子</li>
                </ul>
            </div>

            <!-- 操作按钮组 -->
            <div class="flex flex-wrap gap-3">
                <button id="passBtn" class="flex-1 min-w-[100px] bg-amber-100 hover:bg-amber-200 text-stone-800 py-3 px-3 font-medium btn-hover flex items-center justify-center gap-2 border border-amber-300" style="border-radius:0px;">
                    <i class="fa-regular fa-hand"></i>虚着
                </button>
                <button id="undoBtn" class="flex-1 min-w-[100px] bg-stone-100 hover:bg-stone-200 text-stone-700 py-3 px-3 font-medium btn-hover flex items-center justify-center gap-2 border border-stone-300" style="border-radius:0px;">
                    <i class="fa-solid fa-arrow-rotate-left"></i>悔棋
                </button>
                <button id="restartBtn" class="flex-1 min-w-[100px] bg-primary hover:bg-primary/90 text-white py-3 px-3 font-medium btn-hover flex items-center justify-center gap-2" style="border-radius:0px;">
                    <i class="fa-solid fa-arrows-rotate"></i>新一局
                </button>
            </div>
            <p class="text-xs text-center text-gray-500 mt-1">点击「虚着」表示放弃一手</p>
        </div>
    </div>

    <!-- 底部版权 -->
    <div class="bg-stone-50 p-3 text-center text-sm text-stone-500 border-t border-stone-200" style="border-radius:0px;">
        <p>&copy; 米遇安</p>
    </div>
</div>

<!-- 结束模态框 -->
<div id="gameOverModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-all duration-300">
    <div class="bg-white p-8 max-w-sm w-full mx-4 shadow-2xl transform transition-all duration-300 scale-95 border border-stone-200" style="border-radius:0px;">
        <div class="text-center">
            <div class="w-16 h-16 bg-amber-50 flex items-center justify-center mx-auto mb-4 border-2 border-amber-200" style="border-radius:50%;">
                <i class="fa-solid fa-trophy text-4xl text-yellow-600"></i>
            </div>
            <h2 class="text-3xl font-bold mb-1" id="modalWinnerText">黑方胜</h2>
            <p class="text-gray-600 mb-6" id="modalSubText">棋局终止</p>
            <button id="modalNewGameBtn" class="w-full bg-primary hover:bg-primary/90 text-white py-3 px-6 font-medium btn-hover" style="border-radius:0px;">
                <i class="fa-regular fa-circle-play mr-2"></i>开始新对局
            </button>
            <button id="modalCloseBtn" class="w-full mt-2 text-gray-500 hover:text-gray-700 py-2 text-sm" style="border-radius:0px;">关闭</button>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 围棋配置 ----------
        const BOARD_SIZE = 19;                // 标准19路
        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;

        // 核心数据
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(EMPTY));
        let currentColor = BLACK;             // 黑先
        let gameOver = false;
        let winner = null;                    // null: 无, 'black', 'white', 'draw'
        
        // 历史记录 (用于悔棋、禁全同)
        let history = [];                     // 存储每一步前的棋盘快照 (二维数组深拷贝)
        let moveCount = 0;
        
        // 提子数
        let blackCaptures = 0;
        let whiteCaptures = 0;
        
        // 连续虚着计数 (双方连续pass则结束)
        let consecutivePass = 0;

        // DOM 元素
        const canvas = document.getElementById('goBoardCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.getElementById('statusIndicator');
        const moveCountDisplay = document.getElementById('moveCountDisplay');
        const currentPlayerIcon = document.getElementById('currentPlayerIcon');
        const currentPlayerName = document.getElementById('currentPlayerName');
        const blackCapturesSpan = document.getElementById('blackCaptures');
        const whiteCapturesSpan = document.getElementById('whiteCaptures');
        
        const passBtn = document.getElementById('passBtn');
        const undoBtn = document.getElementById('undoBtn');
        const restartBtn = document.getElementById('restartBtn');
        
        const modal = document.getElementById('gameOverModal');
        const modalWinnerText = document.getElementById('modalWinnerText');
        const modalSubText = document.getElementById('modalSubText');
        const modalNewGameBtn = document.getElementById('modalNewGameBtn');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        // 棋盘绘制参数
        let cellSize = 0;
        let pieceRadius = 0;
        let boardPadding = 0;
        
        // 辅助函数：深拷贝棋盘
        function copyBoard(src) {
            return src.map(row => [...row]);
        }

        // 保存当前棋盘状态到历史
        function pushHistory() {
            history.push(copyBoard(board));
        }

        // 更新UI文字
        function refreshUI() {
            // 更新手数
            moveCountDisplay.textContent = moveCount;
            
            // 当前玩家显示
            if (!gameOver) {
                if (currentColor === BLACK) {
                    statusText.textContent = '黑棋落子';
                    statusIndicator.className = 'w-5 h-5 rounded-full bg-black shadow-sm border border-gray-400';
                    currentPlayerIcon.className = 'w-7 h-7 rounded-full bg-black border border-gray-300 piece-shadow';
                    currentPlayerName.textContent = '黑棋';
                } else {
                    statusText.textContent = '白棋落子';
                    statusIndicator.className = 'w-5 h-5 rounded-full bg-white shadow-sm border border-gray-400';
                    currentPlayerIcon.className = 'w-7 h-7 rounded-full bg-white border border-gray-400 piece-shadow';
                    currentPlayerName.textContent = '白棋';
                }
            } else {
                if (winner === 'black') {
                    statusText.textContent = '黑胜';
                    statusIndicator.className = 'w-5 h-5 rounded-full bg-black';
                } else if (winner === 'white') {
                    statusText.textContent = '白胜';
                    statusIndicator.className = 'w-5 h-5 rounded-full bg-white border';
                } else {
                    statusText.textContent = '对局结束';
                }
            }
            
            blackCapturesSpan.textContent = blackCaptures;
            whiteCapturesSpan.textContent = whiteCaptures;
        }

        // 显示胜利弹窗
        function showGameOverModal(winnerColor) {
            gameOver = true;
            if (winnerColor === BLACK) {
                winner = 'black';
                modalWinnerText.textContent = '黑方胜利！';
                modalSubText.textContent = `提子 ${blackCaptures} vs ${whiteCaptures}`;
            } else if (winnerColor === WHITE) {
                winner = 'white';
                modalWinnerText.textContent = '白方胜利！';
                modalSubText.textContent = `提子 ${whiteCaptures} vs ${blackCaptures}`;
            } else {
                winner = 'draw';
                modalWinnerText.textContent = '平局';
                modalSubText.textContent = '双方停着';
            }
            
            refreshUI();
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modal.querySelector('div').classList.remove('scale-95');
                modal.querySelector('div').classList.add('scale-100');
            }, 10);
        }

        function hideModal() {
            modal.classList.remove('opacity-100');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        // ---------- 围棋规则核心：气的计算 & 提子 ----------
        // 获取指定颜色的所有连通块 (返回数组，每个元素是坐标数组)
        function getGroup(row, col, color, visited) {
            const group = [];
            const stack = [[row, col]];
            visited[row][col] = true;
            
            while (stack.length) {
                const [r, c] = stack.pop();
                group.push([r, c]);
                const neighbors = [[r-1, c], [r+1, c], [r, c-1], [r, c+1]];
                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && !visited[nr][nc] && board[nr][nc] === color) {
                        visited[nr][nc] = true;
                        stack.push([nr, nc]);
                    }
                }
            }
            return group;
        }

        // 计算一个棋串的气 ( liberties )
        function countLiberties(group) {
            const libertySet = new Set();
            for (let [r, c] of group) {
                const neighbors = [[r-1, c], [r+1, c], [r, c-1], [r, c+1]];
                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc] === EMPTY) {
                        libertySet.add(`${nr},${nc}`);
                    }
                }
            }
            return libertySet.size;
        }

        // 移除指定颜色的无气棋子，返回提子数量
        function removeDeadStones(color) {
            let captured = 0;
            const visited = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(false));
            
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === color && !visited[r][c]) {
                        const group = getGroup(r, c, color, visited);
                        if (countLiberties(group) === 0) {
                            // 提走这一整块
                            for (let [gr, gc] of group) {
                                board[gr][gc] = EMPTY;
                                captured++;
                            }
                        }
                    }
                }
            }
            return captured;
        }

        // 尝试落子: 返回 { success: boolean, errorMsg? }
        function tryPlaceStone(row, col, playerColor) {
            if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return { success: false, errorMsg: '超出棋盘' };
            if (board[row][col] !== EMPTY) return { success: false, errorMsg: '此处已有棋子' };
            
            // 暂存当前棋盘 (用于禁全同检测)
            const snapshotBefore = copyBoard(board);
            
            // 1. 落子
            board[row][col] = playerColor;
            
            // 2. 先提掉对方无气棋子 (对方颜色)
            const opponent = playerColor === BLACK ? WHITE : BLACK;
            const capturedCount = removeDeadStones(opponent);
            
            // 3. 再检查自己落子后是否有气 (自杀规则：如果自己没气且没有提掉对方子，则禁止)
            const visited = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(false));
            const selfGroup = getGroup(row, col, playerColor, visited);
            const selfLiberties = countLiberties(selfGroup);
            
            if (selfLiberties === 0 && capturedCount === 0) {
                // 自杀禁着，回退
                board = snapshotBefore;
                return { success: false, errorMsg: '禁止自杀' };
            }
            
            // 4. 禁全同 (简易: 与历史任一棋盘相同则禁止)
            for (let historic of history) {
                if (boardsEqual(board, historic)) {
                    board = snapshotBefore;
                    return { success: false, errorMsg: '全局同形禁止' };
                }
            }
            
            // 成功落子，记录提子
            if (capturedCount > 0) {
                if (playerColor === BLACK) {
                    blackCaptures += capturedCount;
                } else {
                    whiteCaptures += capturedCount;
                }
            }
            
            // 保存历史 (落子前快照)
            history.push(snapshotBefore);
            moveCount++;
            consecutivePass = 0;   // 有落子则重置虚着计数
            
            return { success: true };
        }

        // 比较两个棋盘是否相同
        function boardsEqual(b1, b2) {
            for (let r=0; r<BOARD_SIZE; r++) {
                for (let c=0; c<BOARD_SIZE; c++) {
                    if (b1[r][c] !== b2[r][c]) return false;
                }
            }
            return true;
        }

        // 处理落子逻辑 (被canvas点击调用)
        function handlePlace(row, col) {
            if (gameOver) return false;
            
            const result = tryPlaceStone(row, col, currentColor);
            if (!result.success) {
                // 可提示，暂时静默
                return false;
            }
            
            // 切换玩家
            currentColor = currentColor === BLACK ? WHITE : BLACK;
            
            // 检查是否有棋局终止 (双方pass后续处理，但正常不会立即结束)
            refreshUI();
            drawBoard();
            
            return true;
        }

        // 虚着 (pass)
        function handlePass() {
            if (gameOver) return;
            
            consecutivePass++;
            // 记录历史 (用于禁全同，但pass不改变棋盘，历史不变，但我们仍然记录一下状态?)
            // 但禁全同依赖历史棋盘，pass不改变棋盘，无妨。
            
            const passPlayer = currentColor;
            currentColor = currentColor === BLACK ? WHITE : BLACK;
            
            // 如果连续两次pass则结束
            if (consecutivePass >= 2) {
                // 判定胜负 (简易: 比较提子数，也可按目，这里用提子近似)
                let blackScore = blackCaptures;
                let whiteScore = whiteCaptures;
                // 贴目? 不贴目，提子多者胜，平则平
                if (blackScore > whiteScore) showGameOverModal(BLACK);
                else if (whiteScore > blackScore) showGameOverModal(WHITE);
                else showGameOverModal(null); // 平局
                drawBoard();
                refreshUI();
                return;
            }
            
            refreshUI();
            drawBoard();
        }

        // 悔棋 (回退一步)
        function handleUndo() {
            if (gameOver) {
                // 如果已结束，悔棋重新激活
                gameOver = false;
                winner = null;
                hideModal();
            }
            if (history.length === 0) return;
            
            // 恢复上一步棋盘
            const prevBoard = history.pop();
            board = copyBoard(prevBoard);
            
            // 重新计算提子数 (简便但准确：根据当前棋盘重算)
            recalcCapturesFromBoard();
            
            // 切换回上一步的玩家 (上一步落子者)
            // 历史快照是落子前的棋盘，所以当前玩家应该是落子方
            // 根据moveCount推断: 当前手数 = history长度
            moveCount = history.length;
            currentColor = (moveCount % 2 === 0) ? BLACK : WHITE;
            consecutivePass = 0;
            
            refreshUI();
            drawBoard();
        }

        function recalcCapturesFromBoard() {
            // 简单重算: 重置捕获，通过计数非空棋子反推，但更准确是用遍历棋盘死子? 我们简单重新计算为0，因为提子无法仅从棋盘还原完整历史，但围棋提子数不影响规则判定(除胜负)。为准确，悔棋后置零。
            // 但为了体验，从0开始比较奇怪。改用粗略：黑子数白子数差值。
            // 更合理: 基于总落子数估算，但围棋提子无法回溯。这里我们直接置零，但允许继续。
            blackCaptures = 0;
            whiteCaptures = 0;
        }

        // 重置游戏
        function resetGame() {
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(EMPTY));
            currentColor = BLACK;
            gameOver = false;
            winner = null;
            history = [];
            moveCount = 0;
            blackCaptures = 0;
            whiteCaptures = 0;
            consecutivePass = 0;
            
            hideModal();
            refreshUI();
            drawBoard();
        }

        // ---------- 绘制围棋盘 (19路) ----------
        function drawBoard() {
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            
            const gridSize = BOARD_SIZE - 1;
            cellSize = w / gridSize;
            pieceRadius = cellSize * 0.42;
            boardPadding = cellSize;
            
            // 绘制网格线
            ctx.lineWidth = 1.8;
            ctx.strokeStyle = '#3E2E23';
            for (let i = 0; i < BOARD_SIZE; i++) {
                const pos = i * cellSize;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, h);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(w, pos);
                ctx.stroke();
            }
            
            // 画星位 (天元 + 八个星)
            const starPositions = [
                [3,3], [9,3], [15,3],
                [3,9], [9,9], [15,9],
                [3,15], [9,15], [15,15]
            ];
            ctx.fillStyle = '#3E2E23';
            starPositions.forEach(([x,y]) => {
                ctx.beginPath();
                ctx.arc(x * cellSize, y * cellSize, cellSize*0.1, 0, 2*Math.PI);
                ctx.fill();
            });
            
            // 绘制棋子
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === EMPTY) continue;
                    const x = c * cellSize;
                    const y = r * cellSize;
                    
                    // 阴影
                    ctx.beginPath();
                    ctx.arc(x, y, pieceRadius+1.5, 0, 2*Math.PI);
                    ctx.fillStyle = '#00000030';
                    ctx.fill();
                    
                    const gradient = ctx.createRadialGradient(x-4, y-4, 2, x, y, pieceRadius+2);
                    if (board[r][c] === BLACK) {
                        gradient.addColorStop(0, '#4a4a4a');
                        gradient.addColorStop(0.7, '#1a1a1a');
                        gradient.addColorStop(1, '#050505');
                    } else {
                        gradient.addColorStop(0, '#fefefe');
                        gradient.addColorStop(0.5, '#e0e0e0');
                        gradient.addColorStop(1, '#b0b0b0');
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, pieceRadius, 0, 2*Math.PI);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.strokeStyle = board[r][c] === BLACK ? '#222' : '#aaa';
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }
            }
        }

        // 调整canvas尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, container.clientHeight);
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            canvas.width = size;
            canvas.height = size;
            drawBoard();
        }

        // 事件绑定
        function bindEvents() {
            canvas.addEventListener('click', (e) => {
                if (gameOver) return;
                const rect = canvas.getBoundingClientRect();
                const scale = canvas.width / rect.width;
                const x = (e.clientX - rect.left) * scale;
                const y = (e.clientY - rect.top) * scale;
                
                const col = Math.round(x / cellSize);
                const row = Math.round(y / cellSize);
                if (row >=0 && row < BOARD_SIZE && col>=0 && col<BOARD_SIZE) {
                    handlePlace(row, col);
                }
            });
            
            passBtn.addEventListener('click', handlePass);
            undoBtn.addEventListener('click', handleUndo);
            restartBtn.addEventListener('click', resetGame);
            
            modalNewGameBtn.addEventListener('click', () => { resetGame(); });
            modalCloseBtn.addEventListener('click', hideModal);
            window.addEventListener('resize', () => { resizeCanvas(); });
        }

        // 初始化
        function init() {
            resizeCanvas();
            bindEvents();
            refreshUI();
            drawBoard();
        }

        init();
    })();
</script>
</body>
</html>
