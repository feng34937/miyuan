<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>现代战争推演4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }
        /* 启动层 */
        .screen-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #000, #010101);
            z-index: 20000;
            transition: opacity 1.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 1;
            pointer-events: none;
        }
        .powered-by {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 50%, #0a0f1a, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20001;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 6px;
            transition: opacity 1s ease;
            opacity: 1;
            pointer-events: none;
            font-family: monospace;
        }
        .powered-by span {
            background: linear-gradient(135deg, #ffdd99, #e6b422, #ffcc66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #ffaa33;
            animation: aurora 1.8s infinite alternate;
        }
        @keyframes aurora {
            0% { text-shadow: 0 0 3px #ffd966; opacity: 0.9; letter-spacing: 6px; }
            100% { text-shadow: 0 0 20px #ffbf40; opacity: 1; letter-spacing: 8px; }
        }
        /* 首页 */
        .home-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #0a1a3a, #01040f);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; transition: opacity 1.8s ease-out;
            pointer-events: none; overflow: hidden;
        }
        .home-container.active { opacity: 1; pointer-events: auto; }
        .flowing-lights { position: absolute; width: 100%; height: 100%; top: 0; left: 0; overflow: hidden; z-index: 0; }
        .light-particle {
            position: absolute; background: radial-gradient(circle, #ffdd99, #ffaa33);
            border-radius: 50%; filter: blur(3px);
            animation: floatGlow 20s infinite linear;
        }
        @keyframes floatGlow {
            0% { transform: translateY(100vh) translateX(-40px); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) translateX(40px); opacity: 0; }
        }
        .game-title {
            font-size: 2.8rem; font-weight: 900;
            background: linear-gradient(135deg, #fff0c0, #f5bc5c, #ffecb3);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 1.5rem; z-index: 2; letter-spacing: 4px;
            text-align: center;
            padding: 0 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .btn-group { display: flex; gap: 1rem; z-index: 2; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
        .gold-btn {
            background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
            border: 1.5px solid #f5bc5c; color: #fff2d7; font-size: 1.2rem;
            padding: 0.7rem 1.5rem; cursor: pointer; font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); transition: 0.1s;
        }
        .gold-btn:active { transform: scale(0.98); background: #3a2a1a; }

        /* 游戏主界面 */
        .game-main {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030c15; z-index: 2000; display: none; flex-direction: column;
        }
        .game-main.active { display: flex; }
        .nation-info {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f5bc5c;
            gap: 8px;
            z-index: 2100;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .nation-card {
            color: #fdebb3; font-weight: bold; font-size: 0.75rem;
            background: #0a1f30cc; padding: 5px 12px;
            display: flex; align-items: center; gap: 12px;
            border: 1px solid #dba347;
        }
        .turn-text {
            background: #000000aa; backdrop-filter: blur(8px); padding: 5px 12px;
            font-size: 0.75rem; font-weight: bold; color: #ffeaac;
            border-left: 3px solid #f5bc5c;
        }
        /* 地图区域 */
        .map-wrapper {
            flex: 1;
            overflow: auto;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(20, 28px);
            grid-template-rows: repeat(20, 28px);
            background: #0a1622;
            border: 2px solid #ac864a;
            box-shadow: 0 0 0 2px #162a3a;
        }
        .grid-cell {
            border: 1px solid #2d5470;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .grid-cell:active { filter: brightness(1.2); transform: scale(0.96); }
        .sea { background: radial-gradient(circle at 30% 20%, #1e5a7a, #0e3950); }
        .land { background: radial-gradient(circle at 30% 20%, #4cae7a, #2a6a46); }
        .selected { background: radial-gradient(circle, #ffc107, #f57c00) !important; border: 1px solid white !important; }
        .unit { background: radial-gradient(circle at 30% 30%, #e65c5c, #a03333) !important; box-shadow: inset 0 0 4px #ffcc00; }
        .player1-land { background: radial-gradient(circle, #c084fc, #a855f7) !important; }
        .player1-capital { background: radial-gradient(circle, #d6a6ff, #b77cf0) !important; border: 2px solid #ffdd88; }
        .player2-land { background: radial-gradient(circle, #34d399, #10b981) !important; }
        .player2-capital { background: radial-gradient(circle, #5ee0ae, #2cbd82) !important; border: 2px solid #ffdd88; }
        .player3-land { background: radial-gradient(circle, #fbbf24, #f59e0b) !important; }
        .player3-capital { background: radial-gradient(circle, #ffd966, #f5a623) !important; border: 2px solid #fff0b0; }
        .player4-land { background: radial-gradient(circle, #f87171, #ef4444) !important; }
        .player4-capital { background: radial-gradient(circle, #fc8b8b, #e35f5f) !important; border: 2px solid #ffe0e0; }
        .player5-land { background: radial-gradient(circle, #f472b6, #ec4899) !important; }
        .player5-capital { background: radial-gradient(circle, #ff92ce, #da62b0) !important; }
        .player6-land { background: radial-gradient(circle, #a78bfa, #8b5cf6) !important; }
        .player6-capital { background: radial-gradient(circle, #b794ff, #8a6cf0) !important; }
        .player7-land { background: radial-gradient(circle, #60a5fa, #3b82f6) !important; }
        .player7-capital { background: radial-gradient(circle, #7faeff, #2e7eb8) !important; }
        .player8-land { background: radial-gradient(circle, #fb7185, #f43f5e) !important; }
        .player8-capital { background: radial-gradient(circle, #ff98aa, #fc687c) !important; }
        .player9-land { background: radial-gradient(circle, #94a3b8, #64748b) !important; }
        .player9-capital { background: radial-gradient(circle, #b0c4de, #748aa6) !important; }

        /* 悬浮按钮 */
        .fab-horizontal {
            position: fixed; bottom: 12px; right: 12px; z-index: 3000;
            display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            padding: 6px 12px;
            border: 1px solid #f5bc5c;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: 85vw;
        }
        .fab-icon {
            width: 40px; height: 40px; background: #0a1f2e;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #ffdfa5; cursor: pointer;
            border: 1px solid #dba347;
            transition: 0.1s;
        }
        .fab-icon:active { transform: scale(0.96); background: #2c5a78; color: white; }
        .lobby-modal, .tech-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.96); backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: center; z-index: 7000;
            padding: 16px;
        }
        .lobby-card, .tech-card {
            background: #071a28; border: 2px solid #f5bc5c; width: 100%; max-width: 550px;
            padding: 1.2rem; text-align: center; max-height: 85vh; overflow-y: auto;
            color: #ffefcf;
        }
        .player-config-list { max-height: 50vh; overflow-y: auto; margin: 1rem 0; }
        .player-row {
            display: flex; gap: 8px; align-items: center; background: #021a2b; margin: 8px 0;
            padding: 6px 8px; border: 1px solid #c99242; flex-wrap: wrap;
        }
        .player-row input { background: #0a2030; border: 1px solid #c99242; color: #ffefcf; padding: 4px 6px; flex: 2; min-width: 80px; font-size: 0.75rem; }
        .player-row label { color: #ffdeae; }
        .lobby-btn { background: #c5863a; border: none; color: white; padding: 6px 18px; font-size: 0.9rem; margin: 6px 4px; cursor: pointer; font-weight: bold; }
        .status-tip {
            position: fixed; bottom: 70px; left: 12px;
            background: #000000cc; backdrop-filter: blur(12px);
            color: #ffefbb; padding: 4px 12px; border-left: 4px solid #f5bc5c;
            font-weight: bold; z-index: 3000; font-size: 0.7rem;
            pointer-events: none; white-space: nowrap;
        }
        .tech-item { background: #05212e; margin: 8px 0; padding: 8px; border: 1px solid #e4b363; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; font-size: 0.8rem; color: #fff2da; }
        .tech-item button { background: #c5863a; border: none; color: white; padding: 4px 12px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .close-tech { background: #5a3e1f; margin-top: 12px; padding: 6px 16px; cursor: pointer; color: #ffefcf; border: none; font-weight: bold; }
        h2, h3 { color: #f5bc5c; }
        @media (max-width: 650px) {
            .fab-icon { width: 36px; height: 36px; font-size: 16px; }
            .grid-container { grid-template-columns: repeat(20, 24px); grid-template-rows: repeat(20, 24px); }
            .nation-card, .turn-text { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="screen-mask" id="blackMask"></div>
<div class="powered-by" id="poweredScreen"><span>powered by Miyuan</span></div>
<div class="home-container" id="homeContainer">
    <div class="flowing-lights" id="lightCanvas"></div>
    <div class="game-title">现代战争推演4</div>
    <div class="btn-group">
        <div class="gold-btn" id="enterGameBtn">⚔️ 进入游戏</div>
        <div class="gold-btn" id="tutorialHomeBtn">📘 新手教程</div>
    </div>
</div>
<div class="game-main" id="gameMain">
    <div class="nation-info" id="nationInfoBar">
        <div class="nation-card" id="playerInfoPanel">🏳️ 帝国议会</div>
        <div class="turn-text" id="turnText">⚙️ 待机中</div>
    </div>
    <div class="map-wrapper">
        <div class="grid-container" id="gridMap"></div>
    </div>
</div>
<div class="fab-horizontal" id="fabMenu">
    <div class="fab-icon" id="fabRules" title="规则"><i class="fas fa-scroll"></i></div>
    <div class="fab-icon" id="fabResearch" title="研发"><i class="fas fa-flask"></i></div>
    <div class="fab-icon" id="fabAttack" title="攻击"><i class="fas fa-crosshairs"></i></div>
    <div class="fab-icon" id="fabCollect" title="收集"><i class="fas fa-coins"></i></div>
    <div class="fab-icon" id="fabExpand" title="扩张"><i class="fas fa-expand-alt"></i></div>
    <div class="fab-icon" id="fabPlace" title="部署步兵"><i class="fas fa-user-plus"></i></div>
    <div class="fab-icon" id="fabDevelop" title="内政发展"><i class="fas fa-chart-line"></i></div>
    <div class="fab-icon" id="fabEndTurn" title="结束回合"><i class="fas fa-hourglass-half"></i></div>
</div>
<div class="status-tip" id="statusMessage">✦ 高亮科技树 · 触摸开启霸业</div>

<script>
    (function() {
        // 启动动画
        const blackMask = document.getElementById('blackMask');
        const poweredScreen = document.getElementById('poweredScreen');
        const homeContainer = document.getElementById('homeContainer');
        const gameMain = document.getElementById('gameMain');
        const enterBtn = document.getElementById('enterGameBtn');
        const tutorialBtn = document.getElementById('tutorialHomeBtn');

        setTimeout(() => {
            poweredScreen.style.opacity = '0';
            setTimeout(() => {
                poweredScreen.style.display = 'none';
                blackMask.style.opacity = '0';
                setTimeout(() => {
                    blackMask.style.display = 'none';
                    homeContainer.classList.add('active');
                    generateParticles();
                }, 500);
            }, 1000);
        }, 1300);

        function generateParticles() {
            const container = document.getElementById('lightCanvas');
            if(!container) return;
            for(let i=0;i<100;i++) {
                let p = document.createElement('div');
                p.classList.add('light-particle');
                let size = 2 + Math.random() * 6;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = 9 + Math.random() * 18 + 's';
                container.appendChild(p);
            }
        }

        // ================= 50个研发项目（分类）高对比 =================
        const techCategories = {
            "⚔️ 军事基础": ["轻型坦克","重型坦克","自行火炮","火箭炮","防空系统"],
            "🚀 导弹科技": ["短程导弹","中程导弹","洲际导弹","高超音速导弹","巡航导弹"],
            "☢️ 核子力量": ["核基础设施","原子弹","氢弹","中子弹","钴弹"],
            "✈️ 空军力量": ["螺旋桨战机","喷气战机","战斗轰炸机","战略轰炸机","隐形轰炸机"],
            "⚓ 海军力量": ["巡逻艇","导弹快艇","驱逐舰","潜艇","核潜艇"],
            "🔮 未来科技": ["电磁炮","激光武器","粒子炮","天基动能","纳米机器人"],
            "📈 经济产业": ["农业机械化","工业自动化","商业全球化","数字金融","人工智能管理"],
            "🛡️ 战略支援": ["雷达站","电子干扰","卫星侦察","网络战","心理战"]
        };
        let techList = [];
        for(let cat in techCategories) {
            techCategories[cat].forEach(name => {
                let id = name.replace(/ /g, '');
                techList.push({ id, name, category: cat, costSilver: 150 + Math.floor(Math.random()*300), costRare: Math.floor(Math.random()*12), costOil: Math.floor(Math.random()*18), costGold: Math.floor(Math.random()*3), prereq: null });
            });
        }
        // 前置关联
        let shortId = techList.find(t=>t.name==='短程导弹')?.id;
        let mediumId = techList.find(t=>t.name==='中程导弹')?.id;
        if(mediumId) techList.find(t=>t.name==='中程导弹').prereq = shortId;
        if(techList.find(t=>t.name==='洲际导弹')) techList.find(t=>t.name==='洲际导弹').prereq = mediumId;
        while(techList.length<50) techList.push({ id: `tech${techList.length}`, name: `跨时代科技${techList.length}`, category:"✨ 通用技术", costSilver:280, costRare:8 });
        
        let GAME = {
            playerResources: {}, playerEconomy: {},
            playerNames: {}, capitalNames: {},
            currentTurn: 1, totalPlayers: 2,
            playerLands: {}, units: new Map(), harvestedCells: new Set(),
            eliminatedPlayers: new Set(),
            setupPhase: { isSetting: true, currentSettingPlayer: 1, selectedCells: [], selectingCapital: false },
            selectedAction: null, attackUsedThisTurn: false,
            researched: {},
            mapTerrain: [],
            aiPlayers: new Set(),
            aiProcessing: false,
            turnCount: 0
        };
        techList.forEach(t => { GAME.researched[t.id] = new Set(); });

        function generateMap() {
            let map = [];
            for(let i=0;i<20;i++) {
                map[i]=[];
                for(let j=0;j<20;j++) map[i][j] = Math.random()>0.48?1:0;
            }
            let totalLand = map.flat().filter(v=>v===1).length;
            let target = 200;
            while(totalLand > target) {
                let y = Math.floor(Math.random()*20), x = Math.floor(Math.random()*20);
                if(map[y][x]===1) { map[y][x]=0; totalLand--; }
            }
            while(totalLand < target) {
                let y = Math.floor(Math.random()*20), x = Math.floor(Math.random()*20);
                if(map[y][x]===0) { map[y][x]=1; totalLand++; }
            }
            return map;
        }

        function renderFullMap() {
            const container = document.getElementById('gridMap');
            if(!container) return;
            container.innerHTML = '';
            for(let y=0;y<20;y++) {
                for(let x=0;x<20;x++) {
                    let cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    let key = `${x},${y}`;
                    let owner = 0;
                    for(let p=1;p<=GAME.totalPlayers;p++) if(GAME.playerLands[p]?.cells.has(key)) owner = p;
                    let isCapital = false;
                    for(let p=1;p<=GAME.totalPlayers;p++) if(GAME.playerLands[p]?.capital && GAME.playerLands[p].capital.x===x && GAME.playerLands[p].capital.y===y) isCapital=true;
                    let terrain = (GAME.mapTerrain[y] && GAME.mapTerrain[y][x]===1) ? 'land' : 'sea';
                    cell.classList.add(terrain);
                    if(owner) {
                        cell.classList.add(`player${owner}-land`);
                        if(isCapital) cell.classList.add(`player${owner}-capital`);
                    }
                    if(GAME.units.has(key)) cell.classList.add('unit');
                    cell.dataset.x=x; cell.dataset.y=y;
                    cell.addEventListener('click', (function(xx,yy){ return function(){ onGridClick(xx,yy); }; })(x,y));
                    container.appendChild(cell);
                }
            }
        }

        function updateTopBar() {
            let panel = document.getElementById('playerInfoPanel');
            let turnSpan = document.getElementById('turnText');
            if(!panel) return;
            if(GAME.setupPhase.isSetting) {
                let cur = GAME.setupPhase.currentSettingPlayer;
                let name = GAME.playerNames[cur] || `领主${cur}`;
                panel.innerHTML = `🏳️ ${name}  | 🏛️ 待立都 | 💰银 ${GAME.playerResources[cur]?.silver || 200}`;
                turnSpan.innerHTML = `⚙️ 拓建 · ${name}`;
            } else {
                let cur = GAME.currentTurn;
                let eco = GAME.playerEconomy[cur] || {gdp:500, agriculture:10, industry:5, commerce:8, science:5};
                let res = GAME.playerResources[cur] || {silver:220,gold:3,rareEarth:6,oil:14,uranium:1};
                panel.innerHTML = `🏳️ ${GAME.playerNames[cur]} | 🏛️ ${GAME.capitalNames[cur]} | 💰银${res.silver} | GDP${eco.gdp} | 🌾${eco.agriculture} | 🏭${eco.industry} | 📈${eco.commerce} | 🔬${eco.science}`;
                turnSpan.innerHTML = `✨ ${GAME.playerNames[cur]} ${GAME.attackUsedThisTurn?'(已战)':'待命'} 第${GAME.turnCount}轮`;
            }
        }

        function isConnected(cells) {
            if(cells.length<=1) return true;
            let set = new Set(cells.map(c=>`${c.x},${c.y}`));
            let start = cells[0];
            let visited = new Set(), q=[start];
            visited.add(`${start.x},${start.y}`);
            while(q.length) {
                let cur = q.shift();
                [[-1,0],[1,0],[0,-1],[0,1]].forEach(dir=>{
                    let nx = cur.x+dir[0], ny = cur.y+dir[1];
                    let k = `${nx},${ny}`;
                    if(set.has(k) && !visited.has(k)) { visited.add(k); q.push({x:nx,y:ny}); }
                });
            }
            return visited.size === cells.length;
        }

        function onGridClick(x,y) {
            let cellDiv = document.querySelector(`.grid-cell[data-x='${x}'][data-y='${y}']`);
            if(!cellDiv) return;
            if(GAME.setupPhase.isSetting) {
                let curPlayer = GAME.setupPhase.currentSettingPlayer;
                if(!cellDiv.classList.contains('land')) { showMsg('只能选陆地'); return; }
                if(!GAME.setupPhase.selectingCapital) {
                    if(GAME.setupPhase.selectedCells.some(c=>c.x===x && c.y===y)) {
                        GAME.setupPhase.selectedCells = GAME.setupPhase.selectedCells.filter(c=>!(c.x===x && c.y===y));
                        cellDiv.classList.remove('selected');
                    } else {
                        if(GAME.setupPhase.selectedCells.length>=4) { showMsg('最多4块'); return; }
                        GAME.setupPhase.selectedCells.push({x,y});
                        cellDiv.classList.add('selected');
                    }
                    if(GAME.setupPhase.selectedCells.length===4 && isConnected(GAME.setupPhase.selectedCells)) {
                        GAME.setupPhase.selectingCapital = true;
                        showMsg('点击其中一块作为首都');
                    } else if(GAME.setupPhase.selectedCells.length===4 && !isConnected(GAME.setupPhase.selectedCells)) {
                        GAME.setupPhase.selectedCells.pop();
                        cellDiv.classList.remove('selected');
                        showMsg('必须连成一片');
                    }
                } else {
                    if(!GAME.setupPhase.selectedCells.some(c=>c.x===x && c.y===y)){ showMsg('首都需从已选地块中确立'); return; }
                    GAME.playerLands[curPlayer] = { cells: new Set(), capital:null };
                    GAME.setupPhase.selectedCells.forEach(c=>{ GAME.playerLands[curPlayer].cells.add(`${c.x},${c.y}`); });
                    GAME.playerLands[curPlayer].capital = {x,y};
                    if(!GAME.playerResources[curPlayer]) GAME.playerResources[curPlayer] = {silver:250,gold:5,diamond:1,rareEarth:12,oil:20,uranium:3};
                    if(!GAME.playerEconomy[curPlayer]) GAME.playerEconomy[curPlayer] = {gdp:550, agriculture:12, industry:7, commerce:9, science:6};
                    renderFullMap();
                    if(curPlayer >= GAME.totalPlayers) {
                        GAME.setupPhase.isSetting = false;
                        GAME.currentTurn = 1;
                        GAME.turnCount = 0;
                        showMsg('帝国崛起！');
                        updateTopBar();
                        if(GAME.aiPlayers.has(1)) executeAITurn();
                    } else {
                        GAME.setupPhase.currentSettingPlayer++;
                        GAME.setupPhase.selectedCells = [];
                        GAME.setupPhase.selectingCapital = false;
                        showMsg(`轮到 ${GAME.playerNames[GAME.setupPhase.currentSettingPlayer]} 开辟疆土`);
                        updateTopBar();
                        if(GAME.aiPlayers.has(GAME.setupPhase.currentSettingPlayer)) autoSetupTerrain();
                    }
                }
                return;
            }
            if(GAME.selectedAction === 'attack') actionAttack(x,y);
            else if(GAME.selectedAction === 'collect') actionCollect(x,y);
            else if(GAME.selectedAction === 'expand') actionExpand(x,y);
            else if(GAME.selectedAction === 'place') actionPlaceUnit(x,y);
            else if(GAME.selectedAction === 'develop') showDevelopMenu();
            else showMsg('请先选择行动按钮');
        }

        function autoSetupTerrain() {
            let player = GAME.setupPhase.currentSettingPlayer;
            let landCells = [];
            for(let y=0;y<20;y++) for(let x=0;x<20;x++) {
                let cell = document.querySelector(`.grid-cell[data-x='${x}'][data-y='${y}']`);
                if(cell && cell.classList.contains('land')) landCells.push({x,y,cell});
            }
            if(landCells.length<4) return;
            let selected = [];
            let start = landCells[Math.floor(Math.random()*landCells.length)];
            selected.push(start);
            let frontier = [start];
            while(selected.length<4 && frontier.length) {
                let cur = frontier.shift();
                for(let dir of [[-1,0],[1,0],[0,-1],[0,1]]) {
                    let nx = cur.x+dir[0], ny = cur.y+dir[1];
                    let nc = landCells.find(c=>c.x===nx && c.y===ny);
                    if(nc && !selected.some(s=>s.x===nx && s.y===ny)) {
                        selected.push(nc);
                        frontier.push(nc);
                        if(selected.length>=4) break;
                    }
                }
            }
            if(selected.length<4) return;
            for(let s of selected) {
                GAME.setupPhase.selectedCells.push({x:s.x,y:s.y});
                s.cell.classList.add('selected');
            }
            GAME.setupPhase.selectingCapital = true;
            let cap = selected[Math.floor(Math.random()*selected.length)];
            GAME.playerLands[player] = { cells: new Set(), capital:null };
            GAME.setupPhase.selectedCells.forEach(c=>{ GAME.playerLands[player].cells.add(`${c.x},${c.y}`); });
            GAME.playerLands[player].capital = {x:cap.x,y:cap.y};
            if(!GAME.playerResources[player]) GAME.playerResources[player] = {silver:250,gold:5,diamond:1,rareEarth:12,oil:20,uranium:3};
            if(!GAME.playerEconomy[player]) GAME.playerEconomy[player] = {gdp:550, agriculture:12, industry:7, commerce:9, science:6};
            renderFullMap();
            if(player >= GAME.totalPlayers) {
                GAME.setupPhase.isSetting = false;
                GAME.currentTurn = 1;
                showMsg('帝国崛起！');
                updateTopBar();
                if(GAME.aiPlayers.has(1)) executeAITurn();
            } else {
                GAME.setupPhase.currentSettingPlayer++;
                GAME.setupPhase.selectedCells = [];
                GAME.setupPhase.selectingCapital = false;
                showMsg(`轮到 ${GAME.playerNames[GAME.setupPhase.currentSettingPlayer]} 开辟疆土`);
                updateTopBar();
                if(GAME.aiPlayers.has(GAME.setupPhase.currentSettingPlayer)) autoSetupTerrain();
            }
        }

        async function executeAITurn() {
            if(GAME.setupPhase.isSetting) return;
            let player = GAME.currentTurn;
            if(!GAME.aiPlayers.has(player) || GAME.aiProcessing) return;
            GAME.aiProcessing = true;
            showMsg(`🤖 AI ${GAME.playerNames[player]} 行动中...`);
            await new Promise(r=>setTimeout(r, 300));
            let eco = GAME.playerEconomy[player];
            if(eco && (eco.agriculture<30 || eco.industry<25)) {
                developEconomy(player, 'agriculture', 5, 120);
                await new Promise(r=>setTimeout(r, 200));
                developEconomy(player, 'industry', 5, 150);
            }
            for(let [key,unit] of GAME.units) {
                if(unit.owner===player && !GAME.harvestedCells.has(key) && GAME.playerLands[player]?.cells.has(key)) {
                    let [x,y] = key.split(',').map(Number);
                    actionCollect(x,y);
                    await new Promise(r=>setTimeout(r, 200));
                }
            }
            let candidates = [];
            for(let cell of GAME.playerLands[player].cells) {
                let [cx,cy] = cell.split(',').map(Number);
                [[-1,0],[1,0],[0,-1],[0,1]].forEach(dir=>{
                    let nx=cx+dir[0], ny=cy+dir[1];
                    let nk=`${nx},${ny}`;
                    if(nx>=0 && nx<20 && ny>=0 && ny<20 && !GAME.playerLands[player].cells.has(nk) && GAME.playerResources[player].silver>=100) {
                        let occ = false;
                        for(let p=1;p<=GAME.totalPlayers;p++) if(p!==player && GAME.playerLands[p]?.cells.has(nk)) occ=true;
                        if(!occ) candidates.push({x:nx,y:ny});
                    }
                });
            }
            if(candidates.length) {
                let target = candidates[Math.floor(Math.random()*candidates.length)];
                actionExpand(target.x,target.y);
                await new Promise(r=>setTimeout(r, 200));
            }
            if(!GAME.attackUsedThisTurn) {
                let enemies = [];
                for(let [k,u] of GAME.units) if(u.owner !== player && !GAME.eliminatedPlayers.has(u.owner)) enemies.push(k);
                if(enemies.length===0) {
                    for(let i=1;i<=GAME.totalPlayers;i++) if(i!==player && !GAME.eliminatedPlayers.has(i)) {
                        for(let cell of GAME.playerLands[i].cells) enemies.push(cell);
                    }
                }
                if(enemies.length) {
                    let targetKey = enemies[Math.floor(Math.random()*enemies.length)];
                    let [tx,ty] = targetKey.split(',').map(Number);
                    actionAttack(tx,ty);
                    await new Promise(r=>setTimeout(r, 300));
                }
            }
            endTurn();
            GAME.aiProcessing = false;
        }

        function showDevelopMenu() {
            let eco = GAME.playerEconomy[GAME.currentTurn];
            let choice = prompt(`🌾农业${eco.agriculture} 🏭工业${eco.industry} 📈商业${eco.commerce} 🔬科技${eco.science}\nGDP:${eco.gdp}\n发展:\n1农业+5(120银) 2工业+5(150银) 3商业+5(180银) 4科技+3(200银)`);
            if(choice === '1') developEconomy(GAME.currentTurn, 'agriculture', 5, 120);
            else if(choice === '2') developEconomy(GAME.currentTurn, 'industry', 5, 150);
            else if(choice === '3') developEconomy(GAME.currentTurn, 'commerce', 5, 180);
            else if(choice === '4') developEconomy(GAME.currentTurn, 'science', 3, 200);
            else showMsg('取消发展');
            GAME.selectedAction = null;
        }
        function developEconomy(player, sector, amount, cost) {
            let eco = GAME.playerEconomy[player];
            if(GAME.playerResources[player].silver < cost) { showMsg('银币不足'); return; }
            GAME.playerResources[player].silver -= cost;
            eco[sector] += amount;
            let newGdp = eco.gdp + eco.agriculture*3 + eco.industry*4 + eco.commerce*2 + eco.science*5;
            eco.gdp = Math.floor(newGdp);
            showMsg(`${sector} 发展成功! GDP ${eco.gdp}`);
            updateTopBar();
        }

        function showTechTree() {
            if(GAME.setupPhase.isSetting) { showMsg('建设阶段无法研发'); return; }
            let player = GAME.currentTurn;
            let modal = document.createElement('div');
            modal.className = 'tech-modal';
            let html = `<div class="tech-card"><h2><i class="fas fa-microchip"></i> 📡 科技研发 (${techList.length}项)</h2>`;
            let cats = {};
            techList.forEach(t => { if(!cats[t.category]) cats[t.category]=[]; cats[t.category].push(t); });
            for(let cat in cats) {
                html += `<h3 style="color:#f5bc5c; margin-top:12px;">${cat}</h3>`;
                cats[cat].forEach(tech => {
                    let has = GAME.researched[tech.id].has(player);
                    if(has) {
                        html += `<div class="tech-item"><span>✅ ${tech.name}</span><button disabled>已研发</button></div>`;
                    } else {
                        let prereqOk = true;
                        if(tech.prereq && !GAME.researched[tech.prereq]?.has(player)) prereqOk = false;
                        let costStr = `${tech.costSilver||0}银 `;
                        if(tech.costRare) costStr += `${tech.costRare}稀土 `;
                        if(tech.costOil) costStr += `${tech.costOil}石油 `;
                        if(tech.costGold) costStr += `${tech.costGold}金 `;
                        html += `<div class="tech-item"><span>🔬 ${tech.name}<br><small>${costStr}</small></span>
                            <button data-tech="${tech.id}" ${!prereqOk?'disabled':''}>${prereqOk?'研发':'前置未解锁'}</button></div>`;
                    }
                });
            }
            html += `<button class="close-tech" id="closeTechBtn">关闭</button></div>`;
            modal.innerHTML = html;
            document.body.appendChild(modal);
            modal.querySelectorAll('[data-tech]').forEach(btn => {
                btn.onclick = (e) => {
                    let techId = btn.dataset.tech;
                    let tech = techList.find(t=>t.id===techId);
                    if(!tech) return;
                    if(tech.prereq && !GAME.researched[tech.prereq]?.has(player)) { showMsg('前置科技未研发'); modal.remove(); showTechTree(); return; }
                    let costSilver=tech.costSilver||0, costGold=tech.costGold||0, costRare=tech.costRare||0, costOil=tech.costOil||0;
                    let res = GAME.playerResources[player];
                    if(res.silver < costSilver || res.gold < costGold || res.rareEarth < costRare || res.oil < costOil) {
                        showMsg('资源不足'); modal.remove(); showTechTree(); return;
                    }
                    res.silver -= costSilver; res.gold -= costGold; res.rareEarth -= costRare; res.oil -= costOil;
                    GAME.researched[techId].add(player);
                    if(tech.name === '农业机械化') GAME.playerEconomy[player].agriculture += 8;
                    if(tech.name === '工业自动化') GAME.playerEconomy[player].industry += 8;
                    if(tech.name === '商业全球化') GAME.playerEconomy[player].commerce += 8;
                    if(tech.name === '数字金融') GAME.playerEconomy[player].commerce += 5;
                    if(tech.name === '人工智能管理') GAME.playerEconomy[player].science += 6;
                    updateTopBar();
                    showMsg(`研发成功: ${tech.name}`);
                    modal.remove();
                    showTechTree();
                };
            });
            document.getElementById('closeTechBtn')?.addEventListener('click',()=>modal.remove());
        }

        function actionAttack(x,y) {
            let key = `${x},${y}`;
            let owner = null;
            for(let p=1;p<=GAME.totalPlayers;p++) if(GAME.playerLands[p]?.cells.has(key)) owner=p;
            if(owner === GAME.currentTurn){ showMsg('无法进攻己方'); return; }
            if(GAME.attackUsedThisTurn){ showMsg('本回合已攻击'); return; }
            let myUnit = null;
            for(let [k,u] of GAME.units) if(u.owner === GAME.currentTurn){ myUnit = k; break; }
            if(!myUnit){ showMsg('无战斗单位'); return; }
            if(owner) {
                GAME.playerLands[owner].cells.delete(key);
                if(GAME.playerLands[owner].capital && GAME.playerLands[owner].capital.x===x && GAME.playerLands[owner].capital.y===y) {
                    GAME.eliminatedPlayers.add(owner);
                    showMsg(`⚔️ ${GAME.playerNames[owner]} 灭亡`);
                }
            }
            GAME.playerLands[GAME.currentTurn].cells.add(key);
            let [sx,sy] = myUnit.split(',').map(Number);
            let oldCell = document.querySelector(`.grid-cell[data-x='${sx}'][data-y='${sy}']`);
            if(oldCell) oldCell.classList.remove('unit');
            GAME.units.delete(myUnit);
            GAME.units.set(key, {type:'步兵', owner:GAME.currentTurn});
            GAME.attackUsedThisTurn = true;
            renderFullMap(); updateTopBar();
            showMsg(`占领 (${x},${y})`);
            GAME.selectedAction = null;
        }
        function actionCollect(x,y) {
            let key = `${x},${y}`;
            if(!GAME.playerLands[GAME.currentTurn]?.cells.has(key)){ showMsg('非己方领土'); return; }
            if(GAME.harvestedCells.has(key)){ showMsg('资源枯竭'); return; }
            let gain = 40 + Math.floor(Math.random() * 40);
            GAME.playerResources[GAME.currentTurn].silver += gain;
            GAME.harvestedCells.add(key);
            showMsg(`💰 +${gain}银`);
            updateTopBar(); renderFullMap();
            GAME.selectedAction = null;
        }
        function actionExpand(x,y) {
            let key = `${x},${y}`;
            if(GAME.playerLands[GAME.currentTurn].cells.has(key)){ showMsg('已是领土'); return; }
            let neighbors = [`${x-1},${y}`,`${x+1},${y}`,`${x},${y-1}`,`${x},${y+1}`];
            let adjacent = neighbors.some(n => GAME.playerLands[GAME.currentTurn].cells.has(n));
            if(!adjacent){ showMsg('只能扩张相邻'); return; }
            if(GAME.playerResources[GAME.currentTurn].silver < 100){ showMsg('银币不足100'); return; }
            GAME.playerResources[GAME.currentTurn].silver -= 100;
            GAME.playerLands[GAME.currentTurn].cells.add(key);
            renderFullMap(); updateTopBar();
            showMsg(`扩张成功 -100银`);
            GAME.selectedAction = null;
        }
        function actionPlaceUnit(x,y) {
            let key = `${x},${y}`;
            if(!GAME.playerLands[GAME.currentTurn]?.cells.has(key)){ showMsg('需部署在己方领土'); return; }
            if(GAME.units.has(key)){ showMsg('已有单位'); return; }
            GAME.units.set(key, {type:'步兵', owner:GAME.currentTurn});
            renderFullMap();
            showMsg(`部署步兵`);
            GAME.selectedAction = null;
        }
        function endTurn() {
            if(GAME.setupPhase.isSetting){ showMsg('建设中无法结束'); return; }
            let eco = GAME.playerEconomy[GAME.currentTurn];
            let income = Math.floor(eco.agriculture * 2 + eco.industry * 3 + eco.commerce * 2.5 + eco.science * 2);
            GAME.playerResources[GAME.currentTurn].silver += income;
            showMsg(`税收 +${income}银`);
            updateTopBar();
            let next = (GAME.currentTurn % GAME.totalPlayers) + 1;
            while(GAME.eliminatedPlayers.has(next) && next !== GAME.currentTurn) next = (next % GAME.totalPlayers)+1;
            GAME.currentTurn = next;
            GAME.turnCount++;
            GAME.attackUsedThisTurn = false;
            GAME.selectedAction = null;
            renderFullMap(); updateTopBar();
            showMsg(`轮到 ${GAME.playerNames[GAME.currentTurn]}`);
            if(GAME.aiPlayers.has(GAME.currentTurn)) executeAITurn();
        }
        function showMsg(txt) { let el = document.getElementById('statusMessage'); if(el) el.innerHTML = `✦ ${txt} ✦`; }

        function showLobbyConfig(callback) {
            let modal = document.createElement('div');
            modal.className = 'lobby-modal';
            let playerCount = 2;
            let container = document.createElement('div');
            container.className = 'lobby-card';
            container.innerHTML = `
                <h2><i class="fas fa-crown"></i> 帝国议会</h2>
                <div style="display:flex; gap:15px; justify-content:center; margin-bottom:15px;">
                    <button id="decPlayer" class="lobby-btn">-</button>
                    <span id="playerNumDisplay" style="color:#ffdeae; font-size:1.8rem;">2</span>
                    <button id="incPlayer" class="lobby-btn">+</button>
                </div>
                <div id="playersConfigList" class="player-config-list"></div>
                <button id="confirmLobby" class="lobby-btn">⚡ 开创史诗 ⚡</button>
            `;
            modal.appendChild(container);
            document.body.appendChild(modal);
            function rebuildList(count) {
                let listDiv = document.getElementById('playersConfigList');
                listDiv.innerHTML = '';
                for(let i=1;i<=count;i++) {
                    let row = document.createElement('div');
                    row.className = 'player-row';
                    row.innerHTML = `
                        <span style="color:#ffd966;">玩家${i}</span>
                        <input type="text" id="pName${i}" placeholder="国度" value="星穹${i}">
                        <input type="text" id="pCap${i}" placeholder="首都" value="辉光${i}">
                        <label style="color:#ffdeae;"><input type="checkbox" id="pAI${i}"> 🤖 AI</label>
                    `;
                    listDiv.appendChild(row);
                }
            }
            let numSpan = document.getElementById('playerNumDisplay');
            let decBtn = document.getElementById('decPlayer'), incBtn = document.getElementById('incPlayer');
            decBtn.onclick = () => { if(playerCount>2) { playerCount--; numSpan.innerText=playerCount; rebuildList(playerCount); } };
            incBtn.onclick = () => { if(playerCount<9) { playerCount++; numSpan.innerText=playerCount; rebuildList(playerCount); } };
            rebuildList(2);
            document.getElementById('confirmLobby').onclick = () => {
                let total = parseInt(numSpan.innerText);
                GAME.totalPlayers = total;
                GAME.playerNames = {}; GAME.capitalNames = {}; GAME.aiPlayers.clear();
                for(let i=1;i<=total;i++) {
                    let name = document.getElementById(`pName${i}`).value.trim() || `帝国${i}`;
                    let cap = document.getElementById(`pCap${i}`).value.trim() || `王都${i}`;
                    GAME.playerNames[i] = name;
                    GAME.capitalNames[i] = cap;
                    if(document.getElementById(`pAI${i}`)?.checked) GAME.aiPlayers.add(i);
                }
                modal.remove();
                callback();
            };
        }

        function launchFullGame() {
            homeContainer.classList.remove('active');
            setTimeout(() => {
                gameMain.classList.add('active');
                showLobbyConfig(() => {
                    GAME.mapTerrain = generateMap();
                    GAME.playerLands = {}; GAME.playerResources = {}; GAME.playerEconomy = {};
                    for(let i=1;i<=GAME.totalPlayers;i++) {
                        GAME.playerLands[i] = { cells: new Set(), capital: null };
                        GAME.playerResources[i] = { silver:350, gold:6, diamond:3, rareEarth:20, oil:35, uranium:6 };
                        GAME.playerEconomy[i] = { gdp:680, agriculture:16, industry:10, commerce:13, science:9 };
                    }
                    GAME.units.clear(); GAME.harvestedCells.clear(); GAME.eliminatedPlayers.clear();
                    GAME.setupPhase = { isSetting: true, currentSettingPlayer:1, selectedCells:[], selectingCapital:false };
                    GAME.currentTurn=1; GAME.attackUsedThisTurn=false; GAME.turnCount=0;
                    renderFullMap(); updateTopBar();
                    showMsg(`请 ${GAME.playerNames[1]} 选择4块相连领土，再点击首都`);
                    if(GAME.aiPlayers.has(1)) autoSetupTerrain();
                });
            }, 200);
        }

        enterBtn.onclick = launchFullGame;
        tutorialBtn.onclick = launchFullGame;

        document.getElementById('fabRules').onclick = () => alert("📜 高对比主题 | 50+科技分类，发展经济，每回合一攻，扩张100银，首都陷落即灭国");
        document.getElementById('fabResearch').onclick = () => { if(!GAME.setupPhase.isSetting) showTechTree(); else showMsg('建设中无法研发'); };
        document.getElementById('fabAttack').onclick = () => { if(!GAME.setupPhase.isSetting){ GAME.selectedAction='attack'; showMsg('攻击模式: 点击敌方格子'); } else showMsg('完成建国后再宣战'); };
        document.getElementById('fabCollect').onclick = () => { if(!GAME.setupPhase.isSetting){ GAME.selectedAction='collect'; showMsg('收集模式: 点击己方领土'); } };
        document.getElementById('fabExpand').onclick = () => { if(!GAME.setupPhase.isSetting){ GAME.selectedAction='expand'; showMsg('扩张模式: 点击相邻地块(100银)'); } };
        document.getElementById('fabPlace').onclick = () => { if(!GAME.setupPhase.isSetting){ GAME.selectedAction='place'; showMsg('部署步兵: 点击己方领土'); } };
        document.getElementById('fabDevelop').onclick = () => { if(!GAME.setupPhase.isSetting){ GAME.selectedAction='develop'; showDevelopMenu(); } else showMsg('建设中无法发展'); };
        document.getElementById('fabEndTurn').onclick = () => { endTurn(); };
    })();
</script>
</body>
</html>
