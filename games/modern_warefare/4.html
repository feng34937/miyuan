            function isConnected(cells) {
                if (cells.length <= 1) return true;
                let set = new Set(cells.map(c => `${c.x},${c.y}`));
                let start = cells[0];
                let visited = new Set(),
                    q = [start];
                visited.add(`${start.x},${start.y}`);
                while (q.length) {
                    let cur = q.shift();
                    [
                        [-1, 0],
                        [1, 0],
                        [0, -1],
                        [0, 1]
                    ].forEach(dir => {
                        let nx = cur.x + dir[0],
                            ny = cur.y + dir[1];
                        let k = `${nx},${ny}`;
                        if (set.has(k) && !visited.has(k)) { visited.add(k);
                            q.push({ x: nx, y: ny }); }
                    });
                }
                return visited.size === cells.length;
            }

            function onGridClick(x, y) {
                let cellDiv = document.querySelector(`.grid-cell[data-x='${x}'][data-y='${y}']`);
                if (!cellDiv) return;
                if (GAME.setupPhase.isSetting) {
                    let curPlayer = GAME.setupPhase.currentSettingPlayer;
                    if (!cellDiv.classList.contains('land')) { showMsg('只能选陆地');
                        SoundEngine.error(); return; }
                    if (!GAME.setupPhase.selectingCapital) {
                        if (GAME.setupPhase.selectedCells.some(c => c.x === x && c.y === y)) {
                            GAME.setupPhase.selectedCells = GAME.setupPhase.selectedCells.filter(c => !(c.x === x &&
                                c.y === y));
                            cellDiv.classList.remove('selected');
                            SoundEngine.click();
                            if (TUTORIAL.active && TUTORIAL.step === 1 && !TUTORIAL.completed) {
                                positionTutorialArrow();
                            }
                        } else {
                            if (GAME.setupPhase.selectedCells.length >= 4) { showMsg('最多4块');
                                SoundEngine.error(); return; }
                            GAME.setupPhase.selectedCells.push({ x, y });
                            cellDiv.classList.add('selected');
                            SoundEngine.click();
                        }
                        if (GAME.setupPhase.selectedCells.length === 4 && isConnected(GAME.setupPhase.selectedCells)) {
                            GAME.setupPhase.selectingCapital = true;
                            showMsg('点击其中一块作为首都');
                            SoundEngine.success();
                            if (TUTORIAL.active && TUTORIAL.step === 1 && !TUTORIAL.completed) {
                                advanceTutorial();
                            }
                        } else if (GAME.setupPhase.selectedCells.length === 4 && !isConnected(GAME.setupPhase
                                .selectedCells)) {
                            GAME.setupPhase.selectedCells.pop();
                            cellDiv.classList.remove('selected');
                            showMsg('必须连成一片');
                            SoundEngine.error();
                        }
                    } else {
                        if (!GAME.setupPhase.selectedCells.some(c => c.x === x && c.y === y)) { showMsg(
                                '首都需从已选地块中确立');
                            SoundEngine.error(); return; }
                        GAME.playerLands[curPlayer] = { cells: new Set(), capital: null };
                        GAME.setupPhase.selectedCells.forEach(c => { GAME.playerLands[curPlayer].cells.add(
                                `${c.x},${c.y}`); });
                        GAME.playerLands[curPlayer].capital = { x, y };
                        if (!GAME.playerResources[curPlayer]) GAME.playerResources[curPlayer] = { silver: 250, gold: 5,
                            diamond: 1, rareEarth: 12, oil: 20, uranium: 3 };
                        if (!GAME.playerEconomy[curPlayer]) GAME.playerEconomy[curPlayer] = { gdp: 550, agriculture: 12,
                            industry: 7, commerce: 9, science: 6 };
                        SoundEngine.capitalSet();
                        renderFullMap();
                        showAchievement('<i class="fas fa-crown"></i>',
                            '🏛️ 首都确立',
                            `${GAME.playerNames[curPlayer]} 的 ${GAME.capitalNames[curPlayer]} 巍然矗立！`
                        );
                        if (TUTORIAL.active && TUTORIAL.step === 2 && !TUTORIAL.completed) {
                            advanceTutorial();
                        }
                        if (curPlayer >= GAME.totalPlayers) {
                            GAME.setupPhase.isSetting = false;
                            GAME.currentTurn = 1;
                            GAME.turnCount = 0;
                            GAME.expandUsedThisTurn = false;
                            showMsg('帝国崛起！每回合只能扩张1格 | 攻击需相邻(导弹除外)');
                            updateTopBar();
                            updateLotteryButtonHighlight();
                            // 切换到游戏音乐
                            MusicEngine.setMode(GAME.aiPlayers.has(1) ? 'game' : (TUTORIAL.active ? 'tutorial' :
                                'game'));
                            if (TUTORIAL.active && TUTORIAL.step === 3 && !TUTORIAL.completed) {
                                updateTutorialBanner();
                            }
                            if (GAME.aiPlayers.has(1)) executeAITurn();
                        } else {
                            GAME.setupPhase.currentSettingPlayer++;
                            GAME.setupPhase.selectedCells = [];
                            GAME.setupPhase.selectingCapital = false;
                            showMsg(`轮到 ${GAME.playerNames[GAME.setupPhase.currentSettingPlayer]} 开辟疆土`);
                            updateTopBar();
                            if (GAME.aiPlayers.has(GAME.setupPhase.currentSettingPlayer)) autoSetupTerrain();
                        }
                    }
                    return;
                }
                if (GAME.selectedAction === 'attack') actionAttack(x, y);
                else if (GAME.selectedAction === 'collect') actionCollect(x, y);
                else if (GAME.selectedAction === 'expand') actionExpand(x, y);
                else if (GAME.selectedAction === 'place') actionPlaceUnit(x, y);
                else if (GAME.selectedAction === 'develop') showDevelopModal();
                else {
                    if (TUTORIAL.active && !TUTORIAL.completed) {
                        showMsg('📖 ' + TUTORIAL.steps[TUTORIAL.step - 1].desc);
                    } else {
                        showMsg('请先选择行动按钮');
                    }
                    SoundEngine.error();
                }
            }

            function autoSetupTerrain() {
                let player = GAME.setupPhase.currentSettingPlayer;
                let landCells = [];
                for (let y = 0; y < 20; y++)
                    for (let x = 0; x < 20; x++) {
                        let cell = document.querySelector(`.grid-cell[data-x='${x}'][data-y='${y}']`);
                        if (cell && cell.classList.contains('land')) landCells.push({ x, y, cell });
                    }
                if (landCells.length < 4) return;
                let selected = [];
                let start = landCells[Math.floor(Math.random() * landCells.length)];
                selected.push(start);
                let frontier = [start];
                while (selected.length < 4 && frontier.length) {
                    let cur = frontier.shift();
                    for (let dir of [
                            [-1, 0],
                            [1, 0],
                            [0, -1],
                            [0, 1]
                        ]) {
                        let nx = cur.x + dir[0],
                            ny = cur.y + dir[1];
                        let nc = landCells.find(c => c.x === nx && c.y === ny);
                        if (nc && !selected.some(s => s.x === nx && s.y === ny)) {
                            selected.push(nc);
                            frontier.push(nc);
                            if (selected.length >= 4) break;
                        }
                    }
                }
                if (selected.length < 4) return;
                for (let s of selected) {
                    GAME.setupPhase.selectedCells.push({ x: s.x, y: s.y });
                    s.cell.classList.add('selected');
                }
                GAME.setupPhase.selectingCapital = true;
                let cap = selected[Math.floor(Math.random() * selected.length)];
                GAME.playerLands[player] = { cells: new Set(), capital: null };
                GAME.setupPhase.selectedCells.forEach(c => { GAME.playerLands[player].cells.add(`${c.x},${c.y}`); });
                GAME.playerLands[player].capital = { x: cap.x, y: cap.y };
                if (!GAME.playerResources[player]) GAME.playerResources[player] = { silver: 250, gold: 5, diamond: 1,
                    rareEarth: 12, oil: 20, uranium: 3 };
                if (!GAME.playerEconomy[player]) GAME.playerEconomy[player] = { gdp: 550, agriculture: 12, industry: 7,
                    commerce: 9, science: 6 };
                renderFullMap();
                showAchievement('<i class="fas fa-crown"></i>',
                    '🏛️ 首都确立',
                    `${GAME.playerNames[player]} 的 ${GAME.capitalNames[player]} 巍然矗立！`
                );
                if (player >= GAME.totalPlayers) {
                    GAME.setupPhase.isSetting = false;
                    GAME.currentTurn = 1;
                    GAME.turnCount = 0;
                    GAME.expandUsedThisTurn = false;
                    showMsg('帝国崛起！每回合只能扩张1格 | 攻击需相邻(导弹除外)');
                    updateTopBar();
                    updateLotteryButtonHighlight();
                    MusicEngine.setMode('game');
                    if (GAME.aiPlayers.has(1)) executeAITurn();
                } else {
                    GAME.setupPhase.currentSettingPlayer++;
                    GAME.setupPhase.selectedCells = [];
                    GAME.setupPhase.selectingCapital = false;
                    showMsg(`轮到 ${GAME.playerNames[GAME.setupPhase.currentSettingPlayer]} 开辟疆土`);
                    updateTopBar();
                    if (GAME.aiPlayers.has(GAME.setupPhase.currentSettingPlayer)) autoSetupTerrain();
                }
            }

            // ==================== AI 回合 ====================
            async function executeAITurn() {
                if (GAME.setupPhase.isSetting) return;
                let player = GAME.currentTurn;
                if (!GAME.aiPlayers.has(player) || GAME.aiProcessing) return;
                GAME.aiProcessing = true;
                showMsg(`🤖 AI ${GAME.playerNames[player]} 行动中...`);
                await new Promise(r => setTimeout(r, 300));
                let eco = GAME.playerEconomy[player];
                if (eco && (eco.agriculture < 30 || eco.industry < 25)) {
                    developEconomy(player, 'agriculture', 5, 120);
                    await new Promise(r => setTimeout(r, 200));
                    developEconomy(player, 'industry', 5, 150);
                }
                for (let [key, unit] of GAME.units) {
                    if (unit.owner === player && !GAME.harvestedCells.has(key) && GAME.playerLands[player]?.cells.has(
                            key)) {
                        let [x, y] = key.split(',').map(Number);
                        actionCollect(x, y);
                        await new Promise(r => setTimeout(r, 200));
                    }
                }
                if (!GAME.expandUsedThisTurn) {
                    let candidates = [];
                    for (let cell of GAME.playerLands[player].cells) {
                        let [cx, cy] = cell.split(',').map(Number);
                        [
                            [-1, 0],
                            [1, 0],
                            [0, -1],
                            [0, 1]
                        ].forEach(dir => {
                            let nx = cx + dir[0],
                                ny = cy + dir[1];
                            let nk = `${nx},${ny}`;
                            if (nx >= 0 && nx < 20 && ny >= 0 && ny < 20 && !GAME.playerLands[player].cells.has(
                                    nk) && GAME.playerResources[player].silver >= 100) {
                                let occ = false;
                                for (let p = 1; p <= GAME.totalPlayers; p++)
                                    if (p !== player && GAME.playerLands[p]?.cells.has(nk)) occ = true;
                                if (!occ) candidates.push({ x: nx, y: ny });
                            }
                        });
                    }
                    if (candidates.length) {
                        let target = candidates[Math.floor(Math.random() * candidates.length)];
                        actionExpand(target.x, target.y);
                        await new Promise(r => setTimeout(r, 200));
                    }
                }
                if (!GAME.attackUsedThisTurn) {
                    let myUnitKeys = [];
                    for (let [k, u] of GAME.units) {
                        if (u.owner === player && !GAME.eliminatedPlayers.has(u.owner)) myUnitKeys.push(k);
                    }
                    let attackTarget = null;
                    let useMissile = false;
                    let sourceUnitKey = null;
                    if (myUnitKeys.length > 0) {
                        let enemyCells = [];
                        for (let i = 1; i <= GAME.totalPlayers; i++) {
                            if (i !== player && !GAME.eliminatedPlayers.has(i)) {
                                for (let cell of GAME.playerLands[i].cells) enemyCells.push({ key: cell, owner: i });
                            }
                        }
                        for (let [k, u] of GAME.units) {
                            if (u.owner !== player && !GAME.eliminatedPlayers.has(u.owner)) {
                                if (!enemyCells.some(e => e.key === k)) enemyCells.push({ key: k, owner: u.owner });
                            }
                        }
                        enemyCells.sort(() => Math.random() - 0.5);
                        for (let enemy of enemyCells) {
                            let [ex, ey] = enemy.key.split(',').map(Number);
                            for (let uk of myUnitKeys) {
                                let [ux, uy] = uk.split(',').map(Number);
                                if (Math.abs(ux - ex) + Math.abs(uy - ey) === 1) {
                                    attackTarget = { x: ex, y: ey, owner: enemy.owner };
                                    sourceUnitKey = uk;
                                    useMissile = false;
                                    break;
                                }
                            }
                            if (attackTarget) break;
                        }
                        if (!attackTarget && hasMissileTech(player) && enemyCells.length > 0) {
                            let randomEnemy = enemyCells[0];
                            let [ex, ey] = randomEnemy.key.split(',').map(Number);
                            attackTarget = { x: ex, y: ey, owner: randomEnemy.owner };
                            sourceUnitKey = myUnitKeys[0];
                            useMissile = true;
                        }
                    }
                    if (attackTarget && sourceUnitKey) {
                        if (useMissile) {
                            actionAttackMissile(attackTarget.x, attackTarget.y, sourceUnitKey);
                        } else {
                            actionAttack(attackTarget.x, attackTarget.y);
                        }
                        await new Promise(r => setTimeout(r, 300));
                    }
                }
                endTurn();
                GAME.aiProcessing = false;
            }

            // ==================== 内政发展弹窗 ====================
            function showDevelopModal() {

            function developEconomy(player, sector, amount, cost) {
                let eco = GAME.playerEconomy[player];
                if (GAME.playerResources[player].silver < cost) { showMsg('银币不足');
                    SoundEngine.error(); return; }
                GAME.playerResources[player].silver -= cost;
                eco[sector] += amount;
                let newGdp = Math.floor(eco.gdp + eco.agriculture * 3 + eco.industry * 4 + eco.commerce * 2 + eco.science *
                    5);
                eco.gdp = newGdp;
                let sectorNames = { agriculture: '农业', industry: '工业', commerce: '商业', science: '科技' };
                SoundEngine.success();
                showMsg(`${sectorNames[sector]} +${amount} | GDP ${eco.gdp}`);
                showAchievement('<i class="fas fa-arrow-trend-up"></i>',
                    '📊 内政发展成功',
                    `${sectorNames[sector]}提升 +${amount}！GDP达到 ${eco.gdp}`
                );
                updateTopBar();
            }

            // ==================== 科技树弹窗 ====================
            function showTechTree() {
                if (GAME.setupPhase.isSetting) { showMsg('建设阶段无法研发');
                    return; }
                let player = GAME.currentTurn;
                SoundEngine.click();
                let modal = document.createElement('div');
                modal.className = 'modal-backdrop';
                let html =
                    `<div class="modal-card" style="max-width:580px;"><h2><i class="fas fa-microchip"></i> 📡 科技研发 (${techList.length}项)</h2>`;
                let cats = {};
                techList.forEach(t => { if (!cats[t.category]) cats[t.category] = [];
                    cats[t.category].push(t); });
                for (let cat in cats) {
                    html +=
                        `<h3 style="color:#f5bc5c; margin-top:12px; border-bottom:1px solid #3a2a1a; padding-bottom:4px;">${cat}</h3>`;
                    cats[cat].forEach(tech => {
                        let has = GAME.researched[tech.id].has(player);
                        if (has) {
                            html +=
                                `<div class="tech-item"><span>✅ ${tech.name}</span><button disabled>已研发</button></div>`;
                        } else {
                            let prereqOk = true;
                            if (tech.prereq && !GAME.researched[tech.prereq]?.has(player)) prereqOk = false;
                            let costStr = `${tech.costSilver||0}银 `;
                            if (tech.costRare) costStr += `${tech.costRare}稀土 `;
                            if (tech.costOil) costStr += `${tech.costOil}石油 `;
                            if (tech.costGold) costStr += `${tech.costGold}金 `;
                            html +=
                                `<div class="tech-item"><span>🔬 ${tech.name}<br><small>${costStr}</small></span>
                            <button class="modal-action-btn tech-research-btn" data-tech="${tech.id}" ${!prereqOk?'disabled':''}>${prereqOk?'研发':'前置未解锁'}</button></div>`;
                        }
                    });
                }
                html +=
                    `<button class="modal-close-btn" id="closeTechModalBtn">关闭</button></div>`;
                modal.innerHTML = html;
                document.body.appendChild(modal);
                modal.querySelectorAll('.tech-research-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        let techId = btn.dataset.tech;
                        let tech = techList.find(t => t.id === techId);
                        if (!tech) return;
                        if (tech.prereq && !GAME.researched[tech.prereq]?.has(player)) {
                            showMsg('前置科技未研发');
                            SoundEngine.error();
                            modal.remove();
                            showTechTree();
                            return;
                        }
                        let costSilver = tech.costSilver || 0,
                            costGold = tech.costGold || 0,
                            costRare = tech.costRare || 0,
                            costOil = tech.costOil || 0;
                        let res = GAME.playerResources[player];
                        if (res.silver < costSilver || res.gold < costGold || res.rareEarth < costRare || res.oil <
                            costOil) {
                            showMsg('资源不足');
                            SoundEngine.error();
                            modal.remove();
                            showTechTree();
                            return;
                        }
                        res.silver -= costSilver;
                        res.gold -= costGold;
                        res.rareEarth -= costRare;
                        res.oil -= costOil;
                        GAME.researched[techId].add(player);
                        if (tech.name === '农业机械化') GAME.playerEconomy[player].agriculture += 8;
                        if (tech.name === '工业自动化') GAME.playerEconomy[player].industry += 8;
                        if (tech.name === '商业全球化') GAME.playerEconomy[player].commerce += 8;
                        if (tech.name === '数字金融') GAME.playerEconomy[player].commerce += 5;
                        if (tech.name === '人工智能管理') GAME.playerEconomy[player].science += 6;
                        updateTopBar();
                        let isMissile = MISSILE_TECH_IDS.has(techId);
                        let extraMsg = isMissile ? ' 🚀 现在可进行远程导弹攻击！' : '';
                        SoundEngine.success();
                        showMsg(`研发成功: ${tech.name}${extraMsg}`);
                        showAchievement('<i class="fas fa-flask"></i>',
                            '🔬 研发成功！',
                            `成功研发出「${tech.name}」！${isMissile ? '解锁远程导弹攻击能力！' : '科技力量大幅提升'}`
                        );
                        modal.remove();
                        showTechTree();
                    };
                });
                document.getElementById('closeTechModalBtn')?.addEventListener('click', () => { modal.remove();
                    SoundEngine.click(); });
                modal.addEventListener('click', function(e) { if (e.target === modal) { modal.remove();
                        SoundEngine.click(); } });
            }

            // ==================== 抽奖系统 ====================
            function canFreeLottery(player) {
                if (GAME.playerLastFreeTurn[player] === undefined) {
                    GAME.playerLastFreeTurn[player] = -2;
                }
                return (GAME.turnCount - GAME.playerLastFreeTurn[player]) >= 2;
            }

            function updateLotteryButtonHighlight() {
                const btn = document.getElementById('fabLottery');
                const badge = document.getElementById('lotteryBadge');
                if (!btn) return;
                let pendingCount = getPendingFreeLottery();
                let hasTurnFree = !GAME.setupPhase.isSetting && canFreeLottery(GAME.currentTurn);
                let totalFree = pendingCount + (hasTurnFree ? 1 : 0);

                if (badge) {
                    if (totalFree > 0) {
                        badge.style.display = 'block';
                        badge.textContent = totalFree;
                        if (pendingCount > 0 && !badge.classList.contains('pulse-badge')) {
                            badge.classList.add('pulse-badge');
                        } else if (pendingCount === 0 && badge.classList.contains('pulse-badge')) {
                            badge.classList.remove('pulse-badge');
                        }
                    } else {
                        badge.style.display = 'none';
                        badge.classList.remove('pulse-badge');
                    }
                }

                if (!GAME.setupPhase.isSetting && totalFree > 0) {
                    btn.classList.add('lottery-free');
                } else {
                    btn.classList.remove('lottery-free');
                }
            }

            function openLotteryModal() {
                if (GAME.setupPhase.isSetting) {
                    showMsg('完成建国后再抽奖');
                    SoundEngine.error();
                    return;
                }
                SoundEngine.click();
                let player = GAME.currentTurn;
                let pendingCount = getPendingFreeLottery();
                let turnFree = canFreeLottery(player);
                let totalFree = pendingCount + (turnFree ? 1 : 0);
                let res = GAME.playerResources[player];
                let modal = document.createElement('div');
                modal.className = 'modal-backdrop';
                let freeInfoHtml = '';
                if (totalFree > 0) {
                    freeInfoHtml = `<p style="color:#4ade80; font-weight:bold; margin-bottom:4px;">
                        🎫 可用免费抽奖：<b style="font-size:1.3rem;">${totalFree}</b> 次
                        ${pendingCount > 0 ? ` (含等级奖励${pendingCount}次)` : ''}
                        ${turnFree ? ' (含回合奖励1次)' : ''}
                    </p>`;
                }
                modal.innerHTML = `
                    <div class="modal-card" style="max-width:450px;">
                        <h2><i class="fas fa-gift"></i> 幸运抽奖</h2>
                        <p style="color:#ffdfa5; margin-bottom:4px;">当前银币：<b>${res.silver}</b></p>
                        ${freeInfoHtml}
                        <p style="color:${totalFree>0?'#4ade80':'#f5bc5c'}; font-weight:bold; margin-bottom:12px;">
                            ${totalFree > 0 ? '🎫 有免费抽奖机会！' : '💲 付费抽奖 · 消耗100银币'}
                        </p>
                        <div id="lotteryResultArea"></div>
                        <button class="modal-action-btn" id="doLotteryBtn" style="font-size:1rem; padding:10px 24px;">
                            ${totalFree > 0 ? '🎰 免费抽取（优先消耗等级奖励）' : '🎰 消耗100银抽取'}
                        </button>
                        ${totalFree > 0 && res.silver >= 100 ? '<button class="modal-action-btn" id="doPaidLotteryBtn" style="font-size:0.85rem; padding:8px 16px; margin-left:6px; background:#7a5430;">💲 付费抽取(保留免费)</button>' : ''}
                        <button class="modal-close-btn" id="closeLotteryBtn" style="margin-top:10px;">离开</button>
                    </div>`;
                document.body.appendChild(modal);

                function refreshModalAfterLottery(resultMsg, prize) {
                    let resultArea = document.getElementById('lotteryResultArea');
                    if (resultArea) {
                        resultArea.innerHTML = `
                            <div class="lottery-result">
                                <div class="prize-icon">${prize.icon}</div>
                                <div class="prize-text">${prize.text}</div>
                                <p style="color:#ffefcf; margin-top:6px;">${resultMsg}</p>
                            </div>`;
                    }
                    let doBtn = document.getElementById('doLotteryBtn');
                    let paidBtn = document.getElementById('doPaidLotteryBtn');
                    if (doBtn) doBtn.disabled = true;
                    if (paidBtn) paidBtn.disabled = true;
                    updateTopBar();
                    renderFullMap();
                    updateLotteryButtonHighlight();
                    updateHomeStats();
                }

                document.getElementById('closeLotteryBtn').addEventListener('click', () => {
                    modal.remove();
                    updateLotteryButtonHighlight();
                    SoundEngine.click();
                });
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        modal.remove();
                        updateLotteryButtonHighlight();
                        SoundEngine.click();
                    }
                });

                document.getElementById('doLotteryBtn').addEventListener('click', () => {
                    let isFree = false;
                    if (usePendingFreeLottery()) {
                        isFree = true;
                    } else if (turnFree && canFreeLottery(player)) {
                        GAME.playerLastFreeTurn[player] = GAME.turnCount;
                        isFree = true;
                    }
                    if (!isFree && res.silver < 100) {
                        showMsg('银币不足100，无法抽奖');
                        SoundEngine.error();
                        return;
                    }
                    if (!isFree) {
                        res.silver -= 100;
                        showMsg('消耗100银币进行抽奖');
                    }
                    SoundEngine.lottery();
                    let prize = getRandomPrize();
                    let resultMsg = applyPrize(player, prize);
                    refreshModalAfterLottery(resultMsg, prize);
                    showAchievement('<i class="fas fa-gift"></i>', '🎁 抽奖结果', prize.text);

                if (paidBtn) {

                            showMsg('银币不足100，无法抽奖');
                            SoundEngine.error();
                            return;
                        }
                        res.silver -= 100;
                        showMsg('消耗100银币进行付费抽奖（保留免费次数）');
                        SoundEngine.lottery();
                        let prize = getRandomPrize();
                        let resultMsg = applyPrize(player, prize);
                        refreshModalAfterLottery(resultMsg, prize);
                        showAchievement('<i class="fas fa-gift"></i>', '🎁 抽奖结果', prize.text);
                    });
                }
            }

            // ==================== 军事行动 ====================
            function executeAdjacentAttack(x, y, key, owner, player, sourceUnitEntry) {
                let conqueredPlayerName = null;
                if (owner) {
                    GAME.playerLands[owner].cells.delete(key);
                    if (GAME.playerLands[owner].capital && GAME.playerLands[owner].capital.x === x && GAME.playerLands[
                            owner].capital.y === y) {
                        GAME.eliminatedPlayers.add(owner);
                        conqueredPlayerName = GAME.playerNames[owner];
                        showMsg(`⚔️ ${conqueredPlayerName} 灭亡！`);
                    }
                }
                GAME.playerLands[player].cells.add(key);
                let [sx, sy] = sourceUnitEntry.key.split(',').map(Number);
                let oldCell = document.querySelector(`.grid-cell[data-x='${sx}'][data-y='${sy}']`);
                if (oldCell) oldCell.classList.remove('unit');
                GAME.units.delete(sourceUnitEntry.key);
                GAME.units.set(key, { type: '步兵', owner: player });
                GAME.attackUsedThisTurn = true;
                SoundEngine.attack();
                renderFullMap();
                updateTopBar();
                showMsg(`⚔️ 步兵攻占 (${x},${y})`);
                if (conqueredPlayerName) {
                    showAchievement('<i class="fas fa-skull-crossbones"></i>',
                        '💀 帝国覆灭',
                        `${conqueredPlayerName} 的首都陷落！霸业又进一步！`
                    );
                } else {
                    showAchievement('<i class="fas fa-crosshairs"></i>',
                        '⚔️ 攻占成功',
                        `步兵成功占领坐标 (${x},${y})！`
                    );
                }
                GAME.selectedAction = null;
            }

            function actionAttack(x, y) {
                let player = GAME.currentTurn;
                let key = `${x},${y}`;
                let owner = null;
                for (let p = 1; p <= GAME.totalPlayers; p++)
                    if (GAME.playerLands[p]?.cells.has(key)) owner = p;
                if (owner === player) { showMsg('无法进攻己方');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                if (GAME.attackUsedThisTurn) { showMsg('本回合已攻击');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                let myUnitEntries = [];
                for (let [k, u] of GAME.units) {
                    if (u.owner === player) myUnitEntries.push({ key: k, unit: u });
                }
                if (myUnitEntries.length === 0) { showMsg('无己方战斗单位，请先部署步兵');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                let adjacentUnit = null;
                for (let entry of myUnitEntries) {
                    let [sx, sy] = entry.key.split(',').map(Number);
                    if (Math.abs(sx - x) + Math.abs(sy - y) === 1) {
                        adjacentUnit = entry;
                        break;
                    }
                }
                if (!adjacentUnit) {
                    if (hasMissileTech(player)) {
                        showMsg('⚠️ 没有相邻的己方单位！但你已研发导弹科技，再次点击目标确认远程打击(消耗50银)');
                        GAME.selectedAction = 'missile';
                        SoundEngine.click();
                        return;
                    } else {
                        showMsg('❌ 没有与目标相邻的己方单位！研发导弹科技后可远程攻击');
                        SoundEngine.error();
                        GAME.selectedAction = null;
                        return;
                    }
                }
                executeAdjacentAttack(x, y, key, owner, player, adjacentUnit);
            }

            function actionAttackMissile(x, y, sourceUnitKeyOverride) {
                let player = GAME.currentTurn;
                let key = `${x},${y}`;
                let owner = null;
                for (let p = 1; p <= GAME.totalPlayers; p++)
                    if (GAME.playerLands[p]?.cells.has(key)) owner = p;
                if (owner === player) { showMsg('无法进攻己方');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                if (GAME.attackUsedThisTurn) { showMsg('本回合已攻击');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                if (!hasMissileTech(player)) { showMsg('未研发导弹科技，无法远程攻击');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                let sourceKey = sourceUnitKeyOverride;
                if (!sourceKey) {
                    let myUnitEntries = [];
                    for (let [k, u] of GAME.units) {
                        if (u.owner === player) myUnitEntries.push(k);
                    }
                    if (myUnitEntries.length === 0) { showMsg('无己方单位作为导弹发射平台');
                        SoundEngine.error();
                        GAME.selectedAction = null; return; }
                    sourceKey = myUnitEntries[0];
                }
                if (GAME.playerResources[player].silver < 50) { showMsg('银币不足50，无法发射导弹');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                GAME.playerResources[player].silver -= 50;
                SoundEngine.missile();
                let conqueredPlayerName = null;
                if (owner) {
                    GAME.playerLands[owner].cells.delete(key);
                    if (GAME.playerLands[owner].capital && GAME.playerLands[owner].capital.x === x && GAME.playerLands[
                            owner].capital.y === y) {
                        GAME.eliminatedPlayers.add(owner);
                        conqueredPlayerName = GAME.playerNames[owner];
                        showMsg(`💥 导弹摧毁！${conqueredPlayerName} 灭亡！`);
                    }
                }
                GAME.playerLands[player].cells.add(key);
                GAME.attackUsedThisTurn = true;
                renderFullMap();
                updateTopBar();
                showMsg(`🚀 导弹远程打击 (${x},${y}) -50银`);
                if (conqueredPlayerName) {
                    showAchievement('<i class="fas fa-skull-crossbones"></i>',
                        '💀 帝国覆灭',
                        `${conqueredPlayerName} 的首都被导弹摧毁！霸业又进一步！`
                    );
                } else {
                    showAchievement('<i class="fas fa-rocket"></i>',
                        '🚀 导弹打击',
                        `远程导弹成功命中坐标 (${x},${y})！-50银`
                    );
                }
                GAME.selectedAction = null;
            }

            function actionCollect(x, y) {
                let key = `${x},${y}`;
                if (!GAME.playerLands[GAME.currentTurn]?.cells.has(key)) { showMsg('非己方领土');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                if (GAME.harvestedCells.has(key)) { showMsg('资源枯竭');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                let gain = 40 + Math.floor(Math.random() * 40);
                GAME.playerResources[GAME.currentTurn].silver += gain;
                GAME.harvestedCells.add(key);
                SoundEngine.collect();
                showMsg(`💰 +${gain}银`);
                showAchievement('<i class="fas fa-coins"></i>',
                    '💰 资源收集',
                    `从领土获得 +${gain} 银币！`
                );
                updateTopBar();
                renderFullMap();
                GAME.selectedAction = null;
                if (TUTORIAL.active && TUTORIAL.step === 6 && !TUTORIAL.completed) {
                    advanceTutorial();
                }
            }

            function actionExpand(x, y) {
                let key = `${x},${y}`;
                if (GAME.expandUsedThisTurn) {
                    showMsg('⚠️ 本回合已扩张过，每回合只能扩张1格！');
                    SoundEngine.error();
                    GAME.selectedAction = null;
                    return;
                }
                if (GAME.playerLands[GAME.currentTurn].cells.has(key)) { showMsg('已是领土');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                let neighbors = [`${x-1},${y}`, `${x+1},${y}`, `${x},${y-1}`, `${x},${y+1}`];
                let adjacent = neighbors.some(n => GAME.playerLands[GAME.currentTurn].cells.has(n));
                if (!adjacent) { showMsg('只能扩张相邻');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                if (GAME.playerResources[GAME.currentTurn].silver < 100) { showMsg('银币不足100');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                GAME.playerResources[GAME.currentTurn].silver -= 100;
                GAME.playerLands[GAME.currentTurn].cells.add(key);
                GAME.expandUsedThisTurn = true;
                SoundEngine.expand();
                renderFullMap();
                updateTopBar();
                showMsg(`扩张成功 -100银 (本回合已扩张)`);
                showAchievement('<i class="fas fa-maximize"></i>',
                    '🏴 领土扩张',
                    `疆域扩展至 (${x},${y})！-100银（本回合仅此1格）`
                );
                GAME.selectedAction = null;
                if (TUTORIAL.active && TUTORIAL.step === 4 && !TUTORIAL.completed) {
                    advanceTutorial();
                }
            }

            function actionPlaceUnit(x, y) {
                let key = `${x},${y}`;
                if (!GAME.playerLands[GAME.currentTurn]?.cells.has(key)) { showMsg('需部署在己方领土');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                if (GAME.units.has(key)) { showMsg('已有单位');
                    SoundEngine.error();
                    GAME.selectedAction = null; return; }
                GAME.units.set(key, { type: '步兵', owner: GAME.currentTurn });
                SoundEngine.place();
                renderFullMap();
                showMsg(`部署步兵`);
                showAchievement('<i class="fas fa-user-plus"></i>',
                    '🪖 部队部署',
                    `步兵已部署于 (${x},${y})！`
                );
                GAME.selectedAction = null;
                if (TUTORIAL.active && TUTORIAL.step === 8 && !TUTORIAL.completed) {
                    advanceTutorial();
                }
            }

            function endTurn() {
                if (GAME.setupPhase.isSetting) { showMsg('建设中无法结束');
                    SoundEngine.error(); return; }
                let curPlayer = GAME.currentTurn;
                checkRiot(curPlayer, GAME.turnCount + 1);
                let eco = GAME.playerEconomy[curPlayer];
                let income = Math.floor(eco.agriculture * 2 + eco.industry * 3 + eco.commerce * 2.5 + eco.science * 2);
                GAME.playerResources[curPlayer].silver += income;
                SoundEngine.turnEnd();
                showMsg(`税收 +${income}银`);
                updateTopBar();
                let next = (curPlayer % GAME.totalPlayers) + 1;
                while (GAME.eliminatedPlayers.has(next) && next !== curPlayer) next = (next % GAME.totalPlayers) + 1;
                GAME.currentTurn = next;
                GAME.turnCount++;
                GAME.attackUsedThisTurn = false;
                GAME.expandUsedThisTurn = false;
                GAME.selectedAction = null;
                renderFullMap();
                updateTopBar();
                updateLotteryButtonHighlight();
                showMsg(`轮到 ${GAME.playerNames[GAME.currentTurn]} (可扩张1格 | 攻击需相邻或导弹)`);
                if (TUTORIAL.active && TUTORIAL.step === 9 && !TUTORIAL.completed) {
                    advanceTutorial();
                }
                if (GAME.aiPlayers.has(GAME.currentTurn)) executeAITurn();
            }

            function showMsg(txt) {
                let el = document.getElementById('statusMessage');
                if (el) {
                    el.innerHTML = `✦ ${txt} ✦`;
                    el.classList.remove('warning');
                }
            }

            function showWarningMsg(txt) {
                let el = document.getElementById('statusMessage');
                if (el) {
                    el.innerHTML = `⚠️ ${txt} ⚠️`;
                    el.classList.add('warning');
                    setTimeout(() => el.classList.remove('warning'), 3000);
                }
            }

            // ==================== 大厅配置弹窗 ====================
            function showLobbyConfig(callback, isTutorial = false) {
                SoundEngine.click();
                let modal = document.createElement('div');
                modal.className = 'modal-backdrop';
                let playerCount = isTutorial ? 2 : 2;
                let container = document.createElement('div');
                container.className = 'modal-card';
                container.innerHTML = `
                    <h2><i class="fas fa-crown"></i> ${isTutorial ? '新手教程 · 配置' : '帝国议会'}</h2>
                    ${isTutorial ? '<p style="color:#4ade80; font-size:0.8rem;">详细9步教程将引导你完成基本操作（每回合限扩1格，攻击需相邻或导弹）</p>' : ''}
                    <div style="display:flex; gap:15px; justify-content:center; margin-bottom:15px; align-items:center;">
                        <button id="decPlayer" class="modal-action-btn" style="font-size:1.2rem; padding:6px 16px;" ${isTutorial?'disabled':''}>-</button>
                        <span id="playerNumDisplay" style="color:#ffdeae; font-size:1.8rem; font-weight:900;">${playerCount}</span>
                        <button id="incPlayer" class="modal-action-btn" style="font-size:1.2rem; padding:6px 16px;" ${isTutorial?'disabled':''}>+</button>
                    </div>
                    <div id="playersConfigList" class="player-config-list"></div>
                    <button id="confirmLobby" class="modal-action-btn" style="font-size:1rem; padding:10px 24px; margin-top:8px;">⚡ ${isTutorial ? '开始教程' : '开创史诗'} ⚡</button>
                `;
                modal.appendChild(container);
                document.body.appendChild(modal);

                function rebuildList(count) {
                    let listDiv = document.getElementById('playersConfigList');
                    if (!listDiv) return;
                    listDiv.innerHTML = '';
                    for (let i = 1; i <= count; i++) {
                        let row = document.createElement('div');
                        row.className = 'player-row';
                        let isAI = isTutorial ? (i === 2) : false;
                        row.innerHTML = `
                            <span>玩家${i}</span>
                            <input type="text" id="pName${i}" placeholder="国度" value="${isTutorial && i===1 ? '学员国' : '星穹'+i}">
                            <input type="text" id="pCap${i}" placeholder="首都" value="${isTutorial && i===1 ? '学府城' : '辉光'+i}">
                            <label><input type="checkbox" id="pAI${i}" ${isAI ? 'checked' : ''}> 🤖 AI</label>
                        `;
                        listDiv.appendChild(row);
                    }
                }
                let numSpan = document.getElementById('playerNumDisplay');
                let decBtn = document.getElementById('decPlayer'),
                    incBtn = document.getElementById('incPlayer');
                if (!isTutorial) {
                    decBtn.onclick = () => {
                        if (playerCount > 2) { playerCount--;
                            numSpan.innerText = playerCount;
                            rebuildList(playerCount);
                            SoundEngine.click(); }
                    };
                    incBtn.onclick = () => {
                        if (playerCount < 9) { playerCount++;
                            numSpan.innerText = playerCount;
                            rebuildList(playerCount);
                            SoundEngine.click(); }
                    };
                }
                rebuildList(playerCount);
                document.getElementById('confirmLobby').onclick = () => {
                    let total = parseInt(numSpan.innerText);
                    GAME.totalPlayers = total;
                    GAME.playerNames = {};
                    GAME.capitalNames = {};
                    GAME.aiPlayers.clear();
                    for (let i = 1; i <= total; i++) {
                        let nameEl = document.getElementById(`pName${i}`);
                        let capEl = document.getElementById(`pCap${i}`);
                        let aiEl = document.getElementById(`pAI${i}`);
                        let name = (nameEl && nameEl.value.trim()) || `帝国${i}`;
                        let cap = (capEl && capEl.value.trim()) || `王都${i}`;
                        GAME.playerNames[i] = name;
                        GAME.capitalNames[i] = cap;
                        if (aiEl && aiEl.checked) GAME.aiPlayers.add(i);
                    }
                    SoundEngine.success();
                    modal.remove();
                    callback();
                };
                modal.addEventListener('click', function(e) { if (e.target === modal) { modal.remove();
                        SoundEngine.click(); } });
            }

            function launchFullGame(isTutorial = false) {
                homeContainer.classList.remove('active');
                fabMenu.classList.add('visible');
                // 显示音乐按钮
                if (musicToggleBtn) musicToggleBtn.style.display = 'flex';
                incrementPlayCount();
                setSessionStart();
                startAutoSave();
                updateHomeStats();
                checkAndAwardRankRewards(getTotalPlayTime(), true);
                // 初始化音频上下文
                SoundEngine.ensureCtx();
                MusicEngine.stop();
                MusicEngine.start(isTutorial ? 'tutorial' : 'game');
                if (getMusicMuted() && !MusicEngine.isMuted) {
                    MusicEngine.toggleMute();
                }
                updateMusicButtonUI();
                setTimeout(() => {
                    gameMain.classList.add('active');
                    showLobbyConfig(() => {
                        GAME.mapTerrain = generateMap();
                        GAME.playerLands = {};
                        GAME.playerResources = {};
                        GAME.playerEconomy = {};
                        GAME.riotCheckedTurns = new Set();
                        GAME.playerLastFreeTurn = {};
                        for (let i = 1; i <= GAME.totalPlayers; i++) {
                            GAME.playerLands[i] = { cells: new Set(), capital: null };
                            GAME.playerResources[i] = { silver: 350, gold: 6, diamond: 3, rareEarth: 20, oil: 35,
                                uranium: 6 };
                            GAME.playerEconomy[i] = { gdp: 680, agriculture: 16, industry: 10, commerce: 13,
                                science: 9 };
                            GAME.playerLastFreeTurn[i] = -2;
                        }
                        GAME.units.clear();
                        GAME.harvestedCells.clear();
                        GAME.eliminatedPlayers.clear();
                        GAME.setupPhase = { isSetting: true, currentSettingPlayer: 1, selectedCells: [],
                            selectingCapital: false };
                        GAME.currentTurn = 1;
                        GAME.attackUsedThisTurn = false;
                        GAME.expandUsedThisTurn = false;
                        GAME.turnCount = 0;
                        renderFullMap();
                        updateTopBar();
                        updateLotteryButtonHighlight();
                        if (isTutorial) {
                            startTutorial();
                            showMsg('📖 教程开始！' + TUTORIAL.steps[0].desc);
                        } else {
                            TUTORIAL.active = false;
                            TUTORIAL.completed = true;
                            clearTutorialHighlights();
                            const banner = document.getElementById('tutorialBanner');
                            if (banner) banner.classList.remove('show');
                            showMsg(`请 ${GAME.playerNames[1]} 选择4块相连领土，再点击首都 | 每回合限扩1格 | 攻击需相邻(导弹除外)`);
                        }
                        if (GAME.aiPlayers.has(1)) autoSetupTerrain();
                    }, isTutorial);
                }, 200);
            }

            // ==================== 按钮绑定（含教程步骤推进与音效） ====================
            enterBtn.onclick = () => {
                SoundEngine.click();
                launchFullGame(false);
            };
            tutorialStartBtn.onclick = () => {
                SoundEngine.click();
                launchFullGame(true);
            };
            tutorialBtn.onclick = () => { SoundEngine.click();
                showRulesModal(); };

            document.getElementById('fabRules').onclick = () => { SoundEngine.click();
                showRulesModal(); };
            document.getElementById('fabResearch').onclick = () => {
                SoundEngine.click();
                if (!GAME.setupPhase.isSetting) showTechTree();
                else showMsg('建设中无法研发');
            };
            document.getElementById('fabAttack').onclick = () => {
                SoundEngine.click();
                if (!GAME.setupPhase.isSetting) {
                    GAME.selectedAction = 'attack';
                    let player = GAME.currentTurn;
                    if (hasMissileTech(player)) {
                        showMsg('⚔️ 攻击模式：点击敌方相邻格子(步兵) 或 远程(导弹-50银) | 再次点击目标确认');
                    } else {
                        showMsg('⚔️ 攻击模式：点击与己方单位相邻的敌方格子');
                    }
                } else showMsg('完成建国后再宣战');
            };
            document.getElementById('fabCollect').onclick = () => {
                SoundEngine.click();
                if (!GAME.setupPhase.isSetting) {
                    GAME.selectedAction = 'collect';
                    showMsg('收集模式: 点击己方领土');
                    if (TUTORIAL.active && TUTORIAL.step === 5 && !TUTORIAL.completed) {
                        advanceTutorial();
                    }
                } else showMsg('完成建国后再收集');
            };
            document.getElementById('fabExpand').onclick = () => {
                SoundEngine.click();
                if (GAME.setupPhase.isSetting) { showMsg('完成建国后再扩张');
                    return; }
                if (GAME.expandUsedThisTurn) {
                    showMsg('⚠️ 本回合已扩张过，每回合只能扩张1格！请结束回合后下轮再扩');
                    if (TUTORIAL.active && TUTORIAL.step === 3 && !TUTORIAL.completed) {
                        advanceTutorial();
                    }
                    return;
                }
                GAME.selectedAction = 'expand';
                showMsg('扩张模式: 点击相邻地块(100银)·本回合限1格');
                if (TUTORIAL.active && TUTORIAL.step === 3 && !TUTORIAL.completed) {
                    advanceTutorial();
                }
            };
            document.getElementById('fabPlace').onclick = () => {
                SoundEngine.click();
                if (!GAME.setupPhase.isSetting) {
                    GAME.selectedAction = 'place';
                    showMsg('部署步兵: 点击己方领土');
                    if (TUTORIAL.active && TUTORIAL.step === 7 && !TUTORIAL.completed) {
                        advanceTutorial();
                    }
                } else showMsg('完成建国后再部署');
            };
            document.getElementById('fabDevelop').onclick = () => {
                SoundEngine.click();
                if (!GAME.setupPhase.isSetting) { GAME.selectedAction = 'develop';
                    showDevelopModal(); } else showMsg('建设中无法发展');
            };
            document.getElementById('fabLottery').onclick = () => {
                SoundEngine.click();
                openLotteryModal();
            };
            document.getElementById('fabEndTurn').onclick = () => { SoundEngine.click();
                endTurn(); };

            // ==================== 重写onGridClick处理导弹模式 ====================
            const originalOnGridClick = onGridClick;
            onGridClick = function(x, y) {
                if (!GAME.setupPhase.isSetting && GAME.selectedAction === 'missile') {
                    actionAttackMissile(x, y, null);
                    return;
                }
                if (!GAME.setupPhase.isSetting && GAME.selectedAction === 'attack') {
                    let player = GAME.currentTurn;
                    let key = `${x},${y}`;
                    let owner = null;
                    for (let p = 1; p <= GAME.totalPlayers; p++)
                        if (GAME.playerLands[p]?.cells.has(key)) owner = p;
                    if (owner === player) { showMsg('无法进攻己方');
                        SoundEngine.error();
                        GAME.selectedAction = null; return; }
                    if (GAME.attackUsedThisTurn) { showMsg('本回合已攻击');
                        SoundEngine.error();
                        GAME.selectedAction = null; return; }
                    let myUnitEntries = [];
                    for (let [k, u] of GAME.units) {
                        if (u.owner === player) myUnitEntries.push({ key: k, unit: u });
                    }
                    if (myUnitEntries.length === 0) { showMsg('无己方战斗单位，请先部署步兵');
                        SoundEngine.error();
                        GAME.selectedAction = null; return; }
                    let adjacentUnit = null;
                    for (let entry of myUnitEntries) {
                        let [sx, sy] = entry.key.split(',').map(Number);
                        if (Math.abs(sx - x) + Math.abs(sy - y) === 1) {
                            adjacentUnit = entry;
                            break;
                        }
                    }
                    if (!adjacentUnit && hasMissileTech(player)) {
                        if (GAME.playerResources[player].silver < 50) {
                            showMsg('❌ 没有相邻单位，且银币不足50无法发射导弹');
                            SoundEngine.error();
                            GAME.selectedAction = null;
                            return;
                        }
                        actionAttackMissile(x, y, null);
                        return;
                    } else if (!adjacentUnit) {
                        showMsg('❌ 没有与目标相邻的己方单位！研发导弹科技后可远程攻击');
                        SoundEngine.error();
                        GAME.selectedAction = null;
                        return;
                    }
                    executeAdjacentAttack(x, y, key, owner, player, adjacentUnit);
                    return;
                }
                originalOnGridClick(x, y);
            };

            // ==================== 初始状态 ====================
            updateHomeStats();
            recalcCellSize();
            GAME.mapTerrain = generateMap();
            GAME.playerLands = {};
            GAME.playerResources = {};
            GAME.playerEconomy = {};
            GAME.playerLastFreeTurn = {};
            for (let i = 1; i <= 2; i++) {
                GAME.playerLands[i] = { cells: new Set(), capital: null };
                GAME.playerResources[i] = { silver: 350, gold: 6, diamond: 3, rareEarth: 20, oil: 35, uranium: 6 };
                GAME.playerEconomy[i] = { gdp: 680, agriculture: 16, industry: 10, commerce: 13, science: 9 };
                GAME.playerLastFreeTurn[i] = -2;
            }
            GAME.totalPlayers = 2;
            GAME.setupPhase = { isSetting: true, currentSettingPlayer: 1, selectedCells: [], selectingCapital: false };
            GAME.playerNames = { 1: '星穹1', 2: '星穹2' };
            GAME.capitalNames = { 1: '辉光1', 2: '辉光2' };
            GAME.attackUsedThisTurn = false;
            GAME.expandUsedThisTurn = false;
            updateLotteryButtonHighlight();

            // ==================== 全局点击初始化音频上下文 ====================
            document.addEventListener('click', function initAudioOnce() {
                SoundEngine.ensureCtx();
                MusicEngine.resume();
            }, { once: true });
            document.addEventListener('touchstart', function initAudioOnceTouch() {
                SoundEngine.ensureCtx();
                MusicEngine.resume();
            }, { once: true });

            console.log('🎵 现代战争推演4 - 音效与背景音乐系统已就绪');
            console.log('🔽 教程箭头已增强：精准指向地图格子 & 按钮，带波纹脉冲动画');
            console.log('🎮 音乐开关按钮位于右上角');
        })();
    </script>
</body>
</html>
