<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>现代战争推演4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --gold: #f5bc5c;
            --gold-light: #ffefcf;
            --bg-deep: #030c15;
            --panel-bg: rgba(0, 0, 0, 0.88);
            --accent: #c5863a;
            --success: #4ade80;
            --danger: #f87171;
            --info: #60a5fa;
            --cell-size: 28px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        /* ============ 全屏成就动画 ============ */
        .achievement-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 90000;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: radial-gradient(ellipse at center, rgba(20, 10, 0, 0.92) 0%, rgba(0, 0, 0, 0.96) 70%);
        }
        .achievement-overlay.show {
            opacity: 1;
            animation: achievePulse 0.5s ease-out;
        }
        .achievement-content {
            text-align: center;
            animation: achieveBounce 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1;
        }
        .achievement-icon {
            font-size: 4rem;
            color: #ffd966;
            text-shadow: 0 0 60px #ffaa33, 0 0 120px #ff8800;
            margin-bottom: 0.5rem;
            animation: achieveGlow 0.6s infinite alternate;
        }
        .achievement-title {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff0c0, #f5bc5c, #ffecb3, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            margin-bottom: 0.3rem;
        }
        .achievement-subtitle {
            font-size: 1rem;
            color: #ffdfa5;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .achievement-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .ach-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd966;
            border-radius: 50%;
            animation: achPartFly 1.8s ease-out forwards;
            box-shadow: 0 0 10px #ffaa33;
        }
        @keyframes achieveBounce {
            0% {
                transform: scale(0.2);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes achievePulse {
            0% {
                background: radial-gradient(ellipse at center, rgba(30, 15, 0, 0.7) 0%, rgba(0, 0, 0, 0.9) 70%);
            }
            100% {
                background: radial-gradient(ellipse at center, rgba(20, 10, 0, 0.92) 0%, rgba(0, 0, 0, 0.96) 70%);
            }
        }
        @keyframes achieveGlow {
            0% {
                text-shadow: 0 0 40px #ffaa33, 0 0 80px #ff8800;
            }
            100% {
                text-shadow: 0 0 80px #ffd966, 0 0 150px #ffbb44;
            }
        }
        @keyframes achPartFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }

        /* ============ 启动层 ============ */
        .screen-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #000, #010101);
            z-index: 20000;
            transition: opacity 1.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 1;
            pointer-events: none;
        }
        .powered-by {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 50%, #0a0f1a, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20001;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 6px;
            transition: opacity 1s ease;
            opacity: 1;
            pointer-events: none;
            font-family: monospace;
        }
        .powered-by span {
            background: linear-gradient(135deg, #ffdd99, #e6b422, #ffcc66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #ffaa33;
            animation: aurora 1.8s infinite alternate;
        }
        @keyframes aurora {
            0% {
                text-shadow: 0 0 3px #ffd966;
                opacity: 0.9;
                letter-spacing: 6px;
            }
            100% {
                text-shadow: 0 0 20px #ffbf40;
                opacity: 1;
                letter-spacing: 8px;
            }
        }

        /* ============ 首页 ============ */
        .home-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: radial-gradient(ellipse at 30% 40%, #0a1a3a, #01040f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 1.8s ease-out;
            pointer-events: none;
            overflow: hidden;
        }
        .home-container.active {
            opacity: 1;
            pointer-events: auto;
        }
        .flowing-lights {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
        }
        .light-particle {
            position: absolute;
            background: radial-gradient(circle, #ffdd99, #ffaa33);
            border-radius: 50%;
            filter: blur(3px);
            animation: floatGlow 20s infinite linear;
        }
        @keyframes floatGlow {
            0% {
                transform: translateY(100vh) translateX(-40px);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) translateX(40px);
                opacity: 0;
            }
        }
        .game-title {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff0c0, #f5bc5c, #ffecb3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.2rem;
            z-index: 2;
            letter-spacing: 4px;
            text-align: center;
            padding: 0 20px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            z-index: 2;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
            margin-bottom: 1.5rem;
        }
        .gold-btn {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border: 1.5px solid #f5bc5c;
            color: #fff2d7;
            font-size: 1.2rem;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            border-radius: 2px;
        }
        .gold-btn:hover {
            box-shadow: 0 10px 28px rgba(245, 188, 92, 0.3);
            border-color: #ffd966;
        }
        .gold-btn:active {
            transform: scale(0.97);
            background: #3a2a1a;
        }
        .gold-btn i {
            color: #f5bc5c;
            font-size: 1.1rem;
        }
        .gold-btn.tutorial-btn {
            border-color: #4ade80;
            color: #d4ffe0;
        }
        .gold-btn.tutorial-btn i {
            color: #4ade80;
        }
        .gold-btn.tutorial-btn:hover {
            box-shadow: 0 10px 28px rgba(74, 222, 128, 0.35);
            border-color: #6fff9f;
        }

        /* 首页统计面板 */
        .home-stats-panel {
            position: relative;
            z-index: 3;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px);
            border: 1.5px solid #f5bc5c;
            padding: 1rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            max-width: 90vw;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            border-radius: 2px;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #ffefcf;
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c5924a;
            font-weight: 600;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: #ffd966;
        }
        .stat-badge {
            display: inline-block;
            padding: 4px 14px;
            border: 1px solid;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            animation: badgeShimmer 2s infinite;
        }
        .badge-bronze {
            color: #cd7f32;
            border-color: #cd7f32;
            background: rgba(139, 90, 43, 0.3);
            text-shadow: 0 0 8px #b87333;
        }
        .badge-silver {
            color: #c0c0c0;
            border-color: #c0c0c0;
            background: rgba(160, 160, 160, 0.3);
            text-shadow: 0 0 10px #e0e0e0;
        }
        .badge-gold {
            color: #ffd700;
            border-color: #ffd700;
            background: rgba(200, 150, 30, 0.35);
            text-shadow: 0 0 14px #ffcc00;
        }
        .badge-platinum {
            color: #7ec8e3;
            border-color: #7ec8e3;
            background: rgba(80, 150, 180, 0.35);
            text-shadow: 0 0 16px #a0e0f0;
        }
        .badge-diamond {
            color: #b8e6ff;
            border-color: #b8e6ff;
            background: rgba(100, 180, 220, 0.4);
            text-shadow: 0 0 20px #d0f0ff;
            animation: diamondSparkle 1.5s infinite;
        }
        .badge-legend {
            color: #ff9933;
            border-color: #ff9933;
            background: rgba(200, 100, 20, 0.45);
            text-shadow: 0 0 22px #ffbb66, 0 0 40px #ff8800;
            animation: legendFire 1s infinite;
        }
        @keyframes badgeShimmer {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.3);
            }
        }
        @keyframes diamondSparkle {
            0%,
            100% {
                text-shadow: 0 0 16px #d0f0ff;
            }
            50% {
                text-shadow: 0 0 30px #ffffff, 0 0 50px #b8e6ff;
            }
        }
        @keyframes legendFire {
            0%,
            100% {
                text-shadow: 0 0 20px #ffbb66, 0 0 40px #ff8800;
            }
            50% {
                text-shadow: 0 0 35px #ffdd99, 0 0 70px #ffaa33, 0 0 100px #ff6600;
            }
        }

        /* ============ 游戏主界面 ============ */
        .game-main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: #030c15;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }
        .game-main.active {
            display: flex;
        }
        .nation-info {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f5bc5c;
            gap: 8px;
            z-index: 2100;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .nation-card {
            color: #fdebb3;
            font-weight: bold;
            font-size: 0.75rem;
            background: #0a1f30cc;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #dba347;
            border-radius: 2px;
            max-width: 65vw;
            overflow-x: auto;
            white-space: nowrap;
        }
        .turn-text {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #ffeaac;
            border-left: 3px solid #f5bc5c;
            white-space: nowrap;
        }
        .map-wrapper {
            flex: 1;
            overflow: auto;
            padding: 8px 8px 100px 8px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .grid-container {
            display: grid;
            background: #0a1622;
            border: 2px solid #ac864a;
            box-shadow: 0 0 0 2px #162a3a;
            flex-shrink: 0;
            grid-template-columns: repeat(20, var(--cell-size));
            grid-template-rows: repeat(20, var(--cell-size));
            transition: grid-template-columns 0.2s ease, grid-template-rows 0.2s ease;
        }
        .grid-cell {
            border: 1px solid #2d5470;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .grid-cell:active {
            filter: brightness(1.2);
            transform: scale(0.94);
        }
        .sea {
            background: radial-gradient(circle at 30% 20%, #1e5a7a, #0e3950);
        }
        .land {
            background: radial-gradient(circle at 30% 20%, #4cae7a, #2a6a46);
        }
        .selected {
            background: radial-gradient(circle, #ffc107, #f57c00) !important;
            border: 1px solid white !important;
            animation: selectedPulse 0.6s infinite alternate;
        }
        @keyframes selectedPulse {
            0% {
                box-shadow: inset 0 0 6px #fff;
            }
            100% {
                box-shadow: inset 0 0 14px #ffe0a0;
            }
        }
        .unit {
            background: radial-gradient(circle at 30% 30%, #e65c5c, #a03333) !important;
            box-shadow: inset 0 0 4px #ffcc00;
        }
        .player1-land {
            background: radial-gradient(circle, #c084fc, #a855f7) !important;
        }
        .player1-capital {
            background: radial-gradient(circle, #d6a6ff, #b77cf0) !important;
            border: 2px solid #ffdd88;
        }
        .player2-land {
            background: radial-gradient(circle, #34d399, #10b981) !important;
        }
        .player2-capital {
            background: radial-gradient(circle, #5ee0ae, #2cbd82) !important;
            border: 2px solid #ffdd88;
        }
        .player3-land {
            background: radial-gradient(circle, #fbbf24, #f59e0b) !important;
        }
        .player3-capital {
            background: radial-gradient(circle, #ffd966, #f5a623) !important;
            border: 2px solid #fff0b0;
        }
        .player4-land {
            background: radial-gradient(circle, #f87171, #ef4444) !important;
        }
        .player4-capital {
            background: radial-gradient(circle, #fc8b8b, #e35f5f) !important;
            border: 2px solid #ffe0e0;
        }
        .player5-land {
            background: radial-gradient(circle, #f472b6, #ec4899) !important;
        }
        .player5-capital {
            background: radial-gradient(circle, #ff92ce, #da62b0) !important;
        }
        .player6-land {
            background: radial-gradient(circle, #a78bfa, #8b5cf6) !important;
        }
        .player6-capital {
            background: radial-gradient(circle, #b794ff, #8a6cf0) !important;
        }
        .player7-land {
            background: radial-gradient(circle, #60a5fa, #3b82f6) !important;
        }
        .player7-capital {
            background: radial-gradient(circle, #7faeff, #2e7eb8) !important;
        }
        .player8-land {
            background: radial-gradient(circle, #fb7185, #f43f5e) !important;
        }
        .player8-capital {
            background: radial-gradient(circle, #ff98aa, #fc687c) !important;
        }
        .player9-land {
            background: radial-gradient(circle, #94a3b8, #64748b) !important;
        }
        .player9-capital {
            background: radial-gradient(circle, #b0c4de, #748aa6) !important;
        }

        /* ============ 悬浮工具栏 ============ */
        .fab-horizontal {
            position: fixed;
            bottom: 12px;
            right: 12px;
            z-index: 3100;
            display: none;
            gap: 6px;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(20px);
            padding: 6px 10px;
            border: 1px solid #f5bc5c;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: 88vw;
            pointer-events: auto;
            border-radius: 2px;
        }
        .fab-horizontal.visible {
            display: flex;
        }
        .fab-icon {
            width: 38px;
            height: 38px;
            background: #0a1f2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #ffdfa5;
            cursor: pointer;
            border: 1px solid #dba347;
            transition: 0.1s;
            position: relative;
            border-radius: 2px;
        }
        .fab-icon:active {
            transform: scale(0.94);
            background: #2c5a78;
            color: white;
        }
        .fab-icon:hover {
            border-color: #f5bc5c;
            box-shadow: 0 0 12px rgba(245, 188, 92, 0.4);
        }
        .fab-icon.tutorial-highlight {
            border-color: #4ade80 !important;
            box-shadow: 0 0 18px rgba(74, 222, 128, 0.7) !important;
            animation: tutorialGlow 0.7s infinite alternate;
        }
        @keyframes tutorialGlow {
            0% {
                box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
            }
            100% {
                box-shadow: 0 0 22px rgba(74, 222, 128, 0.9), 0 0 40px rgba(74, 222, 128, 0.4);
            }
        }

        /* ============ 弹窗通用 ============ */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 7000;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-card {
            background: #071a28;
            border: 2px solid #f5bc5c;
            width: 100%;
            max-width: 580px;
            padding: 1.5rem;
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
            color: #ffefcf;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 2px;
        }
        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-card h2 {
            color: #f5bc5c;
            margin-bottom: 0.8rem;
            letter-spacing: 2px;
            font-size: 1.4rem;
        }
        .modal-card h3 {
            color: #e4b363;
            margin: 10px 0 6px;
            font-size: 1rem;
        }
        .modal-close-btn {
            background: #5a3e1f;
            margin-top: 14px;
            padding: 8px 20px;
            cursor: pointer;
            color: #ffefcf;
            border: 1px solid #c5863a;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.15s;
            border-radius: 2px;
        }
        .modal-close-btn:hover {
            background: #7a5430;
            border-color: #f5bc5c;
        }
        .modal-action-btn {
            background: #c5863a;
            border: none;
            color: white;
            padding: 7px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.15s;
            border-radius: 2px;
        }
        .modal-action-btn:hover {
            background: #dba347;
            box-shadow: 0 0 14px rgba(245, 188, 92, 0.4);
        }
        .modal-action-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* ============ 玩家配置列表 ============ */
        .player-config-list {
            max-height: 50vh;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .player-row {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #021a2b;
            margin: 8px 0;
            padding: 6px 8px;
            border: 1px solid #c99242;
            flex-wrap: wrap;
            border-radius: 2px;
        }
        .player-row input {
            background: #0a2030;
            border: 1px solid #c99242;
            color: #ffefcf;
            padding: 4px 6px;
            flex: 2;
            min-width: 80px;
            font-size: 0.75rem;
        }
        .player-row label {
            color: #ffdeae;
            white-space: nowrap;
            font-size: 0.75rem;
        }
        .player-row span {
            color: #ffd966;
            font-weight: bold;
            min-width: 40px;
            font-size: 0.8rem;
        }

        /* ============ 科技树弹窗 ============ */
        .tech-item {
            background: #05212e;
            margin: 8px 0;
            padding: 8px 10px;
            border: 1px solid #e4b363;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #fff2da;
            gap: 6px;
            border-radius: 2px;
        }
        .tech-item button {
            background: #c5863a;
            border: none;
            color: white;
            padding: 5px 14px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
            border-radius: 2px;
        }
        .tech-item button:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* ============ 内政发展弹窗 ============ */
        .develop-option {
            background: #05212e;
            margin: 8px 0;
            padding: 10px 14px;
            border: 1px solid #e4b363;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #fff2da;
            cursor: pointer;
            transition: 0.15s;
            gap: 8px;
            border-radius: 2px;
        }
        .develop-option:hover {
            background: #0a3040;
            border-color: #f5bc5c;
            box-shadow: 0 0 10px rgba(245, 188, 92, 0.25);
        }
        .develop-option .dev-cost {
            font-size: 0.7rem;
            color: #ffdfa5;
            background: #021a2b;
            padding: 3px 10px;
            white-space: nowrap;
            border-radius: 2px;
        }
        .develop-option .dev-icon {
            font-size: 1.4rem;
            width: 36px;
            text-align: center;
        }

        /* ============ 状态提示栏 ============ */
        .status-tip {
            position: fixed;
            bottom: 100px;
            left: 12px;
            right: 12px;
            background: #000000dd;
            backdrop-filter: blur(14px);
            color: #ffefbb;
            padding: 6px 14px;
            border-left: 4px solid #f5bc5c;
            font-weight: bold;
            z-index: 3050;
            font-size: 0.7rem;
            pointer-events: none;
            white-space: nowrap;
            overflow-x: auto;
            max-width: calc(100vw - 24px);
            text-align: center;
            border-radius: 2px;
            text-overflow: ellipsis;
        }
        .status-tip.warning {
            border-left-color: #f87171 !important;
            color: #ffbbbb !important;
            animation: warningFlash 0.5s infinite alternate;
        }
        @keyframes warningFlash {
            0% {
                background: #000000dd;
            }
            100% {
                background: #3a0000dd;
            }
        }

        /* ============ 教程引导覆盖层 ============ */
        .tutorial-banner {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6000;
            background: rgba(0, 30, 20, 0.95);
            backdrop-filter: blur(16px);
            border: 2px solid #4ade80;
            color: #d4ffe0;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            pointer-events: none;
            max-width: 90vw;
            border-radius: 2px;
            animation: tutorialBannerIn 0.4s ease;
            display: none;
        }
        .tutorial-banner.show {
            display: block;
        }
        @keyframes tutorialBannerIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        .tutorial-banner .tut-step-num {
            color: #4ade80;
            font-size: 1.1rem;
            margin-right: 6px;
        }
        .tutorial-banner .tut-arrow {
            display: inline-block;
            animation: tutArrowBounce 0.8s infinite;
            margin: 0 4px;
        }
        @keyframes tutArrowBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        /* ============ 暴乱全屏警告 ============ */
        .riot-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 85000;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            background: rgba(120, 0, 0, 0.5);
        }
        .riot-overlay.show {
            opacity: 1;
            animation: riotShake 0.6s ease-out;
        }
        .riot-content {
            text-align: center;
            color: #ff6666;
            animation: riotText 0.5s ease-out;
        }
        .riot-content .riot-icon {
            font-size: 3.5rem;
            text-shadow: 0 0 40px #ff0000, 0 0 80px #ff4400;
        }
        .riot-content .riot-title {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 20px #ff3333;
        }
        @keyframes riotShake {
            0%,
            100% {
                transform: translateX(0);
            }
            10% {
                transform: translateX(-8px);
            }
            20% {
                transform: translateX(8px);
            }
            30% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            50% {
                transform: translateX(-3px);
            }
            60% {
                transform: translateX(3px);
            }
            70% {
                transform: translateX(-1px);
            }
            80% {
                transform: translateX(1px);
            }
        }
        @keyframes riotText {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ============ 响应式 ============ */
        @media (max-width: 650px) {
            :root {
                --cell-size: 22px;
            }
            .fab-icon {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .grid-container {
                border-width: 1.5px;
            }
            .nation-card,
            .turn-text {
                font-size: 0.6rem;
                padding: 4px 8px;
            }
            .map-wrapper {
                padding: 6px 6px 110px 6px;
            }
            .status-tip {
                bottom: 110px;
                font-size: 0.62rem;
                padding: 5px 10px;
                left: 6px;
                right: 6px;
                max-width: calc(100vw - 12px);
            }
            .game-title {
                font-size: 2rem;
            }
            .gold-btn {
                font-size: 0.95rem;
                padding: 0.55rem 1rem;
            }
            .home-stats-panel {
                gap: 0.6rem;
                padding: 0.7rem 0.8rem;
            }
            .stat-value {
                font-size: 0.9rem;
            }
            .achievement-title {
                font-size: 1.2rem;
            }
            .achievement-icon {
                font-size: 3rem;
            }
            .tutorial-banner {
                top: 40px;
                font-size: 0.7rem;
                padding: 7px 14px;
            }
            .fab-horizontal {
                bottom: 8px;
                right: 6px;
                gap: 4px;
                padding: 5px 7px;
                max-width: 94vw;
            }
            .nation-card {
                max-width: 55vw;
                font-size: 0.55rem;
            }
            .turn-text {
                font-size: 0.55rem;
                padding: 4px 8px;
            }
        }
        @media (max-width: 380px) {
            :root {
                --cell-size: 18px;
            }
            .fab-icon {
                width: 30px;
                height: 30px;
                font-size: 12px;
            }
            .status-tip {
                bottom: 105px;
                font-size: 0.58rem;
            }
            .grid-cell {
                border-width: 0.5px;
            }
            .map-wrapper {
                padding: 4px 4px 105px 4px;
            }
            .nation-card {
                font-size: 0.5rem;
                padding: 3px 6px;
                max-width: 50vw;
            }
            .turn-text {
                font-size: 0.5rem;
                padding: 3px 6px;
            }
            .fab-horizontal {
                bottom: 6px;
                right: 3px;
                gap: 3px;
                padding: 4px 5px;
                max-width: 96vw;
            }
        }
    </style>
</head>
<body>

    <!-- 启动遮罩 -->
    <div class="screen-mask" id="blackMask"></div>
    <div class="powered-by" id="poweredScreen"><span>powered by Miyuan</span></div>

    <!-- ============ 首页 ============ -->
    <div class="home-container" id="homeContainer">
        <div class="flowing-lights" id="lightCanvas"></div>
        <div class="game-title">现代战争推演4</div>
        <div class="btn-group">
            <div class="gold-btn" id="enterGameBtn"><i class="fas fa-flag"></i> 进入游戏</div>
            <div class="gold-btn tutorial-btn" id="tutorialStartBtn"><i class="fas fa-graduation-cap"></i> 新手教程</div>
            <div class="gold-btn" id="tutorialHomeBtn"><i class="fas fa-book"></i> 游戏规则</div>
        </div>
        <!-- 首页统计面板 -->
        <div class="home-stats-panel" id="homeStatsPanel">
            <div class="stat-item">
                <span class="stat-label"><i class="fas fa-play-circle"></i> 游玩次数</span>
                <span class="stat-value" id="statPlayCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label"><i class="fas fa-clock"></i> 累计时长</span>
                <span class="stat-value" id="statPlayTime">0分钟</span>
            </div>
            <div class="stat-item">
                <span class="stat-label"><i class="fas fa-medal"></i> 荣誉名号</span>
                <span class="stat-badge badge-bronze" id="statBadge">🟤 青铜新兵</span>
            </div>
        </div>
    </div>

    <!-- ============ 游戏主界面 ============ -->
    <div class="game-main" id="gameMain">
        <div class="nation-info" id="nationInfoBar">
            <div class="nation-card" id="playerInfoPanel">🏳️ 帝国议会</div>
            <div class="turn-text" id="turnText">⚙️ 待机中</div>
        </div>
        <div class="map-wrapper" id="mapWrapper">
            <div class="grid-container" id="gridMap"></div>
        </div>
    </div>

    <!-- ============ 悬浮工具栏（游戏中显示） ============ -->
    <div class="fab-horizontal" id="fabMenu">
        <div class="fab-icon" id="fabRules" title="规则"><i class="fas fa-scroll"></i></div>
        <div class="fab-icon" id="fabResearch" title="研发"><i class="fas fa-flask"></i></div>
        <div class="fab-icon" id="fabAttack" title="攻击"><i class="fas fa-crosshairs"></i></div>
        <div class="fab-icon" id="fabCollect" title="收集"><i class="fas fa-coins"></i></div>
        <div class="fab-icon" id="fabExpand" title="扩张"><i class="fas fa-maximize"></i></div>
        <div class="fab-icon" id="fabPlace" title="部署步兵"><i class="fas fa-user-plus"></i></div>
        <div class="fab-icon" id="fabDevelop" title="内政发展"><i class="fas fa-chart-line"></i></div>
        <div class="fab-icon" id="fabEndTurn" title="结束回合"><i class="fas fa-hourglass-half"></i></div>
    </div>

    <!-- 状态提示栏 -->
    <div class="status-tip" id="statusMessage">✦ 触摸按钮开创霸业 | 地图已预留防遮挡空间</div>

    <!-- ============ 教程引导横幅 ============ -->
    <div class="tutorial-banner" id="tutorialBanner">
        <span class="tut-step-num" id="tutStepNum">步骤1/6</span>
        <span id="tutDesc">请选择4块相连陆地</span>
        <span class="tut-arrow">👇</span>
    </div>

    <!-- ============ 暴乱全屏警告层 ============ -->
    <div class="riot-overlay" id="riotOverlay">
        <div class="riot-content">
            <div class="riot-icon"><i class="fas fa-fire"></i></div>
            <div class="riot-title" id="riotTitle">大暴乱！</div>
            <p style="color:#ffaaaa; font-size:0.9rem;" id="riotDesc"></p>
        </div>
    </div>

    <!-- ============ 全屏成就动画层 ============ -->
    <div class="achievement-overlay" id="achievementOverlay">
        <div class="achievement-particles" id="achievementParticles"></div>
        <div class="achievement-content">
            <div class="achievement-icon" id="achIcon"><i class="fas fa-star"></i></div>
            <div class="achievement-title" id="achTitle">成就达成</div>
            <div class="achievement-subtitle" id="achSubtitle"></div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== LOCAL STORAGE 管理 ====================
            const LS_KEYS = {
                playCount: 'modernWar4_playCount',
                totalPlayTime: 'modernWar4_totalPlayTime',
                sessionStart: 'modernWar4_sessionStart'
            };

            function getPlayCount() {
                return parseInt(localStorage.getItem(LS_KEYS.playCount) || '0');
            }

            function incrementPlayCount() {
                let c = getPlayCount() + 1;
                localStorage.setItem(LS_KEYS.playCount, String(c));
                return c;
            }

            function getTotalPlayTime() {
                return parseInt(localStorage.getItem(LS_KEYS.totalPlayTime) || '0');
            }

            function addPlayTime(seconds) {
                let t = getTotalPlayTime() + seconds;
                localStorage.setItem(LS_KEYS.totalPlayTime, String(t));
                return t;
            }

            function setSessionStart() {
                localStorage.setItem(LS_KEYS.sessionStart, String(Date.now()));
            }

            function getSessionElapsed() {
                let start = parseInt(localStorage.getItem(LS_KEYS.sessionStart) || '0');
                if (!start) return 0;
                return Math.floor((Date.now() - start) / 1000);
            }

            function flushSessionTime() {
                let elapsed = getSessionElapsed();
                if (elapsed > 0) {
                    addPlayTime(elapsed);
                }
                localStorage.setItem(LS_KEYS.sessionStart, String(Date.now()));
            }

            // 名号系统
            function getRankBadge(totalSeconds) {
                let minutes = totalSeconds / 60;
                if (minutes < 30) {
                    return { name: '青铜新兵', cls: 'badge-bronze', icon: '🟤' };
                } else if (minutes < 120) {
                    return { name: '白银勇士', cls: 'badge-silver', icon: '⚪' };
                } else if (minutes < 480) {
                    return { name: '黄金将领', cls: 'badge-gold', icon: '🟡' };
                } else if (minutes < 1440) {
                    return { name: '铂金统帅', cls: 'badge-platinum', icon: '🔵' };
                } else if (minutes < 4320) {
                    return { name: '钻石元帅', cls: 'badge-diamond', icon: '💎' };
                } else {
                    return { name: '传奇战神', cls: 'badge-legend', icon: '👑' };
                }
            }

            function formatPlayTime(totalSeconds) {
                if (totalSeconds < 60) return totalSeconds + '秒';
                let mins = Math.floor(totalSeconds / 60);
                if (mins < 60) return mins + '分钟';
                let hrs = Math.floor(mins / 60);
                let remMins = mins % 60;
                if (hrs < 24) return hrs + '小时' + (remMins > 0 ? remMins + '分钟' : '');
                let days = Math.floor(hrs / 24);
                let remHrs = hrs % 24;
                return days + '天' + (remHrs > 0 ? remHrs + '小时' : '');
            }

            function updateHomeStats() {
                let count = getPlayCount();
                let totalSec = getTotalPlayTime();
                let rank = getRankBadge(totalSec);
                let timeStr = formatPlayTime(totalSec);

                let countEl = document.getElementById('statPlayCount');
                let timeEl = document.getElementById('statPlayTime');
                let badgeEl = document.getElementById('statBadge');
                if (countEl) countEl.textContent = count;
                if (timeEl) timeEl.textContent = timeStr;
                if (badgeEl) {
                    badgeEl.textContent = rank.icon + ' ' + rank.name;
                    badgeEl.className = 'stat-badge ' + rank.cls;
                }
            }

            // 页面关闭时保存游玩时间
            window.addEventListener('beforeunload', () => {
                flushSessionTime();
            });
            let autoSaveInterval = null;

            function startAutoSave() {
                if (autoSaveInterval) clearInterval(autoSaveInterval);
                autoSaveInterval = setInterval(() => {
                    flushSessionTime();
                    updateHomeStats();
                }, 30000);
            }

            function stopAutoSave() {
                if (autoSaveInterval) {
                    clearInterval(autoSaveInterval);
                    autoSaveInterval = null;
                }
            }

            // ==================== 全屏成就动画 ====================
            let achievementTimer = null;

            function showAchievement(iconHtml, title, subtitle) {
                let overlay = document.getElementById('achievementOverlay');
                let achIcon = document.getElementById('achIcon');
                let achTitle = document.getElementById('achTitle');
                let achSubtitle = document.getElementById('achSubtitle');
                let particlesContainer = document.getElementById('achievementParticles');
                if (!overlay || !achTitle) return;
                if (achievementTimer) clearTimeout(achievementTimer);
                achIcon.innerHTML = iconHtml || '<i class="fas fa-star"></i>';
                achTitle.textContent = title || '成就达成';
                achSubtitle.textContent = subtitle || '';
                particlesContainer.innerHTML = '';
                for (let i = 0; i < 40; i++) {
                    let p = document.createElement('div');
                    p.classList.add('ach-particle');
                    let angle = Math.random() * Math.PI * 2;
                    let dist = 60 + Math.random() * 180;
                    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                    p.style.left = '50%';
                    p.style.top = '50%';
                    p.style.animationDelay = Math.random() * 0.4 + 's';
                    p.style.animationDuration = (1.2 + Math.random() * 1.6) + 's';
                    p.style.width = (3 + Math.random() * 8) + 'px';
                    p.style.height = p.style.width;
                    let colors = ['#ffd966', '#ffaa33', '#ffcc66', '#ffe0a0', '#fff0c0', '#ffbb44'];
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particlesContainer.appendChild(p);
                }
                overlay.classList.add('show');
                achievementTimer = setTimeout(() => {
                    overlay.classList.remove('show');
                    achievementTimer = null;
                }, 2200);
            }

            // ==================== 暴乱警告动画 ====================
            let riotTimer = null;

            function showRiotWarning(title, desc) {
                let overlay = document.getElementById('riotOverlay');
                let riotTitle = document.getElementById('riotTitle');
                let riotDesc = document.getElementById('riotDesc');
                if (!overlay) return;
                if (riotTimer) clearTimeout(riotTimer);
                riotTitle.textContent = title || '大暴乱！';
                riotDesc.textContent = desc || '民怨沸腾，国家动荡！';
                overlay.classList.add('show');
                riotTimer = setTimeout(() => {
                    overlay.classList.remove('show');
                    riotTimer = null;
                }, 2500);
            }

            // ==================== 启动动画 ====================
            const blackMask = document.getElementById('blackMask');
            const poweredScreen = document.getElementById('poweredScreen');
            const homeContainer = document.getElementById('homeContainer');
            const gameMain = document.getElementById('gameMain');
            const fabMenu = document.getElementById('fabMenu');
            const enterBtn = document.getElementById('enterGameBtn');
            const tutorialBtn = document.getElementById('tutorialHomeBtn');
            const tutorialStartBtn = document.getElementById('tutorialStartBtn');
            const mapWrapper = document.getElementById('mapWrapper');

            // 初始化首页统计
            updateHomeStats();

            setTimeout(() => {
                poweredScreen.style.opacity = '0';
                setTimeout(() => {
                    poweredScreen.style.display = 'none';
                    blackMask.style.opacity = '0';
                    setTimeout(() => {
                        blackMask.style.display = 'none';
                        homeContainer.classList.add('active');
                        generateParticles();
                    }, 500);
                }, 1000);
            }, 1300);

            function generateParticles() {
                const container = document.getElementById('lightCanvas');
                if (!container) return;
                container.innerHTML = '';
                for (let i = 0; i < 100; i++) {
                    let p = document.createElement('div');
                    p.classList.add('light-particle');
                    let size = 2 + Math.random() * 6;
                    p.style.width = size + 'px';
                    p.style.height = size + 'px';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.animationDelay = Math.random() * 20 + 's';
                    p.style.animationDuration = 9 + Math.random() * 18 + 's';
                    container.appendChild(p);
                }
            }

            // ==================== 地图自适应单元格大小 ====================
            function recalcCellSize() {
                const wrapper = document.getElementById('mapWrapper');
                const grid = document.getElementById('gridMap');
                if (!wrapper || !grid) return;
                const wrapperWidth = wrapper.clientWidth;
                const wrapperHeight = wrapper.clientHeight;
                if (wrapperWidth <= 0 || wrapperHeight <= 0) return;
                // 减去padding（左右各8px=16px）和border（4px）
                const availWidth = wrapperWidth - 20;
                const availHeight = wrapperHeight - 16;
                const cellByWidth = Math.floor(availWidth / 20);
                const cellByHeight = Math.floor(availHeight / 20);
                let cellSize = Math.min(28, cellByWidth, cellByHeight);
                cellSize = Math.max(17, cellSize);
                document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
                grid.style.gridTemplateColumns = `repeat(20, ${cellSize}px)`;
                grid.style.gridTemplateRows = `repeat(20, ${cellSize}px)`;
            }

            // 监听窗口变化和地图wrapper变化
            let resizeDebounce = null;
            window.addEventListener('resize', () => {
                if (resizeDebounce) clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(() => {
                    recalcCellSize();
                }, 150);
            });

            // 使用ResizeObserver监听mapWrapper大小变化
            if (window.ResizeObserver && mapWrapper) {
                const ro = new ResizeObserver(() => {
                    if (resizeDebounce) clearTimeout(resizeDebounce);
                    resizeDebounce = setTimeout(() => {
                        recalcCellSize();
                    }, 100);
                });
                ro.observe(mapWrapper);
            }

            // ==================== 50个研发项目 ====================
            const techCategories = {
                "⚔️ 军事基础": ["轻型坦克", "重型坦克", "自行火炮", "火箭炮", "防空系统"],
                "🚀 导弹科技": ["短程导弹", "中程导弹", "洲际导弹", "高超音速导弹", "巡航导弹"],
                "☢️ 核子力量": ["核基础设施", "原子弹", "氢弹", "中子弹", "钴弹"],
                "✈️ 空军力量": ["螺旋桨战机", "喷气战机", "战斗轰炸机", "战略轰炸机", "隐形轰炸机"],
                "⚓ 海军力量": ["巡逻艇", "导弹快艇", "驱逐舰", "潜艇", "核潜艇"],
                "🔮 未来科技": ["电磁炮", "激光武器", "粒子炮", "天基动能", "纳米机器人"],
                "📈 经济产业": ["农业机械化", "工业自动化", "商业全球化", "数字金融", "人工智能管理"],
                "🛡️ 战略支援": ["雷达站", "电子干扰", "卫星侦察", "网络战", "心理战"]
            };
            let techList = [];
            for (let cat in techCategories) {
                techCategories[cat].forEach(name => {
                    let id = name.replace(/ /g, '');
                    techList.push({
                        id,
                        name,
                        category: cat,
                        costSilver: 150 + Math.floor(Math.random() * 300),

            // ==================== 暴乱处罚系统 ====================
            function checkRiot(player, turnCount) {
                // 从第5回合开始，每5回合检查一次
                if (turnCount < 5) return false;
                if (turnCount % 5 !== 0) return false;
                const checkKey = `${player}_${turnCount}`;
                if (GAME.riotCheckedTurns.has(checkKey)) return false;
                GAME.riotCheckedTurns.add(checkKey);

                const eco = GAME.playerEconomy[player];
                if (!eco) return false;

                // 阈值计算：农业阈值 = 10 + turnCount*1.5，工业阈值 = 8 + turnCount*1.2
                const agriThreshold = Math.floor(10 + turnCount * 1.5);
                const indusThreshold = Math.floor(8 + turnCount * 1.2);
                const agriLow = eco.agriculture < agriThreshold;
                const indusLow = eco.industry < indusThreshold;

                if (!agriLow && !indusLow) return false;

                // 触发暴乱
                let riotLevel = 'minor';
                let penaltySilver = 0;
                let penaltyGdp = 0;
                let loseTerritory = false;
                let riotTitle = '民众不满';
                let riotDescParts = [];

                if (agriLow && indusLow) {
                    riotLevel = 'major';
                    riotTitle = '🔥 大暴乱！';
                    penaltySilver = Math.floor(GAME.playerResources[player].silver * 0.4);
                    penaltyGdp = Math.floor(eco.gdp * 0.25);
                    loseTerritory = true;
                    riotDescParts.push('农业和工业双双落后');
                } else if (agriLow) {
                    riotLevel = 'medium';
                    riotTitle = '🌾 饥荒暴动！';
                    penaltySilver = Math.floor(GAME.playerResources[player].silver * 0.25);
                    penaltyGdp = Math.floor(eco.gdp * 0.15);
                    riotDescParts.push(`农业(${eco.agriculture})远低于需求(${agriThreshold})`);
                } else if (indusLow) {
                    riotLevel = 'medium';
                    riotTitle = '🏭 工人罢工！';
                    penaltySilver = Math.floor(GAME.playerResources[player].silver * 0.2);
                    penaltyGdp = Math.floor(eco.gdp * 0.12);
                    riotDescParts.push(`工业(${eco.industry})远低于需求(${indusThreshold})`);
                }

                // 执行惩罚
                penaltySilver = Math.max(30, Math.min(penaltySilver, 500));
                penaltyGdp = Math.max(20, Math.min(penaltyGdp, 300));
                GAME.playerResources[player].silver = Math.max(0, GAME.playerResources[player].silver - penaltySilver);
                eco.gdp = Math.max(50, eco.gdp - penaltyGdp);

                // 随机失去非首都领土
                let lostCells = [];
                if (loseTerritory && GAME.playerLands[player] && GAME.playerLands[player].cells.size > 1) {
                    const allCells = Array.from(GAME.playerLands[player].cells);
                    const capKey =
                        `${GAME.playerLands[player].capital.x},${GAME.playerLands[player].capital.y}`;
                    const nonCapCells = allCells.filter(c => c !== capKey);
                    if (nonCapCells.length > 0) {
                        const loseCount = Math.min(2, nonCapCells.length);
                        for (let i = 0; i < loseCount; i++) {
                            const idx = Math.floor(Math.random() * nonCapCells.length);
                            const cellToLose = nonCapCells.splice(idx, 1)[0];
                            GAME.playerLands[player].cells.delete(cellToLose);
                            lostCells.push(cellToLose);
                            // 清除该格上的单位
                            if (GAME.units.has(cellToLose)) GAME.units.delete(cellToLose);
                            // 清除收获记录
                            GAME.harvestedCells.delete(cellToLose);
                        }
                    }
                }

                riotDescParts.push(`银币-${penaltySilver}`, `GDP-${penaltyGdp}`);
                if (lostCells.length > 0) riotDescParts.push(`失去${lostCells.length}块领土`);
                const riotDesc = riotDescParts.join(' | ');

                // 显示暴乱警告
                showRiotWarning(riotTitle, riotDesc);
                showMsg('⚠️ ' + riotTitle + '：' + riotDesc);
                updateTopBar();
                renderFullMap();
                return true;
            }

            // ==================== 地图生成 ====================
            function generateMap() {
                let map = [];
                for (let i = 0; i < 20; i++) {
                    map[i] = [];
                    for (let j = 0; j < 20; j++) map[i][j] = Math.random() > 0.48 ? 1 : 0;
                }
                let totalLand = map.flat().filter(v => v === 1).length;
                let target = 200;
                while (totalLand > target) {
                    let y = Math.floor(Math.random() * 20),
                        x = Math.floor(Math.random() * 20);
                    if (map[y][x] === 1) { map[y][x] = 0;
                        totalLand--; }
                }
                while (totalLand < target) {
                    let y = Math.floor(Math.random() * 20),
                        x = Math.floor(Math.random() * 20);
                    if (map[y][x] === 0) { map[y][x] = 1;
                        totalLand++; }
                }
                return map;
            }

            function renderFullMap() {
                const container = document.getElementById('gridMap');
                if (!container) return;
                container.innerHTML = '';
                for (let y = 0; y < 20; y++) {
                    for (let x = 0; x < 20; x++) {
                        let cell = document.createElement('div');
                        cell.className = 'grid-cell';
                        let key = `${x},${y}`;
                        let owner = 0;
                        for (let p = 1; p <= GAME.totalPlayers; p++)
                            if (GAME.playerLands[p]?.cells.has(key)) owner = p;
                        let isCapital = false;
                        for (let p = 1; p <= GAME.totalPlayers; p++)
                            if (GAME.playerLands[p]?.capital && GAME.playerLands[p].capital.x === x && GAME
                                .playerLands[p].capital.y === y) isCapital = true;
                        let terrain = (GAME.mapTerrain[y] && GAME.mapTerrain[y][x] === 1) ? 'land' : 'sea';
                        cell.classList.add(terrain);
                        if (owner) {
                            cell.classList.add(`player${owner}-land`);
                            if (isCapital) cell.classList.add(`player${owner}-capital`);
                        }
                        if (GAME.units.has(key)) cell.classList.add('unit');
                        cell.dataset.x = x;
                        cell.dataset.y = y;
                        cell.addEventListener('click', (function(xx, yy) {
                            return function() { onGridClick(xx, yy); };
                        })(x, y));
                        container.appendChild(cell);
                    }
                }
                // 重新计算单元格大小以适应屏幕
                recalcCellSize();
            }

            function updateTopBar() {
                let panel = document.getElementById('playerInfoPanel');
                let turnSpan = document.getElementById('turnText');
                if (!panel) return;
                if (GAME.setupPhase.isSetting) {
                    let cur = GAME.setupPhase.currentSettingPlayer;

                        `🏳️ ${name}  | 🏛️ 待立都 | 💰银 ${GAME.playerResources[cur]?.silver || 200}`;
                    turnSpan.innerHTML = `⚙️ 拓建 · ${name}`;
                } else {
                    let cur = GAME.currentTurn;
                    let eco = GAME.playerEconomy[cur] || { gdp: 500, agriculture: 10, industry: 5, commerce: 8,
                        science: 5 };
                    let res = GAME.playerResources[cur] || { silver: 220, gold: 3, rareEarth: 6, oil: 14,
                    uranium: 1 };
                    panel.innerHTML =
                        `🏳️ ${GAME.playerNames[cur]} | 🏛️ ${GAME.capitalNames[cur]} | 💰银${res.silver} | GDP${eco.gdp} | 🌾${eco.agriculture} | 🏭${eco.industry} | 📈${eco.commerce} | 🔬${eco.science}`;

            function isConnected(cells) {
                if (cells.length <= 1) return true;
                let set = new Set(cells.map(c => `${c.x},${c.y}`));
                let start = cells[0];
                let visited = new Set(),
                    q = [start];
                visited.add(`${start.x},${start.y}`);
                while (q.length) {
                    let cur = q.shift();
                    [
                        [-1, 0],
                        [1, 0],
                        [0, -1],
                        [0, 1]
                    ].forEach(dir => {
                        let nx = cur.x + dir[0],
                            ny = cur.y + dir[1];
                        let k = `${nx},${ny}`;
                        if (set.has(k) && !visited.has(k)) { visited.add(k);
                            q.push({ x: nx, y: ny }); }
                    });
                }
                return visited.size === cells.length;
            }

            function onGridClick(x, y) {
                let cellDiv = document.querySelector(`.grid-cell[data-x='${x}'][data-y='${y}']`);
                if (!cellDiv) return;
                if (GAME.setupPhase.isSetting) {
                    let curPlayer = GAME.setupPhase.currentSettingPlayer;
                    if (!cellDiv.classList.contains('land')) { showMsg('只能选陆地');
                        return; }
                    if (!GAME.setupPhase.selectingCapital) {
                        if (GAME.setupPhase.selectedCells.some(c => c.x === x && c.y === y)) {
                            GAME.setupPhase.selectedCells = GAME.setupPhase.selectedCells.filter(c => !(c.x === x &&
                                c.y === y));
                            cellDiv.classList.remove('selected');
                        } else {
                            if (GAME.setupPhase.selectedCells.length >= 4) { showMsg('最多4块');
                                return; }
                            GAME.setupPhase.selectedCells.push({ x, y });
                            cellDiv.classList.add('selected');
                        }
                        if (GAME.setupPhase.selectedCells.length === 4 && isConnected(GAME.setupPhase.selectedCells)) {
                            GAME.setupPhase.selectingCapital = true;
                            showMsg('点击其中一块作为首都');
                            // 教程：推进到步骤2
                            if (TUTORIAL.active && TUTORIAL.step === 1 && !TUTORIAL.completed) {
                                advanceTutorial();
                            }
                        } else if (GAME.setupPhase.selectedCells.length === 4 && !isConnected(GAME.setupPhase
                                .selectedCells)) {
                            GAME.setupPhase.selectedCells.pop();
                            cellDiv.classList.remove('selected');
                            showMsg('必须连成一片');
                        }
                    } else {
                        if (!GAME.setupPhase.selectedCells.some(c => c.x === x && c.y === y)) { showMsg(
                                '首都需从已选地块中确立');
                            return; }
                        GAME.playerLands[curPlayer] = { cells: new Set(), capital: null };
                        GAME.setupPhase.selectedCells.forEach(c => { GAME.playerLands[curPlayer].cells.add(
                            `${c.x},${c.y}`); });
                        GAME.playerLands[curPlayer].capital = { x, y };
                        if (!GAME.playerResources[curPlayer]) GAME.playerResources[curPlayer] = { silver: 250, gold: 5,
                            diamond: 1, rareEarth: 12, oil: 20, uranium: 3 };
                        if (!GAME.playerEconomy[curPlayer]) GAME.playerEconomy[curPlayer] = { gdp: 550, agriculture: 12,
                            industry: 7, commerce: 9, science: 6 };
                        renderFullMap();
                        showAchievement('<i class="fas fa-crown"></i>',
                            '🏛️ 首都确立',
                            `${GAME.playerNames[curPlayer]} 的 ${GAME.capitalNames[curPlayer]} 巍然矗立！`
                        );
                        // 教程：推进到步骤3
                        if (TUTORIAL.active && TUTORIAL.step === 2 && !TUTORIAL.completed) {
                            advanceTutorial();
                        }
                        if (curPlayer >= GAME.totalPlayers) {
                            GAME.setupPhase.isSetting = false;
                            GAME.currentTurn = 1;
                            GAME.turnCount = 0;
                            showMsg('帝国崛起！');
                            updateTopBar();
                            if (TUTORIAL.active && TUTORIAL.step === 3 && !TUTORIAL.completed) {
                                updateTutorialBanner();
                            }
                            if (GAME.aiPlayers.has(1)) executeAITurn();
                        } else {
                            GAME.setupPhase.currentSettingPlayer++;
                            GAME.setupPhase.selectedCells = [];
                            GAME.setupPhase.selectingCapital = false;
                            showMsg(`轮到 ${GAME.playerNames[GAME.setupPhase.currentSettingPlayer]} 开辟疆土`);
                            updateTopBar();
                            if (GAME.aiPlayers.has(GAME.setupPhase.currentSettingPlayer)) autoSetupTerrain();
                        }
                    }
                    return;
                }
                if (GAME.selectedAction === 'attack') actionAttack(x, y);
                else if (GAME.selectedAction === 'collect') actionCollect(x, y);
                else if (GAME.selectedAction === 'expand') actionExpand(x, y);
                else if (GAME.selectedAction === 'place') actionPlaceUnit(x, y);
                else if (GAME.selectedAction === 'develop') showDevelopModal();
                else {
                    // 教程模式下给出提示
                    if (TUTORIAL.active && !TUTORIAL.completed) {
                        showMsg('📖 ' + TUTORIAL.steps[TUTORIAL.step - 1].desc);
                    } else {
                        showMsg('请先选择行动按钮');
                    }
                }
            }

            function autoSetupTerrain() {
                let player = GAME.setupPhase.currentSettingPlayer;
                let landCells = [];
                for (let y = 0; y < 20; y++)
                    for (let x = 0; x < 20; x++) {
                        let cell = document.querySelector(`.grid-cell[data-x='${x}'][data-y='${y}']`);
                        if (cell && cell.classList.contains('land')) landCells.push({ x, y, cell });
                    }
                if (landCells.length < 4) return;
                let selected = [];
                let start = landCells[Math.floor(Math.random() * landCells.length)];
                selected.push(start);
                let frontier = [start];
                while (selected.length < 4 && frontier.length) {
                    let cur = frontier.shift();
                    for (let dir of [
                            [-1, 0],
                            [1, 0],
                            [0, -1],
                            [0, 1]
                        ]) {
                        let nx = cur.x + dir[0],
                            ny = cur.y + dir[1];
                        let nc = landCells.find(c => c.x === nx && c.y === ny);
                        if (nc && !selected.some(s => s.x === nx && s.y === ny)) {
                            selected.push(nc);
                            frontier.push(nc);
                            if (selected.length >= 4) break;
                        }
                    }
                }
                if (selected.length < 4) return;
                for (let s of selected) {
                    GAME.setupPhase.selectedCells.push({ x: s.x, y: s.y });
                    s.cell.classList.add('selected');
                }
                GAME.setupPhase.selectingCapital = true;
                let cap = selected[Math.floor(Math.random() * selected.length)];
                GAME.playerLands[player] = { cells: new Set(), capital: null };
                GAME.setupPhase.selectedCells.forEach(c => { GAME.playerLands[player].cells.add(`${c.x},${c.y}`); });
                GAME.playerLands[player].capital = { x: cap.x, y: cap.y };
                if (!GAME.playerResources[player]) GAME.playerResources[player] = { silver: 250, gold: 5, diamond: 1,
                    rareEarth: 12, oil: 20, uranium: 3 };
                if (!GAME.playerEconomy[player]) GAME.playerEconomy[player] = { gdp: 550, agriculture: 12, industry: 7,
                    commerce: 9, science: 6 };
                renderFullMap();
                showAchievement('<i class="fas fa-crown"></i>',
                    '🏛️ 首都确立',
                    `${GAME.playerNames[player]} 的 ${GAME.capitalNames[player]} 巍然矗立！`
                );
                if (player >= GAME.totalPlayers) {
                    GAME.setupPhase.isSetting = false;
                    GAME.currentTurn = 1;
                    GAME.turnCount = 0;
                    showMsg('帝国崛起！');
                    updateTopBar();
                    if (GAME.aiPlayers.has(1)) executeAITurn();
                } else {
                    GAME.setupPhase.currentSettingPlayer++;
                    GAME.setupPhase.selectedCells = [];
                    GAME.setupPhase.selectingCapital = false;
                    showMsg(`轮到 ${GAME.playerNames[GAME.setupPhase.currentSettingPlayer]} 开辟疆土`);
                    updateTopBar();
                    if (GAME.aiPlayers.has(GAME.setupPhase.currentSettingPlayer)) autoSetupTerrain();
                }
            }

            async function executeAITurn() {
                if (GAME.setupPhase.isSetting) return;
                let player = GAME.currentTurn;
                if (!GAME.aiPlayers.has(player) || GAME.aiProcessing) return;
                GAME.aiProcessing = true;
                showMsg(`🤖 AI ${GAME.playerNames[player]} 行动中...`);
                await new Promise(r => setTimeout(r, 300));
                let eco = GAME.playerEconomy[player];
                if (eco && (eco.agriculture < 30 || eco.industry < 25)) {
                    developEconomy(player, 'agriculture', 5, 120);
                    await new Promise(r => setTimeout(r, 200));
                    developEconomy(player, 'industry', 5, 150);
                }
                for (let [key, unit] of GAME.units) {
                    if (unit.owner === player && !GAME.harvestedCells.has(key) && GAME.playerLands[player]?.cells.has(
                            key)) {
                        let [x, y] = key.split(',').map(Number);
                        actionCollect(x, y);
                        await new Promise(r => setTimeout(r, 200));
                    }
                }
                let candidates = [];
                for (let cell of GAME.playerLands[player].cells) {
                    let [cx, cy] = cell.split(',').map(Number);
                    [
                        [-1, 0],
                        [1, 0],
                        [0, -1],
                        [0, 1]
                    ].forEach(dir => {
                        let nx = cx + dir[0],
                            ny = cy + dir[1];
                        let nk = `${nx},${ny}`;
                        if (nx >= 0 && nx < 20 && ny >= 0 && ny < 20 && !GAME.playerLands[player].cells.has(
                                nk) && GAME.playerResources[player].silver >= 100) {
                            let occ = false;
                            for (let p = 1; p <= GAME.totalPlayers; p++)
                                if (p !== player && GAME.playerLands[p]?.cells.has(nk)) occ = true;
                            if (!occ) candidates.push({ x: nx, y: ny });
                        }
                    });
                }
                if (candidates.length) {
                    let target = candidates[Math.floor(Math.random() * candidates.length)];
                    actionExpand(target.x, target.y);
                    await new Promise(r => setTimeout(r, 200));
                }
                if (!GAME.attackUsedThisTurn) {
                    let enemies = [];
                    for (let [k, u] of GAME.units)
                        if (u.owner !== player && !GAME.eliminatedPlayers.has(u.owner)) enemies.push(k);
                    if (enemies.length === 0) {
                        for (let i = 1; i <= GAME.totalPlayers; i++)
                            if (i !== player && !GAME.eliminatedPlayers.has(i)) {
                                for (let cell of GAME.playerLands[i].cells) enemies.push(cell);
                            }
                    }
                    if (enemies.length) {
                        let targetKey = enemies[Math.floor(Math.random() * enemies.length)];
                        let [tx, ty] = targetKey.split(',').map(Number);
                        actionAttack(tx, ty);
                        await new Promise(r => setTimeout(r, 300));
                    }
                }
                endTurn();
                GAME.aiProcessing = false;
            }

            // ==================== 内政发展弹窗 ====================
            function showDevelopModal() {
                if (GAME.setupPhase.isSetting) { showMsg('建设中无法发展');

            function developEconomy(player, sector, amount, cost) {
                let eco = GAME.playerEconomy[player];
                if (GAME.playerResources[player].silver < cost) { showMsg('银币不足');
                    return; }
                GAME.playerResources[player].silver -= cost;
                eco[sector] += amount;
                let newGdp = Math.floor(eco.gdp + eco.agriculture * 3 + eco.industry * 4 + eco.commerce * 2 + eco.science *
                    5);
                eco.gdp = newGdp;
                let sectorNames = { agriculture: '农业', industry: '工业', commerce: '商业', science: '科技' };
                showMsg(`${sectorNames[sector]} +${amount} | GDP ${eco.gdp}`);
                showAchievement('<i class="fas fa-arrow-trend-up"></i>',
                    '📊 内政发展成功',
                    `${sectorNames[sector]}提升 +${amount}！GDP达到 ${eco.gdp}`
                );
                updateTopBar();
            }

            // ==================== 科技树弹窗 ====================
            function showTechTree() {
                if (GAME.setupPhase.isSetting) { showMsg('建设阶段无法研发');
                    return; }
                let player = GAME.currentTurn;
                let modal = document.createElement('div');
                modal.className = 'modal-backdrop';
                let html =
                    `<div class="modal-card" style="max-width:580px;"><h2><i class="fas fa-microchip"></i> 📡 科技研发 (${techList.length}项)</h2>`;
                let cats = {};
                techList.forEach(t => { if (!cats[t.category]) cats[t.category] = [];
                    cats[t.category].push(t); });
                for (let cat in cats) {
                    html +=
                        `<h3 style="color:#f5bc5c; margin-top:12px; border-bottom:1px solid #3a2a1a; padding-bottom:4px;">${cat}</h3>`;
                    cats[cat].forEach(tech => {
                        let has = GAME.researched[tech.id].has(player);
                        if (has) {
                            html +=
                                `<div class="tech-item"><span>✅ ${tech.name}</span><button disabled>已研发</button></div>`;
                        } else {
                            let prereqOk = true;
                            if (tech.prereq && !GAME.researched[tech.prereq]?.has(player)) prereqOk = false;
                            let costStr = `${tech.costSilver||0}银 `;
                            if (tech.costRare) costStr += `${tech.costRare}稀土 `;
                            if (tech.costOil) costStr += `${tech.costOil}石油 `;
                            if (tech.costGold) costStr += `${tech.costGold}金 `;
                            html +=
                                `<div class="tech-item"><span>🔬 ${tech.name}<br><small>${costStr}</small></span>
                            <button class="modal-action-btn tech-research-btn" data-tech="${tech.id}" ${!prereqOk?'disabled':''}>${prereqOk?'研发':'前置未解锁'}</button></div>`;
                        }
                    });
                }
                html +=
                    `<button class="modal-close-btn" id="closeTechModalBtn">关闭</button></div>`;
                modal.innerHTML = html;
                document.body.appendChild(modal);

                modal.querySelectorAll('.tech-research-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        let techId = btn.dataset.tech;
                        let tech = techList.find(t => t.id === techId);
                        if (!tech) return;
                        if (tech.prereq && !GAME.researched[tech.prereq]?.has(player)) {
                            showMsg('前置科技未研发');
                            modal.remove();
                            showTechTree();
                            return;
                        }
                        let costSilver = tech.costSilver || 0,
                            costGold = tech.costGold || 0,
                            costRare = tech.costRare || 0,
                            costOil = tech.costOil || 0;
                        let res = GAME.playerResources[player];
                        if (res.silver < costSilver || res.gold < costGold || res.rareEarth < costRare || res.oil <
                            costOil) {
                            showMsg('资源不足');
                            modal.remove();
                            showTechTree();
                            return;
                        }
                        res.silver -= costSilver;
                        res.gold -= costGold;
                        res.rareEarth -= costRare;
                        res.oil -= costOil;
                        GAME.researched[techId].add(player);
                        if (tech.name === '农业机械化') GAME.playerEconomy[player].agriculture += 8;
                        if (tech.name === '工业自动化') GAME.playerEconomy[player].industry += 8;
                        if (tech.name === '商业全球化') GAME.playerEconomy[player].commerce += 8;
                        if (tech.name === '数字金融') GAME.playerEconomy[player].commerce += 5;
                        if (tech.name === '人工智能管理') GAME.playerEconomy[player].science += 6;
                        updateTopBar();
                        showMsg(`研发成功: ${tech.name}`);
                        showAchievement('<i class="fas fa-flask"></i>',
                            '🔬 研发成功！',
                            `成功研发出「${tech.name}」！科技力量大幅提升`
                        );
                        modal.remove();
                        showTechTree();
                    };
                });
                document.getElementById('closeTechModalBtn')?.addEventListener('click', () => modal.remove());
                modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
            }

                        <p><b>一、游戏概述</b><br>《现代战争推演4》是一款回合制战略推演游戏，支持2~9名玩家（可设AI）。玩家扮演各国领袖，通过领土扩张、经济发展、科技研发与军事征服，最终消灭所有对手、一统天下。每回合仅可执行一次攻击，策略深度极高。</p>
                        <p><b>二、建国阶段</b><br>游戏开始时，每位玩家需在20×20的世界地图上选择<b>4块相连陆地</b>作为初始领土，并从其中选定<b>1块为首都</b>。首都若被敌方攻占，则该玩家<b>立即灭亡</b>，所有领土归攻击者所有。领土必须连成一片方可确认。</p>

                modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
