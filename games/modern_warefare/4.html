<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>现代战争推演4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --gold: #f5bc5c;
            --gold-light: #ffefcf;
            --bg-deep: #030c15;
            --panel-bg: rgba(0, 0, 0, 0.88);
            --accent: #c5863a;
            --success: #4ade80;
            --danger: #f87171;
            --info: #60a5fa;
            --cell-size: 28px;
            --tutorial-arrow-size: 80px;
            --tutorial-arrow-size-mobile: 52px;
            --arrow-glow-color: rgba(74, 222, 128, 0.95);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        /* ========== 改进版教程大箭头指针 ========== */
        .tutorial-arrow-pointer {
            position: fixed;
            z-index: 6200;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease, left 0.45s cubic-bezier(0.22, 0.9, 0.38, 1.15), top 0.45s cubic-bezier(0.22, 0.9, 0.38, 1.15);
            filter: drop-shadow(0 0 22px var(--arrow-glow-color)) drop-shadow(0 0 50px rgba(74, 222, 128, 0.55)) drop-shadow(0 0 90px rgba(34, 197, 94, 0.35));
        }
        .tutorial-arrow-pointer.visible {
            opacity: 1;
        }
        .tutorial-arrow-pointer .arrow-icon-wrap {
            animation: tutorialArrowFloatLarge 0.9s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .tutorial-arrow-pointer .arrow-icon-wrap i {
            font-size: var(--tutorial-arrow-size);
            color: #4ade80;
            text-shadow: 0 0 35px #22c55e, 0 0 70px #16a34a, 0 0 120px #15803d, 0 0 160px #0f5c2e;
            line-height: 1;
            animation: arrowShine 1.5s ease-in-out infinite;
        }
        .tutorial-arrow-pointer .arrow-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 20px #4ade80, 0 0 40px #22c55e, 0 0 60px #16a34a;
            animation: dotPulse 0.7s ease-in-out infinite;
            z-index: -1;
        }
        .tutorial-arrow-pointer .arrow-ripple {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid rgba(74, 222, 128, 0.7);
            animation: rippleOut 1.2s ease-out infinite;
            z-index: -2;
        }
        .tutorial-arrow-pointer .arrow-ripple:nth-child(3) {
            animation-delay: 0.4s;
        }
        .tutorial-arrow-pointer .arrow-ripple:nth-child(4) {
            animation-delay: 0.8s;
        }
        @keyframes rippleOut {
            0% {
                width: 20px;
                height: 20px;
                opacity: 0.9;
                border-width: 4px;
            }
            100% {
                width: 80px;
                height: 80px;
                opacity: 0;
                border-width: 1px;
            }
        }
        @keyframes dotPulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px #4ade80, 0 0 40px #22c55e;
            }
            50% {
                transform: scale(1.8);
                box-shadow: 0 0 35px #4ade80, 0 0 65px #22c55e, 0 0 90px #16a34a;
            }
        }
        @keyframes arrowShine {
            0%,
            100% {
                filter: brightness(1);
            }
            40% {
                filter: brightness(1.5);
            }
            70% {
                filter: brightness(1.15);
            }
        }
        .tutorial-arrow-pointer .arrow-label {
            background: rgba(0, 35, 20, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2.5px solid #4ade80;
            color: #d4ffe0;
            padding: 7px 18px;
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 2.5px;
            white-space: nowrap;
            margin-top: 3px;
            animation: tutorialArrowFloatLarge 0.9s ease-in-out infinite;
            text-shadow: 0 0 10px #4ade80;
            box-shadow: 0 0 25px rgba(74, 222, 128, 0.5), inset 0 0 15px rgba(74, 222, 128, 0.1);
            border-radius: 3px;
        }
        .tutorial-arrow-pointer.point-up .arrow-icon-wrap {
            animation-name: tutorialArrowFloatUp;
        }
        .tutorial-arrow-pointer.point-up .arrow-label {
            animation-name: tutorialArrowFloatUp;
            margin-top: 0;
            margin-bottom: 3px;
            order: -1;
        }
        .tutorial-arrow-pointer.point-left .arrow-icon-wrap i {
            transform: rotate(90deg);
        }
        .tutorial-arrow-pointer.point-right .arrow-icon-wrap i {
            transform: rotate(-90deg);
        }
        .tutorial-arrow-pointer.point-up .arrow-dot {
            top: auto;
            bottom: -30px;
        }

        @keyframes tutorialArrowFloatLarge {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-22px);
            }
            60% {
                transform: translateY(-8px);
            }
            85% {
                transform: translateY(-18px);
            }
        }
        @keyframes tutorialArrowFloatUp {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(18px);
            }
            60% {
                transform: translateY(6px);
            }
            85% {
                transform: translateY(14px);
            }
        }

        .grid-container.tutorial-map-glow {
            animation: tutorialMapGlow 0.9s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.75), 0 0 65px rgba(74, 222, 128, 0.4), 0 0 0 5px rgba(74, 222, 128, 0.55) !important;
            border-color: #4ade80 !important;
        }
        @keyframes tutorialMapGlow {
            0%,
            100% {
                box-shadow: 0 0 25px rgba(74, 222, 128, 0.55), 0 0 50px rgba(74, 222, 128, 0.3), 0 0 0 4px rgba(74, 222, 128, 0.5);
            }
            50% {
                box-shadow: 0 0 45px rgba(74, 222, 128, 0.95), 0 0 90px rgba(74, 222, 128, 0.55), 0 0 0 7px rgba(74, 222, 128, 0.75);
            }
        }

        /* 网格单元教程高亮 */
        .grid-cell.tutorial-cell-highlight {
            animation: cellHighlightPulse 0.6s ease-in-out infinite !important;
            border: 3px solid #4ade80 !important;
            box-shadow: inset 0 0 18px rgba(74, 222, 128, 0.7), 0 0 20px rgba(74, 222, 128, 0.6) !important;
            z-index: 10 !important;
            position: relative;
        }
        @keyframes cellHighlightPulse {
            0%,
            100% {
                box-shadow: inset 0 0 12px rgba(74, 222, 128, 0.5), 0 0 14px rgba(74, 222, 128, 0.4);
            }
            50% {
                box-shadow: inset 0 0 28px rgba(74, 222, 128, 0.9), 0 0 30px rgba(74, 222, 128, 0.8);
            }
        }

        .tutorial-spotlight {
            position: fixed;
            z-index: 6050;
            pointer-events: none;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .tutorial-spotlight.active {
            opacity: 1;
        }

        /* ========== 原有样式 ========== */
        .achievement-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 90000;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: radial-gradient(ellipse at center, rgba(20, 10, 0, 0.92) 0%, rgba(0, 0, 0, 0.96) 70%);
        }
        .achievement-overlay.show {
            opacity: 1;
            animation: achievePulse 0.5s ease-out;
        }
        .achievement-content {
            text-align: center;
            animation: achieveBounce 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1;
        }
        .achievement-icon {
            font-size: 4rem;
            color: #ffd966;
            text-shadow: 0 0 60px #ffaa33, 0 0 120px #ff8800;
            margin-bottom: 0.5rem;
            animation: achieveGlow 0.6s infinite alternate;
        }
        .achievement-title {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff0c0, #f5bc5c, #ffecb3, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            margin-bottom: 0.3rem;
        }
        .achievement-subtitle {
            font-size: 1rem;
            color: #ffdfa5;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .achievement-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .ach-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd966;
            border-radius: 50%;
            animation: achPartFly 1.8s ease-out forwards;
            box-shadow: 0 0 10px #ffaa33;
        }
        @keyframes achieveBounce {
            0% {
                transform: scale(0.2);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes achievePulse {
            0% {
                background: radial-gradient(ellipse at center, rgba(30, 15, 0, 0.7) 0%, rgba(0, 0, 0, 0.9) 70%);
            }
            100% {
                background: radial-gradient(ellipse at center, rgba(20, 10, 0, 0.92) 0%, rgba(0, 0, 0, 0.96) 70%);
            }
        }
        @keyframes achieveGlow {
            0% {
                text-shadow: 0 0 40px #ffaa33, 0 0 80px #ff8800;
            }
            100% {
                text-shadow: 0 0 80px #ffd966, 0 0 150px #ffbb44;
            }
        }
        @keyframes achPartFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }
        .screen-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #000, #010101);
            z-index: 20000;
            transition: opacity 1.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 1;
            pointer-events: none;
        }
        .powered-by {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 50%, #0a0f1a, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20001;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 6px;
            transition: opacity 1s ease;
            opacity: 1;
            pointer-events: none;
            font-family: '华文细黑', 'STXihei', 'Heiti SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }
        .powered-by span {
            background: linear-gradient(135deg, #ffdd99, #e6b422, #ffcc66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #ffaa33;
            animation: aurora 1.8s infinite alternate;
        }
        @keyframes aurora {
            0% {
                text-shadow: 0 0 3px #ffd966;
                opacity: 0.9;
                letter-spacing: 6px;
            }
            100% {
                text-shadow: 0 0 20px #ffbf40;
                opacity: 1;
                letter-spacing: 8px;
            }
        }
        .home-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: radial-gradient(ellipse at 30% 40%, #0a1a3a, #01040f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 1.8s ease-out;
            pointer-events: none;
            overflow: hidden;
        }
        .home-container.active {
            opacity: 1;
            pointer-events: auto;
        }
        .flowing-lights {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
        }
        .light-particle {
            position: absolute;
            background: radial-gradient(circle, #ffdd99, #ffaa33);
            border-radius: 50%;
            filter: blur(3px);
            animation: floatGlow 20s infinite linear;
        }
        @keyframes floatGlow {
            0% {
                transform: translateY(100vh) translateX(-40px);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) translateX(40px);
                opacity: 0;
            }
        }
        .game-title {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff0c0, #f5bc5c, #ffecb3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.2rem;
            z-index: 2;
            letter-spacing: 4px;
            text-align: center;
            padding: 0 20px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            z-index: 2;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
            margin-bottom: 1.5rem;
        }
        .gold-btn {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border: 1.5px solid #f5bc5c;
            color: #fff2d7;
            font-size: 1.2rem;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            border-radius: 2px;
            position: relative;
        }
        .gold-btn:hover {
            box-shadow: 0 10px 28px rgba(245, 188, 92, 0.3);
            border-color: #ffd966;
        }
        .gold-btn:active {
            transform: scale(0.97);
            background: #3a2a1a;
        }
        .gold-btn i {
            color: #f5bc5c;
            font-size: 1.1rem;
        }
        .gold-btn.tutorial-btn {
            border-color: #4ade80;
            color: #d4ffe0;
        }
        .gold-btn.tutorial-btn i {
            color: #4ade80;
        }
        .gold-btn.tutorial-btn:hover {
            box-shadow: 0 10px 28px rgba(74, 222, 128, 0.35);
            border-color: #6fff9f;
        }
        .home-stats-panel {
            position: relative;
            z-index: 3;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px);
            border: 1.5px solid #f5bc5c;
            padding: 1rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            max-width: 90vw;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            border-radius: 2px;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #ffefcf;
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c5924a;
            font-weight: 600;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: #ffd966;
        }
        .stat-badge {
            display: inline-block;
            padding: 4px 14px;
            border: 1px solid;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            animation: badgeShimmer 2s infinite;
        }
        .badge-bronze {
            color: #cd7f32;
            border-color: #cd7f32;
            background: rgba(139, 90, 43, 0.3);
            text-shadow: 0 0 8px #b87333;
        }
        .badge-silver {
            color: #c0c0c0;
            border-color: #c0c0c0;
            background: rgba(160, 160, 160, 0.3);
            text-shadow: 0 0 10px #e0e0e0;
        }
        .badge-gold {
            color: #ffd700;
            border-color: #ffd700;
            background: rgba(200, 150, 30, 0.35);
            text-shadow: 0 0 14px #ffcc00;
        }
        .badge-platinum {
            color: #7ec8e3;
            border-color: #7ec8e3;
            background: rgba(80, 150, 180, 0.35);
            text-shadow: 0 0 16px #a0e0f0;
        }
        .badge-diamond {
            color: #b8e6ff;
            border-color: #b8e6ff;
            background: rgba(100, 180, 220, 0.4);
            text-shadow: 0 0 20px #d0f0ff;
            animation: diamondSparkle 1.5s infinite;
        }
        .badge-legend {
            color: #ff9933;
            border-color: #ff9933;
            background: rgba(200, 100, 20, 0.45);
            text-shadow: 0 0 22px #ffbb66, 0 0 40px #ff8800;
            animation: legendFire 1s infinite;
        }
        @keyframes badgeShimmer {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.3);
            }
        }
        @keyframes diamondSparkle {
            0%,
            100% {
                text-shadow: 0 0 16px #d0f0ff;
            }
            50% {
                text-shadow: 0 0 30px #ffffff, 0 0 50px #b8e6ff;
            }
        }
        @keyframes legendFire {
            0%,
            100% {
                text-shadow: 0 0 20px #ffbb66, 0 0 40px #ff8800;
            }
            50% {
                text-shadow: 0 0 35px #ffdd99, 0 0 70px #ffaa33, 0 0 100px #ff6600;
            }
        }
        .game-main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: #030c15;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }
        .game-main.active {
            display: flex;
        }
        .nation-info {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f5bc5c;
            gap: 8px;
            z-index: 2100;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .nation-card {
            color: #fdebb3;
            font-weight: bold;
            font-size: 0.75rem;
            background: #0a1f30cc;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #dba347;
            border-radius: 2px;
            max-width: 65vw;
            overflow-x: auto;
            white-space: nowrap;
        }
        .turn-text {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #ffeaac;
            border-left: 3px solid #f5bc5c;
            white-space: nowrap;
        }
        .map-wrapper {
            flex: 1;
            overflow: auto;
            padding: 8px 8px 100px 8px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .grid-container {
            display: grid;
            background: #0a1622;
            border: 2px solid #ac864a;
            box-shadow: 0 0 0 2px #162a3a;
            flex-shrink: 0;
            grid-template-columns: repeat(20, var(--cell-size));
            grid-template-rows: repeat(20, var(--cell-size));
            transition: grid-template-columns 0.2s ease, grid-template-rows 0.2s ease;
        }
        .grid-cell {
            border: 1px solid #2d5470;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .grid-cell:active {
            filter: brightness(1.2);
            transform: scale(0.94);
        }
        .sea {
            background: radial-gradient(circle at 30% 20%, #1e5a7a, #0e3950);
        }
        .land {
            background: radial-gradient(circle at 30% 20%, #4cae7a, #2a6a46);
        }
        .selected {
            background: radial-gradient(circle, #ffc107, #f57c00) !important;
            border: 1px solid white !important;
            animation: selectedPulse 0.6s infinite alternate;
        }
        @keyframes selectedPulse {
            0% {
                box-shadow: inset 0 0 6px #fff;
            }
            100% {
                box-shadow: inset 0 0 14px #ffe0a0;
            }
        }
        .unit {
            background: radial-gradient(circle at 30% 30%, #e65c5c, #a03333) !important;
            box-shadow: inset 0 0 4px #ffcc00;
        }
        .player1-land {
            background: radial-gradient(circle, #c084fc, #a855f7) !important;
        }
        .player1-capital {
            background: radial-gradient(circle, #d6a6ff, #b77cf0) !important;
            border: 2px solid #ffdd88;
        }
        .player2-land {
            background: radial-gradient(circle, #34d399, #10b981) !important;
        }
        .player2-capital {
            background: radial-gradient(circle, #5ee0ae, #2cbd82) !important;
            border: 2px solid #ffdd88;
        }
        .player3-land {
            background: radial-gradient(circle, #fbbf24, #f59e0b) !important;
        }
        .player3-capital {
            background: radial-gradient(circle, #ffd966, #f5a623) !important;
            border: 2px solid #fff0b0;
        }
        .player4-land {
            background: radial-gradient(circle, #f87171, #ef4444) !important;
        }
        .player4-capital {
            background: radial-gradient(circle, #fc8b8b, #e35f5f) !important;
            border: 2px solid #ffe0e0;

    <script>
        (function() {
            // ==================== 音效引擎 (SoundEngine) ====================
            const SoundEngine = (function() {
                let audioCtx = null;
                let initialized = false;

                function initAudioContext() {
                    if (initialized && audioCtx) return audioCtx;
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        if (audioCtx.state === 'suspended') {
                            audioCtx.resume().catch(() => {});
                        }
                        initialized = true;
                    } catch (e) {
                        console.warn('AudioContext not available:', e);
                        audioCtx = null;
                        initialized = true;
                    }
                    return audioCtx;
                }

                function ensureCtx() {
                    if (!audioCtx || audioCtx.state === 'closed') {
                        initAudioContext();
                    }
                    if (audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume().catch(() => {});
                    }
                    return audioCtx;
                }

                function playTone(freq, duration, type = 'triangle', volume = 0.15, glideTo = null) {
                    const ctx = ensureCtx();
                    if (!ctx) return;
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    if (glideTo) {
                        osc.frequency.linearRampToValueAtTime(glideTo, now + duration * 0.6);
                    }
                    gain.gain.setValueAtTime(volume, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + duration + 0.05);
                }

                function playNoise(duration, volume = 0.08) {
                    const ctx = ensureCtx();
                    if (!ctx) return;
                    const now = ctx.currentTime;
                    const bufferSize = Math.floor(ctx.sampleRate * duration);
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    const gain = ctx.createGain();
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(800, now);
                    filter.Q.setValueAtTime(0.5, now);
                    gain.gain.setValueAtTime(volume, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    source.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    source.start(now);
                    source.stop(now + duration + 0.05);
                }

                function playChord(freqs, duration, volume = 0.1) {
                    freqs.forEach(f => playTone(f, duration, 'sine', volume / freqs.length));
                }

                return {
                    init: initAudioContext,
                    ensureCtx: ensureCtx,
                    click: () => { playTone(600, 0.08, 'square', 0.06);
                        playTone(900, 0.06, 'square', 0.04); },
                    success: () => { playTone(523, 0.1, 'triangle', 0.1);
                        playTone(659, 0.1, 'triangle', 0.08);
                        playTone(784, 0.15, 'triangle', 0.1); },
                    error: () => { playTone(200, 0.2, 'sawtooth', 0.08);
                        playTone(150, 0.25, 'sawtooth', 0.06); },
                    expand: () => { playTone(330, 0.12, 'triangle', 0.1);
                        playTone(440, 0.18, 'triangle', 0.08);
                        playNoise(0.08, 0.04); },
                    collect: () => { playTone(880, 0.08, 'sine', 0.08);
                        playTone(1100, 0.1, 'sine', 0.06);
                        playTone(1320, 0.06, 'sine', 0.04); },
                    attack: () => { playNoise(0.15, 0.1);
                        playTone(100, 0.25, 'sawtooth', 0.12);
                        playTone(60, 0.3, 'sawtooth', 0.08); },
                    missile: () => { playTone(150, 0.3, 'sawtooth', 0.15, 40);
                        playNoise(0.3, 0.12);
                        playTone(40, 0.4, 'sine', 0.2); },
                    place: () => { playTone(400, 0.1, 'square', 0.08);
                        playTone(600, 0.12, 'square', 0.06); },
                    turnEnd: () => { playTone(350, 0.15, 'triangle', 0.08);
                        playTone(280, 0.2, 'triangle', 0.06); },
                    achievement: () => { playChord([523, 659, 784, 1047], 0.4, 0.15);
                        playTone(1047, 0.5, 'sine', 0.12); },
                    tutorialStep: () => { playTone(700, 0.08, 'triangle', 0.08);
                        playTone(900, 0.06, 'triangle', 0.06);
                        playTone(1100, 0.1, 'triangle', 0.07); },
                    lottery: () => { playTone(600, 0.06, 'sine', 0.06);
                        playTone(800, 0.06, 'sine', 0.06);
                        playTone(1000, 0.06, 'sine', 0.06);
                        playTone(1200, 0.12, 'sine', 0.08);
                        playChord([800, 1000, 1200], 0.2, 0.1); },
                    riot: () => { playNoise(0.4, 0.18);
                        playTone(60, 0.5, 'sawtooth', 0.15);
                        playTone(45, 0.6, 'sawtooth', 0.12); },
                    buttonHover: () => { playTone(500, 0.04, 'sine', 0.03); },
                    capitalSet: () => { playChord([392, 523, 659, 784], 0.5, 0.18);
                        playTone(784, 0.6, 'triangle', 0.12); },
                };
            })();

            // ==================== 背景音乐引擎 (MusicEngine) ====================
            const MusicEngine = (function() {
                let audioCtx = null;
                let isPlaying = false;
                let isMuted = false;
                let masterGain = null;
                let activeOscillators = [];
                let sequenceTimer = null;
                let currentMode = 'menu'; // 'menu', 'game', 'tutorial'

                const SCALES = {
                    menu: [
                        [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66],
                        [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 392.00, 349.23]
                    ],
                    game: [
                        [196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 293.66, 261.63],
                        [196.00, 220.00, 246.94, 293.66, 329.63, 349.23, 329.63, 293.66],
                        [220.00, 246.94, 261.63, 293.66, 329.63, 392.00, 329.63, 293.66]
                    ],
                    tutorial: [
                        [293.66, 329.63, 349.23, 392.00, 440.00, 392.00, 349.23, 329.63],
                        [293.66, 329.63, 349.23, 392.00, 440.00, 523.25, 440.00, 392.00]
                    ]
                };

                const BASS_NOTES = {
                    menu: [130.81, 130.81, 146.83, 146.83, 164.81, 164.81, 146.83, 130.81],
                    game: [98.00, 98.00, 110.00, 110.00, 123.47, 123.47, 110.00, 98.00],
                    tutorial: [146.83, 146.83, 164.81, 164.81, 196.00, 196.00, 164.81, 146.83]
                };

                function initMusicCtx() {
                    if (audioCtx && audioCtx.state !== 'closed') return audioCtx;
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        masterGain = audioCtx.createGain();
                        masterGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                        masterGain.connect(audioCtx.destination);
                    } catch (e) {
                        audioCtx = null;
                        masterGain = null;
                    }
                    return audioCtx;
                }

                function stopAllOsc() {
                    activeOscillators.forEach(o => {
                        try { o.stop(); } catch (e) {}
                    });
                    activeOscillators = [];
                }

                function clearSequence() {
                    if (sequenceTimer) {
                        clearTimeout(sequenceTimer);
                        sequenceTimer = null;
                    }
                    stopAllOsc();
                }

                function playNote(freq, duration, type = 'sine', vol = 0.03) {
                    const ctx = audioCtx;
                    if (!ctx || !masterGain || isMuted) return;
                    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.setValueAtTime(0, now + duration * 0.85);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    osc.connect(gain);
                    gain.connect(masterGain);
                    osc.start(now);
                    osc.stop(now + duration + 0.02);
                    activeOscillators.push(osc);
                    // Clean up
                    setTimeout(() => {
                        const idx = activeOscillators.indexOf(osc);
                        if (idx >= 0) activeOscillators.splice(idx, 1);
                    }, (duration + 0.05) * 1000);
                }

                function playSequenceStep(stepIndex) {
                    if (!isPlaying || !audioCtx || isMuted) return;
                    const scale = SCALES[currentMode] || SCALES['game'];
                    const bassNotes = BASS_NOTES[currentMode] || BASS_NOTES['game'];
                    const melodyRow = scale[stepIndex % scale.length];
                    const noteIdx = stepIndex % melodyRow.length;
                    const melodyFreq = melodyRow[noteIdx];
                    const bassFreq = bassNotes[stepIndex % bassNotes.length];

                    const beatDuration = currentMode === 'tutorial' ? 0.55 : (currentMode === 'menu' ? 0.7 : 0.5);

                    // Melody note
                    playNote(melodyFreq, beatDuration * 0.75, 'triangle', 0.025);
                    // Bass note
                    playNote(bassFreq, beatDuration * 0.9, 'sine', 0.018);
                    // Subtle pad
                    if (stepIndex % 4 === 0) {
                        playNote(melodyFreq / 2, beatDuration * 2, 'sine', 0.012);
                    }

                    sequenceTimer = setTimeout(() => {
                        playSequenceStep((stepIndex + 1) % (melodyRow.length * 2));
                    }, beatDuration * 1000);
                }

                function start(mode = 'game') {
                    initMusicCtx();
                    if (!audioCtx) return;
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume().catch(() => {});
                    }
                    clearSequence();
                    currentMode = mode;
                    isPlaying = true;
                    if (masterGain) {
                        masterGain.gain.setValueAtTime(isMuted ? 0 : 0.04, audioCtx.currentTime);
                    }
                    playSequenceStep(0);
                }

                function stop() {
                    isPlaying = false;
                    clearSequence();
                }

                function toggleMute() {
                    isMuted = !isMuted;
                    if (masterGain && audioCtx) {
                        masterGain.gain.setValueAtTime(isMuted ? 0 : 0.04, audioCtx.currentTime);
                    }
                    return isMuted;
                }

                function setMode(mode) {
                    currentMode = mode;
                }

                function resume() {
                    if (audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume().catch(() => {});
                    }
                }

                return {
                    init: initMusicCtx,
                    start,
                    stop,
                    toggleMute,
                    setMode,
                    resume,
                    get isPlaying() { return isPlaying; },
                    get isMuted() { return isMuted; },
                };
            })();

            // ==================== localStorage 键管理 ====================
            const LS_KEYS = {
                playCount: 'modernWar4_playCount',
                totalPlayTime: 'modernWar4_totalPlayTime',
                sessionStart: 'modernWar4_sessionStart',
                claimedRankRewards: 'modernWar4_claimedRankRewards',
                pendingFreeLottery: 'modernWar4_pendingFreeLottery',
                musicMuted: 'modernWar4_musicMuted'
            };

            function getPlayCount() {
                return parseInt(localStorage.getItem(LS_KEYS.playCount) || '0');
            }

            function incrementPlayCount() {
                let c = getPlayCount() + 1;
                localStorage.setItem(LS_KEYS.playCount, String(c));
                return c;
            }

            function getTotalPlayTime() {
                return parseInt(localStorage.getItem(LS_KEYS.totalPlayTime) || '0');
            }

            function addPlayTime(seconds) {
                let t = getTotalPlayTime() + seconds;
                localStorage.setItem(LS_KEYS.totalPlayTime, String(t));
                return t;
            }

            function setSessionStart() {
                localStorage.setItem(LS_KEYS.sessionStart, String(Date.now()));
            }

            function getSessionElapsed() {
                let start = parseInt(localStorage.getItem(LS_KEYS.sessionStart) || '0');
                if (!start) return 0;
                return Math.floor((Date.now() - start) / 1000);
            }

            function flushSessionTime() {
                let elapsed = getSessionElapsed();
                if (elapsed > 0) {
                    addPlayTime(elapsed);
                }
                localStorage.setItem(LS_KEYS.sessionStart, String(Date.now()));
            }

            function getClaimedRankRewards() {
                try {
                    return JSON.parse(localStorage.getItem(LS_KEYS.claimedRankRewards) || '[]');
                } catch (e) { return []; }
            }

            function addClaimedRankReward(rankName) {
                let claimed = getClaimedRankRewards();
                if (!claimed.includes(rankName)) {
                    claimed.push(rankName);
                    localStorage.setItem(LS_KEYS.claimedRankRewards, JSON.stringify(claimed));
                }
            }

            function getPendingFreeLottery() {
                return parseInt(localStorage.getItem(LS_KEYS.pendingFreeLottery) || '0');
            }

            function addPendingFreeLottery(count) {
                let current = getPendingFreeLottery();
                localStorage.setItem(LS_KEYS.pendingFreeLottery, String(current + count));
            }

            function usePendingFreeLottery() {
                let current = getPendingFreeLottery();
                if (current > 0) {
                    localStorage.setItem(LS_KEYS.pendingFreeLottery, String(current - 1));
                    return true;
                }
                return false;
            }

            function getMusicMuted() {
                return localStorage.getItem(LS_KEYS.musicMuted) === 'true';
            }

            function setMusicMuted(muted) {
                localStorage.setItem(LS_KEYS.musicMuted, String(muted));
            }

            function getRankKey(totalSeconds) {
                let minutes = totalSeconds / 60;
                if (minutes < 30) return 'bronze';
                else if (minutes < 120) return 'silver';
                else if (minutes < 480) return 'gold';
                else if (minutes < 1440) return 'platinum';
                else if (minutes < 4320) return 'diamond';
                else return 'legend';
            }

            function getRankBadge(totalSeconds) {
                let minutes = totalSeconds / 60;
                if (minutes < 30) {
                    return { name: '青铜新兵', cls: 'badge-bronze', icon: '🟤', key: 'bronze' };
                } else if (minutes < 120) {
                    return { name: '白银勇士', cls: 'badge-silver', icon: '⚪', key: 'silver' };
                } else if (minutes < 480) {
                    return { name: '黄金将领', cls: 'badge-gold', icon: '🟡', key: 'gold' };
                } else if (minutes < 1440) {
                    return { name: '铂金统帅', cls: 'badge-platinum', icon: '🔵', key: 'platinum' };
                } else if (minutes < 4320) {
                    return { name: '钻石元帅', cls: 'badge-diamond', icon: '💎', key: 'diamond' };
                } else {
                    return { name: '传奇战神', cls: 'badge-legend', icon: '👑', key: 'legend' };
                }
            }

            function checkAndAwardRankRewards(totalSeconds, showNotification = true) {
                let currentRank = getRankKey(totalSeconds);
                let claimed = getClaimedRankRewards();
                const RANK_ORDER = ['bronze', 'silver', 'gold', 'platinum', 'diamond', 'legend'];
                let currentIndex = RANK_ORDER.indexOf(currentRank);
                let newRewards = 0;
                for (let i = 1; i <= currentIndex; i++) {
                    let rankName = RANK_ORDER[i];
                    if (!claimed.includes(rankName)) {
                        addClaimedRankReward(rankName);
                        newRewards++;
                    }
                }
                if (newRewards > 0) {
                    addPendingFreeLottery(newRewards);
                    if (showNotification && typeof showAchievement === 'function') {
                        let rankInfo = getRankBadge(totalSeconds);
                        showAchievement('<i class="fas fa-gift"></i>',
                            '🎉 等级提升奖励！',
                            `晋升至 ${rankInfo.icon} ${rankInfo.name}！获得 ${newRewards} 次免费抽奖机会！`
                        );
                    }
                    if (typeof showMsg === 'function' && !showNotification) {
                        showMsg('🎉 等级提升！获得 ' + newRewards + ' 次免费抽奖！点击抽奖按钮查看');
                    }
                }
                return newRewards;
            }

            function formatPlayTime(totalSeconds) {
                if (totalSeconds < 60) return totalSeconds + '秒';
                let mins = Math.floor(totalSeconds / 60);
                if (mins < 60) return mins + '分钟';
                let hrs = Math.floor(mins / 60);
                let remMins = mins % 60;
                if (hrs < 24) return hrs + '小时' + (remMins > 0 ? remMins + '分钟' : '');
                let days = Math.floor(hrs / 24);
                let remHrs = hrs % 24;
                return days + '天' + (remHrs > 0 ? remHrs + '小时' : '');
            }

            function updateHomeStats() {
                let count = getPlayCount();
                let totalSec = getTotalPlayTime();
                let rank = getRankBadge(totalSec);
                let timeStr = formatPlayTime(totalSec);
                let pendingLottery = getPendingFreeLottery();
                let countEl = document.getElementById('statPlayCount');
                let timeEl = document.getElementById('statPlayTime');
                let badgeEl = document.getElementById('statBadge');
                let rankRewardItem = document.getElementById('rankRewardStatItem');
                let pendingLotteryEl = document.getElementById('statPendingLottery');
                if (countEl) countEl.textContent = count;
                if (timeEl) timeEl.textContent = timeStr;
                if (badgeEl) {
                    badgeEl.textContent = rank.icon + ' ' + rank.name;
                    badgeEl.className = 'stat-badge ' + rank.cls;
                }
                if (rankRewardItem && pendingLotteryEl) {
                    if (pendingLottery > 0) {
                        rankRewardItem.style.display = 'flex';
                        pendingLotteryEl.textContent = pendingLottery + '次';
                    } else {
                        rankRewardItem.style.display = 'none';
                    }
                }
                checkAndAwardRankRewards(totalSec, false);
            }

            window.addEventListener('beforeunload', () => {
                flushSessionTime();
                updateHomeStats();
            });
            let autoSaveInterval = null;

            function startAutoSave() {
                if (autoSaveInterval) clearInterval(autoSaveInterval);
                autoSaveInterval = setInterval(() => {
                    flushSessionTime();
                    updateHomeStats();
                    let totalSec = getTotalPlayTime();
                    let awarded = checkAndAwardRankRewards(totalSec, true);
                    if (awarded > 0 && typeof updateLotteryButtonHighlight === 'function') {
                        updateLotteryButtonHighlight();
                    }
                }, 30000);
            }

            function stopAutoSave() {
                if (autoSaveInterval) {
                    clearInterval(autoSaveInterval);
                    autoSaveInterval = null;
                }
            }

            let achievementTimer = null;

            function showAchievement(iconHtml, title, subtitle) {
                SoundEngine.achievement();
                let overlay = document.getElementById('achievementOverlay');
                let achIcon = document.getElementById('achIcon');
                let achTitle = document.getElementById('achTitle');
                let achSubtitle = document.getElementById('achSubtitle');
                let particlesContainer = document.getElementById('achievementParticles');
                if (!overlay || !achTitle) return;
                if (achievementTimer) clearTimeout(achievementTimer);
                achIcon.innerHTML = iconHtml || '<i class="fas fa-star"></i>';
                achTitle.textContent = title || '成就达成';
                achSubtitle.textContent = subtitle || '';
                particlesContainer.innerHTML = '';
                for (let i = 0; i < 40; i++) {
                    let p = document.createElement('div');
                    p.classList.add('ach-particle');
                    let angle = Math.random() * Math.PI * 2;
                    let dist = 60 + Math.random() * 180;
                    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                    p.style.left = '50%';
                    p.style.top = '50%';
                    p.style.animationDelay = Math.random() * 0.4 + 's';
                    p.style.animationDuration = (1.2 + Math.random() * 1.6) + 's';
                    p.style.width = (3 + Math.random() * 8) + 'px';
                    p.style.height = p.style.width;
                    let colors = ['#ffd966', '#ffaa33', '#ffcc66', '#ffe0a0', '#fff0c0', '#ffbb44'];
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particlesContainer.appendChild(p);
                }
                overlay.classList.add('show');
                achievementTimer = setTimeout(() => {
                    overlay.classList.remove('show');
                    achievementTimer = null;
                }, 2200);
            }

            let riotTimer = null;

            function showRiotWarning(title, desc) {
                SoundEngine.riot();
                let overlay = document.getElementById('riotOverlay');
                let riotTitle = document.getElementById('riotTitle');
                let riotDesc = document.getElementById('riotDesc');
                if (!overlay) return;
                if (riotTimer) clearTimeout(riotTimer);
                riotTitle.textContent = title || '大暴乱！';
                riotDesc.textContent = desc || '民怨沸腾，国家动荡！';
                overlay.classList.add('show');
                riotTimer = setTimeout(() => {
                    overlay.classList.remove('show');
                    riotTimer = null;
                }, 2500);
            }

            const blackMask = document.getElementById('blackMask');
            const poweredScreen = document.getElementById('poweredScreen');
            const homeContainer = document.getElementById('homeContainer');
            const gameMain = document.getElementById('gameMain');
            const fabMenu = document.getElementById('fabMenu');
            const enterBtn = document.getElementById('enterGameBtn');
            const tutorialBtn = document.getElementById('tutorialHomeBtn');
            const tutorialStartBtn = document.getElementById('tutorialStartBtn');
            const mapWrapper = document.getElementById('mapWrapper');

            /**
             * 获取教程步骤对应的最佳地图格子坐标
             * 返回 {x, y} 或 null
             */
            function getBestCellForTutorialStep(step) {
                const player = GAME.setupPhase.isSetting ? GAME.setupPhase.currentSettingPlayer : GAME.currentTurn;
                const stepData = TUTORIAL.steps[step - 1];
                if (!stepData || stepData.target !== 'map') return null;

                switch (stepData.action) {
                    case 'select_land':
                        // 步骤1：找地图中央区域的陆地格子
                        const centerCells = [];
                        for (let y = 6; y <= 13; y++) {
                            for (let x = 6; x <= 13; x++) {
                                if (GAME.mapTerrain[y] && GAME.mapTerrain[y][x] === 1) {
                                    // 检查是否已被占据
                                    let key = `${x},${y}`;
                                    let occupied = false;
                                    for (let p = 1; p <= GAME.totalPlayers; p++) {
                                        if (GAME.playerLands[p]?.cells.has(key)) { occupied = true; break; }
                                    }
                                    if (!occupied) centerCells.push({ x, y });
                                }
                            }
                        }
                        if (centerCells.length > 0) {
                            return centerCells[Math.floor(Math.random() * centerCells.length)];
                        }
                        // fallback: 找任意陆地
                        for (let y = 0; y < 20; y++)
                            for (let x = 0; x < 20; x++)
                                if (GAME.mapTerrain[y] && GAME.mapTerrain[y][x] === 1) return { x, y };
                        return { x: 10, y: 10 };

                    case 'select_capital':
                        // 步骤2：指向已选中的格子
                        if (GAME.setupPhase.selectedCells.length > 0) {
                            const mid = Math.floor(GAME.setupPhase.selectedCells.length / 2);
                            return GAME.setupPhase.selectedCells[mid];
                        }
                        return null;

                    case 'expand':
                        // 步骤4：找与玩家领土相邻的空地
                        if (GAME.playerLands[player] && GAME.playerLands[player].cells.size > 0) {
                            const candidates = [];
                            for (let cellKey of GAME.playerLands[player].cells) {
                                const [cx, cy] = cellKey.split(',').map(Number);
                                for (const [dx, dy] of [
                                        [-1, 0],
                                        [1, 0],
                                        [0, -1],
                                        [0, 1]
                                    ]) {
                                    const nx = cx + dx;
                                    const ny = cy + dy;
                                    if (nx >= 0 && nx < 20 && ny >= 0 && ny < 20 && GAME.mapTerrain[ny] && GAME
                                        .mapTerrain[ny][nx] === 1) {
                                        const nk = `${nx},${ny}`;
                                        if (!GAME.playerLands[player].cells.has(nk)) {
                                            let occupied = false;
                                            for (let p = 1; p <= GAME.totalPlayers; p++) {
                                                if (p !== player && GAME.playerLands[p]?.cells.has(nk)) { occupied =
                                                        true; break; }
                                            }
                                            if (!occupied) candidates.push({ x: nx, y: ny });
                                        }
                                    }
                                }
                            }
                            if (candidates.length > 0) {
                                return candidates[Math.floor(Math.random() * candidates.length)];
                            }
                        }
                        return null;

                    case 'collect':
                        // 步骤6：找玩家领土中未被收集的格子
                        if (GAME.playerLands[player] && GAME.playerLands[player].cells.size > 0) {
                            const unharvested = [];
                            for (let cellKey of GAME.playerLands[player].cells) {
                                if (!GAME.harvestedCells.has(cellKey)) {
                                    const [cx, cy] = cellKey.split(',').map(Number);
                                    unharvested.push({ x: cx, y: cy });
                                }
                            }
                            if (unharvested.length > 0) {
                                return unharvested[Math.floor(Math.random() * unharvested.length)];
                            }
                            // 全部收集过了，指向任意领土格子
                            const allCells = Array.from(GAME.playerLands[player].cells);
                            const [cx, cy] = allCells[0].split(',').map(Number);
                            return { x: cx, y: cy };
                        }
                        return null;

                    case 'place':
                        // 步骤8：找玩家领土中没有单位的格子
                        if (GAME.playerLands[player] && GAME.playerLands[player].cells.size > 0) {
                            const emptyCells = [];
                            for (let cellKey of GAME.playerLands[player].cells) {
                                if (!GAME.units.has(cellKey)) {
                                    const [cx, cy] = cellKey.split(',').map(Number);
                                    emptyCells.push({ x: cx, y: cy });
                                }
                            }
                            if (emptyCells.length > 0) {
                                return emptyCells[Math.floor(Math.random() * emptyCells.length)];
                            }
                        }
                        return null;

                    default:
                        return null;
                }
            }

            /**
             * 高亮地图上的特定格子
             */
            function highlightTutorialCell(x, y) {
                clearTutorialCellHighlights();
                if (x === undefined || y === undefined) return;
                const cell = document.querySelector(`.grid-cell[data-x='${x}'][data-y='${y}']`);
                if (cell) {
                    cell.classList.add('tutorial-cell-highlight');
                }
            }

            function positionTutorialArrow() {
                if (!tutorialArrowPointer || !TUTORIAL.active || TUTORIAL.completed) {
                    hideTutorialArrow();
                    return;
                }
                const stepData = TUTORIAL.steps[TUTORIAL.step - 1];
                if (!stepData) {
                    hideTutorialArrow();
                    return;
                }

                let targetEl = null;
                let targetRect = null;
                const arrowSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue(
                    '--tutorial-arrow-size').trim()) || 80;
                const arrowHalf = arrowSize / 2;

                if (stepData.target === 'map') {
                    // 对于地图步骤，尝试找到最佳格子
                    const bestCell = getBestCellForTutorialStep(TUTORIAL.step);
                    if (bestCell) {
                        const cellEl = document.querySelector(`.grid-cell[data-x='${bestCell.x}'][data-y='${bestCell.y}']`);
                        if (cellEl) {
                            targetEl = cellEl;
                            targetRect = cellEl.getBoundingClientRect();
                            highlightTutorialCell(bestCell.x, bestCell.y);
                        }
                    }
                    if (!targetEl) {
                        targetEl = document.getElementById('gridMap');
                        targetRect = targetEl.getBoundingClientRect();
                        clearTutorialCellHighlights();
                    }
                } else {
                    targetEl = document.getElementById(stepData.target);
                    if (targetEl) {
                        targetRect = targetEl.getBoundingClientRect();
                    }
                    clearTutorialCellHighlights();
                }

                if (!targetEl || !targetRect) {
                    hideTutorialArrow();
                    return;
                }

                const arrowLabelHeight = 35;
                let arrowLeft = targetRect.left + targetRect.width / 2;
                let arrowTop = targetRect.top - arrowSize - arrowLabelHeight - 8;
                let direction = stepData.arrowDir || 'down';

                // 如果上方空间不够，箭头指向下方
                if (arrowTop < 25) {
                    arrowTop = targetRect.bottom + arrowSize + arrowLabelHeight + 8;
                    direction = 'up';
                }

                // 边界检查
                arrowLeft = Math.max(arrowHalf + 10, Math.min(window.innerWidth - arrowHalf - 10, arrowLeft));
                arrowTop = Math.max(arrowHalf + 10, Math.min(window.innerHeight - arrowHalf - 10, arrowTop));

                tutorialArrowPointer.classList.remove('point-up', 'point-down', 'point-left', 'point-right');
                tutorialArrowPointer.classList.add('point-' + direction);
                tutorialArrowPointer.style.left = arrowLeft + 'px';
                tutorialArrowPointer.style.top = arrowTop + 'px';
                tutorialArrowPointer.classList.add('visible');

                if (tutorialArrowLabel) {
                    tutorialArrowLabel.textContent = stepData.label || '点这里';
                }

                // 聚光灯
                if (tutorialSpotlight) {
                    const spotSize = Math.max(targetRect.width, targetRect.height) + 40;
                    tutorialSpotlight.style.left = (targetRect.left + targetRect.width / 2) + 'px';
                    tutorialSpotlight.style.top = (targetRect.top + targetRect.height / 2) + 'px';
                    tutorialSpotlight.style.width = spotSize + 'px';
                    tutorialSpotlight.style.height = spotSize + 'px';
                    tutorialSpotlight.classList.add('active');
                }

                // 地图光晕
                const gridContainer = document.getElementById('gridMap');
                if (stepData.target === 'map' && gridContainer) {
                    gridContainer.classList.add('tutorial-map-glow');
                } else if (gridContainer) {
                    gridContainer.classList.remove('tutorial-map-glow');
                }
            }

            function hideTutorialArrow() {
                if (tutorialArrowPointer) {
                    tutorialArrowPointer.classList.remove('visible');
                }

            // ==================== 暴乱处罚系统 ====================
            function checkRiot(player, turnCount) {
                if (turnCount < 5) return false;
                if (turnCount % 5 !== 0) return false;
                const checkKey = `${player}_${turnCount}`;
                if (GAME.riotCheckedTurns.has(checkKey)) return false;
                GAME.riotCheckedTurns.add(checkKey);
                const eco = GAME.playerEconomy[player];
                if (!eco) return false;
                const agriThreshold = Math.floor(10 + turnCount * 1.5);
                const indusThreshold = Math.floor(8 + turnCount * 1.2);
                const agriLow = eco.agriculture < agriThreshold;
                const indusLow = eco.industry < indusThreshold;
                if (!agriLow && !indusLow) return false;
                let riotLevel = 'minor';
                let penaltySilver = 0;
                let penaltyGdp = 0;
                let loseTerritory = false;
                let riotTitle = '民众不满';
                let riotDescParts = [];
                if (agriLow && indusLow) {
                    riotLevel = 'major';
                    riotTitle = '🔥 大暴乱！';
                    penaltySilver = Math.floor(GAME.playerResources[player].silver * 0.4);
                    penaltyGdp = Math.floor(eco.gdp * 0.25);
                    loseTerritory = true;
                    riotDescParts.push('农业和工业双双落后');
                } else if (agriLow) {
                    riotLevel = 'medium';
                    riotTitle = '🌾 饥荒暴动！';
                    penaltySilver = Math.floor(GAME.playerResources[player].silver * 0.25);
                    penaltyGdp = Math.floor(eco.gdp * 0.15);
                    riotDescParts.push(`农业(${eco.agriculture})远低于需求(${agriThreshold})`);
                } else if (indusLow) {
                    riotLevel = 'medium';
                    riotTitle = '🏭 工人罢工！';
                    penaltySilver = Math.floor(GAME.playerResources[player].silver * 0.2);
                    penaltyGdp = Math.floor(eco.gdp * 0.12);
                    riotDescParts.push(`工业(${eco.industry})远低于需求(${indusThreshold})`);
                }
                penaltySilver = Math.max(30, Math.min(penaltySilver, 500));
                penaltyGdp = Math.max(20, Math.min(penaltyGdp, 300));
                GAME.playerResources[player].silver = Math.max(0, GAME.playerResources[player].silver - penaltySilver);
                eco.gdp = Math.max(50, eco.gdp - penaltyGdp);
                let lostCells = [];
                if (loseTerritory && GAME.playerLands[player] && GAME.playerLands[player].cells.size > 1) {
                    const allCells = Array.from(GAME.playerLands[player].cells);
                    const capKey =
                        `${GAME.playerLands[player].capital.x},${GAME.playerLands[player].capital.y}`;
                    const nonCapCells = allCells.filter(c => c !== capKey);
                    if (nonCapCells.length > 0) {
                        const loseCount = Math.min(2, nonCapCells.length);
                        for (let i = 0; i < loseCount; i++) {
                            const idx = Math.floor(Math.random() * nonCapCells.length);
                            const cellToLose = nonCapCells.splice(idx, 1)[0];
                            GAME.playerLands[player].cells.delete(cellToLose);
                            lostCells.push(cellToLose);
                            if (GAME.units.has(cellToLose)) GAME.units.delete(cellToLose);
                            GAME.harvestedCells.delete(cellToLose);
                        }
                    }
                }
                riotDescParts.push(`银币-${penaltySilver}`, `GDP-${penaltyGdp}`);
                if (lostCells.length > 0) riotDescParts.push(`失去${lostCells.length}块领土`);
                const riotDesc = riotDescParts.join(' | ');
                showRiotWarning(riotTitle, riotDesc);
                showMsg('⚠️ ' + riotTitle + '：' + riotDesc);
                updateTopBar();
                renderFullMap();
                return true;
            }

            // ==================== 地图生成 ====================
            function generateMap() {
                let map = [];
                for (let i = 0; i < 20; i++) {
                    map[i] = [];
                    for (let j = 0; j < 20; j++) map[i][j] = Math.random() > 0.48 ? 1 : 0;
                }
                let totalLand = map.flat().filter(v => v === 1).length;
                let target = 200;
                while (totalLand > target) {
                    let y = Math.floor(Math.random() * 20),
                        x = Math.floor(Math.random() * 20);
                    if (map[y][x] === 1) { map[y][x] = 0;
                        totalLand--; }
                }
                while (totalLand < target) {
                    let y = Math.floor(Math.random() * 20),
                        x = Math.floor(Math.random() * 20);
                    if (map[y][x] === 0) { map[y][x] = 1;
                        totalLand++; }
                }
                return map;
            }

            function renderFullMap() {
                const container = document.getElementById('gridMap');
                if (!container) return;
                container.innerHTML = '';
                for (let y = 0; y < 20; y++) {
                    for (let x = 0; x < 20; x++) {
                        let cell = document.createElement('div');
                        cell.className = 'grid-cell';
                        let key = `${x},${y}`;
                        let owner = 0;
                        for (let p = 1; p <= GAME.totalPlayers; p++)
                            if (GAME.playerLands[p]?.cells.has(key)) owner = p;
                        let isCapital = false;
                        for (let p = 1; p <= GAME.totalPlayers; p++)
                            if (GAME.playerLands[p]?.capital && GAME.playerLands[p].capital.x === x && GAME
                                .playerLands[p].capital.y === y) isCapital = true;
                        let terrain = (GAME.mapTerrain[y] && GAME.mapTerrain[y][x] === 1) ? 'land' : 'sea';
                        cell.classList.add(terrain);
                        if (owner) {
                            cell.classList.add(`player${owner}-land`);
                            if (isCapital) cell.classList.add(`player${owner}-capital`);
                        }
                        if (GAME.units.has(key)) cell.classList.add('unit');
                        cell.dataset.x = x;
                        cell.dataset.y = y;
                        cell.addEventListener('click', (function(xx, yy) {
                            return function() { onGridClick(xx, yy); };
                        })(x, y));
                        container.appendChild(cell);
                    }
                }
                recalcCellSize();
                updateExpandButtonState();
                if (TUTORIAL.active && !TUTORIAL.completed) {
                    setTimeout(() => positionTutorialArrow(), 120);
                }
            }
