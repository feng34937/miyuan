<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>米遇安天气</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg-gradient-start: #d4e9ff;
      --bg-gradient-end: #b0d9f5;
      --app-bg: rgba(255, 255, 255, 0.65);
      --app-border: rgba(255, 255, 255, 0.7);
      --text-primary: #1e293b;
      --text-heading: #0b2b44;
      --text-secondary: #3e5e7c;
      --card-bg: rgba(255, 255, 255, 0.4);
      --card-border: rgba(255, 255, 255, 0.7);
      --detail-icon-bg: rgba(255, 255, 255, 0.7);
      --detail-icon-color: #2266aa;
      --button-bg: rgba(255, 255, 255, 0.85);
      --button-shadow: 0 4px 8px rgba(0, 20, 40, 0.08);
      --input-bg: white;
      --input-text: #1e293b;
      --status-bg: rgba(255, 255, 255, 0.5);
      --shadow-color: rgba(0, 20, 40, 0.1);
      --footer-opacity: 0.9;
      --temp-color: #0a2a44;
      --grid-value-color: #0b2b44;
      --forecast-item-bg: rgba(255, 255, 255, 0.4);
      --index-card-bg: rgba(255, 255, 255, 0.4);
      --modal-overlay-bg: rgba(0, 0, 0, 0.15);
      --tab-active-bg: #3b82f6;
      --tab-active-text: white;
      --tab-inactive-bg: rgba(255,255,255,0.5);
    }

    .dark-mode {
      --bg-gradient-start: #1a2a3a;
      --bg-gradient-end: #0f1a24;
      --app-bg: rgba(20, 30, 40, 0.75);
      --app-border: rgba(60, 80, 100, 0.6);
      --text-primary: #e2e8f0;
      --text-heading: #d0e0f0;
      --text-secondary: #b0c4de;
      --card-bg: rgba(30, 45, 60, 0.5);
      --card-border: rgba(80, 110, 140, 0.5);
      --detail-icon-bg: rgba(50, 70, 90, 0.8);
      --detail-icon-color: #8ab4f8;
      --button-bg: rgba(40, 55, 70, 0.9);
      --button-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      --input-bg: #2a3a4a;
      --input-text: #e0e8f0;
      --status-bg: rgba(30, 45, 60, 0.6);
      --shadow-color: rgba(0, 0, 0, 0.3);
      --footer-opacity: 1;
      --temp-color: #d0e4ff;
      --grid-value-color: #cbd5e1;
      --forecast-item-bg: rgba(40, 60, 80, 0.5);
      --index-card-bg: rgba(40, 60, 80, 0.5);
      --modal-overlay-bg: rgba(0, 0, 0, 0.5);
      --tab-active-bg: #4f8cf7;
      --tab-active-text: white;
      --tab-inactive-bg: rgba(40,55,70,0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      margin: 0;
      color: var(--text-primary);
      background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
      transition: background 0.3s ease;
    }

    .weather-app,
    .weather-app *,
    .search-wrapper,
    button,
    .weather-card,
    .details-grid,
    .indices-grid,
    .forecast-card,
    .forecast-item,
    .detail-icon,
    .status-message,
    .update-time,
    .city-quick button,
    .footer-note span,
    .theme-toggle,
    .city-btn,
    .modal-content,
    .modal-tab,
    .modal-city-btn,
    .modal-search-input {
      border-radius: 0 !important;
    }

    .weather-app {
      max-width: 680px;
      width: 100%;
      background: var(--app-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 8px 8px 0 var(--shadow-color), 0 4px 12px rgba(0, 0, 0, 0.05);
      padding: 1.8rem 1.6rem;
      border: 1px solid var(--app-border);
      position: relative;
      overflow: hidden;
      z-index: 2;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    #weather-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      z-index: 0;
      opacity: 0.85;
    }

    .weather-app>*:not(#weather-canvas) {
      position: relative;
      z-index: 3;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-heading);
      text-shadow: 0 2px 3px rgba(255, 255, 255, 0.3);
      margin: 0;
    }
    h1 i {
      color: #3b82f6;
      font-size: 1.8rem;
      background: rgba(255, 255, 255, 0.4);
      padding: 6px;
    }

    .theme-toggle {
      background: var(--button-bg);
      border: 1px solid var(--app-border);
      color: var(--text-primary);
      font-size: 1.4rem;
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: var(--button-shadow);
      backdrop-filter: blur(4px);
      transition: 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle:hover {
      background: var(--card-bg);
      transform: scale(1.05);
    }

    .search-section {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .search-wrapper {
      flex: 1;
      display: flex;
      background: var(--input-bg);
      padding: 4px 4px 4px 18px;
      align-items: center;
      box-shadow: inset 0 0 0 1px var(--app-border), 0 4px 8px var(--shadow-color);
    }
    .search-wrapper:focus-within {
      box-shadow: inset 0 0 0 2px #3b82f6, 0 6px 12px rgba(59, 130, 246, 0.15);
    }
    .search-wrapper i {
      color: var(--text-secondary);
      margin-right: 8px;
    }
    #city-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 1.1rem;
      font-weight: 500;
      padding: 12px 0;
      background: transparent;
      color: var(--input-text);
    }
    #city-input::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    button {
      background: var(--button-bg);
      border: none;
      padding: 0 20px;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-heading);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--button-shadow);
      cursor: pointer;
      backdrop-filter: blur(4px);
      border: 1px solid var(--app-border);
      white-space: nowrap;
      transition: 0.15s;
    }
    button:hover {
      background: var(--card-bg);
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.15), inset 0 0 0 1px #bdd6ff;
      transform: scale(1.02);
    }

    .city-quick {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }
    .city-quick button {
      padding: 8px 16px;
      font-size: 0.9rem;
      background: var(--button-bg);
    }
    .city-btn-more {
      background: #3b82f6 !important;
      color: white !important;
      border-color: #3b82f6 !important;
      font-weight: 650 !important;
    }
    .city-btn-more:hover {
      background: #2563eb !important;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3) !important;
    }

    /* 城市选择弹窗 - 白色玻璃背景 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-overlay-bg);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: background 0.3s;
    }
    .modal-overlay.hidden {
      display: none;
    }
    .modal-content {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12), inset 0 1px 0 white;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .dark-mode .modal-content {
      background: rgba(20, 28, 38, 0.7);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .dark-mode .modal-header {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-header h3 {
      font-size: 1.2rem;
      color: var(--text-heading);
      font-weight: 650;
    }
    .modal-close {
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px 8px !important;
    }
    .modal-close:hover {
      color: #e8634b;
      transform: scale(1.1);
    }
    .modal-search {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .dark-mode .modal-search {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-search-input {
      width: 100%;
      padding: 10px 16px;
      font-size: 1rem;
      border: 1px solid var(--card-border);
      background: var(--input-bg);
      color: var(--input-text);
      outline: none;
      font-family: inherit;
    }
    .modal-search-input:focus {
      border-color: #3b82f6;
      box-shadow: inset 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    .modal-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .dark-mode .modal-tabs {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-tab {
      padding: 7px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--card-border);
      background: var(--tab-inactive-bg);
      color: var(--text-primary);
      transition: 0.12s;
      white-space: nowrap;
    }
    .modal-tab.active {
      background: var(--tab-active-bg);
      color: var(--tab-active-text);
      border-color: var(--tab-active-bg);
    }
    .modal-tab:hover {
      background: var(--tab-active-bg);
      color: var(--tab-active-text);
      border-color: var(--tab-active-bg);
    }
    .modal-city-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      align-content: start;
    }
    .modal-city-btn {
      padding: 10px 8px;
      font-size: 0.85rem;
      font-weight: 550;
      cursor: pointer;
      border: 1px solid var(--card-border);
      background: var(--button-bg);
      color: var(--text-primary);
      text-align: center;
      transition: 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .modal-city-btn:hover {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
      transform: scale(1.03);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
    }
    .modal-city-btn.selected {
      background: #10b981;
      color: white;
      border-color: #10b981;
    }
    .no-result {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-secondary);
      padding: 30px;
      font-size: 1rem;
    }

    .weather-card {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 1.6rem 1.4rem;
      border: 1px solid var(--card-border);
      box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.1), 0 10px 20px -5px var(--shadow-color);
    }

    .location-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .city-name {
      font-size: 1.9rem;
      font-weight: 650;
      color: var(--text-heading);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .update-time {
      font-size: 0.75rem;
      background: var(--card-bg);
      padding: 4px 10px;
      border: 1px solid var(--card-border);
      color: var(--text-secondary);
    }

    .weather-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 15px 0 20px;
    }
    .temp-section {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .temp-value {
      font-size: 4.2rem;
      font-weight: 650;
      color: var(--temp-color);
      line-height: 1;
    }
    .temp-unit {
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .weather-icon-large {
      font-size: 4rem;
      color: #2c4e6e;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.15));
      background: rgba(255, 255, 240, 0.2);
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .weather-desc {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 24px;
      color: var(--text-heading);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 20px 16px;
      backdrop-filter: blur(4px);
      border: 1px solid var(--card-border);
    }
    .detail-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .detail-icon {
      width: 40px;
      height: 40px;
      background: var(--detail-icon-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--detail-icon-color);
      border: 1px solid var(--card-border);
    }
    .detail-info {
      display: flex;
      flex-direction: column;
    }
    .detail-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .detail-value {
      font-size: 1.3rem;
      font-weight: 650;
      color: var(--grid-value-color);
      line-height: 1.3;
    }
    .detail-unit {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .indices-section {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      border: 1px solid var(--card-border);
      padding: 16px;
    }
    .indices-title {
      font-size: 1.1rem;
      font-weight: 650;
      color: var(--text-heading);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .indices-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .index-card {
      background: var(--index-card-bg);
      padding: 12px 8px;
      text-align: center;
      border: 1px solid var(--card-border);
    }
    .index-icon {
      font-size: 1.4rem;
      color: var(--detail-icon-color);
      margin-bottom: 4px;
    }
    .index-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .index-value {
      font-size: 1.1rem;
      font-weight: 650;
      color: var(--grid-value-color);
      margin: 4px 0;
    }
    .index-desc {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .forecast-section {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      border: 1px solid var(--card-border);
      padding: 16px;
    }
    .forecast-title {
      font-size: 1.1rem;
      font-weight: 650;
      color: var(--text-heading);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .forecast-scroll {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 6px;
    }
    .forecast-item {
      flex: 0 0 90px;
      background: var(--forecast-item-bg);
      padding: 12px 6px;
      text-align: center;
      border: 1px solid var(--card-border);
    }
    .forecast-date {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .forecast-icon {
      font-size: 1.4rem;
      color: var(--detail-icon-color);
      margin: 4px 0;
    }
    .forecast-temp {
      font-size: 1.1rem;
      font-weight: 650;
      color: var(--grid-value-color);
    }
    .forecast-desc {
      font-size: 0.65rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-message {
      text-align: center;
      padding: 28px 10px;
      background: var(--status-bg);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
    }
    .error-message {
      color: #f87171;
      background: rgba(80, 30, 30, 0.5);
    }

    .footer-note {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-primary);
      opacity: var(--footer-opacity);
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(59, 130, 246, 0.15);
      border-top-color: #3b82f6;
      border-radius: 50% !important;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    @media (max-width: 500px) {
      .modal-city-list {
        grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
        gap: 5px;
        padding: 10px;
      }
      .modal-city-btn {
        padding: 8px 4px;
        font-size: 0.75rem;
      }
      .modal-tab {
        padding: 5px 10px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="weather-app" id="weatherAppContainer">
    <canvas id="weather-canvas"></canvas>

    <div class="header-row">
      <h1><i class="fas fa-cloud-sun-rain"></i>米遇安天气</h1>
      <button class="theme-toggle" id="theme-toggle-btn" title="切换深色/浅色模式"><i class="fas fa-moon"></i></button>
    </div>

    <div class="search-section">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="city-input" placeholder="输入城市名称…" value="北京" autocomplete="off" />
      </div>
      <button id="search-btn"><i class="fas fa-magnifying-glass"></i> 查询</button>
      <button id="locate-btn" title="定位我"><i class="fas fa-location-dot"></i></button>
    </div>

    <div class="city-quick">
      <button data-city="北京">北京</button>
      <button data-city="上海">上海</button>
      <button data-city="广州">广州</button>
      <button data-city="成都">成都</button>
      <button data-city="纽约">纽约</button>
      <button data-city="伦敦">伦敦</button>
      <button data-city="东京">东京</button>
      <button data-city="巴黎">巴黎</button>
      <button class="city-btn-more" id="btn-more-cities"><i class="fas fa-globe-asia"></i> 更多城市</button>
    </div>

    <div id="weather-container">
      <div id="loading-state" class="status-message"><span class="spinner"></span> 读取天气…</div>
      <div id="weather-card" class="weather-card hidden">
        <div class="location-header">
          <div class="city-name"><i class="fas fa-map-pin"></i><span id="display-city">北京</span></div>
          <div class="update-time" id="update-time">刚刚更新</div>
        </div>
        <div class="weather-main">
          <div class="temp-section"><span class="temp-value" id="temp-value">--</span><span class="temp-unit">°C</span></div>
          <div class="weather-icon-large" id="weather-icon"><i class="fas fa-sun"></i></div>
        </div>
        <div class="weather-desc" id="weather-desc"><i class="fas fa-cloud"></i><span id="desc-text">晴</span></div>
        <div class="details-grid">

      function getAllCities() { const all = []; for (const r in cityDatabase) all.push(...cityDatabase[r]); return [...new Set(all)]; }

      const forecastContainer = document.getElementById('forecast-container');
      const themeToggleBtn = document.getElementById('theme-toggle-btn');
      const modalOverlay = document.getElementById('city-modal-overlay');
      const modalCloseBtn = document.getElementById('modal-close-btn');
      const modalSearchInput = document.getElementById('modal-search-input');
      const modalTabs = document.getElementById('modal-tabs');
      const modalCityList = document.getElementById('modal-city-list');
      const btnMoreCities = document.getElementById('btn-more-cities');

      let currentAbortController = null;
      let currentWeatherCode = 0;
      let animationFrame = null;
      let particles = [];
      let canvasWidth = 0, canvasHeight = 0;
      let isPageVisible = true;
      let currentRegion = 'china';

      document.addEventListener('visibilitychange', () => {
        isPageVisible = !document.hidden;
        if (isPageVisible) { resizeCanvas(); startAnimation(); }
      });

      function initTheme() {
        const saved = localStorage.getItem('miyutianqi_theme') || 'light';
        if (saved === 'dark') { document.body.classList.add('dark-mode'); themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>'; }
        else { document.body.classList.remove('dark-mode'); themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>'; }
      }
      function toggleTheme() {
        if (document.body.classList.contains('dark-mode')) {
          document.body.classList.remove('dark-mode'); themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>'; localStorage.setItem('miyutianqi_theme', 'light');
        } else {
          document.body.classList.add('dark-mode'); themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>'; localStorage.setItem('miyutianqi_theme', 'dark');
        }
      }
      themeToggleBtn.addEventListener('click', toggleTheme);

      // 粒子背景 (完整保留)
      function initParticlesForWeather(code) {
        const count = Math.floor((canvasWidth * canvasHeight) / 4500) || 30;
        particles = [];
        const meta = getWeatherMeta(code); const type = meta.bgType;
        for (let i = 0; i < count; i++) {
          if (type === 'sunny') particles.push({ type:'sunny', x:Math.random()*canvasWidth, y:Math.random()*canvasHeight*0.6, size:15+Math.random()*30, speed:0.2+Math.random()*0.5, alpha:0.1+Math.random()*0.3 });
          else if (type === 'rainy') particles.push({ type:'rain', x:Math.random()*canvasWidth*1.5-canvasWidth*0.25, y:Math.random()*canvasHeight*1.2-canvasHeight*0.2, len:15+Math.random()*25, speed:8+Math.random()*12, thickness:1+Math.random()*1.5 });
          else if (type === 'snowy') particles.push({ type:'snow', x:Math.random()*canvasWidth, y:Math.random()*canvasHeight, radius:2+Math.random()*5, speedY:0.8+Math.random()*1.5, speedX:0.2+Math.random()*0.6-0.3, alpha:0.6+Math.random()*0.4 });
          else if (type === 'cloudy') particles.push({ type:'cloud', x:Math.random()*canvasWidth, y:Math.random()*canvasHeight*0.5, radius:40+Math.random()*60, speed:0.1+Math.random()*0.2, alpha:0.15+Math.random()*0.2 });
          else particles.push({ type:'default', x:Math.random()*canvasWidth, y:Math.random()*canvasHeight, size:2+Math.random()*8, alpha:0.05 });
        }
      }
      function drawSunny(c,w,h){ const g=c.createRadialGradient(w*0.2,h*0.15,10,w*0.3,h*0.2,w*0.8); g.addColorStop(0,'rgba(255,245,180,0.3)'); g.addColorStop(0.7,'rgba(255,220,120,0.05)'); c.fillStyle=g; c.fillRect(0,0,w,h); particles.forEach(p=>{ c.beginPath(); const pg=c.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size); pg.addColorStop(0,`rgba(255,250,200,${p.alpha})`); pg.addColorStop(1,'rgba(255,230,140,0)'); c.fillStyle=pg; c.arc(p.x,p.y,p.size,0,Math.PI*2); c.fill(); p.x+=p.speed*0.7; p.y+=p.speed*0.2; if(p.x>w+50)p.x=-50; if(p.y>h*0.8)p.y=h*0.1; }); }
      function drawRainy(c,w,h){ particles.forEach(p=>{ c.beginPath(); c.moveTo(p.x,p.y); c.lineTo(p.x-5,p.y+p.len); c.strokeStyle=`rgba(180,220,250,${0.5+Math.random()*0.3})`; c.lineWidth=p.thickness; c.stroke(); p.y+=p.speed; p.x+=1.2; if(p.y>h+30){p.y=-30; p.x=Math.random()*w*1.2-w*0.1;} }); }
      function drawSnowy(c,w,h){ particles.forEach(p=>{ c.beginPath(); c.fillStyle=`rgba(255,255,255,${p.alpha})`; c.arc(p.x,p.y,p.radius,0,Math.PI*2); c.fill(); p.y+=p.speedY; p.x+=p.speedX; if(p.y>h+10){p.y=-10; p.x=Math.random()*w;} if(p.x>w+10)p.x=-10; if(p.x<-10)p.x=w+10; }); }
      function drawCloudy(c,w,h){ c.fillStyle='rgba(220,235,250,0.2)'; c.fillRect(0,0,w,h); particles.forEach(p=>{ c.beginPath(); const g=c.createRadialGradient(p.x,p.y,0,p.x,p.y,p.radius); g.addColorStop(0,`rgba(200,220,240,${p.alpha})`); g.addColorStop(1,'rgba(180,210,240,0)'); c.fillStyle=g; c.arc(p.x,p.y,p.radius,0,Math.PI*2); c.fill(); p.x+=p.speed; if(p.x>w+100)p.x=-100; }); }
      function drawFoggy(c,w,h){ const g=c.createLinearGradient(0,0,w,h); g.addColorStop(0,'rgba(210,225,240,0.3)'); g.addColorStop(1,'rgba(190,210,230,0.2)'); c.fillStyle=g; c.fillRect(0,0,w,h); }
      function drawThunder(c,w,h){ drawRainy(c,w,h); if(Math.random()<0.02){c.fillStyle='rgba(255,255,230,0.25)'; c.fillRect(0,0,w,h);} }
      function drawDefault(c,w,h){ c.fillStyle='rgba(180,205,230,0.1)'; c.fillRect(0,0,w,h); }
      function drawBackground(){ if(!canvas||!ctx)return; ctx.clearRect(0,0,canvasWidth,canvasHeight); const t=getWeatherMeta(currentWeatherCode).bgType; if(t==='sunny')drawSunny(ctx,canvasWidth,canvasHeight); else if(t==='rainy')drawRainy(ctx,canvasWidth,canvasHeight); else if(t==='snowy')drawSnowy(ctx,canvasWidth,canvasHeight); else if(t==='cloudy')drawCloudy(ctx,canvasWidth,canvasHeight); else if(t==='foggy')drawFoggy(ctx,canvasWidth,canvasHeight); else if(t==='thunder')drawThunder(ctx,canvasWidth,canvasHeight); else drawDefault(ctx,canvasWidth,canvasHeight); }
      function animationLoop(){ if(!isPageVisible)return; drawBackground(); animationFrame=requestAnimationFrame(animationLoop); }
      function startAnimation(){ if(animationFrame)cancelAnimationFrame(animationFrame); animationFrame=requestAnimationFrame(animationLoop); }
      function stopAnimation(){ if(animationFrame){cancelAnimationFrame(animationFrame); animationFrame=null;} }
      function resizeCanvas(){ const r=container.getBoundingClientRect(); canvasWidth=r.width; canvasHeight=r.height; canvas.width=canvasWidth; canvas.height=canvasHeight; initParticlesForWeather(currentWeatherCode); }
      function applyWeatherBackground(code){ currentWeatherCode=code; if(canvasWidth>0){ initParticlesForWeather(code); startAnimation(); } }

      function getWeatherMeta(code) {
        if (code === 0) return { desc: '晴朗', icon: 'fa-sun', color: '#fbbf24', bgType: 'sunny' };
        if (code === 1) return { desc: '大部晴朗', icon: 'fa-sun', color: '#fbbf24', bgType: 'sunny' };
        if (code === 2) return { desc: '局部多云', icon: 'fa-cloud-sun', color: '#7b9eb3', bgType: 'cloudy' };
        if (code === 3) return { desc: '多云', icon: 'fa-cloud', color: '#6c8a9e', bgType: 'cloudy' };
        if (code === 45 || code === 48) return { desc: '雾', icon: 'fa-smog', color: '#9aaeb9', bgType: 'foggy' };
        if (code >= 51 && code <= 55) return { desc: '毛毛雨', icon: 'fa-cloud-drizzle', color: '#5f9db2', bgType: 'rainy' };
        if (code >= 61 && code <= 65) return { desc: '雨', icon: 'fa-cloud-rain', color: '#3b7a9e', bgType: 'rainy' };
        if (code >= 66 && code <= 67) return { desc: '冻雨', icon: 'fa-cloud-meatball', color: '#5588a7', bgType: 'rainy' };
        if (code >= 71 && code <= 75) return { desc: '雪', icon: 'fa-snowflake', color: '#aac9e0', bgType: 'snowy' };
        if (code === 77) return { desc: '雪粒', icon: 'fa-cloud-snow', color: '#b0c7db', bgType: 'snowy' };
        if (code >= 80 && code <= 82) return { desc: '阵雨', icon: 'fa-cloud-showers-heavy', color: '#3f7e9e', bgType: 'rainy' };
        if (code >= 85 && code <= 86) return { desc: '阵雪', icon: 'fa-snowman', color: '#9bb7d4', bgType: 'snowy' };
        if (code === 95) return { desc: '雷暴', icon: 'fa-cloud-bolt', color: '#616b9e', bgType: 'thunder' };
        if (code === 96 || code === 99) return { desc: '雷暴冰雹', icon: 'fa-cloud-hail', color: '#5b6990', bgType: 'thunder' };
        return { desc: '未知', icon: 'fa-cloud-question', color: '#7f8fa0', bgType: 'default' };
      }
      function degreeToDirection(d){ if(d==null)return '—'; const dirs=['北','东北','东','东南','南','西南','西','西北']; return dirs[Math.round(d/45)%8]; }
      function calculateIndices(temp,humidity,windSpeed,weatherCode,uvIndex){ let cl=1; if(temp>=33)cl=1; else if(temp>=28)cl=2; else if(temp>=24)cl=3; else if(temp>=20)cl=4; else if(temp>=15)cl=5; else if(temp>=10)cl=6; else if(temp>=5)cl=7; else cl=8; const cm={1:{level:'炎热',desc:'短袖、短裙、薄T恤'},2:{level:'热',desc:'短袖、短裤、薄外套'},3:{level:'较热',desc:'单衣、薄长裤'},4:{level:'舒适',desc:'薄外套、长裤'},5:{level:'较凉',desc:'夹衣、风衣'},6:{level:'冷',desc:'毛衣、厚外套'},7:{level:'寒冷',desc:'棉服、薄羽绒'},8:{level:'严寒',desc:'厚羽绒服、保暖内衣'}}; const isRainy=(weatherCode>=51&&weatherCode<=67)||(weatherCode>=80&&weatherCode<=82)||weatherCode===95||weatherCode===96||weatherCode===99; const isSnowy=weatherCode>=71&&weatherCode<=77; const isFoggy=weatherCode===45||weatherCode===48; let ts=5; if(!isRainy&&!isSnowy&&!isFoggy&&windSpeed<20&&temp>=15&&temp<=30)ts=1; else if(!isRainy&&!isSnowy&&!isFoggy&&windSpeed<30&&temp>=10&&temp<=35)ts=2; else if(isRainy||windSpeed>=30)ts=4; else if(isSnowy||isFoggy)ts=3; else ts=3; const tm={1:'适宜',2:'较适宜',3:'一般',4:'较不宜',5:'不适宜'}; let coldL=1; if(temp<10&&windSpeed>15)coldL=4; else if(temp<15&&windSpeed>10)coldL=3; else if(temp<20&&windSpeed>8)coldL=2; else coldL=1; const coldM={1:'少发',2:'较易发',3:'易发',4:'极易发'}; let sl=1; if(isRainy||isSnowy||windSpeed>20||temp>35||temp<5)sl=3; else if(windSpeed>12||temp>30||temp<10)sl=2; else sl=1; const sm={1:'适宜',2:'较适宜',3:'不宜'}; let ul=1; if(uvIndex>=8)ul=5; else if(uvIndex>=6)ul=4; else if(uvIndex>=4)ul=3; else if(uvIndex>=2)ul=2; else ul=1; const um={1:'最弱',2:'弱',3:'中等',4:'强',5:'很强'}; let comfL=1; if(temp>=18&&temp<=26&&humidity>=40&&humidity<=70)comfL=1; else if(temp>=15&&temp<=30&&humidity>=30&&humidity<=80)comfL=2; else if(temp>=10&&temp<=35)comfL=3; else if(temp<5||temp>38)comfL=7; else comfL=4; const comfM={1:'舒适',2:'较舒适',3:'一般',4:'较不舒适',5:'不舒适',6:'很不舒适',7:'极不舒适'}; return { clothing:{...cm[cl],icon:'fa-shirt'}, travel:{level:tm[ts],desc:ts<=2?'适合出行':ts===3?'谨慎出行':'不建议出行',icon:'fa-person-walking'}, cold:{level:coldM[coldL],desc:coldL<=2?'注意保暖':'易感冒,注意防护',icon:'fa-virus'}, sport:{level:sm[sl],desc:sl===1?'适合运动':'减少户外运动',icon:'fa-person-running'}, uv:{level:um[ul],desc:ul>=3?'注意防晒':'无需防晒',icon:'fa-sun'}, comfort:{level:comfM[comfL],desc:comfL<=3?'体感舒适':'体感不适',icon:'fa-face-smile'} }; }
      function renderIndices(ind){ const items=[{...ind.clothing,name:'穿衣',icon:'fa-shirt'},{...ind.travel,name:'出行',icon:'fa-person-walking'},{...ind.cold,name:'感冒',icon:'fa-virus'},{...ind.sport,name:'运动',icon:'fa-person-running'},{...ind.uv,name:'紫外线',icon:'fa-sun'},{...ind.comfort,name:'舒适度',icon:'fa-face-smile'}]; indicesContainer.innerHTML=items.map(i=>`<div class="index-card"><div class="index-icon"><i class="fas ${i.icon}"></i></div><div class="index-name">${i.name}</div><div class="index-value">${i.level}</div><div class="index-desc">${i.desc}</div></div>`).join(''); }
      function renderForecast(daily){ const {time,temperature_2m_max,temperature_2m_min,weather_code}=daily; if(!time||time.length===0){forecastContainer.innerHTML='<div class="forecast-item">暂无预报数据</div>';return;} const n=Math.min(15,time.length); let h=''; for(let i=0;i<n;i++){ const d=new Date(time[i]); const m=d.getMonth()+1; const day=d.getDate(); const code=weather_code[i]; const meta=getWeatherMeta(code); h+=`<div class="forecast-item"><div class="forecast-date">${m}/${day}</div><div class="forecast-icon"><i class="fas ${meta.icon}" style="color:${meta.color}"></i></div><div class="forecast-temp">${(temperature_2m_max[i]?.toFixed(0)||'--')}°/${(temperature_2m_min[i]?.toFixed(0)||'--')}°</div><div class="forecast-desc">${meta.desc}</div></div>`; } forecastContainer.innerHTML=h; }
      function setUIState(s){ loadingState.classList.add('hidden'); weatherCard.classList.add('hidden'); errorState.classList.add('hidden'); if(s==='loading')loadingState.classList.remove('hidden'); else if(s==='card')weatherCard.classList.remove('hidden'); else if(s==='error')errorState.classList.remove('hidden'); }
      function showError(msg){ errorText.textContent=msg||'网络异常'; setUIState('error'); }
      function formatUpdateTime(){ const d=new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
      function renderWeather(cityName,current,daily){ displayCity.textContent=cityName||'--'; updateTimeSpan.textContent=`更新 ${formatUpdateTime()}`; const temp=current.temperature_2m,feels=current.apparent_temperature,hum=current.relative_humidity_2m,wind=current.wind_speed_10m,code=current.weather_code,pressure=current.pressure_msl,vis=current.visibility,precip=current.precipitation,cloud=current.cloud_cover,wdir=current.wind_direction_10m,uv=current.uv_index,dew=current.dew_point_2m,gust=current.wind_gusts_10m; currentWeatherCode=code; applyWeatherBackground(code); tempValue.textContent=(temp!=null)?temp.toFixed(1):'--'; feelslikeSpan.textContent=(feels!=null)?feels.toFixed(1):'--'; humiditySpan.textContent=(hum!=null)?hum:'--'; windSpan.textContent=(wind!=null)?wind.toFixed(1):'--'; pressureSpan.textContent=(pressure!=null)?Math.round(pressure):'--'; visibilitySpan.textContent=(vis!=null)?(vis/1000).toFixed(1):'--'; precipSpan.textContent=(precip!=null)?precip.toFixed(1):'--'; cloudSpan.textContent=(cloud!=null)?cloud:'--'; winddirSpan.textContent=degreeToDirection(wdir); uvSpan.textContent=(uv!=null)?uv.toFixed(1):'--'; dewpointSpan.textContent=(dew!=null)?dew.toFixed(1):'--'; codeSpan.textContent=(code!=null)?code:'--'; gustSpan.textContent=(gust!=null)?gust.toFixed(1):'--'; const meta=getWeatherMeta(code); descTextSpan.textContent=meta.desc; const iconEl=weatherIconContainer.querySelector('i'); if(iconEl){iconEl.className=`fas ${meta.icon}`; iconEl.style.color=meta.color;}else weatherIconContainer.innerHTML=`<i class="fas ${meta.icon}" style="color:${meta.color}"></i>`; renderIndices(calculateIndices(temp,hum,wind,code,uv)); renderForecast(daily); setUIState('card'); }
      async function fetchWeatherByCoords(lat,lon,displayName){ const label=displayName||`${lat.toFixed(2)},${lon.toFixed(2)}`; try{ const p=new URLSearchParams({latitude:lat,longitude:lon,current:'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,pressure_msl,visibility,precipitation,cloud_cover,uv_index,dew_point_2m',daily:'weather_code,temperature_2m_max,temperature_2m_min',timezone:'auto',forecast_days:'16'}); const resp=await fetch(`https://api.open-meteo.com/v1/forecast?${p}`,{signal:currentAbortController?.signal}); if(!resp.ok)throw new Error(`API ${resp.status}`); const data=await resp.json(); if(!data.current)throw new Error('无数据'); renderWeather(label,data.current,data.daily); }catch(err){if(err.name==='AbortError')return; showError(err.message);} }
      async function geocodeCity(city){ const url=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`; const resp=await fetch(url,{signal:currentAbortController?.signal}); if(!resp.ok)throw new Error('地理编码失败'); const data=await resp.json(); if(!data.results?.length)throw new Error('城市未找到'); const r=data.results[0]; let display=r.name; if(r.admin1)display+=`, ${r.admin1}`; else if(r.country)display+=`, ${r.country}`; return {lat:r.latitude,lon:r.longitude,displayName:display}; }
      async function handleSearch(city){ if(!city?.trim()){showError('请输入城市');return;} if(currentAbortController)currentAbortController.abort(); currentAbortController=new AbortController(); setUIState('loading'); try{ const {lat,lon,displayName}=await geocodeCity(city.trim()); await fetchWeatherByCoords(lat,lon,displayName); cityInput.value=displayName.split(',')[0]||city; }catch(e){if(e.name==='AbortError')return; showError(e.message);}finally{currentAbortController=null;} }
      function manualLocate(){ if(!navigator.geolocation){showError('不支持定位');return;} setUIState('loading'); if(currentAbortController)currentAbortController.abort(); currentAbortController=new AbortController(); navigator.geolocation.getCurrentPosition(async(pos)=>{ const lat=pos.coords.latitude,lon=pos.coords.longitude; let locName='我的位置'; try{ const rev=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=12`,{headers:{'User-Agent':'MiyuAnWeather'},signal:currentAbortController?.signal}); if(rev.ok){const d=await rev.json(); if(d?.address){const a=d.address; locName=a.city||a.town||a.village||a.suburb||a.county||a.state||'我的位置'; if(a.country&&locName!==a.country)locName+=`, ${a.country}`;}} }catch(e){} try{await fetchWeatherByCoords(lat,lon,locName); cityInput.value=locName.split(',')[0]||'';}catch(e){showError('定位天气失败');}finally{currentAbortController=null;} },(err)=>{currentAbortController=null;showError('定位失败');},{timeout:8000}); }
      function autoLocateOnLoad(){ if(!navigator.geolocation){handleSearch('北京');return;} navigator.geolocation.getCurrentPosition(async(pos)=>{ const lat=pos.coords.latitude,lon=pos.coords.longitude; let locName='我的位置'; try{ const rev=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=12`,{headers:{'User-Agent':'MiyuAnWeather'},signal:AbortSignal.timeout(4000)}); if(rev.ok){const d=await rev.json(); if(d?.address){const a=d.address; locName=a.city||a.town||a.village||a.suburb||a.county||a.state||'我的位置'; if(a.country&&locName!==a.country)locName+=`, ${a.country}`;}} }catch(e){} if(currentAbortController)currentAbortController.abort(); currentAbortController=new AbortController(); setUIState('loading'); try{await fetchWeatherByCoords(lat,lon,locName); cityInput.value=locName.split(',')[0]||'';}catch(err){handleSearch('北京');}finally{currentAbortController=null;} },(err)=>{handleSearch('北京');},{timeout:6000}); }

      // 城市选择弹窗功能
      function renderCityList(region,filter=''){ let cities=[]; if(region==='all')cities=getAllCities(); else cities=cityDatabase[region]||[]; const f=filter.trim().toLowerCase(); if(f)cities=cities.filter(c=>c.toLowerCase().includes(f)); if(cities.length===0){modalCityList.innerHTML='<div class="no-result">未找到匹配的城市</div>';return;} modalCityList.innerHTML=cities.map(c=>`<button class="modal-city-btn${cityInput.value===c?' selected':''}" data-city="${c}">${c}</button>`).join(''); modalCityList.querySelectorAll('.modal-city-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const city=btn.getAttribute('data-city'); cityInput.value=city; handleSearch(city); closeModal(); }); }); }
      function openModal(){ modalOverlay.classList.remove('hidden'); currentRegion='china'; modalTabs.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active')); const activeTab=modalTabs.querySelector(`[data-region="${currentRegion}"]`); if(activeTab)activeTab.classList.add('active'); modalSearchInput.value=''; renderCityList(currentRegion); setTimeout(()=>modalSearchInput.focus(),150); }
      function closeModal(){ modalOverlay.classList.add('hidden'); }
      modalSearchInput.addEventListener('input',()=>{ renderCityList(currentRegion,modalSearchInput.value); });
      modalTabs.addEventListener('click',(e)=>{ const tab=e.target.closest('.modal-tab'); if(!tab)return; currentRegion=tab.getAttribute('data-region'); modalTabs.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); modalSearchInput.value=''; renderCityList(currentRegion); });
      modalCloseBtn.addEventListener('click',closeModal);
      modalOverlay.addEventListener('click',(e)=>{ if(e.target===modalOverlay)closeModal(); });
      document.addEventListener('keydown',(e)=>{ if(e.key==='Escape')closeModal(); });
      btnMoreCities.addEventListener('click',openModal);
      document.querySelectorAll('.city-quick button[data-city]').forEach(btn=>{ btn.addEventListener('click',()=>{ const city=btn.getAttribute('data-city'); if(city){cityInput.value=city; handleSearch(city);} }); });

      searchBtn.addEventListener('click',()=>handleSearch(cityInput.value));
      cityInput.addEventListener('keypress',e=>{ if(e.key==='Enter')searchBtn.click(); });
      locateBtn.addEventListener('click',manualLocate);
      window.addEventListener('resize',()=>{ resizeCanvas(); startAnimation(); });
      window.addEventListener('DOMContentLoaded',()=>{ initTheme(); resizeCanvas(); autoLocateOnLoad(); });
      window.addEventListener('beforeunload',()=>stopAnimation());
    })();
  </script>
