<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>米遇安日历</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      color: #1e293b;
      background: #aaccdd;
      transition: background 0.2s;
    }
    body.dark { background: #1a2a3a; }

    .calendar-app, .calendar-app *, .picker-scroll-container, .scroll-column, button,
    .calendar-card, .weekday, .day-cell, .selected-info, .year-month-card, .modal-content {
      border-radius: 0 !important;
    }

    .calendar-app {
      max-width: 860px;
      width: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 8px 8px 0 rgba(0,20,40,0.1), 0 4px 12px rgba(0,0,0,0.05);
      padding: 1.8rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.7);
      position: relative;
      overflow: hidden;
      z-index: 2;
      transition: background 0.2s, border-color 0.2s;
    }
    body.dark .calendar-app {
      background: rgba(20,35,50,0.7);
      border-color: rgba(60,80,100,0.5);
      box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
    }

    #calendar-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: block; pointer-events: none; z-index: 0; opacity: 0.85;
    }
    .calendar-app > *:not(#calendar-canvas) { position: relative; z-index: 3; }

    h1 {
      font-weight: 600; font-size: 2rem; display: flex; align-items: center; gap: 8px;
      margin-bottom: 1.4rem; color: #0b2b44;
      text-shadow: 0 2px 3px rgba(255,255,255,0.6);
    }
    body.dark h1 { color: #e0edf5; text-shadow: 0 2px 3px rgba(0,0,0,0.3); }
    h1 i { color: #3b82f6; font-size: 1.8rem; background: rgba(255,255,255,0.5); padding: 8px; }
    body.dark h1 i { background: rgba(30,50,70,0.6); color: #7aa9ff; }

    .theme-toggle-btn {
      background: rgba(255,255,255,0.7); border: none; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
      color: #1e3a5f; box-shadow: 0 4px 8px rgba(0,20,40,0.08);
      cursor: pointer; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.6);
      margin-left: auto; transition: 0.15s;
    }
    .theme-toggle-btn:hover { background: #fff; transform: scale(1.02); }
    body.dark .theme-toggle-btn { background: rgba(40,60,80,0.8); color: #f0e68c; }

    /* 工具栏 — 滚动选择器容器 */
    .toolbar-row {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: flex-start;
    }
    .picker-scroll-container {
      flex: 2; min-width: 280px; display: flex; gap: 4px; align-items: stretch;
      background: rgba(255,255,255,0.25); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.6); padding: 6px;
    }
    body.dark .picker-scroll-container {
      background: rgba(15,30,45,0.4); border-color: #3a5a7a;
    }
    .scroll-column {
      flex: 1; height: 160px; overflow-y: auto;
      background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8);
      scrollbar-width: none; -ms-overflow-style: none;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth; /* 平滑滚动 */
    }
    .scroll-column::-webkit-scrollbar { display: none; }
    body.dark .scroll-column { background: rgba(30,50,70,0.7); border-color: #4a6a8a; }
    .scroll-item {
      height: 40px; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 500; color: #4a5e74; scroll-snap-align: center;
      transition: 0.05s; cursor: pointer; user-select: none;
    }
    body.dark .scroll-item { color: #a0bcd0; }
    .scroll-item.active {
      font-weight: 650; font-size: 1.2rem; color: #0b2b44;
      background: rgba(59,130,246,0.1); box-shadow: inset 0 0 0 1px #3b82f6;
    }
    body.dark .scroll-item.active { color: white; background: rgba(59,130,246,0.3); }
    .picker-go-btn {
      height: auto; padding: 0 16px; white-space: nowrap;
      background: rgba(59,130,246,0.1); border: 1px solid #3b82f6;
    }

    button {
      background: white; border: none; padding: 0 20px; font-weight: 600; font-size: 1rem;
      color: #1e3a5f; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      box-shadow: 0 4px 8px rgba(0,20,40,0.08), inset 0 0 0 1px rgba(255,255,255,0.7);
      cursor: pointer; backdrop-filter: blur(4px); background: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.6); white-space: nowrap; transition: 0.15s;
      height: 48px;
    }
    button:hover { background: #fff; box-shadow: 0 8px 16px rgba(59,130,246,0.15); transform: scale(1.02); }
    body.dark button { background: rgba(30,50,70,0.9); color: #e0edf5; border-color: #4a6a8a; }
    body.dark button:hover { background: #2a445e; }

    .view-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.3); padding: 4px; border: 1px solid rgba(255,255,255,0.5); }
    body.dark .view-toggle { background: rgba(20,35,50,0.5); border-color: #3a5a7a; }
    .view-btn { background: transparent; padding: 0 18px; box-shadow: none; height: 48px; }
    .view-btn.active { background: white; box-shadow: inset 0 0 0 2px #3b82f6; }
    body.dark .view-btn.active { background: #2a445e; color: white; }

    .nav-section {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px;
      background: rgba(255,255,255,0.25); padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.5);
    }
    body.dark .nav-section { background: rgba(15,30,45,0.4); border-color: #3a5a7a; }
    .month-year { font-size: 1.6rem; font-weight: 650; color: #0a2a44; }
    body.dark .month-year { color: #d4e4f0; }
    .nav-arrows { display: flex; gap: 10px; }
    .nav-btn { padding: 0; width: 44px; height: 44px; }
    #today-btn, #today-year-btn { width: auto; padding: 0 20px; }

    .calendar-card {
      background: rgba(255,255,255,0.4); backdrop-filter: blur(8px);
      padding: 1.8rem 1.6rem; border: 1px solid rgba(255,255,255,0.7);
      box-shadow: inset 0 1px 5px #fff, 0 12px 24px -8px rgba(0,20,40,0.15);
      margin-bottom: 8px;
    }
    body.dark .calendar-card { background: rgba(25,45,65,0.5); border-color: #3a5a7a; }
    .weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; margin-bottom: 14px; font-weight: 600; color: #1e405e; }
    body.dark .weekdays { color: #bdd1e5; }
    .weekday { padding: 10px 0; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); }
    body.dark .weekday { background: rgba(0,0,0,0.15); border-color: #3a5a7a; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
    .day-cell {
      min-height: 85px; display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; font-size: 1.15rem; font-weight: 500;
      background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.7);
      color: #0f2f4a; cursor: pointer; padding: 8px 2px 4px; transition: 0.1s;
    }
    body.dark .day-cell { background: rgba(40,65,90,0.6); border-color: #4a6a8a; color: #d4e4f0; }
    .day-cell:hover { background: rgba(255,255,255,0.9); transform: translateY(-1px); }
    body.dark .day-cell:hover { background: rgba(70,100,130,0.8); }
    .day-cell.other-month { color: #6c85a0; opacity: 0.7; }
    .day-cell.today { background: #2c5f8a; border: 2px solid #f9e56a; color: white; }
    .day-cell.selected { background: #3b82f6; color: white; border: 2px solid #fff; }
    .festival-name { font-size: 0.7rem; font-weight: 600; margin-top: 4px; color: #c44536; }
    body.dark .festival-name { color: #f7b2a4; }
    .event-dot { width: 7px; height: 7px; background: #e67e22; margin-top: 4px; border-radius: 50% !important; }

    .year-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; }
    .year-month-card { background: rgba(255,255,255,0.4); padding: 20px; text-align: center; font-weight: 650; cursor: pointer; }

    .selected-info {
      margin-top: 20px; padding: 16px 18px; background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.6);
      display: flex; flex-wrap: wrap; gap: 16px;
    }
    #selected-date-text { font-size: 1.2rem; font-weight: 650; }
    .event-list-container { flex: 1; min-width: 200px; max-height: 120px; overflow-y: auto; }

    .footer-note { margin-top: 22px; display: flex; justify-content: space-between; font-size: 0.75rem; border-top: 1px solid rgba(255,255,255,0.5); padding-top: 12px; }

    .modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); }
    .modal-content { background: rgba(255,255,255,0.9); padding: 28px 24px; max-width: 440px; width: 90%; border: 1px solid white; }
    body.dark .modal-content { background: rgba(30,50,70,0.95); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="calendar-app" id="calendarAppContainer">
  <canvas id="calendar-canvas"></canvas>

  <h1>
    <i class="fas fa-calendar-alt"></i> 米遇安日历
    <span style="flex:1"></span>
    <button class="theme-toggle-btn" id="theme-toggle" title="切换主题"><i class="fas fa-moon"></i></button>
  </h1>

  <div class="toolbar-row">
    <!-- 滚动选择器 (电脑端滚轮逐项移动) -->
    <div class="picker-scroll-container">
      <div class="scroll-column" id="year-column"></div>
      <div class="scroll-column" id="month-column"></div>
      <div class="scroll-column" id="day-column"></div>
      <button class="picker-go-btn" id="picker-go-btn"><i class="fas fa-arrow-right"></i> 跳转</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="month"><i class="far fa-calendar-alt"></i> 月</button>
      <button class="view-btn" data-view="year"><i class="far fa-calendar"></i> 年</button>
    </div>
    <button id="add-event-btn"><i class="fas fa-plus"></i> 新建日程</button>
  </div>

  <div class="nav-section" id="month-nav">
    <div class="month-year"><span id="current-month-year">2026年4月</span></div>
    <div class="nav-arrows">
      <button class="nav-btn" id="prev-month"><i class="fas fa-chevron-left"></i></button>
      <button class="nav-btn" id="next-month"><i class="fas fa-chevron-right"></i></button>
      <button class="nav-btn" id="today-btn"><i class="fas fa-calendar-check"></i> 今天</button>
    </div>
  </div>
  <div class="nav-section hidden" id="year-nav">
    <div class="month-year"><span id="current-year-display">2026年</span></div>
    <div class="nav-arrows">
      <button class="nav-btn" id="prev-year"><i class="fas fa-chevron-left"></i></button>
      <button class="nav-btn" id="next-year"><i class="fas fa-chevron-right"></i></button>
      <button class="nav-btn" id="today-year-btn">今年</button>
    </div>
  </div>

  <div class="calendar-card">
    <div id="month-view-content"></div>
    <div id="year-view-content" class="hidden"></div>
  </div>

  <div class="selected-info">
    <div class="selected-label"><i class="fas fa-map-pin"></i><span>选中</span></div>
    <span id="selected-date-text"></span>
    <div class="event-list-container"><div id="event-list">✨ 点击日期查看日程</div></div>
  </div>
  <div class="footer-note">
    <span><i class="far fa-calendar-check"></i> 农历节日 · 日程管理</span>
    <span>©2026 米遇安</span>
  </div>
</div>

<div class="modal hidden" id="event-modal">
  <div class="modal-content">
    <div class="modal-header"><h3>新建日程</h3><button id="close-event-modal">&times;</button></div>
    <div class="form-group"><label>日期</label><input type="date" id="event-date" /></div>
    <div class="form-group"><label>标题</label><input type="text" id="event-title" /></div>
    <div class="form-group"><label>时间</label><input type="time" id="event-time" /></div>
    <div class="modal-actions">
      <button id="save-event-btn">保存</button>
      <button id="cancel-event-btn">取消</button>
    </div>
  </div>
</div>

<script>
  (function(){
    const body = document.body;
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = themeToggle.querySelector('i');
    if (localStorage.getItem('theme') === 'dark') { body.classList.add('dark'); themeIcon.className = 'fas fa-sun'; }
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      const isDark = body.classList.contains('dark');
      themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    const Lunar = (function(){
      const lunarInfo = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0];
      function getLunarYearInfo(y){ return lunarInfo[y-1900]; }
      function getLeapMonth(y){ return getLunarYearInfo(y)&0xf; }
      function getMonthDays(y,m){ return (getLunarYearInfo(y)&(0x10000>>m))?30:29; }
      function getYearDays(y){ let sum=348; for(let i=0x8000;i>0x8;i>>=1) sum+=(getLunarYearInfo(y)&i)?1:0; return sum+getLeapMonthDays(y); }
      function getLeapMonthDays(y){ if(getLeapMonth(y)) return (getLunarYearInfo(y)&0x10000)?30:29; return 0; }
      const base = new Date(1900,0,31);
      function solarToLunar(date){
        let offset = Math.floor((date-base)/86400000), year = 1900, days;
        while(year<2101 && offset>0){ days=getYearDays(year); offset-=days; year++; }
        if(offset<0){ offset+=days; year--; }
        let month=1, leap=false, leapMonth=getLeapMonth(year);
        while(month<=12 && offset>0){
          let dim = getMonthDays(year,month);
          if(leapMonth===month && !leap){ leap=true; month--; }
          if(offset>=dim){ offset-=dim; if(leap && month===leapMonth) leap=false; month++; }
          else break;
        }
        return { year, month, day: offset+1, leap };
      }
      return { solarToLunar };
    })();

    function getFestival(date){
      const y=date.getFullYear(), m=date.getMonth()+1, d=date.getDate();
      const md = `${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const solarFixed = {'01-01':'元旦','02-14':'情人节','03-08':'妇女节','03-12':'植树节','04-01':'愚人节','05-01':'劳动节','05-04':'青年节','06-01':'儿童节','07-01':'建党节','08-01':'建军节','09-10':'教师节','10-01':'国庆节','10-31':'万圣夜','12-24':'平安夜','12-25':'圣诞节'};
      if(solarFixed[md]) return solarFixed[md];
      if(m===5){ const d2 = getNthWeekday(y,5,0,2); if(d===d2) return '母亲节'; }
      if(m===6){ const d3 = getNthWeekday(y,6,0,3); if(d===d3) return '父亲节'; }
      if(m===11){ const d4 = getNthWeekday(y,11,4,4); if(d===d4) return '感恩节'; }
      if(m===4&&(d===4||d===5||d===6)){ if(d===getQingming(y)) return '清明节'; }
      const lunar = Lunar.solarToLunar(date);
      if(!lunar.leap){
        const lm=lunar.month, ld=lunar.day;
        if(lm===1&&ld===1) return '春节'; if(lm===1&&ld===15) return '元宵节';
        if(lm===5&&ld===5) return '端午节'; if(lm===7&&ld===7) return '七夕';
        if(lm===8&&ld===15) return '中秋节'; if(lm===9&&ld===9) return '重阳节';
        if(lm===12&&ld===8) return '腊八'; if(lm===12&&ld===23) return '小年(北)';
        if(lm===12&&ld===24) return '小年(南)'; if(lm===12&&ld===30) return '除夕';
      }
      return '';
    }
    function getNthWeekday(y,m,wd,n){ let dt=new Date(y,m-1,1),cnt=0; while(dt.getMonth()===m-1){ if(dt.getDay()===wd){ cnt++; if(cnt===n) return dt.getDate(); } dt.setDate(dt.getDate()+1); } return 0; }
    function getQingming(y){ return (y%4===0&&y%100!==0||y%400===0)?4:5; }

    let events = JSON.parse(localStorage.getItem('calendar_events')) || {};
    function save(){ localStorage.setItem('calendar_events', JSON.stringify(events)); }
    function getEvents(d){ return events[d.toISOString().split('T')[0]] || []; }
    function addEvent(d, t, tm){ const k=d.toISOString().split('T')[0]; if(!events[k]) events[k]=[]; events[k].push({id:Date.now(), title:t, time:tm}); save(); }
    function delEvent(d, id){ const k=d.toISOString().split('T')[0]; if(events[k]) events[k]=events[k].filter(e=>e.id!==id); save(); }

    const container = document.getElementById('calendarAppContainer');
    const canvas = document.getElementById('calendar-canvas'), ctx = canvas.getContext('2d');
    const monthYearSpan = document.getElementById('current-month-year');
    const yearDisplaySpan = document.getElementById('current-year-display');
    const monthNav = document.getElementById('month-nav'), yearNav = document.getElementById('year-nav');
    const monthViewDiv = document.getElementById('month-view-content'), yearViewDiv = document.getElementById('year-view-content');
    const selectedDateText = document.getElementById('selected-date-text'), eventListDiv = document.getElementById('event-list');
    const modal = document.getElementById('event-modal');
    const eventDateInput = document.getElementById('event-date'), eventTitleInput = document.getElementById('event-title'), eventTimeInput = document.getElementById('event-time');

    let currentView = 'month';
    let displayYear = new Date().getFullYear(), displayMonth = new Date().getMonth();
    let selectedDate = new Date();
    let today = new Date();

    // 粒子动画
    let particles = [], canvasWidth, canvasHeight, animFrame, isPageVisible = true;
    function initParticles(){ const c = Math.floor(canvasWidth*canvasHeight/4000)||35; particles=[]; for(let i=0;i<c;i++) particles.push({type:i%3?'sparkle':'cloud',x:Math.random()*canvasWidth,y:Math.random()*canvasHeight,size:3+Math.random()*12,alpha:0.1+Math.random()*0.2,radius:30+Math.random()*60,speedX:0.1,speedY:0.05}); }
    function drawBg(){
      if(!ctx) return; ctx.clearRect(0,0,canvasWidth,canvasHeight);
      const dark = body.classList.contains('dark');
      ctx.fillStyle = dark ? 'rgba(20,35,50,0.15)' : 'rgba(210,230,250,0.1)';
      ctx.fillRect(0,0,canvasWidth,canvasHeight);
      particles.forEach(p=>{
        if(p.type==='cloud'){
          const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.radius);
          if(dark){ g.addColorStop(0,`rgba(100,140,180,${p.alpha*0.6})`); g.addColorStop(1,'rgba(40,60,80,0)'); }
          else { g.addColorStop(0,`rgba(230,242,255,${p.alpha})`); g.addColorStop(1,'rgba(180,210,240,0)'); }
          ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fill();
          p.x+=0.1; if(p.x>canvasWidth+100) p.x=-100;
        } else {
          ctx.fillStyle = dark ? `rgba(180,200,220,${p.alpha*0.8})` : `rgba(255,255,240,${p.alpha})`;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.6,0,Math.PI*2); ctx.fill();
          p.x+=p.speedX; p.y+=p.speedY;
          if(p.x>canvasWidth+20) p.x=-20; if(p.y>canvasHeight+20) p.y=-20;
        }
      });
    }
    function animLoop(){ if(!isPageVisible) return; drawBg(); animFrame=requestAnimationFrame(animLoop); }
    function startAnim(){ if(animFrame) cancelAnimationFrame(animFrame); animFrame=requestAnimationFrame(animLoop); }
    function resizeCanvas(){ const r=container.getBoundingClientRect(); canvasWidth=r.width; canvasHeight=r.height; canvas.width=canvasWidth; canvas.height=canvasHeight; initParticles(); }

    // 滚动选择器核心
    const yearCol = document.getElementById('year-column');
    const monthCol = document.getElementById('month-column');
    const dayCol = document.getElementById('day-column');
    const pickerGoBtn = document.getElementById('picker-go-btn');
    let wheelYear = selectedDate.getFullYear(), wheelMonth = selectedDate.getMonth()+1, wheelDay = selectedDate.getDate();
    let scrolling = false;
    let wheelLock = false; // 防止电脑端滚轮连续触发

    function populateYearColumn() {
      yearCol.innerHTML = '';
      for (let y=1900; y<=2100; y++) {
        const div = document.createElement('div');
        div.className = 'scroll-item'; div.textContent = y; div.dataset.value = y;
        yearCol.appendChild(div);
      }
    }
    function populateMonthColumn() {
      monthCol.innerHTML = '';
      for (let m=1; m<=12; m++) {
        const div = document.createElement('div');
        div.className = 'scroll-item'; div.textContent = m+'月'; div.dataset.value = m;
        monthCol.appendChild(div);
      }
    }
    function populateDayColumn(year, month, keepDay) {
      const daysInMonth = new Date(year, month, 0).getDate();
      dayCol.innerHTML = '';
      for (let d=1; d<=daysInMonth; d++) {
        const div = document.createElement('div');
        div.className = 'scroll-item'; div.textContent = d; div.dataset.value = d;
        dayCol.appendChild(div);
      }
      if (keepDay > daysInMonth) keepDay = daysInMonth;
      wheelDay = keepDay;
    }

    function scrollToItem(col, value) {
      const items = col.querySelectorAll('.scroll-item');
      for (let item of items) {
        if (parseInt(item.dataset.value) === value) {
          col.scrollTop = item.offsetTop - col.clientHeight/2 + item.clientHeight/2;
          break;
        }
      }
    }

    function updateActiveItem(col, value) {
      const items = col.querySelectorAll('.scroll-item');
      items.forEach(it => it.classList.remove('active'));
      for (let it of items) {
        if (parseInt(it.dataset.value) === value) { it.classList.add('active'); break; }
      }
    }

    function syncAllColumns() {
      updateActiveItem(yearCol, wheelYear);
      updateActiveItem(monthCol, wheelMonth);
      updateActiveItem(dayCol, wheelDay);
    }

    function onScrollStop() {
      const cols = [yearCol, monthCol, dayCol];
      const values = [wheelYear, wheelMonth, wheelDay];
      cols.forEach((col, idx) => {
        const items = col.querySelectorAll('.scroll-item');
        if (items.length === 0) return;
        let closest = items[0];
        let minDist = Infinity;
        const colCenter = col.scrollTop + col.clientHeight/2;
        items.forEach(item => {
          const itemCenter = item.offsetTop + item.clientHeight/2;
          const dist = Math.abs(colCenter - itemCenter);
          if (dist < minDist) { minDist = dist; closest = item; }
        });
        values[idx] = parseInt(closest.dataset.value);
      });
      if (values[0] !== wheelYear || values[1] !== wheelMonth) {
        wheelYear = values[0]; wheelMonth = values[1];
        populateDayColumn(wheelYear, wheelMonth, wheelDay);
        updateActiveItem(yearCol, wheelYear);
        updateActiveItem(monthCol, wheelMonth);
        scrollToItem(dayCol, wheelDay);
      }
      wheelDay = values[2];
      syncAllColumns();
    }

    let scrollTimer;
    function handleScroll(e) {
      if (scrolling) return;
      scrolling = true;
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        scrolling = false;
        onScrollStop();
      }, 150);
    }

    yearCol.addEventListener('scroll', handleScroll);
    monthCol.addEventListener('scroll', handleScroll);
    dayCol.addEventListener('scroll', handleScroll);

    // ---- 电脑端鼠标滚轮逐项移动 ----
    function addWheelControl(col, type) {
      col.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (wheelLock) return;
        wheelLock = true;
        setTimeout(() => { wheelLock = false; }, 300);

        const direction = e.deltaY > 0 ? 1 : -1;
        if (type === 'year') {
          let newYear = wheelYear + direction;
          if (newYear < 1900) newYear = 1900;
          if (newYear > 2100) newYear = 2100;
          if (newYear !== wheelYear) {
            wheelYear = newYear;
            populateDayColumn(wheelYear, wheelMonth, wheelDay);
            scrollToItem(yearCol, wheelYear);
            updateActiveItem(yearCol, wheelYear);
            updateActiveItem(monthCol, wheelMonth);
            updateActiveItem(dayCol, wheelDay);
            scrollToItem(dayCol, wheelDay);
          }
        } else if (type === 'month') {
          let newMonth = wheelMonth + direction;
          if (newMonth < 1) { newMonth = 12; wheelYear--; if (wheelYear < 1900) { wheelYear = 1900; newMonth = 1; } }
          else if (newMonth > 12) { newMonth = 1; wheelYear++; if (wheelYear > 2100) { wheelYear = 2100; newMonth = 12; } }
          wheelMonth = newMonth;
          populateDayColumn(wheelYear, wheelMonth, wheelDay);
          scrollToItem(yearCol, wheelYear);
          scrollToItem(monthCol, wheelMonth);
          updateActiveItem(yearCol, wheelYear);
          updateActiveItem(monthCol, wheelMonth);
          updateActiveItem(dayCol, wheelDay);
          scrollToItem(dayCol, wheelDay);
        } else if (type === 'day') {
          let newDay = wheelDay + direction;
          const daysInMonth = new Date(wheelYear, wheelMonth, 0).getDate();
          if (newDay < 1) newDay = 1;
          if (newDay > daysInMonth) newDay = daysInMonth;
          if (newDay !== wheelDay) {
            wheelDay = newDay;
            scrollToItem(dayCol, wheelDay);
            updateActiveItem(dayCol, wheelDay);
          }
        }
        syncAllColumns();
      }, { passive: false });
    }

    function initPicker() {
      populateYearColumn();
      populateMonthColumn();
      populateDayColumn(selectedDate.getFullYear(), selectedDate.getMonth()+1, selectedDate.getDate());
      wheelYear = selectedDate.getFullYear();
      wheelMonth = selectedDate.getMonth()+1;
      wheelDay = selectedDate.getDate();
      syncAllColumns();
      scrollToItem(yearCol, wheelYear);
      scrollToItem(monthCol, wheelMonth);
      scrollToItem(dayCol, wheelDay);

      // 绑定滚轮逐项控制
      addWheelControl(yearCol, 'year');
      addWheelControl(monthCol, 'month');
      addWheelControl(dayCol, 'day');
    }

    pickerGoBtn.addEventListener('click', () => {
      selectedDate = new Date(wheelYear, wheelMonth-1, wheelDay);
      displayYear = wheelYear; displayMonth = wheelMonth-1;
      if (currentView !== 'month') switchView('month');
      else renderMonthView();
      updateSelectedInfo(selectedDate);
    });

    function renderEventList(date){
      const evs = getEvents(date);
      if (evs.length===0) { eventListDiv.innerHTML='<span style="opacity:0.7;">✨ 无日程</span>'; return; }
      eventListDiv.innerHTML = evs.map(e=>`<div class="event-item"><span>${e.time||'全天'} ${e.title}</span><button data-id="${e.id}" class="delete-event"><i class="fas fa-trash"></i></button></div>`).join('');
      document.querySelectorAll('.delete-event').forEach(btn=>{
        btn.addEventListener('click', (e)=>{ e.stopPropagation(); delEvent(selectedDate, Number(btn.dataset.id)); renderEventList(selectedDate); renderCalendarView(); });
      });
    }

    function updateSelectedInfo(date){
      selectedDate = date;
      selectedDateText.textContent = `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
      if (wheelYear !== date.getFullYear() || wheelMonth !== date.getMonth()+1) {
        wheelYear = date.getFullYear(); wheelMonth = date.getMonth()+1;
        populateDayColumn(wheelYear, wheelMonth, date.getDate());
        scrollToItem(yearCol, wheelYear);
        scrollToItem(monthCol, wheelMonth);
      }
      wheelDay = date.getDate();
      syncAllColumns();
      scrollToItem(dayCol, wheelDay);
      renderEventList(date);
    }

    function renderMonthView(){
      const y=displayYear, m=displayMonth;
      monthYearSpan.textContent = `${y}年${m+1}月`;
      const firstDay = new Date(y,m,1), lastDay = new Date(y,m+1,0);
      let startOffset = firstDay.getDay()===0 ? 6 : firstDay.getDay()-1;
      const prevLast = new Date(y,m,0).getDate();
      let html = '<div class="weekdays">'+['一','二','三','四','五','六','日'].map(d=>`<div class="weekday">${d}</div>`).join('')+'</div><div class="calendar-grid">';
      for(let i=startOffset-1;i>=0;i--) html+=genDayCell(prevLast-i,'other-month',new Date(y,m-1,prevLast-i));
      for(let d=1;d<=lastDay.getDate();d++) html+=genDayCell(d,'',new Date(y,m,d));
      const total=42; const rendered=startOffset+lastDay.getDate();
      for(let d=1; rendered+d-1<total; d++) html+=genDayCell(d,'other-month',new Date(y,m+1,d));
      html+='</div>'; monthViewDiv.innerHTML=html; bindDayCellClick();
    }

    function genDayCell(day, cls, dateObj){
      const isToday = dateObj.toDateString()===today.toDateString();
      const isSelected = dateObj.toDateString()===selectedDate.toDateString();
      const classes = ['day-cell',cls,isToday?'today':'',isSelected?'selected':''].filter(c=>c).join(' ');
      const fest = getFestival(dateObj);
      const hasEvents = getEvents(dateObj).length>0;
      return `<div class="${classes}" data-date="${dateObj.toISOString().split('T')[0]}">${day}${fest?`<span class="festival-name">${fest}</span>`:''}${hasEvents?'<span class="event-dot"></span>':''}</div>`;
    }

    function bindDayCellClick(){
      document.querySelectorAll('.day-cell').forEach(cell=>{
        cell.addEventListener('click', ()=>{
          const ds = cell.dataset.date; if(!ds) return;
          const cd = new Date(ds);
          updateSelectedInfo(cd);
          document.querySelectorAll('.day-cell').forEach(c=>c.classList.remove('selected'));
          cell.classList.add('selected');
          if(cd.getMonth()!==displayMonth || cd.getFullYear()!==displayYear){
            displayYear = cd.getFullYear(); displayMonth = cd.getMonth();
            renderMonthView();
          }
        });
      });
    }

    function renderYearView(){
      const y=displayYear; yearDisplaySpan.textContent=`${y}年`;
      let html='<div class="year-grid">';
      for(let m=0;m<12;m++) html+=`<div class="year-month-card" data-year="${y}" data-month="${m}">${m+1}月</div>`;
      html+='</div>'; yearViewDiv.innerHTML=html;
      document.querySelectorAll('.year-month-card').forEach(card=>{
        card.addEventListener('click', ()=>{ displayYear=parseInt(card.dataset.year); displayMonth=parseInt(card.dataset.month); switchView('month'); });
      });
    }

    function renderCalendarView(){
      if(currentView==='month'){
        monthViewDiv.classList.remove('hidden'); yearViewDiv.classList.add('hidden');
        monthNav.classList.remove('hidden'); yearNav.classList.add('hidden');
        renderMonthView();
      } else {
        monthViewDiv.classList.add('hidden'); yearViewDiv.classList.remove('hidden');
        monthNav.classList.add('hidden'); yearNav.classList.remove('hidden');
        renderYearView();
      }
    }

    function switchView(view){
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector(`[data-view="${view}"]`).classList.add('active');
      renderCalendarView();
    }

    function init(){
      today = new Date(); selectedDate = new Date(today);
      displayYear = today.getFullYear(); displayMonth = today.getMonth();
      initPicker();
      renderCalendarView();
      updateSelectedInfo(selectedDate);

      document.getElementById('prev-month').onclick = ()=>{ displayMonth--; if(displayMonth<0){ displayMonth=11; displayYear--; } renderMonthView(); };
      document.getElementById('next-month').onclick = ()=>{ displayMonth++; if(displayMonth>11){ displayMonth=0; displayYear++; } renderMonthView(); };
      document.getElementById('today-btn').onclick = ()=>{ displayYear=today.getFullYear(); displayMonth=today.getMonth(); selectedDate=new Date(today); renderMonthView(); updateSelectedInfo(selectedDate); };
      document.getElementById('prev-year').onclick = ()=>{ displayYear--; renderYearView(); };
      document.getElementById('next-year').onclick = ()=>{ displayYear++; renderYearView(); };
      document.getElementById('today-year-btn').onclick = ()=>{ displayYear=today.getFullYear(); renderYearView(); };
      document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click', ()=>switchView(b.dataset.view)));
      document.getElementById('add-event-btn').onclick = ()=>{ eventDateInput.value = selectedDate.toISOString().split('T')[0]; modal.classList.remove('hidden'); };
      document.getElementById('close-event-modal').onclick = ()=> modal.classList.add('hidden');
      document.getElementById('cancel-event-btn').onclick = ()=> modal.classList.add('hidden');
      document.getElementById('save-event-btn').onclick = ()=>{
        const d = new Date(eventDateInput.value); const t = eventTitleInput.value.trim(); const tm = eventTimeInput.value;
        if(!t) return alert('请输入标题');
        addEvent(d, t, tm); modal.classList.add('hidden'); eventTitleInput.value=''; eventTimeInput.value='';
        renderCalendarView(); if(d.toDateString()===selectedDate.toDateString()) renderEventList(selectedDate);
      };
      window.addEventListener('resize', ()=>{ resizeCanvas(); startAnim(); });
      resizeCanvas(); startAnim();
      new ResizeObserver(()=>{ resizeCanvas(); }).observe(container);
      document.addEventListener('visibilitychange', ()=>{ isPageVisible=!document.hidden; if(isPageVisible) startAnim(); });
    }
    init();
  })();
</script>
</body>
</html>
