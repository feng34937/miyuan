<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《HTML由入门到精通》阅读器</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* === 全局重置 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f3f0;
            color: #333;
            overflow: hidden;
            height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* === 夜间模式变量 === */
        body.night-mode {
            background: #1a1a1a;
            color: #ccc;
        }

        body.night-mode .reader-header {
            background: rgba(30, 30, 30, 0.65);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        body.night-mode .reader-header h1 {
            color: #e0e0e0;
        }

        body.night-mode .reader-footer {
            background: rgba(30, 30, 30, 0.65);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        body.night-mode .reader-footer button {
            color: #ccc;
        }

        body.night-mode .reader-footer button:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        body.night-mode .progress-bar {
            background: rgba(255, 255, 255, 0.15);
        }

        body.night-mode .progress-fill {
            background: #6a8caf;
        }

        body.night-mode .content-area {
            background: #1a1a1a;
        }

        body.night-mode .chapter-title {
            color: #e8e8e8;
        }

        body.night-mode .chapter-content {
            color: #c8c8c8;
        }

        body.night-mode .chapter-content h1,
        body.night-mode .chapter-content h2,
        body.night-mode .chapter-content h3 {
            color: #e0e0e0;
        }

        body.night-mode .chapter-content code {
            background: #2d2d2d;
            color: #e6c07b;
        }

        body.night-mode .chapter-content pre {
            background: #2d2d2d;
            border-left-color: #6a8caf;
        }

        body.night-mode .chapter-content table {
            border-color: #444;
        }

        body.night-mode .chapter-content th,
        body.night-mode .chapter-content td {
            border-color: #444;
        }

        body.night-mode .chapter-content blockquote {
            border-left-color: #6a8caf;
            background: #2a2a2a;
        }

        body.night-mode .chapter-content .tip-box {
            background: #2a3a3a;
            border-left-color: #6a8caf;
        }

        body.night-mode .chapter-content .tip-box strong {
            color: #8ab4d6;
        }

        body.night-mode .drawer-overlay {
            background: rgba(0, 0, 0, 0.6);
        }

        /* === iOS 26 玻璃背景目录 === */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 0 !important;
        }

        .drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: -340px;
            width: 320px;
            height: 100%;
            z-index: 1001;
            transition: left 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto;
            padding: 24px 0 40px 0;
            background: rgba(255, 255, 255, 0.58);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-right: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border-radius: 0 !important;
        }

        body.night-mode .drawer {
            background: rgba(30, 30, 30, 0.70);
            backdrop-filter: blur(40px) saturate(160%);
            -webkit-backdrop-filter: blur(40px) saturate(160%);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .drawer.open {
            left: 0;
        }

        .drawer::-webkit-scrollbar {
            width: 3px;
        }
        .drawer::-webkit-scrollbar-track {
            background: transparent;
        }
        .drawer::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }
        body.night-mode .drawer::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
        }

        .drawer-title {
            font-size: 20px;
            font-weight: 600;
            padding: 0 20px 18px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1a1a1a;
            letter-spacing: 0.5px;
        }

        body.night-mode .drawer-title {
            color: #e0e0e0;
            border-bottom-color: rgba(255, 255, 255, 0.06);
        }

        .drawer-title i {
            margin-right: 10px;
            color: #3b7cb8;
            font-size: 22px;
        }

        body.night-mode .drawer-title i {
            color: #6a8caf;
        }

        .drawer-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: rgba(0, 0, 0, 0.4);
            padding: 0 8px;
            transition: color 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drawer-close:hover {
            background: rgba(0, 0, 0, 0.06);
            color: rgba(0, 0, 0, 0.7);
        }

        body.night-mode .drawer-close {
            color: rgba(255, 255, 255, 0.4);
        }
        body.night-mode .drawer-close:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
        }

        .toc-list {
            list-style: none;
            padding: 8px 12px 20px 12px;
            margin: 0;
        }

        .toc-item {
            padding: 10px 16px 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            color: rgba(0, 0, 0, 0.75);
            margin-bottom: 2px;
            position: relative;
        }

        body.night-mode .toc-item {
            color: rgba(255, 255, 255, 0.7);
        }

        .toc-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        body.night-mode .toc-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .toc-item .chapter-num {
            display: inline-block;
            width: 30px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.3);
            margin-right: 10px;
            flex-shrink: 0;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        body.night-mode .toc-item .chapter-num {
            color: rgba(255, 255, 255, 0.25);
        }

        .toc-item .chapter-title-text {
            flex: 1;
            line-height: 1.4;
        }

        .toc-item .status-tag {
            margin-left: 10px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.3);
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 400;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        body.night-mode .toc-item .status-tag {
            color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.06);
        }

        .toc-item.active {
            background: rgba(59, 124, 184, 0.15);
            color: #1a1a1a;
            font-weight: 500;
        }

        body.night-mode .toc-item.active {
            background: rgba(106, 140, 175, 0.20);
            color: #e8e8e8;
        }

        .toc-item.active .chapter-num {
            color: #3b7cb8;
        }

        body.night-mode .toc-item.active .chapter-num {
            color: #8ab4d6;
        }

        .toc-item .toc-icon {
            margin-right: 12px;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.2);
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        body.night-mode .toc-item .toc-icon {
            color: rgba(255, 255, 255, 0.15);
        }

        .toc-item.active .toc-icon {
            color: #3b7cb8;
        }

        body.night-mode .toc-item.active .toc-icon {
            color: #8ab4d6;
        }

        /* === 阅读器布局 - 强制圆角0 === */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 820px;
            margin: 0 auto;
            position: relative;
            background: #f5f3f0;
            transition: background 0.3s;
            border-radius: 0 !important;
        }

        body.night-mode .app-container {
            background: #1a1a1a;
        }

        /* === 顶部导航 - 玻璃效果增强，圆角0 === */
        .reader-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
            height: 60px;
            border-radius: 0 !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        body.night-mode .reader-header {
            background: rgba(30, 30, 30, 0.55);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .reader-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            color: rgba(0, 0, 0, 0.5);
            transition: color 0.2s, background 0.2s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(0, 0, 0, 0.8);
        }

        body.night-mode .menu-btn {
            color: rgba(255, 255, 255, 0.4);
        }
        body.night-mode .menu-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
        }

        .reader-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            transition: color 0.3s;
            letter-spacing: 0.5px;
        }

        body.night-mode .reader-header h1 {
            color: #e0e0e0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-right button {
            background: none;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 18px;
            cursor: pointer;
            color: rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-right button:hover {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(0, 0, 0, 0.8);
        }

        body.night-mode .header-right button {
            color: rgba(255, 255, 255, 0.4);
        }
        body.night-mode .header-right button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
        }

        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 20px;
            padding: 2px 4px;
        }

        body.night-mode .font-size-controls {
            background: rgba(255, 255, 255, 0.04);
        }

        .font-size-controls button {
            width: 32px;
            height: 32px;
            font-size: 14px;
            border-radius: 50%;
            color: rgba(0, 0, 0, 0.5);
        }

        body.night-mode .font-size-controls button {
            color: rgba(255, 255, 255, 0.4);
        }

        .font-size-controls .size-display {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.4);
            min-width: 32px;
            text-align: center;
            font-weight: 500;
        }

        body.night-mode .font-size-controls .size-display {
            color: rgba(255, 255, 255, 0.3);
        }

        /* === 内容区域 === */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 30px 40px 30px;
            background: #fcfaf8;
            transition: background 0.3s, padding 0.3s;
            scroll-behavior: smooth;
            line-height: 1.8;
            border-radius: 0 !important;
        }

        body.night-mode .content-area {
            background: #1e1e1e;
        }

        .chapter-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .chapter-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a1a1a;
            transition: color 0.3s;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8e6e3;
        }

        body.night-mode .chapter-title {
            border-bottom-color: #3a3a3a;
        }

        .chapter-content {
            font-size: 16px;
            color: #333;
            transition: color 0.3s, font-size 0.2s;
        }

        .chapter-content p {
            margin-bottom: 1.2em;
        }

        .chapter-content h1,
        .chapter-content h2,
        .chapter-content h3 {
            margin-top: 1.6em;
            margin-bottom: 0.6em;
            font-weight: 600;
        }

        .chapter-content h1 {
            font-size: 1.8em;
        }
        .chapter-content h2 {
            font-size: 1.4em;
        }
        .chapter-content h3 {
            font-size: 1.2em;
        }

        .chapter-content ul,
        .chapter-content ol {
            margin: 0.8em 0 1em 1.8em;
        }

        .chapter-content li {
            margin-bottom: 0.3em;
        }

        .chapter-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            font-size: 0.95em;
        }

        .chapter-content th,
        .chapter-content td {
            border: 1px solid #d0d0d0;
            padding: 8px 12px;
            text-align: left;
        }

        .chapter-content th {
            background: #f0f0f0;
            font-weight: 600;
        }

        body.night-mode .chapter-content th {
            background: #2a2a2a;
        }

        .chapter-content code {
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            background: #f0f0f0;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            color: #c7254e;
        }

        body.night-mode .chapter-content code {
            background: #2d2d2d;
            color: #e6c07b;
        }

        .chapter-content pre {
            background: #f6f6f6;
            padding: 16px 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 0.9em;
            line-height: 1.6;
            border-left: 4px solid #3b7cb8;
            margin: 1em 0;
        }

        body.night-mode .chapter-content pre {
            background: #2d2d2d;
            border-left-color: #6a8caf;
        }

        .chapter-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .chapter-content blockquote {
            border-left: 4px solid #3b7cb8;
            padding: 0.8em 1.2em;
            background: #f9f9f9;
            margin: 1em 0;
            border-radius: 0 8px 8px 0;
        }

        body.night-mode .chapter-content blockquote {
            background: #2a2a2a;
            border-left-color: #6a8caf;
        }

        .chapter-content .tip-box {
            background: #f0f7ff;
            border-left: 4px solid #3b7cb8;
            padding: 0.8em 1.2em;
            margin: 1em 0;
            border-radius: 0 8px 8px 0;
        }

        body.night-mode .chapter-content .tip-box {
            background: #2a3a4a;
        }

        .chapter-content .tip-box strong {
            color: #1a5c9a;
        }

        .chapter-content hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 2em 0;
        }

        .chapter-content .placeholder-box {
            background: rgba(0, 0, 0, 0.02);
            border: 2px dashed rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            color: rgba(0, 0, 0, 0.3);
            font-size: 1.2em;
            margin: 2em 0;
            backdrop-filter: blur(4px);
        }

        body.night-mode .chapter-content .placeholder-box {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.2);
        }

        .chapter-content .placeholder-box i {
            font-size: 3em;
            margin-bottom: 16px;
            display: block;
            color: rgba(0, 0, 0, 0.12);
        }

        body.night-mode .chapter-content .placeholder-box i {
            color: rgba(255, 255, 255, 0.08);
        }

        /* === 底部工具栏 === */
        .reader-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
            height: 56px;
            border-radius: 0 !important;
            box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.5);
        }

        body.night-mode .reader-footer {
            background: rgba(30, 30, 30, 0.55);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.04);
        }

        .reader-footer .progress-info {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.35);
            min-width: 60px;
            font-weight: 500;
        }

        body.night-mode .reader-footer .progress-info {
            color: rgba(255, 255, 255, 0.25);
        }

        .progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 4px;
            margin: 0 16px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
        }

        .progress-bar:hover {
            height: 5px;
        }

        body.night-mode .progress-bar {
            background: rgba(255, 255, 255, 0.08);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #3b7cb8;
            border-radius: 4px;
            transition: width 0.1s;
        }

        .footer-controls {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .footer-controls button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-controls button:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(0, 0, 0, 0.7);
        }

        .footer-controls button:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        body.night-mode .footer-controls button {
            color: rgba(255, 255, 255, 0.3);
        }

        body.night-mode .footer-controls button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
        }

        /* === 响应式 === */
        @media (max-width: 640px) {
            .reader-header h1 {
                font-size: 16px;
            }
            .content-area {
                padding: 16px 16px 30px 16px;
            }
            .chapter-title {
                font-size: 22px;
            }
            .drawer {
                width: 290px;
                left: -310px;
                padding: 20px 0 30px 0;
            }
            .drawer.open {
                left: 0;
            }
            .reader-footer .progress-info {
                font-size: 12px;
                min-width: 50px;
            }
            .header-right .theme-toggle {
                font-size: 16px;
            }
            .menu-btn {
                font-size: 20px;
                width: 36px;
                height: 36px;
            }
            .font-size-controls button {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .font-size-controls .size-display {
                min-width: 26px;
                font-size: 12px;
            }
        }

        @media (max-width: 420px) {
            .reader-header {
                padding: 8px 12px;
                height: 50px;
            }
            .reader-header h1 {
                font-size: 14px;
            }
            .content-area {
                padding: 12px 12px 20px 12px;
            }
            .chapter-title {
                font-size: 20px;
            }
            .drawer {
                width: 270px;
                left: -290px;
            }
            .drawer.open {
                left: 0;
            }
        }

        /* 滚动条美化 */
        .content-area::-webkit-scrollbar {
            width: 4px;
        }
        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.12);

                            <h1>1.3 什么是HTML</h1>
                            <div class="chapter-content">
                                <p>通过前两节的学习，我们已经知道HTML是Web前端的三大核心技术之一，负责网页的结构和内容。但HTML究竟是一门什么样的"语言"？它从哪里来，又将向何处去？本节我们将追本溯源，系统地回答这些问题。</p>

                                <h2>1.3.1 HTML的基本概念</h2>
                                <p><strong>HTML</strong> 是 <strong>HyperText Markup Language</strong> 的缩写，中文译为 <strong>"超文本标记语言"</strong> 。我们从它的名字入手，逐一拆解其含义：</p>
                                <ul>
                                    <li><strong>标记（Markup）</strong>：HTML通过一系列预先定义好的 <strong>"标签"（Tag）</strong> 来"标记"文本内容，告诉浏览器这段文字是标题、那段文字是段落、某处需要插入一张图片。这些标签本身不会在页面上显示，它们就像剧本中的"舞台提示"——指导浏览器如何将内容呈现给观众。</li>
                                    <li><strong>超文本（HyperText）</strong>：普通的文本（如TXT文档）是线性的、只读的。而"超文本"超越了普通文本的限制——它可以通过 <strong>超链接（Hyperlink）</strong> 将不同的页面、不同的网站、甚至不同的媒体（图片、视频、音频）连接在一起，形成一个纵横交错的、非线性的信息网络。这正是万维网（WWW）的精髓所在。</li>
                                </ul>
                                <p>因此，HTML的本质是一种 <strong>描述性标记语言</strong>，而非编程语言。它没有复杂的逻辑运算和流程控制，它的核心任务就是：<strong>用标签告诉浏览器"内容是什么"以及"内容如何结构化"</strong>。</p>
                                <p><strong>HTML的基本语法结构</strong></p>
                                <p>一个HTML元素（Element）通常由三部分组成：</p>
                                <ol>
                                    <li><strong>开始标签（Start Tag）</strong>：如 <code>&lt;p&gt;</code></li>
                                    <li><strong>内容（Content）</strong>：如 "这是一段文字"</li>
                                    <li><strong>结束标签（End Tag）</strong>：如 <code>&lt;/p&gt;</code></li>
                                </ol>
                                <p>完整写法为：<code>&lt;p&gt;这是一段文字&lt;/p&gt;</code></p>
                                <p>此外，标签上还可以添加 <strong>属性（Attribute）</strong> ，用来为元素提供额外的信息。属性写在开始标签中，采用 <code>属性名="属性值"</code> 的格式：</p>
                                <p><strong>示例1-4：带属性的HTML元素</strong></p>
                                <pre><code>&lt;!-- 不带属性 --&gt;
        &lt;a&gt;点击这里&lt;/a&gt;

        &lt;!-- 带 href 属性，指定链接的目标地址 --&gt;
        &lt;a href="https://www.example.com"&gt;点击这里访问示例网站&lt;/a&gt;

        &lt;!-- 带多个属性 --&gt;
        &lt;a href="https://www.example.com" target="_blank" title="前往示例网站"&gt;
            点击这里访问示例网站
        &lt;/a&gt;</code></pre>
                                <p>在上面的例子中，<code>href</code>（链接地址）、<code>target</code>（打开方式）、<code>title</code>（提示文本）都是 <code>&lt;a&gt;</code> 标签的属性，它们让这个超链接具备了完整的跳转功能。</p>

                                <h2>1.3.2 HTML的发展历史</h2>
                                <p>了解HTML的发展历程，有助于我们理解这门语言的设计哲学和演进方向。HTML从诞生至今，主要经历了以下几个重要的版本阶段：</p>
                                <table>
                                    <tr><th>版本/时间</th><th>重要里程碑</th><th>主要特点</th></tr>
                                    <tr><td><strong>HTML 1.0</strong>（1991年）</td><td>蒂姆·伯纳斯-李定义了最早的HTML标签。</td><td>仅包含约20个标签（标题、段落、超链接等），纯文本排版，无表格、无图像、无样式。这是万维网的"史前时代"。</td></tr>
                                    <tr><td><strong>HTML 2.0</strong>（1995年）</td><td>IETF（互联网工程任务组）发布正式标准。</td><td>加入了表单（Form）和表格（Table）的支持，让网页具备了初步的交互和数据提交能力。网页开始"活"起来。</td></tr>
                                    <tr><td><strong>HTML 3.2</strong>（1997年）</td><td>W3C（万维网联盟）接管HTML标准化工作。</td><td>引入了更多样式属性（如字体、颜色）、<code>&lt;applet&gt;</code> 支持Java小程序，并开始支持简单的CSS。但此时网页布局严重依赖表格嵌套，非常混乱。</td></tr>
                                    <tr><td><strong>HTML 4.01</strong>（1999年）</td><td>经典的成熟版本，长期统治Web世界。</td><td>彻底将样式剥离到CSS中，强调"结构与样式分离"。增加了 <code>&lt;div&gt;</code>、<code>&lt;span&gt;</code> 等通用容器，以及更强大的表单功能。这个版本是21世纪前十年Web开发的基石。</td></tr>
                                    <tr><td><strong>XHTML 1.0</strong>（2000年）</td><td>结合XML的严格语法规则。</td><td>要求标签必须闭合、属性必须加引号、标签名必须小写（语法极严）。虽然提高了代码规范性，但因为太过严厉，在执行中导致大量兼容性问题，最终未能成为主流。</td></tr>
                                    <tr><td><strong>HTML5</strong>（2014年正式推荐标准）</td><td><strong>Web开发的"分水岭"</strong>。</td><td>革命性的版本。不再基于SGML（标准通用标记语言），拥有独立的语法规范。新增了大量语义标签、多媒体支持（音视频）、图形绘制（Canvas）、本地存储、离线应用等。<strong>彻底终结了Flash、Silverlight等第三方插件的时代</strong>。</td></tr>
                                </table>
                                <p><strong>一个关键的时间点</strong>：2004年至2009年间，WHATWG（网页超文本应用技术工作小组）与W3C在HTML发展方向上产生分歧——W3C主张走向严格的XHTML 2.0（但过于理想化，脱离实际），而WHATWG主张在现有HTML 4.01基础上渐进增强、向后兼容。最终，WHATWG的路线取得了胜利，其成果便是今天的 <strong>HTML5</strong>。这充分说明：<strong>一项技术能否被广泛接纳，不在于它是否"纯粹"或"理论完美"，而在于它是否解决了开发者的真实痛点、是否兼容了已有的大量网页。</strong></p>

                                <h2>1.3.3 HTML5的新特性与优势</h2>
                                <p>HTML5并不是在HTML 4.01基础上的"小修小补"，而是一次 <strong>颠覆性的升级</strong>。如果说HTML 4.01时代网页是"静态文档"，那么HTML5时代的网页则是"富应用平台"。</p>
                                <p>HTML5的核心设计理念是 <strong>"一切从简，兼容为王"</strong> ——减少对外部插件（如Flash）的依赖，让浏览器原生能力更强大，同时确保所有新特性在不支持的旧浏览器上能"优雅降级"（即不报错，只是功能缺失）。</p>
                                <p>以下是HTML5带来的几项最核心的新特性与优势：</p>
                                <p><strong>1. 新增了大量语义化标签——让网页"有血有肉有骨架"</strong></p>
                                <p>在HTML 4时代，开发者几乎用 <code>&lt;div&gt;</code> 和 <code>&lt;span&gt;</code> 来搭建一切页面结构（俗称"DIV+CSS"布局）。这导致搜索引擎爬虫很难理解页面区块的含义（全是 <code>&lt;div&gt;</code>，谁知道哪里是导航栏、哪里是页脚？）。</p>
                                <p>HTML5新增了专门的语义标签来明确页面结构：</p>
                                <table>
                                    <tr><th>HTML4写法（无语义）</th><th>HTML5写法（有语义）</th><th>表达含义</th></tr>
                                    <tr><td><code>&lt;div id="header"&gt;</code></td><td><code>&lt;header&gt;</code></td><td>页面头部</td></tr>
                                    <tr><td><code>&lt;div id="nav"&gt;</code></td><td><code>&lt;nav&gt;</code></td><td>导航区域</td></tr>
                                    <tr><td><code>&lt;div id="main"&gt;</code></td><td><code>&lt;main&gt;</code></td><td>页面主体内容</td></tr>
                                    <tr><td><code>&lt;div id="article"&gt;</code></td><td><code>&lt;article&gt;</code></td><td>独立文章/内容块</td></tr>
                                    <tr><td><code>&lt;div id="sidebar"&gt;</code></td><td><code>&lt;aside&gt;</code></td><td>侧边栏/附属信息</td></tr>
                                    <tr><td><code>&lt;div id="footer"&gt;</code></td><td><code>&lt;footer&gt;</code></td><td>页面底部</td></tr>
                                </table>
                                <p>语义化不仅提升了代码的可读性，更重要的是 <strong>极大地改善了SEO（搜索引擎优化）</strong>，让搜索引擎能够更准确地抓取网页的核心内容，同时也有利于屏幕阅读器等辅助设备为视障人士提供服务。</p>

                                <p><strong>2. 原生多媒体支持——让Flash"退休"</strong></p>
                                <p>在HTML5之前，在网页中嵌入视频和音频是一件极其痛苦的事情——你必须依赖第三方插件（如Adobe Flash、Windows Media Player）。这不仅存在巨大的安全漏洞风险，而且在移动端（iPhone/iPad）根本无法运行。</p>
                                <p>HTML5提供了 <code>&lt;video&gt;</code> 和 <code>&lt;audio&gt;</code> 标签，让浏览器原生支持多媒体播放：</p>
                                <pre><code>&lt;video src="movie.mp4" controls width="600"&gt;
        您的浏览器不支持视频播放，请升级浏览器。
        &lt;/video&gt;

        &lt;audio src="music.mp3" controls&gt;
        您的浏览器不支持音频播放。
        &lt;/audio&gt;</code></pre>
                                <p><code>controls</code> 属性让浏览器自动显示播放/暂停、进度条、音量等控件，用户体验统一且流畅。</p>

                                <p><strong>3. Canvas与SVG——强大的绘图能力</strong></p>
                                <p>HTML5的 <code>&lt;canvas&gt;</code> 标签提供了一个"画布"，开发者可以通过JavaScript在画布上动态绘制图形、图表、动画，甚至开发完整的网页游戏（如经典的《2048》或《植物大战僵尸》的HTML5版本）。</p>
                                <p>同时，SVG（可缩放矢量图形）也在HTML5中得到了原生支持，适合绘制图标、LOGO等需要高清缩放（如高清屏适配）的矢量图形。</p>
                                <p>（这两项技术我们将在本书第三篇的<strong>第14章</strong>和<strong>第15章</strong>中深入讲解。）</p>

                                <p><strong>4. 客户端数据存储——不再只依赖Cookie</strong></p>
                                <p>以往的Web存储只能依赖 <code>Cookie</code>，但Cookie有大小限制（仅4KB左右）且每次HTTP请求都会携带，严重影响网络传输效率。</p>
                                <p>HTML5提供了全新的存储方案：</p>
                                <ul>
                                    <li><strong>localStorage</strong>：无过期时间的持久存储，容量约5~10MB，适合存储用户偏好设置、浏览记录等。</li>
                                    <li><strong>sessionStorage</strong>：会话级存储，关闭浏览器标签页即清除。</li>
                                    <li><strong>IndexedDB</strong>：一个完整的事务型数据库系统，适合在客户端存储大量结构化数据（如离线版邮件客户端、笔记应用等）。</li>
                                </ul>
                                <p>这让 <strong>"离线Web应用"（PWA）</strong> 成为可能——即用户即使在网络断开的情况下，依然可以打开网页并查看之前缓存的全部内容。</p>

                                <p><strong>5. 强大的表单控件与验证</strong></p>
                                <p>HTML5对表单进行了大刀阔斧的增强，新增了多种输入类型和属性：</p>
                                <ul>
                                    <li>新的输入类型：<code>type="email"</code>（邮箱）、<code>type="url"</code>（网址）、<code>type="date"</code>（日期）、<code>type="color"</code>（颜色选择器）、<code>type="range"</code>（滑块）等，让移动端键盘自动弹出对应虚拟键盘（如输入邮箱时弹出"@"键）。</li>
                                    <li>新的验证属性：<code>required</code>（必填）、<code>pattern</code>（正则匹配）、<code>min</code>/<code>max</code>（数值范围），大幅减少了前端表单验证对JavaScript的依赖。</li>
                                </ul>

                                <p><strong>6. 地理定位（Geolocation）与设备能力</strong></p>
                                <p>HTML5允许网页通过 <code>Geolocation API</code> 获取用户的地理位置（经度/纬度），这在LBS（基于位置的服务）应用中极其重要，如外卖配送跟踪、附近门店查找、运动轨迹记录等。此外，HTML5还可以访问设备的摄像头、麦克风（通过 <code>getUserMedia</code> API），为Web视频会议、在线直播等应用提供了底层支撑。</p>

                                <p><strong>7. 通信能力的飞跃</strong></p>
                                <ul>
                                    <li><strong>WebSocket</strong>：实现了浏览器与服务器之间的全双工实时通信，是开发在线聊天室、股票行情推送、多人在线游戏等"实时Web应用"的核心技术。</li>
                                    <li><strong>Server-Sent Events (SSE)</strong>：允许服务器主动向浏览器推送数据（如新闻推送、赛事比分），比传统的"轮询"方式更高效。</li>
                                </ul>

                                <p><strong>发展启示录</strong></p>
                                <p>回顾HTML的演进史，我们不难发现一条清晰的规律：<strong>HTML发展的核心驱动力，始终是"让Web变得更强大、更易用、更开放"</strong> 。从纯文本到图文并茂，从静态展示到动态交互，从依赖插件到原生支持，每一步都在降低开发门槛、提升用户体验、拓宽Web的应用边界。</p>
                                <p>正如万维网发明者蒂姆·伯纳斯-李爵士所期望的那样——<strong>"Web是为所有人服务的。"</strong> HTML5正是这一理念的完美践行者，它让Web不再只是"可阅读的文档"，而是"可交互的操作系统级平台"。</p>

                                <p><strong>知识小结</strong></p>
                                <p>本节我们系统地学习了HTML的基本概念和发展历史：</p>
                                <ol>
                                    <li><strong>HTML</strong> 是"超文本标记语言"，通过 <strong>标签（Tag）</strong> 和 <strong>属性（Attribute）</strong> 来描述网页的结构和内容。它是描述性语言，而非编程语言。</li>
                                    <li>HTML的发展经历了 <strong>1.0→2.0→3.2→4.01→XHTML→HTML5</strong> 的演进历程。HTML5是迄今为止最成功、应用最广泛的版本。</li>
                                    <li><strong>HTML5的核心优势</strong>包括：语义化标签、原生多媒体（音视频）、Canvas/SVG绘图、客户端存储（localStorage等）、强大的表单控件、地理位置定位以及WebSocket等高级通信能力。</li>
                                    <li>HTML5的设计哲学是 <strong>"兼容优先，渐进增强"</strong>，旨在构建一个不依赖第三方插件的、开放、强大的Web应用平台。</li>
                                </ol>

                                <p><strong>思考与练习</strong></p>
                                <p><strong>一、选择题</strong></p>
                                <ol>
                                    <li>HTML中的标签 <code>&lt;p&gt;</code> 和 <code>&lt;/p&gt;</code> 之间的文字，在浏览器中会被解析为（　）<br>A. 标题 &nbsp;&nbsp; B. 段落 &nbsp;&nbsp; C. 超链接 &nbsp;&nbsp; D. 图片</li>
                                    <li>以下哪个版本的HTML首次引入了 <code>&lt;video&gt;</code> 和 <code>&lt;audio&gt;</code> 标签来支持原生多媒体播放？（　）<br>A. HTML 3.2 &nbsp;&nbsp; B. HTML 4.01 &nbsp;&nbsp; C. XHTML 1.0 &nbsp;&nbsp; D. HTML5</li>
                                    <li>在HTML5中，以下哪个标签用于表示页面顶部的头部区域（包含LOGO、导航等）？（　）<br>A. <code>&lt;div id="top"&gt;</code> &nbsp;&nbsp; B. <code>&lt;head&gt;</code> &nbsp;&nbsp; C. <code>&lt;header&gt;</code> &nbsp;&nbsp; D. <code>&lt;heading&gt;</code></li>
                                    <li>以下哪项是HTML5新增的客户端数据存储方案？（　）<br>A. Cookie &nbsp;&nbsp; B. localStorage &nbsp;&nbsp; C. Session &nbsp;&nbsp; D. Cache</li>
                                </ol>
                                <p><strong>二、简答题</strong></p>
                                <ol>
                                    <li>请用自己的话解释"超文本"（HyperText）的含义，并举例说明。</li>
                                    <li>为什么说HTML5的诞生"终结了Flash的时代"？请至少列出两个理由。</li>
                                    <li>语义化标签（如 <code>&lt;header&gt;</code>、<code>&lt;nav&gt;</code>、<code>&lt;article&gt;</code>）相较于普通的 <code>&lt;div&gt;</code> 标签有哪些优势？</li>

                                <p><strong>三、上机实践</strong></p>

                                    <tr><td><strong>IE8及更早版本</strong></td><td>几乎不支持</td><td>无法原生识别HTML5的新语义标签（如 <code>&lt;header&gt;</code>、<code>&lt;nav&gt;</code>），无法播放HTML5视频，无法使用Canvas。</td></tr>
                                    <tr><td><strong>IE9</strong></td><td>部分支持</td><td>开始支持部分HTML5特性（如Canvas、部分语义标签），但支持不完整。</td></tr>
                                    <tr><td><strong>IE10 / IE11</strong></td><td>支持大部分特性</td><td>对HTML5的支持有显著提升，但仍有部分限制。</td></tr>
                                    <tr><td><strong>旧版Edge（EdgeHTML内核）</strong></td><td>支持大部分特性</td><td>不如基于Chromium的新版Edge完善。</td></tr>
                                </table>
                                <p>好消息是，微软早已停止对IE系列的主流支持，全球范围内使用IE的用户比例已极低。但在某些<strong>企业内网、政府网站、教育系统</strong>等特定场景中，旧版IE可能仍在服役——如果你的项目面向这类用户，就需要认真对待兼容性问题。</p>
                                <p><strong>3. 移动端浏览器——支持良好</strong></p>
                                <p>移动端的情况比想象中更乐观：<strong>iOS Safari、Android Chrome以及大多数基于Chromium或WebKit的移动浏览器，对HTML5的支持都非常好</strong>。这主要得益于：</p>
                                <ul>
                                    <li>移动端浏览器的更新周期通常较短，新版本的普及速度较快。</li>
                                    <li>苹果和谷歌都积极推动HTML5在移动端的落地，以替代对Flash等插件的依赖。</li>
                                </ul>

                                <h2>1.4.3 如何查询具体特性的浏览器支持情况</h2>
                                <p>在实际开发中，你经常会遇到这样的问题："我想用 <code>&lt;datalist&gt;</code> 做输入建议，Safari支持吗？""<code>localStorage</code> 在IE11上能用吗？"——这时就需要借助专业的查询工具。</p>
                                <p><strong>工具一：Can I use（最常用）</strong></p>
                                <p><strong>Can I use</strong>（https://caniuse.com）是前端开发领域<strong>最权威的浏览器兼容性查询网站</strong>。它提供了实时更新的浏览器支持数据，覆盖HTML、CSS、JavaScript、Web API等几乎所有前端技术。</p>
                                <p><strong>使用方法</strong>：在搜索框中输入你想查询的特性名称（如 <code>video</code>、<code>localStorage</code>、<code>flexbox</code>、<code>datalist</code> 等），页面会以表格形式展示该特性在各浏览器及各版本中的支持状态——绿色代表支持，红色代表不支持，黄色代表部分支持。</p>
                                <div class="tip-box">
                                    <p><strong>💡 给初学者的建议</strong>：把 <strong>Can I use</strong> 加入你的浏览器书签。在未来的开发中，每当你想使用一个不太确定兼容性的HTML5特性时，先上去查一查——这会帮你避免无数"为什么我的页面在某某浏览器上显示不正常"的困惑。</p>
                                </div>
                                <p><strong>工具二：MDN Web Docs</strong></p>
                                <p><strong>MDN Web Docs</strong>（https://developer.mozilla.org）是Mozilla维护的Web技术权威文档库。在每一个HTML标签、属性或API的页面底部，都有一张<strong>"浏览器兼容性"表格</strong>，清晰列出了该特性在各主流浏览器中的支持版本。MDN的数据与Can I use相互补充，同样值得信赖。</p>
                                <p><strong>工具三：手动代码检测</strong></p>
                                <p>除了查表，你还可以在代码中<strong>直接检测</strong>浏览器是否支持某个特性：</p>
                                <pre><code>// 检测 localStorage 是否可用
        if (typeof localStorage !== 'undefined') {
            // 安全使用 localStorage
            localStorage.setItem('key', 'value');
        } else {
            // 降级方案：使用 Cookie 或其他方式
            console.log('当前浏览器不支持 localStorage');
        }

        // 检测地理定位 API 是否可用
        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                console.log('纬度：' + pos.coords.latitude);
            });
        } else {
            alert('您的浏览器不支持地理定位功能');
        }

        // 检测 Canvas 是否可用
        if (!!document.createElement('canvas').getContext) {
            // 可以使用 Canvas 绘图
        } else {
            // 提供降级方案
        }</code></pre>
                                <p>这种"<strong>特性检测（Feature Detection）</strong>"是前端开发中处理兼容性的<strong>黄金法则</strong>——不要猜测用户用什么浏览器，而是直接检测"这个功能在用户的浏览器中是否可用"。</p>

                                <h2>1.4.4 处理兼容性问题的常用策略</h2>
                                <p>当某个HTML5特性在目标用户的浏览器中不被支持时，我们该怎么办？以下是业界通行的几种策略：</p>
                                <p><strong>策略一：渐进增强（Progressive Enhancement）</strong></p>
                                <p><strong>核心理念</strong>：先为所有浏览器提供<strong>最基本的功能</strong>（使用最基础的HTML标签），然后为支持新特性的浏览器<strong>逐步增加更丰富的体验</strong>。</p>
                                <p><strong>示例</strong>：使用 <code>&lt;video&gt;</code> 标签播放视频时，在标签内部提供降级文本：</p>
                                <pre><code>&lt;video controls width="600"&gt;
        &lt;source src="movie.mp4" type="video/mp4"&gt;
        &lt;source src="movie.ogg" type="video/ogg"&gt;
        &lt;!-- 以下内容在不支持 video 的浏览器中显示 --&gt;
        &lt;p&gt;您的浏览器不支持HTML5视频播放，请升级浏览器。
        &lt;a href="movie.mp4"&gt;点击此处下载视频文件&lt;/a&gt;&lt;/p&gt;
        &lt;/video&gt;</code></pre>
                                <p>在支持 <code>&lt;video&gt;</code> 的浏览器中，用户看到的是精美的视频播放器；在不支持的浏览器中，用户至少能看到一段提示文字和一个下载链接——<strong>功能可能不完整，但不会"坏掉"</strong>。</p>
                                <p><strong>策略二：Polyfill（垫片）</strong></p>
                                <p><strong>Polyfill</strong> 是一段JavaScript代码，它的作用是：<strong>如果浏览器原生不支持某个新特性，就用JavaScript模拟实现该功能</strong>。</p>
                                <p><strong>经典案例</strong>：旧版IE（IE9及以下）无法识别HTML5的新语义标签（如 <code>&lt;header&gt;</code>、<code>&lt;nav&gt;</code>、<code>&lt;article&gt;</code> 等），会导致这些标签无法被正确渲染。开发者可以使用 <strong>html5shiv</strong> 这个Polyfill来解决：</p>
                                <pre><code>&lt;!-- 仅在 IE9 及以下版本中加载 html5shiv --&gt;
        &lt;!--[if lt IE 9]&gt;
            &lt;script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"&gt;&lt;/script&gt;
        &lt;![endif]--&gt;</code></pre>
                                <p>这段代码的意思是："如果用户的浏览器是IE9或更早版本，就加载html5shiv脚本，让这些旧浏览器也能识别HTML5的新标签。"——这是<strong>条件注释（Conditional Comment）</strong> 的用法，是专门为IE设计的HTML语法。</p>
                                <p><strong>策略三：优雅降级（Graceful Degradation）</strong></p>
                                <p><strong>核心理念</strong>：先为现代浏览器开发<strong>完整功能</strong>的版本，然后确保在旧浏览器中<strong>功能虽有缩减但依然可用且不报错</strong>。</p>
                                <p>渐进增强和优雅降级是两种互补的思路——前者"从下往上"构建，后者"从上往下"兼容。在实际开发中，<strong>渐进增强是更被推崇的实践</strong>，因为它天然保证了所有用户都能获得最基本的可用体验。</p>
                                <p><strong>策略四：提示用户升级浏览器</strong></p>
                                <p>对于实在无法兼容的极端情况（如用户仍在使用IE8），最务实的做法是<strong>友好地提示用户升级浏览器</strong>：</p>
                                <pre><code>&lt;!--[if lt IE 9]&gt;
        &lt;p style="color: red; font-size: 18px; padding: 20px; background: #ffeeee;"&gt;
            您的浏览器版本过低，无法正常访问本网站。
            请升级到 &lt;a href="https://www.microsoft.com/edge"&gt;Microsoft Edge&lt;/a&gt;
            或 &lt;a href="https://www.google.com/chrome/"&gt;Google Chrome&lt;/a&gt;。
        &lt;/p&gt;
        &lt;![endif]--&gt;</code></pre>

                                <h2>1.4.5 现代开发的新趋势：Baseline（广泛可用功能）</h2>
                                <p>2025年以来，Web开发社区提出了一项名为 <strong>"Baseline（基准）"</strong> 的新倡议。其核心理念是：</p>
                                <p><strong>当一个Web功能被所有主流浏览器（Chrome、Firefox、Safari、Edge）都支持时，它就进入了"Baseline Widely Available"（广泛可用）状态</strong>。开发者可以<strong>放心大胆地使用</strong>这些功能，无需担心兼容性问题。</p>
                                <p>截至2026年，已有<strong>超过500项Web功能</strong>被标记为"Baseline Widely Available"——这其中包括了绝大部分HTML5的核心特性。换句话说，<strong>对于现代Web开发而言，兼容性问题正在逐年减少</strong>。</p>
                                <div class="tip-box">
                                    <p><strong>🎯 对初学者的建议</strong>：在学习阶段，请放心使用本书中讲解的所有HTML5特性——只要你在Chrome、Firefox、Edge或Safari的最新版本中测试，它们都能正常工作。当你将来进入实际项目开发时，再根据项目的目标用户群体，有针对性地处理兼容性问题即可。</p>
                                </div>

                                <p><strong>知识小结</strong></p>
                                <p>本节我们学习了各浏览器对HTML5的支持情况及相关应对策略：</p>
                                <ol>
                                    <li><strong>HTML5已成行业标准</strong>，全球约95%的浏览器已支持HTML5。但"支持HTML5"是一个笼统的说法——具体到每个特性和API，支持情况可能不同。</li>
                                    <li><strong>现代浏览器</strong>（Chrome、Firefox、Edge、Safari、Opera）<strong>完全支持</strong>HTML5核心特性；<strong>旧版IE</strong>（尤其是IE8及更早版本）支持非常有限；<strong>移动端浏览器</strong>支持情况普遍良好。</li>
                                    <li>查询具体特性的兼容性，可使用 <strong>Can I use</strong>（https://caniuse.com）或 <strong>MDN Web Docs</strong>。</li>
                                    <li>处理兼容性问题的常用策略包括：<strong>渐进增强</strong>（先基础后增强）、<strong>Polyfill</strong>（用JS模拟缺失功能）、<strong>优雅降级</strong>（先完整后精简）和<strong>提示用户升级浏览器</strong>。</li>
                                    <li><strong>Baseline（广泛可用功能）</strong> 是近年来兴起的新标准——当一个功能被所有主流浏览器支持后，开发者即可放心使用。</li>
                                </ol>

                                    <li>在HTML中嵌入视频时，为保证在不支持 <code>&lt;video&gt;</code> 标签的浏览器中也能提供基本的可用体验，可以在 <code>&lt;video&gt;</code> 标签内部放置（　）<br>A. 另一个 <code>&lt;video&gt;</code> 标签 &nbsp;&nbsp; B. 一段提示文字或下载链接<br>C. 一个 <code>&lt;script&gt;</code> 标签 &nbsp;&nbsp; D. 一个 <code>&lt;style&gt;</code> 标签</li>

                                <h2>2.1.1 手工编写HTML文件</h2>
                                <p>HTML文件本质上是<strong>纯文本文件</strong>，只是它的扩展名为 <code>.html</code>（或 <code>.htm</code>）。你可以使用任何文本编辑器来创建它——哪怕是操作系统自带的记事本（Notepad）。不过，为了更好的编码体验，我们依然推荐使用VS Code。</p>

                                <p><strong>观察浏览器地址栏</strong></p>

                                <p>一个标准的HTML文档，其结构可以概括为以下"骨架"：</p>

                                <h2>2.2.1 <code>&lt;!DOCTYPE&gt;</code> 文档类型声明</h2>
                                <p><code>&lt;!DOCTYPE&gt;</code> 是HTML文档的第一行代码，它不是HTML标签，而是一条<strong>指令</strong>，用于告诉浏览器"这份文档是用哪个版本的HTML编写的"。</p>
                                <p><strong>1. 为什么需要它？</strong></p>

                                <p><strong>2. HTML5的 <code>&lt;!DOCTYPE&gt;</code> 声明</strong></p>

                                <h2>2.3.1 标签与元素</h2>
                                <p><strong>1. 标签的分类：双标签与单标签</strong></p>
                                <p>HTML中的标签按结构分为两类：<strong>双标签</strong>和<strong>单标签</strong>。</p>

                                <p>事实恰恰相反：<strong><code>&lt;head&gt;</code> 是页面的"大脑"和"名片"</strong>。它虽然不直接显示在浏览器窗口中，却决定了页面如何在浏览器中呈现、如何被搜索引擎收录、如何在社交媒体上被分享，以及如何与外部资源进行交互。</p>

                                <h2>3.1.1 什么是 <code>&lt;head&gt;</code> 标签</h2>
                                <p><code>&lt;head&gt;</code> 是一个<strong>容器标签</strong>，用于存放关于HTML文档的<strong>元数据（Metadata）</strong>。所谓"元数据"，就是"关于数据的数据"——它不是页面要展示给用户的具体内容（如文字、图片），而是描述页面本身的信息。</p>

                                <p>我们可以用一个生动的比喻来理解：<strong>如果把一个网页比作一本实体书——</strong></p>

                                <p>一个精心配置的 <code>&lt;head&gt;</code> 能带来以下关键价值：</p>
                                <ul>
                                    <li><strong>告诉浏览器如何正确显示页面</strong>（字符编码、视口缩放、样式）。</li>
                                    <li><strong>帮助搜索引擎理解页面主题</strong>（标题、描述、关键词），直接影响SEO排名。</li>
                                    <li><strong>控制页面在社交媒体上的分享外观</strong>（Open Graph 协议），影响点击率。</li>
                                    <li><strong>关联外部资源</strong>（CSS样式表、JavaScript脚本、网站图标），实现代码的模块化和复用。</li>
                                    <li><strong>提升页面性能和用户体验</strong>（预加载资源、预连接域名）。</li>
                                </ul>

                                <h2>3.1.2 <code>&lt;head&gt;</code> 中常见的子标签</h2>
                                <p><code>&lt;head&gt;</code> 中可以包含多种子标签，每个都有特定的职责。下面我们以"总览"的方式列出它们，后续小节将逐一深入讲解。</p>
                                <table>
                                    <tr><th>标签</th><th>核心作用</th><th>是否必需</th></tr>
                                    <tr><td><code>&lt;title&gt;</code></td><td>定义浏览器标签页标题，也是搜索引擎结果中的主标题。</td><td><strong>必需</strong></td></tr>
                                    <tr><td><code>&lt;meta&gt;</code></td><td>提供各种元数据，如字符集（<code>charset</code>）、视口（<code>viewport</code>）、页面描述（<code>description</code>）、关键词（<code>keywords</code>）、重定向等。</td><td>部分必需（如 <code>charset</code>）</td></tr>
                                    <tr><td><code>&lt;link&gt;</code></td><td>引入外部资源，最常见的是CSS样式表和网站图标（favicon）。</td><td>按需</td></tr>
                                    <tr><td><code>&lt;style&gt;</code></td><td>在页面内部直接编写CSS样式（内部样式表）。</td><td>按需</td></tr>
                                    <tr><td><code>&lt;script&gt;</code></td><td>引入或嵌入JavaScript代码。可放在 <code>&lt;head&gt;</code> 或 <code>&lt;body&gt;</code> 底部。</td><td>按需</td></tr>
                                    <tr><td><code>&lt;base&gt;</code></td><td>为页面中所有相对路径URL指定一个基础URL。</td><td>可选（不常用）</td></tr>
                                </table>

                                <p>一个典型的 <code>&lt;head&gt;</code> 结构示例如下：</p>
                                <pre><code>&lt;head&gt;
            &lt;!-- 1. 字符编码（必须放在最前面） --&gt;
            &lt;meta charset="utf-8"&gt;

            &lt;!-- 2. 移动端视口适配 --&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;

            &lt;!-- 3. 页面标题（必需且重要） --&gt;
            &lt;title&gt;我的个人博客 - 分享技术与生活&lt;/title&gt;

            &lt;!-- 4. SEO描述 --&gt;
            &lt;meta name="description" content="这是我的个人博客，分享Web开发技术、读书笔记和生活感悟。"&gt;

            &lt;!-- 5. 外部CSS样式表 --&gt;
            &lt;link rel="stylesheet" href="style.css"&gt;

            &lt;!-- 6. 网站图标 --&gt;
            &lt;link rel="icon" href="favicon.ico"&gt;

            &lt;!-- 7. 内部样式（可选） --&gt;
            &lt;style&gt;
                /* 一些仅在此页面使用的样式 */
            &lt;/style&gt;

            &lt;!-- 8. 外部脚本（通常放在末尾，或使用defer/async） --&gt;
            &lt;script src="script.js" defer&gt;&lt;/script&gt;
        &lt;/head&gt;</code></pre>

                                <p><strong>关于标签顺序的建议</strong></p>
                                <p>在 <code>&lt;head&gt;</code> 中，标签的顺序会影响页面加载和渲染的效率。以下是推荐的最佳顺序：</p>
                                <ol>
                                    <li><strong>字符编码</strong>（<code>&lt;meta charset="utf-8"&gt;</code>）—— <strong>必须放在最前面</strong>，以便浏览器尽早知道如何解析后续字符。</li>
                                    <li><strong>视口设置</strong>（<code>&lt;meta name="viewport"&gt;</code>）—— 紧随其后，确保移动端正确渲染。</li>
                                    <li><strong>标题</strong>（<code>&lt;title&gt;</code>）—— 搜索引擎和用户最关注的信息，应尽早定义。</li>
                                    <li><strong>其他 <code>&lt;meta&gt;</code> 标签</strong>（如 <code>description</code>、<code>keywords</code> 等）。</li>
                                    <li><strong>外部资源链接</strong>（<code>&lt;link&gt;</code>）—— 包括CSS样式表和图标。</li>
                                    <li><strong>内部样式</strong>（<code>&lt;style&gt;</code>）—— 如果有内部CSS，放在外部CSS之后以控制优先级。</li>
                                    <li><strong>脚本</strong>（<code>&lt;script&gt;</code>）—— 为了防止阻塞页面渲染，通常建议将脚本放在 <code>&lt;body&gt;</code> 底部，或使用 <code>defer</code> / <code>async</code> 属性。</li>
                                </ol>

                                <h2>3.1.3 用户如何"看到"头部信息</h2>
                                <p>虽然 <code>&lt;head&gt;</code> 的内容不直接显示在页面主体中，但用户依然可以通过多种方式"感知"或"查看"它：</p>
                                <ol>
                                    <li><strong>浏览器标签页/标题栏</strong>：<code>&lt;title&gt;</code> 的内容直接显示在这里。</li>
                                    <li><strong>浏览器书签/收藏夹</strong>：保存网页时，默认名称就是 <code>&lt;title&gt;</code>。</li>
                                    <li><strong>搜索引擎结果页</strong>：<code>&lt;title&gt;</code> 作为蓝色大标题，<code>&lt;meta name="description"&gt;</code> 作为下方的描述文字。</li>
                                    <li><strong>社交媒体分享卡片</strong>：通过 Open Graph 协议（<code>&lt;meta property="og:..."&gt;</code>），<code>&lt;head&gt;</code> 中的信息会决定分享时显示的标题、描述和缩略图。</li>
                                    <li><strong>查看网页源代码</strong>：在页面空白处右键选择"查看网页源代码"（或按 <code>Ctrl+U</code>），可以看到完整的 <code>&lt;head&gt;</code> 内容。</li>
                                    <li><strong>开发者工具（Elements面板）</strong>：按 <code>F12</code> 打开开发者工具，在"Elements"面板中展开 <code>&lt;head&gt;</code> 节点，可以实时查看头部信息。</li>
                                </ol>

                                <div class="tip-box">
                                    <p><strong>💡 动手试一试</strong>：现在打开你常访问的一个网站（如百度、知乎或任何新闻门户），按 <code>Ctrl+U</code> 查看其源代码，定位到 <code>&lt;head&gt;</code> 标签，看看里面包含了哪些信息。尝试找到 <code>&lt;title&gt;</code>、<code>&lt;meta charset&gt;</code>、<code>&lt;meta name="description"&gt;</code> 和 <code>&lt;link rel="icon"&gt;</code> 等标签，对比其内容和页面实际表现。</p>
                                </div>

                                <h2>3.1.4 常见错误与误区</h2>
                                <p>在学习 <code>&lt;head&gt;</code> 时，初学者容易犯以下错误或产生误解：</p>
                                <ol>
                                    <li><strong>认为 <code>&lt;head&gt;</code> 不重要</strong>：一些初学者会跳过 <code>&lt;head&gt;</code> 直接写 <code>&lt;body&gt;</code>，导致页面缺少标题、编码错误（乱码）、移动端适配失效等问题。</li>
                                    <li><strong>忘记设置字符编码</strong>：不写 <code>&lt;meta charset="utf-8"&gt;</code>，中文内容很可能显示为乱码。</li>
                                    <li><strong>把 <code>&lt;head&gt;</code> 和 <code>&lt;header&gt;</code> 混淆</strong>：<code>&lt;head&gt;</code> 是存放元数据的不可见容器；<code>&lt;header&gt;</code> 是页面中可见的"页眉"区域（通常包含LOGO、导航等）。两者完全不同。</li>
                                    <li><strong>在 <code>&lt;head&gt;</code> 中放置可见内容</strong>：如果误将 <code>&lt;h1&gt;</code> 或 <code>&lt;p&gt;</code> 等标签写在 <code>&lt;head&gt;</code> 中，浏览器不会显示它们，且可能导致HTML结构错误。</li>
                                    <li><strong>认为所有 <code>&lt;meta&gt;</code> 标签都能影响SEO排名</strong>：事实上，搜索引擎目前主要关注 <code>&lt;title&gt;</code> 和 <code>&lt;meta description&gt;</code>，而 <code>&lt;meta keywords&gt;</code> 已基本被搜索引擎忽略。</li>
                                </ol>

                                <p><strong>知识小结</strong></p>
                                <p>本节我们站在全局视角认识了 <code>&lt;head&gt;</code> 标签：</p>
                                <table>
                                    <tr><th>要点</th><th>说明</th></tr>
                                    <tr><td><strong>定位</strong></td><td><code>&lt;head&gt;</code> 是HTML文档的头部容器，存放页面的元数据（关于数据的数据）。</td></tr>
                                    <tr><td><strong>可见性</strong></td><td>用户看不见 <code>&lt;head&gt;</code> 的内容，但能通过标签页标题、搜索引擎结果、社交媒体卡片等方式感知其影响。</td></tr>
                                    <tr><td><strong>核心子标签</strong></td><td><code>&lt;title&gt;</code>（必需）、<code>&lt;meta&gt;</code>、<code>&lt;link&gt;</code>、<code>&lt;style&gt;</code>、<code>&lt;script&gt;</code>、<code>&lt;base&gt;</code>。</td></tr>
                                    <tr><td><strong>最佳顺序</strong></td><td>字符编码 → 视口 → 标题 → 其他meta → 外部资源 → 内部样式 → 脚本。</td></tr>
                                    <tr><td><strong>与 <code>&lt;header&gt;</code> 的区别</strong></td><td><code>&lt;head&gt;</code> 是元数据容器（不可见），<code>&lt;header&gt;</code> 是页面页眉（可见）。</td></tr>
                                </table>
                                <p><strong>核心认知</strong>：一个优秀的HTML页面，不仅要有丰富美观的 <code>&lt;body&gt;</code> 内容，更要有一个精心配置的 <code>&lt;head&gt;</code>。它是页面的"第一印象"，也是技术素养的重要体现。</p>

                                <p><strong>3. 每个页面应有独特的标题</strong></p>
                                <p>网站的每一个页面都应有独一无二的 <code>&lt;title&gt;</code>，避免所有页面共用同一个标题。这不仅有助于搜索引擎理解不同页面的差异化内容，也能让用户在多个标签页中轻松区分。</p>

                                            <li>文章页：<code>CSS Flexbox布局完全指南 - 我的个人博客</code></li>
                                            <li>关于页：<code>关于我 - 我的个人博客</code></li>
                                        </ul>
                                    </li>
                                    <li><strong>差</strong>（所有页面都用同一个标题）：
                                        <ul>
                                            <li>首页：<code>我的个人博客</code></li>
                                            <li>文章页：<code>我的个人博客</code></li>
                                            <li>关于页：<code>我的个人博客</code></li>
                                        </ul>
                                    </li>
                                </ul>

                                <p><strong>4. 品牌名称的放置</strong></p>
                                <p>品牌名称建议放在标题末尾，用分隔符（如 <code>-</code>、<code>|</code>、<code>·</code>）与正文隔开。这样既能让核心关键词在前，又能建立品牌认知。</p>
                                <pre><code>&lt;title&gt;CSS Flexbox布局完全指南 - 我的个人博客&lt;/title&gt;
        &lt;title&gt;CSS Flexbox布局完全指南 | 我的个人博客&lt;/title&gt;
        &lt;title&gt;CSS Flexbox布局完全指南 · 我的个人博客&lt;/title&gt;</code></pre>

                                <p><strong>5. 避免关键词堆砌</strong></p>
                                <p>不要把多个不相关的关键词机械地堆砌在标题中。这种做法不仅对SEO无益，还可能被搜索引擎判定为作弊。</p>
                                <ul>
                                    <li><strong>❌ 差（堆砌）</strong>：<code>HTML, CSS, JavaScript, 前端, 网页, 教程, 学习, 零基础</code></li>
                                    <li><strong>✅ 好（自然）</strong>：<code>HTML入门教程 - 零基础学Web前端开发</code></li>
                                </ul>

                                <p><strong>6. 准确反映页面内容</strong></p>
                                <p>标题必须真实、准确地描述页面的内容。如果标题与内容不符（即"标题党"），用户会很快离开页面，导致"跳出率"升高，反而损害SEO排名。</p>

                                <h2>3.2.4 动态标题（使用JavaScript修改）</h2>
                                <p>在某些场景下，你可能希望页面标题随用户操作而变化。例如：</p>
                                <ul>

                                    <li>当用户离开页面时，显示"回来吧"之类的提示。</li>
                                    <li>在聊天应用中，显示未读消息数量。</li>

                                <p>使用JavaScript可以轻松实现动态标题：</p>
                                <pre><code>&lt;script&gt;

            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    document.title = '💬 有新的消息！';
                } else {
                    document.title = '我的聊天应用';
                }

                                <p><strong>注意</strong>：搜索引擎爬虫通常不会执行JavaScript，因此动态标题对SEO没有直接影响。页面的初始 <code>&lt;title&gt;</code> 仍然是最重要的。</p>

                                    <tr><td>关键词堆砌</td><td>用自然流畅的语言撰写标题。</td></tr>
                                    <tr><td>标题与页面内容不符</td><td>标题必须真实反映页面内容。</td></tr>
                                </table>

        &lt;meta http-equiv="refresh" content="5; url=https://example.com"&gt;</code></pre>
                                <div class="tip-box">
                                    <p><strong>⚠️ 谨慎使用</strong>：自动刷新或重定向会打断用户的浏览体验。仅在确实必要的场景下使用（如：旧页面迁移、临时维护提示等）。搜索引擎也可能对使用 <code>refresh</code> 的页面给予较低的排名权重。</p>
                                </div>

                                <p><strong>2. 设置内容类型与编码（已废弃）</strong></p>
                                <p>在 HTML4 时代，字符编码需要用 <code>http-equiv</code> 来声明：</p>
                                <pre><code>&lt;!-- HTML4 写法（已废弃） --&gt;
        &lt;meta http-equiv="Content-Type" content="text/html; charset=utf-8"&gt;</code></pre>
                                <p>但在 HTML5 中，只需使用简洁的 <code>&lt;meta charset="utf-8"&gt;</code> 即可，无需再写 <code>http-equiv</code>。</p>

                                <p><strong>3. 兼容性设置 —— <code>X-UA-Compatible</code>（主要针对 IE）</strong></p>
                                <pre><code>&lt;meta http-equiv="X-UA-Compatible" content="IE=edge"&gt;</code></pre>
                                <p>这行代码告诉旧版 Internet Explorer：<strong>使用最高版本的渲染引擎</strong>来渲染页面，而不是使用兼容模式。由于 IE 已退出历史舞台，这个标签在现代项目中已很少需要。</p>

                                <h2>3.3.6 社交分享 —— Open Graph 协议</h2>
                                <p>当你在微信、微博、Facebook、Twitter 等社交平台上分享一个链接时，分享卡片上显示的标题、描述和缩略图，就是通过 <strong>Open Graph 协议</strong>（由 Facebook 提出）的 <code>&lt;meta&gt;</code> 标签控制的。</p>
                                <pre><code>&lt;!-- 必填 --&gt;
        &lt;meta property="og:title" content="HTML入门教程 - 从零开始学Web开发"&gt;
        &lt;meta property="og:description" content="一份零基础友好的HTML入门教程，带你逐步掌握Web开发的核心技能。"&gt;
        &lt;meta property="og:image" content="https://example.com/images/cover.jpg"&gt;
        &lt;meta property="og:url" content="https://example.com/html-tutorial"&gt;
        &lt;meta property="og:type" content="website"&gt;

        &lt;!-- 可选 --&gt;
        &lt;meta property="og:site_name" content="我的个人博客"&gt;
        &lt;meta property="og:locale" content="zh_CN"&gt;</code></pre>
                                <table>
                                    <tr><th>属性</th><th>作用</th></tr>
                                    <tr><td><code>og:title</code></td><td>分享卡片的主标题。</td></tr>
                                    <tr><td><code>og:description</code></td><td>分享卡片的描述文字。</td></tr>
                                    <tr><td><code>og:image</code></td><td>分享卡片的缩略图（建议尺寸 1200×630px）。</td></tr>
                                    <tr><td><code>og:url</code></td><td>分享页面的完整链接。</td></tr>
                                    <tr><td><code>og:type</code></td><td>页面类型（如 <code>website</code>、<code>article</code>、<code>video</code>）。</td></tr>
                                </table>
                                <div class="tip-box">
                                    <p><strong>🎯 实践建议</strong>：如果你运营一个博客、新闻网站或电商平台，务必添加 Open Graph 标签。这能极大提升在社交平台上的分享效果和点击率。</p>
                                </div>

                                <h2>3.3.7 其他常用的 <code>&lt;meta&gt;</code> 标签</h2>
                                <table>
                                    <tr><th>标签</th><th>作用</th><th>示例</th></tr>
                                    <tr><td><code>author</code></td><td>声明页面作者。</td><td><code>&lt;meta name="author" content="张三"&gt;</code></td></tr>
                                    <tr><td><code>robots</code></td><td>控制搜索引擎爬虫的行为。</td><td><code>&lt;meta name="robots" content="index, follow"&gt;</code></td></tr>
                                    <tr><td><code>copyright</code></td><td>版权信息。</td><td><code>&lt;meta name="copyright" content="© 2026 张三"&gt;</code></td></tr>
                                    <tr><td><code>renderer</code></td><td>针对双核浏览器（如 360）指定渲染模式。</td><td><code>&lt;meta name="renderer" content="webkit"&gt;</code></td></tr>
                                </table>

                                <p><strong><code>robots</code> 常用值</strong></p>
                                <table>
                                    <tr><th>值</th><th>含义</th></tr>
                                    <tr><td><code>index, follow</code></td><td>允许收录并跟踪链接（默认行为）</td></tr>
                                    <tr><td><code>noindex, follow</code></td><td>禁止收录页面，但允许跟踪链接</td></tr>
                                    <tr><td><code>index, nofollow</code></td><td>允许收录，但不跟踪页面上链接</td></tr>
                                    <tr><td><code>noindex, nofollow</code></td><td>禁止收录，且不跟踪链接</td></tr>
                                </table>

                                <h2>3.3.8 一个完整的 <code>&lt;head&gt;</code> 示例</h2>
                                <p>综合以上所有知识，一个配置完善的 <code>&lt;head&gt;</code> 应该是这样的：</p>
                                <pre><code>&lt;head&gt;
            &lt;!-- 1. 字符编码（必须第一位） --&gt;
            &lt;meta charset="utf-8"&gt;

            &lt;!-- 2. 移动端视口 --&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;

            &lt;!-- 3. 页面标题 --&gt;
            &lt;title&gt;HTML入门教程 - 从零开始学Web开发&lt;/title&gt;

            &lt;!-- 4. SEO 描述 --&gt;
            &lt;meta name="description" content="一份零基础友好的HTML入门教程，从第一个页面开始，系统学习HTML标签、语义化、表单与多媒体。"&gt;

            &lt;!-- 5. 作者与版权 --&gt;
            &lt;meta name="author" content="张三"&gt;
            &lt;meta name="copyright" content="© 2026 张三"&gt;

            &lt;!-- 6. 搜索引擎爬虫指令 --&gt;
            &lt;meta name="robots" content="index, follow"&gt;

            &lt;!-- 7. Open Graph（社交分享） --&gt;
            &lt;meta property="og:title" content="HTML入门教程 - 从零开始学Web开发"&gt;
            &lt;meta property="og:description" content="一份零基础友好的HTML入门教程，带你逐步掌握Web开发的核心技能。"&gt;
            &lt;meta property="og:image" content="https://example.com/images/cover.jpg"&gt;
            &lt;meta property="og:url" content="https://example.com/html-tutorial"&gt;
            &lt;meta property="og:type" content="article"&gt;

            &lt;!-- 8. 外部资源 --&gt;
            &lt;link rel="stylesheet" href="style.css"&gt;
            &lt;link rel="icon" href="favicon.ico"&gt;
        &lt;/head&gt;</code></pre>

                                <p><strong>知识小结</strong></p>
                                <p>本节我们系统学习了 <code>&lt;meta&gt;</code> 标签的多种用法：</p>
                                <table>
                                    <tr><th>用途</th><th>标签示例</th></tr>
                                    <tr><td><strong>字符编码</strong></td><td><code>&lt;meta charset="utf-8"&gt;</code>（必须放第一位）</td></tr>
                                    <tr><td><strong>SEO描述</strong></td><td><code>&lt;meta name="description" content="..."&gt;</code></td></tr>
                                    <tr><td><strong>SEO关键词</strong></td><td><code>&lt;meta name="keywords" content="..."&gt;</code>（已不常用）</td></tr>
                                    <tr><td><strong>移动端适配</strong></td><td><code>&lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;</code></td></tr>
                                    <tr><td><strong>页面刷新/重定向</strong></td><td><code>&lt;meta http-equiv="refresh" content="5; url=..."&gt;</code></td></tr>
                                    <tr><td><strong>社交分享（Open Graph）</strong></td><td><code>&lt;meta property="og:title" content="..."&gt;</code></td></tr>
                                    <tr><td><strong>搜索引擎爬虫</strong></td><td><code>&lt;meta name="robots" content="index, follow"&gt;</code></td></tr>
                                    <tr><td><strong>作者/版权</strong></td><td><code>&lt;meta name="author" content="..."&gt;</code></td></tr>
                                </table>
                                <p><strong>核心认知</strong>：<code>&lt;meta&gt;</code> 标签虽然不显示在页面上，但它是页面与外部世界（搜索引擎、社交平台、移动设备）的"桥梁"。一个页面能否被正确检索、能否获得良好的分享效果、能否在移动端完美适配，很大程度上取决于 <code>&lt;meta&gt;</code> 标签是否配置得当。</p>

                                <p><strong>思考与练习</strong></p>
                                <p><strong>一、选择题</strong></p>
                                <ol>
                                    <li>为了避免中文乱码，应该在 <code>&lt;head&gt;</code> 的第一位添加（　）<br>A. <code>&lt;meta name="viewport"&gt;</code> &nbsp;&nbsp; B. <code>&lt;meta charset="utf-8"&gt;</code><br>C. <code>&lt;title&gt;</code> &nbsp;&nbsp; D. <code>&lt;meta name="description"&gt;</code></li>
                                    <li>以下哪个标签用于控制移动端页面的缩放适配？（　）<br>A. <code>&lt;meta name="viewport"&gt;</code> &nbsp;&nbsp; B. <code>&lt;meta name="description"&gt;</code><br>C. <code>&lt;meta http-equiv="refresh"&gt;</code> &nbsp;&nbsp; D. <code>&lt;meta name="robots"&gt;</code></li>
                                    <li>在搜索结果中，页面标题下方显示的描述文字来自哪个标签？（　）<br>A. <code>&lt;title&gt;</code> &nbsp;&nbsp; B. <code>&lt;meta name="keywords"&gt;</code><br>C. <code>&lt;meta name="description"&gt;</code> &nbsp;&nbsp; D. <code>&lt;meta name="author"&gt;</code></li>
                                    <li>Open Graph 标签主要用于（　）<br>A. 提高搜索引擎排名 &nbsp;&nbsp; B. 控制页面在社交平台上的分享效果<br>C. 设置页面字符编码 &nbsp;&nbsp; D. 控制浏览器渲染模式</li>
                                    <li>以下哪个 <code>robots</code> 值表示"禁止搜索引擎收录本页面，但允许跟踪页面上的链接"？（　）<br>A. <code>index, follow</code> &nbsp;&nbsp; B. <code>noindex, follow</code><br>C. <code>index, nofollow</code> &nbsp;&nbsp; D. <code>noindex, nofollow</code></li>
                                </ol>
                                <p><strong>二、简答题</strong></p>
                                <ol>
                                    <li>为什么 <code>&lt;meta charset="utf-8"&gt;</code> 必须放在 <code>&lt;head&gt;</code> 的第一位？</li>
                                    <li><code>description</code> 和 <code>keywords</code> 在 SEO 中的作用有何不同？哪个更重要？</li>
                                    <li>如果你是一个博客作者，希望在微信中分享文章时显示漂亮的卡片（标题、描述、缩略图），你应该在 <code>&lt;head&gt;</code> 中添加哪些标签？</li>
                                </ol>
                                <p><strong>三、上机实践</strong></p>
                                <ol>
                                    <li>打开你之前创建的 <code>index.html</code>，在 <code>&lt;head&gt;</code> 中按以下要求补充标签：
                                        <ul>
                                            <li>将 <code>charset</code> 放在第一位。</li>
                                            <li>添加 <code>viewport</code> 标签。</li>
                                            <li>添加一个长度为 30～50 字的 <code>description</code>。</li>
                                            <li>添加一个 <code>author</code> 标签。</li>

                                        </ul>
                                    </li>
                                    <li>使用浏览器的开发者工具（F12 → Elements 面板），展开 <code>&lt;head&gt;</code> 节点，检查你添加的所有 <code>&lt;meta&gt;</code> 标签是否正确。</li>
                                    <li>（选做）为一个假设的博客文章页面，编写完整的 Open Graph 标签（<code>og:title</code>、<code>og:description</code>、<code>og:image</code>、<code>og:url</code>、<code>og:type</code>）。</li>
                                </ol>

                icon: 'fa-link',
                content: `
                            <h1>3.4 <code>&lt;base&gt;</code> 基底网址标记</h1>
                            <div class="chapter-content">
                                <p>在 <code>&lt;head&gt;</code> 的所有子标签中，<code>&lt;base&gt;</code> 可能是最"低调"的一个——它不像 <code>&lt;title&gt;</code> 那样人人必需，也不像 <code>&lt;meta&gt;</code> 那样功能繁多。但如果你理解了它的作用，就会发现在某些场景下，<code>&lt;base&gt;</code> 能帮你避免大量重复的工作，让页面中所有相对路径的管理变得异常简单。</p>
                                <p><code>&lt;base&gt;</code> 标签的作用可以用一句话概括：<strong>为页面中所有的相对路径 URL 提供一个"基准地址"</strong>。</p>

                                <h2>3.4.1 什么是 <code>&lt;base&gt;</code> 标签</h2>
                                <p><code>&lt;base&gt;</code> 是一个<strong>单标签</strong>，用于设置页面中所有相对路径的<strong>基础 URL</strong>。当浏览器在页面中遇到一个相对路径（如 <code>images/photo.jpg</code> 或 <code>./style.css</code>）时，它会将 <code>&lt;base&gt;</code> 中指定的 URL 作为"前缀"，拼接成完整的绝对路径。</p>

                                <p><strong>基本语法</strong></p>
                                <pre><code>&lt;base href="基准URL"&gt;</code></pre>

                                <p><strong>示例：</strong></p>
                                <pre><code>&lt;head&gt;
            &lt;base href="https://example.com/my-project/"&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;img src="images/logo.png"&gt;   &lt;!-- 实际请求：https://example.com/my-project/images/logo.png --&gt;
            &lt;a href="about.html"&gt;关于我们&lt;/a&gt;  &lt;!-- 实际请求：https://example.com/my-project/about.html --&gt;
            &lt;link rel="stylesheet" href="css/style.css"&gt;  &lt;!-- 实际请求：https://example.com/my-project/css/style.css --&gt;
        &lt;/body&gt;</code></pre>
                                <div class="tip-box">
                                    <p><strong>💡 注意</strong>：<code>&lt;base&gt;</code> 必须在 <code>&lt;head&gt;</code> 中，且<strong>必须放在所有使用相对路径的标签之前</strong>（通常紧跟在 <code>&lt;meta charset&gt;</code> 和 <code>&lt;title&gt;</code> 之后）。如果放在这些标签之后，可能无法生效。</p>
                                </div>

                                <p><strong>可选属性：<code>target</code></strong></p>
                                <p>除了 <code>href</code>，<code>&lt;base&gt;</code> 还可以通过 <code>target</code> 属性设置页面中所有超链接的默认打开方式：</p>
                                <pre><code>&lt;base href="https://example.com/" target="_blank"&gt;</code></pre>
                                <p>这样页面中所有的 <code>&lt;a&gt;</code> 标签都会默认在新窗口/新标签页中打开，除非个别链接显式指定了不同的 <code>target</code>。</p>

                                <h2>3.4.2 为什么需要 <code>&lt;base&gt;</code></h2>
                                <p>在没有 <code>&lt;base&gt;</code> 的情况下，浏览器使用<strong>当前页面的 URL 作为基准</strong>来解析相对路径。例如：</p>
                                <ul>
                                    <li>当前页面：<code>https://example.com/products/index.html</code></li>
                                    <li>相对路径：<code>images/photo.jpg</code></li>
                                    <li>实际请求：<code>https://example.com/products/images/photo.jpg</code></li>
                                </ul>
                                <p>这个行为大多数时候没有问题。但在以下场景中，<code>&lt;base&gt;</code> 能派上大用场：</p>

                                <p><strong>1. 项目文件结构迁移或部署环境变化</strong></p>
                                <p>假设你的项目在本地开发时放在 <code>/my-project/</code> 目录下，而部署到服务器后放在了 <code>/</code>（根目录）或 <code>/v2/</code> 目录下。如果不使用 <code>&lt;base&gt;</code>，你需要修改所有 HTML 文件中涉及路径的地方——这既繁琐又容易遗漏。</p>
                                <p>使用 <code>&lt;base&gt;</code>，你只需要修改一处：</p>
                                <pre><code>&lt;!-- 开发环境 --&gt;
        &lt;base href="/my-project/"&gt;

        &lt;!-- 生产环境 --&gt;
        &lt;base href="/"&gt;</code></pre>
                                <p>页面中所有相对路径（如 <code>images/logo.png</code>）都会自动适配新的基准地址。</p>

                                <p><strong>2. 单页应用（SPA）中的路由管理</strong></p>
                                <p>在 Vue.js、React 等前端框架构建的单页应用中，<code>&lt;base&gt;</code> 经常用于配置路由的根路径：</p>
                                <pre><code>&lt;base href="/app/"&gt;</code></pre>
                                <p>这告诉路由系统所有路径都从 <code>/app/</code> 开始，便于应用部署在子目录中。</p>

                                <p><strong>3. 内容管理系统（CMS）中的动态页面</strong></p>
                                <p>如果你开发一个 CMS 主题或模板，页面可能被放在不同的目录层级中（如 <code>https://example.com/</code> 或 <code>https://example.com/blog/post/</code>）。使用 <code>&lt;base&gt;</code> 可以让模板中的资源引用（图片、CSS、JS）始终保持正确，而不必担心页面所在的目录深度。</p>

                                <h2>3.4.3 使用 <code>&lt;base&gt;</code> 的注意事项</h2>
                                <p><code>&lt;base&gt;</code> 虽然方便，但使用不当也可能带来麻烦。以下是几个关键的注意事项：</p>

                                <p><strong>1. 每个页面只能有一个 <code>&lt;base&gt;</code></strong></p>
                                <p>一个 HTML 文档中<strong>只能出现一个 <code>&lt;base&gt;</code> 标签</strong>。如果写了多个，浏览器通常只会使用第一个。</p>

                                <p><strong>2. 必须放在 <code>&lt;head&gt;</code> 中，且在使用相对路径的标签之前</strong></p>
                                <p><code>&lt;base&gt;</code> 必须放在 <code>&lt;head&gt;</code> 内部，并且必须放在任何可能使用相对路径的标签（如 <code>&lt;link&gt;</code>、<code>&lt;script&gt;</code>、<code>&lt;img&gt;</code>、<code>&lt;a&gt;</code> 等）<strong>之前</strong>。通常的建议位置是：</p>
                                <pre><code>&lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;
            &lt;title&gt;页面标题&lt;/title&gt;

            &lt;!-- ✅ 在这里放置 <base> --&gt;
            &lt;base href="https://example.com/my-project/"&gt;

            &lt;!-- 之后的所有相对路径都会基于此基准 --&gt;
            &lt;link rel="stylesheet" href="css/style.css"&gt;
            &lt;script src="js/app.js"&gt;&lt;/script&gt;
        &lt;/head&gt;</code></pre>

                                <p><strong>3. 对"页面内锚点"的影响</strong></p>
                                <p><code>&lt;base&gt;</code> 会影响 <code>href</code> 以 <code>#</code> 开头的锚点链接。例如：</p>
                                <pre><code>&lt;base href="https://example.com/"&gt;
        &lt;a href="#section1"&gt;跳转到第一节&lt;/a&gt;</code></pre>
                                <p>浏览器会解析为 <code>https://example.com/#section1</code>，而不是当前页面的 <code>#section1</code>。如果这不是你想要的行为，可以在锚点链接中显式使用当前页面的完整路径或使用 JavaScript 处理。</p>

                                <p><strong>4. 对空 <code>href</code> 或 <code>src</code> 的影响</strong></p>
                                <p>如果 <code>&lt;a&gt;</code> 的 <code>href</code> 为空字符串 <code>""</code>，或者 <code>&lt;img&gt;</code> 的 <code>src</code> 为空，浏览器会使用 <code>&lt;base&gt;</code> 的 <code>href</code> 作为请求地址。这可能导致意外请求到基准 URL。因此，<strong>不要在 <code>&lt;base&gt;</code> 存在的情况下使用空的 <code>href</code> 或 <code>src</code></strong>。</p>

                                <p><strong>5. 与 JavaScript 的交互</strong></p>
                                <p>JavaScript 中通过 <code>document.baseURI</code> 可以获取当前页面中 <code>&lt;base&gt;</code> 设置的基准 URL：</p>
                                <pre><code>console.log(document.baseURI);  // 输出：https://example.com/my-project/</code></pre>
                                <p>如果你使用 AJAX 请求或动态创建元素，注意 <code>baseURI</code> 可能影响相对路径的解析。</p>

                                <h2>3.4.4 <code>&lt;base&gt;</code> 与 <code>&lt;link&gt;</code>、<code>&lt;script&gt;</code> 的路径解析</h2>
                                <p>为了更好地理解 <code>&lt;base&gt;</code> 的作用，下面通过一个完整的示例来说明：</p>
                                <p>假设你的页面 URL 是：<code>https://example.com/blog/2026/06/index.html</code></p>

                                <p><strong>不使用 <code>&lt;base&gt;</code></strong></p>
                                <pre><code>&lt;head&gt;
            &lt;title&gt;我的博客&lt;/title&gt;
            &lt;link rel="stylesheet" href="style.css"&gt;
            &lt;!-- 实际请求：https://example.com/blog/2026/06/style.css --&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;img src="images/photo.jpg"&gt;
            &lt;!-- 实际请求：https://example.com/blog/2026/06/images/photo.jpg --&gt;
            &lt;a href="../about.html"&gt;关于&lt;/a&gt;
            &lt;!-- 实际请求：https://example.com/blog/2026/about.html --&gt;
        &lt;/body&gt;</code></pre>

                                <p><strong>使用 <code>&lt;base&gt;</code></strong></p>
                                <pre><code>&lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;title&gt;我的博客&lt;/title&gt;
            &lt;base href="https://example.com/assets/"&gt;
            &lt;link rel="stylesheet" href="style.css"&gt;
            &lt;!-- 实际请求：https://example.com/assets/style.css --&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;img src="images/logo.png"&gt;
            &lt;!-- 实际请求：https://example.com/assets/images/logo.png --&gt;
            &lt;a href="/about.html"&gt;关于&lt;/a&gt;
            &lt;!-- 注意：以 "/" 开头的路径是绝对路径，不受 <base> 影响 --&gt;
            &lt;!-- 实际请求：https://example.com/about.html --&gt;
        &lt;/body&gt;</code></pre>
                                <div class="tip-box">
                                    <p><strong>💡 关键区别</strong>：以 <code>/</code>（根路径）开头或包含协议（如 <code>https://</code>）的路径是<strong>绝对路径</strong>，不受 <code>&lt;base&gt;</code> 影响。只有<strong>相对路径</strong>（如 <code>style.css</code>、<code>images/logo.png</code>、<code>../about.html</code>）才会使用 <code>&lt;base&gt;</code> 作为基准。</p>
                                </div>

                                <h2>3.4.5 常见错误与误区</h2>
                                <table>
                                    <tr><th>错误</th><th>正确做法</th></tr>
                                    <tr><td>在 <code>&lt;body&gt;</code> 中放置 <code>&lt;base&gt;</code></td><td><code>&lt;base&gt;</code> 必须放在 <code>&lt;head&gt;</code> 中。</td></tr>
                                    <tr><td>一个页面中使用多个 <code>&lt;base&gt;</code></td><td>每个页面只能有一个 <code>&lt;base&gt;</code>。</td></tr>
                                    <tr><td>将 <code>&lt;base&gt;</code> 放在 <code>&lt;link&gt;</code> 或 <code>&lt;img&gt;</code> 之后</td><td><code>&lt;base&gt;</code> 必须放在所有使用相对路径的标签之前。</td></tr>
                                    <tr><td>忘记在基准 URL 末尾加 <code>/</code></td><td><code>href="https://example.com"</code> 和 <code>href="https://example.com/"</code> 不同。后者才是正确的目录形式。</td></tr>
                                    <tr><td>认为绝对路径也受 <code>&lt;base&gt;</code> 影响</td><td>以 <code>/</code> 开头的路径是绝对路径，不受 <code>&lt;base&gt;</code> 影响。</td></tr>
                                </table>

                                <p><strong>知识小结</strong></p>
                                <p>本节我们学习了 <code>&lt;base&gt;</code> 基底网址标记：</p>
                                <table>
                                    <tr><th>要点</th><th>说明</th></tr>
                                    <tr><td><strong>作用</strong></td><td>为页面中所有相对路径提供基准 URL。</td></tr>
