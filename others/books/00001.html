                    <h2>3.7.4 脚本的加载与执行顺序</h2>
                    <p>了解脚本的加载和执行顺序，对于避免"未定义"错误至关重要。</p>

                    <p><strong>示例 1：多个脚本按顺序执行（无 defer/async）</strong></p>
                    <pre><code>&lt;script src="lib.js"&gt;&lt;/script&gt;   &lt;!-- 先下载并执行 lib.js --&gt;
        &lt;script src="app.js"&gt;&lt;/script&gt;   &lt;!-- 然后下载并执行 app.js --&gt;
        &lt;script&gt;
            // 最后执行内嵌代码
            console.log('所有脚本执行完毕');
        &lt;/script&gt;</code></pre>

                    <p><strong>示例 2：<code>defer</code> 保证顺序</strong></p>
                    <pre><code>&lt;script src="lib.js" defer&gt;&lt;/script&gt;
        &lt;script src="app.js" defer&gt;&lt;/script&gt;
        &lt;!-- 两个脚本异步下载，但 app.js 会在 lib.js 之后执行 --&gt;</code></pre>

                    <p><strong>示例 3：<code>async</code> 不保证顺序</strong></p>
                    <pre><code>&lt;script src="analytics.js" async&gt;&lt;/script&gt;
        &lt;script src="chat.js" async&gt;&lt;/script&gt;
        &lt;!-- analytics.js 和 chat.js 谁先下载完谁先执行，顺序不确定 --&gt;</code></pre>

                    <p><strong>示例 4：混合使用</strong></p>
                    <pre><code>&lt;script src="jquery.js" defer&gt;&lt;/script&gt;
        &lt;script src="app.js" defer&gt;&lt;/script&gt;
        &lt;script src="ads.js" async&gt;&lt;/script&gt;
        &lt;!-- jquery.js 和 app.js 按顺序延迟执行，ads.js 独立异步执行 --&gt;</code></pre>

                    <h2>3.7.5 <code>type</code> 属性与模块脚本</h2>
                    <p><strong>1. <code>type</code> 属性（传统）</strong></p>
                    <p>在 HTML4 和 XHTML 时代，<code>&lt;script&gt;</code> 需要指定 <code>type="text/javascript"</code>：</p>
                    <pre><code>&lt;script type="text/javascript" src="main.js"&gt;&lt;/script&gt;</code></pre>
                    <p>在 HTML5 中，<code>type</code> 不再是必需的，浏览器默认将 <code>&lt;script&gt;</code> 中的内容识别为 JavaScript。直接写 <code>&lt;script src="main.js"&gt;</code> 即可。</p>

                    <p><strong>2. ES Module —— <code>type="module"</code></strong></p>
                    <p>现代 JavaScript 支持 ES Module（ES6 模块），可以在浏览器中使用 <code>import</code> 和 <code>export</code> 语法。使用 <code>type="module"</code> 来标记模块脚本：</p>
                    <pre><code>&lt;script type="module"&gt;
            import { greet } from './utils.js';
            greet('Hello');
        &lt;/script&gt;</code></pre>
                    <p><strong>模块脚本的特殊行为</strong>：</p>
                    <ul>
                        <li>默认具有 <strong><code>defer</code></strong> 行为（不阻塞渲染，延迟执行）。</li>
                        <li>自动启用 <strong>严格模式</strong>（<code>"use strict"</code>）。</li>
                        <li>模块内的变量和函数不会污染全局作用域。</li>
                        <li>支持 <code>import</code> 和 <code>export</code> 语法。</li>
                    </ul>
                    <pre><code>&lt;script type="module" src="app.js"&gt;&lt;/script&gt;
        &lt;!-- app.js 中的代码会以模块方式执行，自动 defer --&gt;</code></pre>

                    <p><strong>3. <code>nomodule</code> —— 为旧浏览器提供降级方案</strong></p>
                    <p>对于不支持 ES Module 的旧浏览器，可以使用 <code>nomodule</code> 属性提供备选脚本：</p>
                    <pre><code>&lt;script type="module" src="app-modern.js"&gt;&lt;/script&gt;
        &lt;script nomodule src="app-legacy.js"&gt;&lt;/script&gt;</code></pre>
                    <p>现代浏览器会加载第一个（模块），忽略第二个；旧浏览器会忽略第一个，加载第二个。</p>

                    <h2>3.7.6 内联脚本与外部脚本的选择</h2>
                    <table>
                        <tr><th>对比维度</th><th>内联脚本（<code>&lt;script&gt;</code> 内嵌）</th><th>外部脚本（<code>src</code>）</th></tr>
                        <tr><td><strong>复用性</strong></td><td>❌ 仅当前页面可用</td><td>✅ 多页面可共用</td></tr>
                        <tr><td><strong>可维护性</strong></td><td>❌ 代码与 HTML 混杂</td><td>✅ 代码分离，便于维护</td></tr>
                        <tr><td><strong>缓存效率</strong></td><td>❌ 每次加载页面都要重新下载</td><td>✅ 浏览器可缓存</td></tr>
                        <tr><td><strong>加载性能</strong></td><td>较小脚本可减少 HTTP 请求</td><td>较大脚本可并行加载</td></tr>
                        <tr><td><strong>适用场景</strong></td><td>少量页面独有代码、配置数据</td><td>通用逻辑、大型应用代码</td></tr>
                    </table>
                    <p><strong>推荐做法</strong>：将通用的、较大的 JavaScript 代码放在外部文件中，通过 <code>&lt;script src="..."&gt;</code> 引入；将页面独有的、少量的脚本（如初始化数据、事件绑定）以内联方式写在 <code>&lt;body&gt;</code> 底部或使用 <code>defer</code>。</p>

                    <h2>3.7.7 常见错误与调试技巧</h2>
                    <p><strong>1. 错误：<code>xxx is not defined</code></strong></p>
                    <p>通常是因为脚本加载顺序不对，某个变量在被使用之前尚未定义。</p>
                    <p><strong>解决方法</strong>：检查 <code>&lt;script&gt;</code> 的顺序，确保依赖的库先加载。</p>

                    <p><strong>2. 错误：脚本未生效</strong></p>
                    <p>可能的原因：</p>
                    <ul>
                        <li><code>src</code> 路径错误（检查文件名和目录层级）。</li>
                        <li>脚本中有语法错误（查看浏览器控制台的报错信息）。</li>
                        <li>脚本被浏览器的广告拦截器或安全策略阻止。</li>
                    </ul>

                    <p><strong>3. 调试技巧</strong></p>
                    <ul>
                        <li><strong>浏览器控制台（Console）</strong>：按 <code>F12</code> 打开开发者工具，在 Console 面板中查看错误信息和日志输出。</li>
                        <li><strong><code>console.log()</code></strong>：在关键位置输出变量值，帮助追踪代码执行流程。</li>
                        <li><strong>断点调试</strong>：在 Sources 面板中设置断点，逐行执行代码。</li>
                    </ul>

                    <h2>3.7.8 一个完整的 <code>&lt;head&gt;</code> 示例（含 <code>&lt;script&gt;</code>）</h2>
                    <p>综合本章全部内容，一个配置完善的 <code>&lt;head&gt;</code> 最终版本如下：</p>
                    <pre><code>&lt;head&gt;
            &lt;!-- 1. 字符编码（第一位） --&gt;
            &lt;meta charset="utf-8"&gt;

            &lt;!-- 2. 移动端视口 --&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;

            &lt;!-- 3. 页面标题 --&gt;
            &lt;title&gt;我的个人博客 - 技术分享&lt;/title&gt;

            &lt;!-- 4. SEO 描述 --&gt;
            &lt;meta name="description" content="分享Web开发技术、读书笔记和生活感悟的个人博客。"&gt;

            &lt;!-- 5. 网站图标 --&gt;
            &lt;link rel="icon" href="/favicon.ico" sizes="32x32"&gt;
            &lt;link rel="apple-touch-icon" href="/apple-touch-icon.png"&gt;

            &lt;!-- 6. 预连接外部资源 --&gt;
            &lt;link rel="preconnect" href="https://fonts.googleapis.com"&gt;
            &lt;link rel="preconnect" href="https://fonts.gstatic.com" crossorigin&gt;

            &lt;link rel="stylesheet" href="/css/reset.css"&gt;
            &lt;link rel="stylesheet" href="/css/style.css"&gt;

            &lt;!-- 8. 本页面独有样式 --&gt;
            &lt;style&gt;
                .article-content { max-width: 720px; margin: 0 auto; }
            &lt;/style&gt;

            &lt;!-- 9. 外部 JavaScript（带 defer，不阻塞渲染） --&gt;
            &lt;script src="/js/lib/jquery.js" defer&gt;&lt;/script&gt;
            &lt;script src="/js/app.js" defer&gt;&lt;/script&gt;

            &lt;!-- 10. 第三方统计脚本（async，独立加载） --&gt;
            &lt;script src="https://www.googletagmanager.com/gtag/js" async&gt;&lt;/script&gt;
        &lt;/head&gt;</code></pre>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了 <code>&lt;script&gt;</code> 脚本标记：</p>
                    <table>
                        <tr><th>要点</th><th>说明</th></tr>
                        <tr><td><strong>两种用法</strong></td><td>内嵌代码（<code>&lt;script&gt;...&lt;/script&gt;</code>）和外部引用（<code>&lt;script src="..."&gt;</code>）</td></tr>
                        <tr><td><strong>位置选择</strong></td><td>传统放在 <code>&lt;head&gt;</code> 会阻塞渲染；现代推荐放在 <code>&lt;body&gt;</code> 底部或使用 <code>defer</code>/<code>async</code></td></tr>
                        <tr><td><strong><code>defer</code></strong></td><td>异步加载，HTML 解析完成后按顺序执行，不阻塞渲染。推荐用于应用主逻辑。</td></tr>
                        <tr><td><strong><code>async</code></strong></td><td>异步加载，加载完成后立即执行，不保证顺序。推荐用于独立第三方脚本。</td></tr>
                        <tr><td><strong><code>type="module"</code></strong></td><td>标记 ES Module 脚本，自动 defer，支持 <code>import</code>/<code>export</code>。</td></tr>
                        <tr><td><strong><code>nomodule</code></strong></td><td>为旧浏览器提供降级方案。</td></tr>
                        <tr><td><strong>最佳实践</strong></td><td>使用 <code>defer</code> 加载外部脚本，或将脚本放在 <code>&lt;body&gt;</code> 底部，确保良好的页面加载性能。</td></tr>
                    </table>
                    <p><strong>核心认知</strong>：<code>&lt;script&gt;</code> 标签是连接 HTML 与 JavaScript 的桥梁。理解其加载和执行机制，不仅能让你写出更可靠的代码，还能显著优化页面的加载速度和用户体验。</p>

                    <p><strong>思考与练习</strong></p>
                    <p><strong>一、选择题</strong></p>
                    <ol>
                        <li>以下哪个属性可以让外部脚本异步加载，并在 HTML 解析完成后按顺序执行？（　）<br>A. <code>async</code> &nbsp;&nbsp; B. <code>defer</code> &nbsp;&nbsp; C. <code>type="module"</code> &nbsp;&nbsp; D. <code>nomodule</code></li>
                        <li>以下哪个属性适用于独立的第三方脚本（如统计代码），且不保证执行顺序？（　）<br>A. <code>async</code> &nbsp;&nbsp; B. <code>defer</code> &nbsp;&nbsp; C. <code>type="module"</code> &nbsp;&nbsp; D. <code>nomodule</code></li>
                        <li>为了不阻塞页面渲染，<code>&lt;script&gt;</code> 标签最推荐放在（　）<br>A. <code>&lt;head&gt;</code> 的最前面 &nbsp;&nbsp; B. <code>&lt;head&gt;</code> 的最后面<br>C. <code>&lt;body&gt;</code> 的最底部 &nbsp;&nbsp; D. <code>&lt;body&gt;</code> 的最顶部</li>
                        <li>以下关于 ES Module（<code>type="module"</code>）的说法，正确的是（　）<br>A. 默认阻塞 HTML 解析 &nbsp;&nbsp; B. 默认具有 <code>defer</code> 行为<br>C. 不支持 <code>import</code> 语法 &nbsp;&nbsp; D. 必须在 <code>&lt;head&gt;</code> 中才能使用</li>
                        <li>如果一个页面有多个 <code>async</code> 脚本，它们的执行顺序是（　）<br>A. 按照在 HTML 中出现的顺序执行 &nbsp;&nbsp; B. 随机执行<br>C. 谁先下载完谁先执行 &nbsp;&nbsp; D. 由浏览器决定，但保证与出现顺序一致</li>
                    </ol>
                    <p><strong>二、简答题</strong></p>
                    <ol>
                        <li>为什么传统的将 <code>&lt;script&gt;</code> 放在 <code>&lt;head&gt;</code> 中的做法会影响页面加载速度？请解释其原理。</li>
                        <li><code>defer</code> 和 <code>async</code> 的主要区别是什么？分别适用于什么场景？</li>

                <h1>4.1 标题标签 —— <code>&lt;h1&gt;</code> ~ <code>&lt;h6&gt;</code></h1>

                    <p>在前三章中，我们学习了HTML文档的结构、头部信息和基本语法规则。从本章开始，我们将正式进入<strong>网页可见内容</strong>的设计与构建。</p>
                    <p>网页的内容千变万化——有新闻文章、产品介绍、个人博客、企业官网……但无论什么类型的页面，<strong>标题（Heading）</strong> 都是最重要的内容元素之一。它就像文章的"骨架"，不仅让页面结构清晰，更直接影响用户的阅读体验和搜索引擎的理解。</p>
                    <p>在HTML中，标题由一组标签来定义：<strong><code>&lt;h1&gt;</code> 到 <code>&lt;h6&gt;</code></strong>，共六个级别。</p>

                    <h2>4.1.1 标题标签的等级体系</h2>
                    <p>HTML提供了六个层级的标题标签，从最高级到最低级依次为：</p>
                    <table>
                        <tr><th>标签</th><th>层级</th><th>默认显示效果</th><th>典型用途</th></tr>
                        <tr><td><code>&lt;h1&gt;</code></td><td><strong>一级标题</strong>（最高）</td><td>最大、最粗</td><td>页面的主标题/文章标题</td></tr>
                        <tr><td><code>&lt;h2&gt;</code></td><td><strong>二级标题</strong></td><td>较大、较粗</td><td>章节标题/主要分区标题</td></tr>
                        <tr><td><code>&lt;h3&gt;</code></td><td><strong>三级标题</strong></td><td>中等</td><td>子章节标题/小节标题</td></tr>
                        <tr><td><code>&lt;h4&gt;</code></td><td><strong>四级标题</strong></td><td>较小</td><td>细分子标题</td></tr>
                        <tr><td><code>&lt;h5&gt;</code></td><td><strong>五级标题</strong></td><td>更小</td><td>极少使用</td></tr>
                        <tr><td><code>&lt;h6&gt;</code></td><td><strong>六级标题</strong></td><td>最小</td><td>极少使用</td></tr>
                    </table>

                    <p><strong>基本语法</strong></p>
                    <p>所有标题标签都是<strong>双标签</strong>，使用方式完全相同：</p>
                    <pre><code>&lt;h1&gt;这是一级标题&lt;/h1&gt;
        &lt;h2&gt;这是二级标题&lt;/h2&gt;
        &lt;h3&gt;这是三级标题&lt;/h3&gt;
        &lt;h4&gt;这是四级标题&lt;/h4&gt;
        &lt;h5&gt;这是五级标题&lt;/h5&gt;
        &lt;h6&gt;这是六级标题&lt;/h6&gt;</code></pre>

                    <p><strong>浏览器的默认样式</strong></p>
                    <p>在没有CSS干预的情况下，浏览器会为不同级别的标题赋予不同的字号和粗细：</p>

        &lt;/body&gt;
        &lt;/html&gt;</code></pre>
                    <p>在浏览器中，<code>&lt;h1&gt;</code> 的字号约为 2em（约32px），<code>&lt;h2&gt;</code> 约为 1.5em（约24px），逐级递减。但<strong>请记住</strong>：标题标签的语义层级比视觉大小更重要——你应该根据内容结构选择正确的标签，而不是根据想要的"字体大小"来选择。</p>

                    <h2>4.1.2 标题标签的语义化</h2>
                    <p><strong>什么是语义化标题？</strong></p>
                    <p><strong>语义化</strong>是指使用正确的HTML标签来表达内容的结构和含义，而不是仅仅为了视觉效果。</p>
                    <p>在HTML中，标题标签（<code>&lt;h1&gt;</code>~<code>&lt;h6&gt;</code>）表达的是<strong>文档结构的层级关系</strong>——就像一本书有"章"→"节"→"小节"一样，网页内容也应该有清晰的层级结构。</p>

                    <p><strong>正确示例：结构清晰的标题层级</strong></p>
                    <pre><code>&lt;body&gt;
            &lt;!-- 页面主标题 --&gt;
            &lt;h1&gt;HTML入门教程&lt;/h1&gt;

            &lt;h3&gt;1.2 HTML的基本结构&lt;/h3&gt;

            &lt;h3&gt;2.2 链接与图像&lt;/h3&gt;

            &lt;!-- 第三部分 --&gt;
            &lt;h2&gt;三、综合实战&lt;/h2&gt;
        &lt;/body&gt;</code></pre>
                    <p>这个示例清晰地展示了页面的内容结构：全书标题是<code>&lt;h1&gt;</code>，每个大章节是<code>&lt;h2&gt;</code>，章节内的小节是<code>&lt;h3&gt;</code>，更细的分类是<code>&lt;h4&gt;</code>。</p>

                    <p><strong>错误示例：滥用标题标签</strong></p>
                    <pre><code>&lt;!-- ❌ 为了把文字变大，直接用 h1 包裹所有重要文字 --&gt;
        &lt;h1&gt;欢迎来到我的网站&lt;/h1&gt;

                    <p>这些做法都会破坏文档结构的语义，不利于搜索引擎理解和屏幕阅读器导航。</p>

                    <h2>4.1.3 SEO 与标题标签</h2>
                    <p>标题标签是<strong>页面SEO（搜索引擎优化）最重要的内部因素之一</strong>，尤其是 <code>&lt;h1&gt;</code>。</p>

                    <p><strong><code>&lt;h1&gt;</code> —— 页面的"核心主题"</strong></p>
                    <p><code>&lt;h1&gt;</code> 告诉搜索引擎和用户："这个页面的核心主题是什么。"搜索引擎会给予 <code>&lt;h1&gt;</code> 中的文字较高的权重。</p>
                    <p><strong>最佳实践：</strong></p>
                    <ul>
                        <li>每个页面<strong>有且只有一个 <code>&lt;h1&gt;</code></strong>。</li>
                        <li><code>&lt;h1&gt;</code> 应<strong>概括页面的核心主题</strong>，通常与 <code>&lt;title&gt;</code> 内容相关但不完全相同。</li>
                        <li><code>&lt;h1&gt;</code> 应放在 <code>&lt;body&gt;</code> 的最前面（或紧跟在 <code>&lt;header&gt;</code> 之后）。</li>
                    </ul>

                    <p>虽然浏览器为标题标签提供了默认样式，但在实际项目中，你几乎总是会通过CSS自定义标题的外观。</p>

                    <p><strong>保留语义，自定义外观</strong></p>
                    <p><strong>核心原则</strong>：无论你如何修改标题的视觉样式（颜色、字号、间距），都必须保留其语义层级。不要为了让某个文字看起来更大而使用更高层级的标题，也不要为了让文字更小而使用更低层级的标题。</p>

                    <table>
                        <tr><th>对比维度</th><th><code>&lt;p&gt;</code></th><th><code>&lt;br&gt;</code></th></tr>
                        <tr><td><strong>标签类型</strong></td><td>双标签（<code>&lt;p&gt;...&lt;/p&gt;</code>）</td><td>单标签（<code>&lt;br&gt;</code>）</td></tr>
                        <tr><td><strong>语义含义</strong></td><td>表示一个独立的段落</td><td>表示一个换行（仍在同一段落内）</td></tr>
                        <tr><td><strong>垂直间距</strong></td><td>自动在段落上下添加间距</td><td>不添加额外间距，仅换行</td></tr>
                        <tr><td><strong>适用场景</strong></td><td>组织文字为独立的段落单元</td><td>在段落内强制换行（地址、诗歌等）</td></tr>
                        <tr><td><strong>是否可嵌套</strong></td><td>不能嵌套其他 <code>&lt;p&gt;</code></td><td>可放在任何文本内容中</td></tr>
                    </table>

                    <h2>4.2.4 段落内的空白处理</h2>
                    <p><strong>多个空格会被合并</strong></p>
                    <p>在HTML中，无论你在源代码中输入多少个连续空格，浏览器都会将它们<strong>合并为一个空格</strong>。</p>
                    <pre><code>&lt;p&gt;这    是    一    段    文    字。&lt;/p&gt;</code></pre>
                    <p>显示为：</p>
                    <pre><code>这是一段文字。</code></pre>

                    <p><strong>使用 <code>&amp;nbsp;</code> 保留空格</strong></p>
                    <p>如果你需要保留多个连续空格，可以使用<strong>不间断空格实体</strong> <code>&amp;nbsp;</code>：</p>
                    <pre><code>&lt;p&gt;这&amp;nbsp;&amp;nbsp;&amp;nbsp;是&amp;nbsp;&amp;nbsp;&amp;nbsp;一&amp;nbsp;&amp;nbsp;&amp;nbsp;段&amp;nbsp;&amp;nbsp;&amp;nbsp;文&amp;nbsp;&amp;nbsp;&amp;nbsp;字。&lt;/p&gt;</code></pre>
                    <p>显示为：</p>
                    <pre><code>这   是   一   段   文   字。</code></pre>
                    <p><strong>注意</strong>：<code>&amp;nbsp;</code> 主要用于防止单词或数字在换行时被断开（如 <code>100&amp;nbsp;km</code>），不应滥用它来做排版缩进。排版缩进应使用CSS的 <code>text-indent</code> 属性。</p>

                    <p><strong>使用 <code>&lt;pre&gt;</code> 保留原始格式</strong></p>
                    <p>如果你希望保留源代码中的所有空格和换行，可以使用 <code>&lt;pre&gt;</code>（预格式化文本）标签：</p>
                    <pre><code>&lt;pre&gt;
            这    是    一    段    文    字。
            第二行    有    缩    进。
        &lt;/pre&gt;</code></pre>
                    <p><code>&lt;pre&gt;</code> 中的内容会以<strong>等宽字体</strong>显示，并保留所有空格和换行。它适合展示代码或需要精确排版的文本。</p>

                    <h2>4.2.5 段落的CSS样式控制</h2>
                    <p>在实际项目中，你几乎总是会通过CSS来定制段落的外观。以下是最常见的段落样式属性：</p>
                    <table>
                        <tr><th>CSS属性</th><th>作用</th><th>示例</th></tr>
                        <tr><td><code>font-size</code></td><td>设置文字大小</td><td><code>font-size: 16px;</code></td></tr>
                        <tr><td><code>color</code></td><td>设置文字颜色</td><td><code>color: #333;</code></td></tr>
                        <tr><td><code>line-height</code></td><td>设置行高（行间距）</td><td><code>line-height: 1.8;</code></td></tr>
                        <tr><td><code>text-indent</code></td><td>设置首行缩进</td><td><code>text-indent: 2em;</code></td></tr>
                        <tr><td><code>margin</code></td><td>设置段落外边距</td><td><code>margin: 0 0 16px 0;</code></td></tr>
                        <tr><td><code>text-align</code></td><td>设置文字对齐方式</td><td><code>text-align: justify;</code></td></tr>
                        <tr><td><code>letter-spacing</code></td><td>设置字符间距</td><td><code>letter-spacing: 0.5px;</code></td></tr>
                    </table>

                    <p><strong>示例：为段落定制样式</strong></p>
                    <pre><code>&lt;!DOCTYPE html&gt;
        &lt;html lang="zh-CN"&gt;
        &lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;title&gt;段落样式演示&lt;/title&gt;
            &lt;style&gt;
                body {
                    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
                    max-width: 720px;
                    margin: 0 auto;
                    padding: 20px;
                    background: #f9f9f9;
                }

                /* 文章段落样式 */
                .article p {
                    font-size: 16px;
                    line-height: 1.8;           /* 行高1.8倍，阅读舒适 */
                    color: #333;
                    text-indent: 2em;           /* 首行缩进2个汉字 */
                    margin-bottom: 16px;        /* 段落之间间距 */
                }

                /* 首段不缩进（视觉习惯） */
                .article p:first-child {
                    text-indent: 0;
                }

                /* 引用块 */
                .article .quote {
                    text-indent: 0;
                    font-style: italic;
                    color: #666;
                    border-left: 4px solid #3498db;
                    padding-left: 20px;
                    margin: 20px 0;
                }
            &lt;/style&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;div class="article"&gt;
                &lt;h1&gt;文章标题&lt;/h1&gt;
                &lt;p&gt;这是文章的第一段。在中文排版中，第一段通常不缩进。后面的段落则会有首行缩进，让文章结构更清晰。&lt;/p&gt;
                &lt;p&gt;这是第二段。段落之间的间距通过 margin 控制，阅读体验更舒适。行高设置为1.8倍，文字不会显得拥挤。&lt;/p&gt;
                &lt;div class="quote"&gt;
                    “这是一个引用块。它使用斜体和左侧边框来突出显示，与正文形成区分。”
                &lt;/div&gt;
                &lt;p&gt;这是第三段。引用块之后继续正文内容，排版逻辑清晰，读者可以流畅地阅读下去。&lt;/p&gt;
            &lt;/div&gt;
        &lt;/body&gt;
        &lt;/html&gt;</code></pre>

                    <h2>4.2.6 常见错误与最佳实践</h2>
                    <p><strong>常见错误</strong></p>
                    <table>
                        <tr><th>错误</th><th>问题</th><th>正确做法</th></tr>
                        <tr><td><strong>用 <code>&lt;br&gt;</code> 替代 <code>&lt;p&gt;</code></strong></td><td>多个 <code>&lt;br&gt;</code> 堆叠制造段落效果，破坏语义</td><td>用 <code>&lt;p&gt;</code> 表示段落，用CSS控制间距</td></tr>
                        <tr><td><strong>在 <code>&lt;p&gt;</code> 中嵌套块级元素</strong></td><td><code>&lt;p&gt;</code> 内不能嵌套 <code>&lt;div&gt;</code>、<code>&lt;h1&gt;</code> 等块级标签</td><td><code>&lt;p&gt;</code> 内只能包含<strong>内联元素</strong>（如 <code>&lt;span&gt;</code>、<code>&lt;a&gt;</code>、<code>&lt;strong&gt;</code>、<code>&lt;em&gt;</code>、<code>&lt;br&gt;</code> 等）</td></tr>
                        <tr><td><strong>滥用 <code>&lt;br&gt;</code> 制造间距</strong></td><td>用多个 <code>&lt;br&gt;</code> 制造空白，代码杂乱</td><td>使用CSS的 <code>margin</code> 或 <code>padding</code></td></tr>
                        <tr><td><strong>忘记闭合 <code>&lt;p&gt;</code> 标签</strong></td><td>虽然浏览器会尝试自动补全，但可能导致意外行为</td><td>始终显式写出 <code>&lt;/p&gt;</code></td></tr>
                        <tr><td><strong>在 <code>&lt;p&gt;</code> 中放图片或列表</strong></td><td>结构混乱，语义不清</td><td>图片用 <code>&lt;figure&gt;</code> 或直接放在 <code>&lt;p&gt;</code> 外；列表用 <code>&lt;ul&gt;</code>/<code>&lt;ol&gt;</code></td></tr>
                    </table>

                    <p><strong>关于 <code>&lt;p&gt;</code> 中不能嵌套块级元素的说明</strong></p>
                    <p><code>&lt;p&gt;</code> 标签的 content model 是 <strong>"短语内容（Phrasing Content）"</strong>，这意味着它只能包含内联元素，不能包含块级元素（如 <code>&lt;div&gt;</code>、<code>&lt;h1&gt;</code>~<code>&lt;h6&gt;</code>、<code>&lt;ul&gt;</code>、<code>&lt;ol&gt;</code>、<code>&lt;table&gt;</code> 等）。</p>
                    <pre><code>&lt;!-- ❌ 错误：在 <p> 中嵌套块级元素 --&gt;
        &lt;p&gt;
            &lt;h2&gt;这是一个标题&lt;/h2&gt;
            这是段落内容。
        &lt;/p&gt;

        &lt;!-- ✅ 正确：标题放在 <p> 外面 --&gt;
        &lt;h2&gt;这是一个标题&lt;/h2&gt;
        &lt;p&gt;这是段落内容。&lt;/p&gt;</code></pre>
                    <p>虽然浏览器通常会对错误的嵌套进行"容错处理"，但代码的语义会被破坏，不利于SEO和可访问性。</p>

                    <p><strong>最佳实践总结</strong></p>
                    <ol>
                        <li><strong>用 <code>&lt;p&gt;</code> 包裹独立的文字段落</strong>，不要用多个 <code>&lt;br&gt;</code> 替代。</li>
                        <li><strong>在段落内需要换行时使用 <code>&lt;br&gt;</code></strong>（如地址、诗歌、签名）。</li>
                        <li><strong>不要滥用 <code>&lt;br&gt;</code></strong>——它是换行工具，不是间距工具。</li>
                        <li><strong>使用CSS控制段落的样式</strong>（行高、缩进、间距、颜色等）。</li>
                        <li><strong>不要在 <code>&lt;p&gt;</code> 中嵌套块级元素</strong>（如 <code>&lt;div&gt;</code>、<code>&lt;h1&gt;</code>、<code>&lt;ul&gt;</code> 等）。</li>
                        <li><strong>始终闭合 <code>&lt;p&gt;</code> 标签</strong>，虽然浏览器会尝试自动补全，但显式闭合是良好的编码习惯。</li>
                    </ol>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了 <code>&lt;p&gt;</code> 段落标签和 <code>&lt;br&gt;</code> 换行标签：</p>
                    <table>
                        <tr><th>要点</th><th>说明</th></tr>
                        <tr><td><strong><code>&lt;p&gt;</code> 的作用</strong></td><td>定义独立的文字段落，自动在段落上下添加间距。</td></tr>
                        <tr><td><strong><code>&lt;p&gt;</code> 的语义</strong></td><td>表示一段完整的叙述性文字，帮助搜索引擎和辅助技术理解内容。</td></tr>
                        <tr><td><strong><code>&lt;br&gt;</code> 的作用</strong></td><td>在文本中强制换行，不产生额外的垂直间距。</td></tr>
                        <tr><td><strong><code>&lt;br&gt;</code> 的适用场景</strong></td><td>地址、诗歌、联系方式、签名等需要换行但语义仍属同一段落的内容。</td></tr>
                        <tr><td><strong>空白处理</strong></td><td>多个空格会被合并为一个；可用 <code>&amp;nbsp;</code> 保留空格；用 <code>&lt;pre&gt;</code> 保留原始格式。</td></tr>
                        <tr><td><strong>CSS样式</strong></td><td>常用 <code>line-height</code>、<code>text-indent</code>、<code>margin</code>、<code>text-align</code> 控制段落外观。</td></tr>
                        <tr><td><strong>重要规则</strong></td><td><code>&lt;p&gt;</code> 不能嵌套块级元素（如 <code>&lt;div&gt;</code>、<code>&lt;h1&gt;</code>、<code>&lt;ul&gt;</code> 等）。</td></tr>
                    </table>
                    <p><strong>核心认知</strong>：段落是网页内容的"呼吸节奏"。合理使用 <code>&lt;p&gt;</code> 和 <code>&lt;br&gt;</code>，能让文字内容清晰、易读、语义明确。把内容组织得井井有条，是对读者最基本的尊重，也是优秀网页设计的起点。</p>

                    <p><strong>思考与练习</strong></p>

                        <li>以下哪个场景最适合使用 <code>&lt;br&gt;</code>？（　）<br>A. 两个段落之间的间距 &nbsp;&nbsp; B. 诗歌中的换行<br>C. 页面顶部的空白区域 &nbsp;&nbsp; D. 列表中的项目分隔</li>

                    </div>

                    <p><strong>示例对比</strong></p>
                    <pre><code>&lt;p&gt;
            &lt;!-- ✅ 推荐：表达重要性 --&gt;
            &lt;strong&gt;重要通知：&lt;/strong&gt;网站将于今晚 22:00 进行维护。
        &lt;/p&gt;

        &lt;p&gt;
            &lt;!-- ✅ 推荐：表达语气强调 --&gt;
            我 &lt;em&gt;绝不&lt;/em&gt; 会放弃这个目标。
        &lt;/p&gt;

        &lt;p&gt;
            &lt;!-- ⚠️ 可用但非首选：纯样式加粗 --&gt;
            关键字：&lt;b&gt;HTML&lt;/b&gt;、&lt;b&gt;CSS&lt;/b&gt;、&lt;b&gt;JavaScript&lt;/b&gt;
        &lt;/p&gt;

        &lt;p&gt;
            &lt;!-- ⚠️ 可用但非首选：纯样式斜体 --&gt;
            书名：《&lt;i&gt;HTML从入门到精通&lt;/i&gt;》
        &lt;/p&gt;</code></pre>

                    <h2>4.3.2 上标与下标 —— <code>&lt;sup&gt;</code> 与 <code>&lt;sub&gt;</code></h2>
                    <p><code>&lt;sup&gt;</code>（superscript）和 <code>&lt;sub&gt;</code>（subscript）用于显示<strong>上标</strong>和<strong>下标</strong>文字，常用于数学公式、化学方程式和脚注。</p>
                    <table>
                        <tr><th>标签</th><th>作用</th><th>示例效果</th></tr>
                        <tr><td><code>&lt;sup&gt;</code></td><td>上标</td><td>x²、10⁶、脚注标记¹</td></tr>
                        <tr><td><code>&lt;sub&gt;</code></td><td>下标</td><td>H₂O、CO₂、log₂</td></tr>
                    </table>

                    <p><strong>基本用法</strong></p>
                    <pre><code>&lt;p&gt;E = mc&lt;sup&gt;2&lt;/sup&gt;&lt;/p&gt;
        &lt;p&gt;水的化学式是 H&lt;sub&gt;2&lt;/sub&gt;O&lt;/p&gt;
        &lt;p&gt;参考注释&lt;sup&gt;[1]&lt;/sup&gt;&lt;/p&gt;</code></pre>

                    <p><strong>示例：数学公式与化学方程式</strong></p>
                    <pre><code>&lt;h3&gt;数学公式&lt;/h3&gt;
        &lt;p&gt;勾股定理：a&lt;sup&gt;2&lt;/sup&gt; + b&lt;sup&gt;2&lt;/sup&gt; = c&lt;sup&gt;2&lt;/sup&gt;&lt;/p&gt;
        &lt;p&gt;指数运算：2&lt;sup&gt;10&lt;/sup&gt; = 1024&lt;/p&gt;

        &lt;h3&gt;化学方程式&lt;/h3&gt;
        &lt;p&gt;水的化学式：H&lt;sub&gt;2&lt;/sub&gt;O&lt;/p&gt;
        &lt;p&gt;二氧化碳：CO&lt;sub&gt;2&lt;/sub&gt;&lt;/p&gt;
        &lt;p&gt;光合作用：6CO&lt;sub&gt;2&lt;/sub&gt; + 6H&lt;sub&gt;2&lt;/sub&gt;O → C&lt;sub&gt;6&lt;/sub&gt;H&lt;sub&gt;12&lt;/sub&gt;O&lt;sub&gt;6&lt;/sub&gt; + 6O&lt;sub&gt;2&lt;/sub&gt;&lt;/p&gt;</code></pre>

                    <p><strong>脚注标记</strong></p>
                    <p>在学术文章或博客中，可以用 <code>&lt;sup&gt;</code> 标记脚注序号：</p>
                    <pre><code>&lt;p&gt;
            量子力学是描述微观世界规律的理论基础&lt;sup&gt;[1]&lt;/sup&gt;。
            它的建立标志着现代物理学的重大突破&lt;sup&gt;[2]&lt;/sup&gt;。
        &lt;/p&gt;
        &lt;p&gt;
            &lt;sup&gt;[1]&lt;/sup&gt; 薛定谔，《量子力学原理》，1926年。
            &lt;sup&gt;[2]&lt;/sup&gt; 海森堡，《不确定性原理》，1927年。
        &lt;/p&gt;</code></pre>

                    <h2>4.3.3 删除线与下划线 —— <code>&lt;del&gt;</code>、<code>&lt;ins&gt;</code>、<code>&lt;u&gt;</code></h2>
                    <p>这几个标签用于表示文本的<strong>修改、添加或装饰性下划线</strong>。</p>
                    <table>
                        <tr><th>标签</th><th>作用</th><th>默认样式</th><th>语义含义</th></tr>
                        <tr><td><code>&lt;del&gt;</code></td><td>表示已删除的内容</td><td>删除线（中划线）</td><td>内容已被移除或不再有效</td></tr>
                        <tr><td><code>&lt;ins&gt;</code></td><td>表示新插入的内容</td><td>下划线</td><td>内容是新添加的</td></tr>
                        <tr><td><code>&lt;u&gt;</code></td><td>添加下划线</td><td>下划线</td><td>纯样式下划线（无特殊语义）</td></tr>
                    </table>

                    <p><strong>1. <code>&lt;del&gt;</code> —— 删除的内容</strong></p>
                    <p><code>&lt;del&gt;</code> 表示文档中已被<strong>删除</strong>或<strong>不再正确</strong>的内容。</p>
                    <pre><code>&lt;p&gt;原价：&lt;del&gt;¥299&lt;/del&gt; 现价：¥199&lt;/p&gt;
        &lt;p&gt;会议时间：&lt;del&gt;2026年7月1日&lt;/del&gt; 调整为 2026年7月2日&lt;/p&gt;</code></pre>

                    <p><strong>2. <code>&lt;ins&gt;</code> —— 新增的内容</strong></p>
                    <p><code>&lt;ins&gt;</code> 表示文档中<strong>新添加</strong>或<strong>替换</strong>的内容。</p>
                    <pre><code>&lt;p&gt;最新版本：&lt;ins&gt;v3.2.1&lt;/ins&gt;（已于2026年6月发布）&lt;/p&gt;
        &lt;p&gt;联系方式：&lt;del&gt;010-88888888&lt;/del&gt; &lt;ins&gt;400-888-9999&lt;/ins&gt;&lt;/p&gt;</code></pre>

                    <p><strong>3. <code>&lt;u&gt;</code> —— 下划线（纯样式）</strong></p>
                    <p><code>&lt;u&gt;</code> 仅用于给文字添加下划线，不表达特殊语义。在早期的 HTML 中常用于表示链接（现在链接由 <code>&lt;a&gt;</code> 标签负责），因此在实际项目中 <code>&lt;u&gt;</code> 的使用场景非常有限。</p>
                    <pre><code>&lt;p&gt;这是一个 &lt;u&gt;有下划线的&lt;/u&gt; 词语（纯样式）。&lt;/p&gt;</code></pre>
                    <div class="tip-box">
                        <p><strong>💡 提示</strong>：在现代网页设计中，下划线通常留给超链接使用。如果需要在普通文字上添加下划线，建议使用 CSS 的 <code>text-decoration: underline;</code> 而不是 <code>&lt;u&gt;</code> 标签，以保持语义清晰。</p>
                    </div>

                    <p><strong>组合使用：修改记录</strong></p>
                    <p><code>&lt;del&gt;</code> 和 <code>&lt;ins&gt;</code> 经常一起使用，表示文档的修改记录：</p>
                    <pre><code>&lt;p&gt;
            系统将于 &lt;del&gt;2026年6月30日&lt;/del&gt; &lt;ins&gt;2026年7月15日&lt;/ins&gt; 进行升级维护。
            给您带来的不便，敬请谅解。
        &lt;/p&gt;</code></pre>

                    <h2>4.3.4 其他常用的文本标签</h2>
                    <p><strong>1. <code>&lt;mark&gt;</code> —— 高亮标记</strong></p>
                    <p><code>&lt;mark&gt;</code> 表示一段<strong>被高亮</strong>的文本，通常用于搜索结果中的关键词匹配、或用户需要特别关注的内容。</p>
                    <pre><code>&lt;p&gt;搜索关键词"&lt;mark&gt;HTML&lt;/mark&gt;"找到 1,234,567 个结果。&lt;/p&gt;
        &lt;p&gt;温馨提示：&lt;mark&gt;请仔细阅读以下条款&lt;/mark&gt;，确认无误后提交。&lt;/p&gt;</code></pre>

                    <p><strong>2. <code>&lt;small&gt;</code> —— 小号文字</strong></p>
                    <p><code>&lt;small&gt;</code> 表示<strong>小号文字</strong>，通常用于版权声明、免责条款、附属信息等。</p>
                    <pre><code>&lt;p&gt;本网站所有内容版权归 XYZ 公司所有。&lt;/p&gt;
        &lt;p&gt;&lt;small&gt;© 2026 XYZ 公司。保留所有权利。&lt;/small&gt;&lt;/p&gt;
        &lt;p&gt;&lt;small&gt;免责声明：本站信息仅供参考，不构成任何建议。&lt;/small&gt;&lt;/p&gt;</code></pre>

                    <p><strong>3. <code>&lt;time&gt;</code> —— 时间与日期</strong></p>
                    <p><code>&lt;time&gt;</code> 用于表示日期或时间，机器可读的属性 <code>datetime</code> 便于搜索引擎和浏览器解析。</p>
                    <pre><code>&lt;p&gt;文章发布于 &lt;time datetime="2026-06-21"&gt;2026年6月21日&lt;/time&gt;&lt;/p&gt;
        &lt;p&gt;会议时间：&lt;time datetime="2026-07-01T14:00"&gt;7月1日下午2点&lt;/time&gt;&lt;/p&gt;</code></pre>

                    <p><strong>4. <code>&lt;code&gt;</code> —— 代码片段</strong></p>
                    <p><code>&lt;code&gt;</code> 用于表示<strong>计算机代码</strong>或<strong>代码片段</strong>，通常以等宽字体显示。</p>
                    <pre><code>&lt;p&gt;在 JavaScript 中，使用 &lt;code&gt;console.log()&lt;/code&gt; 输出信息。&lt;/p&gt;
        &lt;p&gt;请执行命令：&lt;code&gt;npm install -g create-react-app&lt;/code&gt;&lt;/p&gt;</code></pre>

                    <p><strong>5. <code>&lt;abbr&gt;</code> —— 缩写</strong></p>
                    <p><code>&lt;abbr&gt;</code> 用于表示缩写或首字母缩略词，配合 <code>title</code> 属性提供完整解释。</p>
                    <pre><code>&lt;p&gt;&lt;abbr title="HyperText Markup Language"&gt;HTML&lt;/abbr&gt; 是 Web 开发的基石。&lt;/p&gt;
        &lt;p&gt;我毕业于 &lt;abbr title="Massachusetts Institute of Technology"&gt;MIT&lt;/abbr&gt;。&lt;/p&gt;</code></pre>
                    <p>当用户鼠标悬停在缩写词上时，<code>title</code> 中的完整内容会以工具提示的形式显示。</p>

                    <h2>4.3.5 文本标签的嵌套使用</h2>
                    <p>这些文本标签可以<strong>相互嵌套</strong>，以表达更复杂的语义。但嵌套时应注意<strong>语义的合理性</strong>。</p>
                    <pre><code>&lt;!-- 强调某个重要通知 --&gt;
        &lt;p&gt;&lt;strong&gt;重要：&lt;/strong&gt;请在 &lt;time datetime="2026-07-01"&gt;7月1日&lt;/time&gt; 之前提交申请，&lt;em&gt;逾期不候&lt;/em&gt;。&lt;/p&gt;

        &lt;!-- 删除且强调 --&gt;
        &lt;p&gt;&lt;del&gt;&lt;strong&gt;¥299&lt;/strong&gt;&lt;/del&gt; 现价 &lt;ins&gt;&lt;strong&gt;¥199&lt;/strong&gt;&lt;/ins&gt;&lt;/p&gt;

        &lt;!-- 代码中的注释 --&gt;
        &lt;p&gt;执行命令 &lt;code&gt;git commit -m "&lt;em&gt;修复登录bug&lt;/em&gt;"&lt;/code&gt;&lt;/p&gt;

        &lt;!-- 高亮加粗 --&gt;
        &lt;p&gt;搜索结果：&lt;mark&gt;&lt;strong&gt;HTML&lt;/strong&gt;&lt;/mark&gt; 相关教程已更新。&lt;/p&gt;</code></pre>

                    <p><strong>嵌套时注意不要交叉嵌套</strong>：</p>
                    <pre><code>&lt;!-- ❌ 错误：交叉嵌套 --&gt;
        &lt;p&gt;&lt;strong&gt;&lt;em&gt;重要通知&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;

        &lt;!-- ✅ 正确：正确嵌套 --&gt;
        &lt;p&gt;&lt;strong&gt;&lt;em&gt;重要通知&lt;/em&gt;&lt;/strong&gt;&lt;/p&gt;</code></pre>

                    <h2>4.3.6 语义与样式的区分</h2>
                    <p>这是本节最重要的概念：<strong>HTML 标签应该表达语义，而不是样式</strong>。</p>

                    <p><strong>语义标签 vs 样式标签</strong></p>
                    <table>
                        <tr><th>语义标签</th><th>样式标签</th><th>语义含义</th><th>推荐度</th></tr>
                        <tr><td><code>&lt;strong&gt;</code></td><td><code>&lt;b&gt;</code></td><td>表示内容重要/紧急</td><td>✅ 优先使用 <code>&lt;strong&gt;</code></td></tr>
                        <tr><td><code>&lt;em&gt;</code></td><td><code>&lt;i&gt;</code></td><td>表示语气上的强调</td><td>✅ 优先使用 <code>&lt;em&gt;</code></td></tr>
                        <tr><td><code>&lt;del&gt;</code></td><td>无</td><td>表示内容已被删除</td><td>✅ 使用 <code>&lt;del&gt;</code></td></tr>
                        <tr><td><code>&lt;ins&gt;</code></td><td>无</td><td>表示内容是新添加的</td><td>✅ 使用 <code>&lt;ins&gt;</code></td></tr>
                        <tr><td><code>&lt;mark&gt;</code></td><td>无</td><td>表示高亮/标记</td><td>✅ 使用 <code>&lt;mark&gt;</code></td></tr>
                        <tr><td>无</td><td><code>&lt;u&gt;</code></td><td>纯下划线装饰</td><td>⚠️ 使用 CSS 替代</td></tr>
                    </table>

                    <p><strong>为什么要区分语义？</strong></p>
                    <ol>
                        <li><strong>搜索引擎优化（SEO）</strong>：搜索引擎会赋予 <code>&lt;strong&gt;</code> 和 <code>&lt;em&gt;</code> 中的内容更高的权重，而 <code>&lt;b&gt;</code> 和 <code>&lt;i&gt;</code> 则不会。</li>
                        <li><strong>可访问性（A11y）</strong>：屏幕阅读器会用不同的语调朗读 <code>&lt;strong&gt;</code> 和 <code>&lt;em&gt;</code> 的内容，帮助视障用户理解内容的重点。</li>
                        <li><strong>可维护性</strong>：语义化的代码更容易被其他开发者理解和维护。</li>
                        <li><strong>未来兼容性</strong>：当样式的表达方式发生变化时（如改用 CSS），语义化的标签依然能够保留其含义。</li>
                    </ol>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了 HTML 中的文本格式化标签：</p>
                    <table>
                        <tr><th>分类</th><th>标签</th><th>作用</th><th>语义</th></tr>
                        <tr><td rowspan="2"><strong>粗体</strong></td><td><code>&lt;strong&gt;</code></td><td>加粗</td><td>表示内容重要/紧急</td></tr>
                        <tr><td><code>&lt;b&gt;</code></td><td>加粗</td><td>仅样式（无语义）</td></tr>
                        <tr><td rowspan="2"><strong>斜体</strong></td><td><code>&lt;em&gt;</code></td><td>斜体</td><td>表示语气上的强调</td></tr>
                        <tr><td><code>&lt;i&gt;</code></td><td>斜体</td><td>仅样式（无语义）</td></tr>
                        <tr><td rowspan="2"><strong>上下标</strong></td><td><code>&lt;sup&gt;</code></td><td>上标</td><td>数学公式、脚注标记</td></tr>
                        <tr><td><code>&lt;sub&gt;</code></td><td>下标</td><td>化学方程式、数学符号</td></tr>
                        <tr><td rowspan="2"><strong>删除/插入</strong></td><td><code>&lt;del&gt;</code></td><td>删除线</td><td>表示内容已被删除</td></tr>
                        <tr><td><code>&lt;ins&gt;</code></td><td>下划线</td><td>表示内容是新添加的</td></tr>
                        <tr><td rowspan="4"><strong>其他</strong></td><td><code>&lt;mark&gt;</code></td><td>高亮背景</td><td>标记/高亮显示</td></tr>
                        <tr><td><code>&lt;small&gt;</code></td><td>小号文字</td><td>版权声明、附属信息</td></tr>
                        <tr><td><code>&lt;time&gt;</code></td><td>无默认样式</td><td>表示时间/日期</td></tr>
                        <tr><td><code>&lt;code&gt;</code></td><td>等宽字体</td><td>表示代码片段</td></tr>
                        <tr><td><code>&lt;abbr&gt;</code></td><td>无默认样式</td><td>表示缩写</td></tr>
                    </table>
                    <p><strong>核心认知</strong>：文本格式化标签不仅改变文字的视觉样式，更重要的是赋予了文字<strong>语义</strong>。在 HTML 中，<strong>语义优先于样式</strong>——优先使用表达语义的标签，再通过 CSS 控制视觉效果。这是编写高质量、可访问、SEO友好的 HTML 页面的基本原则。</p>

                    <p><strong>思考与练习</strong></p>
                    <p><strong>一、选择题</strong></p>
                    <ol>

                <h1>4.4 引用标签 —— <code>&lt;blockquote&gt;</code>、<code>&lt;q&gt;</code>、<code>&lt;cite&gt;</code></h1>
                <div class="chapter-content">
                    <p>在网页内容中，我们经常需要引用他人的言论、文献资料、书籍原文或外部来源的信息。HTML为此提供了专门的<strong>引用标签</strong>，它们不仅能以特定的视觉样式呈现引用内容，更重要的是能够清晰地向搜索引擎和辅助技术表明："这段文字是来自外部的引用"。</p>
                    <p>在中文排版中，引用的使用非常讲究——既有独立成段的长篇引用，也有嵌入文中的简短引述。HTML 通过 <code>&lt;blockquote&gt;</code>、<code>&lt;q&gt;</code> 和 <code>&lt;cite&gt;</code> 三个标签，完美地覆盖了这些场景。</p>

                    <h2>4.4.1 <code>&lt;blockquote&gt;</code> —— 块级长引用</h2>
                    <p><code>&lt;blockquote&gt;</code> 是 <strong>Block Quotation（块级引用）</strong> 的缩写，用于表示<strong>独立成块的长篇引用</strong>。它通常用于引用一段完整的文字、一段对话或一篇文献中的较长段落。</p>

                    <p><strong>基本语法</strong></p>
                    <pre><code>&lt;blockquote&gt;
            &lt;p&gt;这是被引用的文字内容。它可以包含多个段落、标题或其他块级元素。&lt;/p&gt;
            &lt;p&gt;这是引用的第二段内容。&lt;/p&gt;
        &lt;/blockquote&gt;</code></pre>

                    <p><strong>浏览器的默认样式</strong></p>
                    <p>浏览器默认会将 <code>&lt;blockquote&gt;</code> 渲染为<strong>缩进显示</strong>（左右各缩进约 40px），从而在视觉上与正文区分开来。</p>
                    <pre><code>&lt;!DOCTYPE html&gt;
        &lt;html lang="zh-CN"&gt;
        &lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;title&gt;引用示例&lt;/title&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;h2&gt;关于学习的名言&lt;/h2&gt;
            &lt;p&gt;孔子曾说过：&lt;/p&gt;
            &lt;blockquote&gt;
                &lt;p&gt;学而不思则罔，思而不学则殆。&lt;/p&gt;
            &lt;/blockquote&gt;
            &lt;p&gt;这句话强调了学习和思考的辩证关系。&lt;/p&gt;
        &lt;/body&gt;
        &lt;/html&gt;</code></pre>

                    <p><strong>引用多段内容</strong></p>
                    <p><code>&lt;blockquote&gt;</code> 内部可以包含多个 <code>&lt;p&gt;</code> 段落，也可以包含其他块级元素（如 <code>&lt;h3&gt;</code>、<code>&lt;ul&gt;</code> 等），以保留原文的结构。</p>
                    <pre><code>&lt;blockquote&gt;
            &lt;h3&gt;《论持久战》节选&lt;/h3&gt;
            &lt;p&gt;武器是战争的重要因素，但不是决定的因素，决定的因素是人不是物。&lt;/p&gt;
            &lt;p&gt;力量对比不但是军力和经济力的对比，而且是人力和人心的对比。&lt;/p&gt;
            &lt;p&gt;—— 毛泽东&lt;/p&gt;
        &lt;/blockquote&gt;</code></pre>

                    <p><strong><code>cite</code> 属性 —— 标注引用来源的 URL</strong></p>
                    <p><code>&lt;blockquote&gt;</code> 支持 <code>cite</code> 属性，用于指定引用来源的<strong>网址（URL）</strong>。这个属性对用户不可见（不会在页面上显示），但对搜索引擎和浏览器有参考价值。</p>
                    <pre><code>&lt;blockquote cite="https://example.com/articles/learning-quote"&gt;
            &lt;p&gt;学而不思则罔，思而不学则殆。&lt;/p&gt;
        &lt;/blockquote&gt;</code></pre>
                    <div class="tip-box">
                        <p><strong>💡 注意</strong>：<code>cite</code> 属性（在标签上）和 <code>&lt;cite&gt;</code> 标签（见 4.4.3 节）是两个不同的概念。前者是属性，供机器读取；后者是标签，供用户阅读。</p>
                    </div>

                    <h2>4.4.2 <code>&lt;q&gt;</code> —— 内联短引用</h2>
                    <p><code>&lt;q&gt;</code> 是 <strong>Quotation（引用）</strong> 的缩写，用于表示<strong>嵌入在段落中的短引用</strong>。它通常用于引用一句短语、一个观点或一句话。</p>

                    <p><strong>基本语法</strong></p>
                    <p><code>&lt;q&gt;</code> 是一个<strong>内联元素</strong>，可以放在 <code>&lt;p&gt;</code>、<code>&lt;h1&gt;</code> 等标签内部，不会打断文字的流动。</p>
                    <pre><code>&lt;p&gt;
            正如孔子所说：&lt;q&gt;学而不思则罔，思而不学则殆&lt;/q&gt;，这句话至今仍有深刻意义。
        &lt;/p&gt;</code></pre>

                    <p><strong>浏览器的默认行为</strong></p>
                    <p>浏览器会自动在 <code>&lt;q&gt;</code> 包裹的文字<strong>前后添加引号</strong>。不同语言环境下，引号的形式可能不同：</p>
                    <ul>
                        <li>在中文环境中，通常显示为 <code>“</code> 和 <code>”</code>（弯引号）。</li>
                        <li>在英文环境中，通常显示为 <code>"</code> 和 <code>"</code>（直引号）。</li>
                    </ul>
                    <pre><code>&lt;p&gt;
            Steve Jobs 曾说：&lt;q&gt;Stay hungry, stay foolish.&lt;/q&gt; 这句话激励了无数创业者。
        &lt;/p&gt;</code></pre>
                    <p>显示效果为：</p>
                    <pre><code>Steve Jobs 曾说："Stay hungry, stay foolish." 这句话激励了无数创业者。</code></pre>
                    <div class="tip-box">
                        <p><strong>⚠️ 重要提醒</strong>：不要手动在 <code>&lt;q&gt;</code> 外部添加引号，否则会出现双引号。浏览器会自动处理引号，你只需要写出文字内容即可。</p>
                    </div>

                    <p><strong><code>&lt;q&gt;</code> 与 <code>&lt;blockquote&gt;</code> 的区别</strong></p>
                    <table>
                        <tr><th>对比维度</th><th><code>&lt;blockquote&gt;</code></th><th><code>&lt;q&gt;</code></th></tr>
                        <tr><td><strong>显示方式</strong></td><td>块级元素，独占一行，缩进显示</td><td>内联元素，不换行</td></tr>

                        <tr><td><strong>引号处理</strong></td><td>默认不加引号（需手动添加）</td><td>浏览器自动添加引号</td></tr>
                        <tr><td><strong>适用场景</strong></td><td>独立成段的引用内容</td><td>嵌入正文中的引述</td></tr>
                    </table>

                    <h2>4.4.3 <code>&lt;cite&gt;</code> —— 引用来源（作品标题）</h2>
                    <p><code>&lt;cite&gt;</code> 用于表示<strong>引用作品的标题</strong>——比如书名、文章标题、论文名称、网站名称、电影名称等。它告诉读者和搜索引擎："这些文字是引用来源的名称。"</p>

                    <p><strong>基本语法</strong></p>
                    <pre><code>&lt;p&gt;我最喜欢的编程书籍是 &lt;cite&gt;《HTML从入门到精通》&lt;/cite&gt;。&lt;/p&gt;
        &lt;p&gt;根据 &lt;cite&gt;《2026年Web开发趋势报告》&lt;/cite&gt; 显示，前端开发需求持续增长。&lt;/p&gt;</code></pre>

                    <p><strong>浏览器的默认样式</strong></p>
                    <p>浏览器默认将 <code>&lt;cite&gt;</code> 渲染为<strong>斜体</strong>。</p>
                    <pre><code>&lt;p&gt;
            引用来源：&lt;cite&gt;《论语·为政》&lt;/cite&gt;
        &lt;/p&gt;</code></pre>
                    <p>显示效果：</p>
                    <pre><code>引用来源：《论语·为政》</code></pre>

                    <p><strong><code>&lt;cite&gt;</code> 与 <code>cite</code> 属性的配合</strong></p>
                    <p>在实际使用中，<code>&lt;cite&gt;</code> 标签（显示引用来源名称）和 <code>cite</code> 属性（提供来源 URL）常常配合使用，让引用既对用户友好，也对搜索引擎友好。</p>
                    <pre><code>&lt;blockquote cite="https://www.gutenberg.org/files/1234/1234-h/1234-h.htm"&gt;
            &lt;p&gt;学而不思则罔，思而不学则殆。&lt;/p&gt;
            &lt;footer&gt;—— &lt;cite&gt;《论语·为政》&lt;/cite&gt;&lt;/footer&gt;
        &lt;/blockquote&gt;</code></pre>

                        <tr><td>音乐专辑名称</td><td>《月之暗面》</td></tr>

                    <pre><code>&lt;blockquote cite="https://www.gutenberg.org/files/1342/1342-h/1342-h.htm"&gt;
            &lt;p&gt;
                傲慢让别人无法来爱我，偏见让我无法去爱别人。

            &lt;footer&gt;

        &lt;/blockquote&gt;</code></pre>
                    <p>在中文排版中，也经常使用 <code>——</code>（破折号）来引出作者或来源，与 <code>&lt;footer&gt;</code> 和 <code>&lt;cite&gt;</code> 配合使用，语义清晰。</p>

                    <h2>4.4.5 引用的CSS样式自定义</h2>
                    <p>在实际项目中，你几乎一定会通过CSS自定义引用的视觉效果，使其与页面整体设计风格统一。</p>

                    <pre><code>&lt;style&gt;
            /* 引用块样式 */

                    <p><strong>完整的HTML示例</strong></p>
                    <pre><code>&lt;!DOCTYPE html&gt;

                &lt;p&gt;

            &lt;blockquote&gt;

        &lt;/html&gt;</code></pre>

                    <h2>4.4.6 常见错误与最佳实践</h2>
                    <p><strong>常见错误</strong></p>
                    <table>
                        <tr><th>错误</th><th>问题</th><th>正确做法</th></tr>
                        <tr><td><strong>用 <code>&lt;blockquote&gt;</code> 做缩进</strong></td><td>使用 <code>blockquote</code> 的默认缩进来排版普通文字，滥用语义</td><td>使用 CSS 的 <code>padding</code> 或 <code>margin</code> 控制缩进</td></tr>
                        <tr><td><strong>手动给 <code>&lt;q&gt;</code> 加引号</strong></td><td>浏览器会自动添加引号，手动添加会导致双引号</td><td>直接用 <code>&lt;q&gt;</code>，不加额外引号</td></tr>
                        <tr><td><strong>用 <code>&lt;cite&gt;</code> 标注人名</strong></td><td><code>&lt;cite&gt;</code> 专用于作品标题，不用于人名</td><td>人名用普通文字或 <code>&lt;strong&gt;</code> 强调</td></tr>
                        <tr><td><strong>引用来源只写URL不留文字</strong></td><td><code>cite</code> 属性对用户不可见，读者不知道来源</td><td>配合 <code>&lt;cite&gt;</code> 标签在页面中显示来源名称</td></tr>
                        <tr><td><strong>在 <code>&lt;q&gt;</code> 中放多句话</strong></td><td><code>&lt;q&gt;</code> 适合短引用，多句话应使用 <code>&lt;blockquote&gt;</code></td><td>短引用用 <code>&lt;q&gt;</code>，长引用用 <code>&lt;blockquote&gt;</code></td></tr>
                    </table>

                    <p><strong>最佳实践总结</strong></p>
                    <ol>
                        <li><strong>长引用用 <code>&lt;blockquote&gt;</code>，短引用用 <code>&lt;q&gt;</code></strong>：根据引用内容的长度选择合适的标签。</li>
                        <li><strong>使用 <code>cite</code> 属性标注来源 URL</strong>：虽然用户看不到，但对搜索引擎有意义。</li>
                        <li><strong>使用 <code>&lt;cite&gt;</code> 标签显示来源名称</strong>：让读者知道引用出自哪里。</li>
                        <li><strong>不要滥用 <code>&lt;blockquote&gt;</code> 做排版</strong>：它表达的是"引用"语义，不是"缩进"样式。</li>
                        <li><strong>保持引用内容忠实于原文</strong>：不要篡改引用的文字，尊重原作者的表达。</li>
                        <li><strong>在引用来源中使用 <code>&lt;cite&gt;</code> 标记作品标题</strong>：如书名、文章名、网站名等。</li>
                    </ol>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了 HTML 中的引用标签：</p>
                    <table>
                        <tr><th>标签</th><th>类型</th><th>作用</th><th>默认样式</th><th>适用场景</th></tr>
                        <tr><td><code>&lt;blockquote&gt;</code></td><td><strong>块级元素</strong></td><td>表示独立成块的长篇引用</td><td>左右缩进</td><td>引用多句话、多个段落、文献片段</td></tr>
                        <tr><td><code>&lt;q&gt;</code></td><td><strong>内联元素</strong></td><td>表示嵌入在段落中的短引用</td><td>自动添加引号</td><td>引用一句短语、观点</td></tr>
                        <tr><td><code>&lt;cite&gt;</code></td><td><strong>内联元素</strong></td><td>表示引用来源的作品标题</td><td>斜体</td><td>标注书名、文章名、网站名等</td></tr>
                        <tr><td><code>cite</code> 属性</td><td><strong>属性</strong></td><td>标注引用来源的URL（对用户不可见）</td><td>无</td><td>配合 <code>&lt;blockquote&gt;</code> 使用</td></tr>
                    </table>
                    <p><strong>核心认知</strong>：引用不仅是视觉上的"抄录"，更是对原作者的尊重和对知识来源的诚实标注。正确使用引用标签，既能提升内容的可信度，也能让网页的语义结构更加清晰，对 SEO 和可访问性都有积极意义。</p>

                    <p><strong>思考与练习</strong></p>
                    <p><strong>一、选择题</strong></p>
                    <ol>
                        <li>以下哪个标签用于表示独立成块的长篇引用？（　）<br>A. <code>&lt;q&gt;</code> &nbsp;&nbsp; B. <code>&lt;cite&gt;</code> &nbsp;&nbsp; C. <code>&lt;blockquote&gt;</code> &nbsp;&nbsp; D. <code>&lt;quote&gt;</code></li>
                        <li>对于嵌入在段落中的短引用，应该使用（　）<br>A. <code>&lt;blockquote&gt;</code> &nbsp;&nbsp; B. <code>&lt;q&gt;</code> &nbsp;&nbsp; C. <code>&lt;p&gt;</code> &nbsp;&nbsp; D. <code>&lt;cite&gt;</code></li>
                        <li>以下哪个标签用于表示引用来源的作品标题？（　）<br>A. <code>&lt;q&gt;</code> &nbsp;&nbsp; B. <code>&lt;blockquote&gt;</code> &nbsp;&nbsp; C. <code>&lt;cite&gt;</code> &nbsp;&nbsp; D. <code>&lt;source&gt;</code></li>
                        <li>关于 <code>&lt;q&gt;</code> 标签，以下说法正确的是（　）<br>A. 需要手动添加引号 &nbsp;&nbsp; B. 浏览器会自动添加引号<br>C. 只能用于英文内容 &nbsp;&nbsp; D. 它是一个块级元素</li>

                    <h2>4.5.2 为什么需要 <code>&lt;pre&gt;</code></h2>

                <h1>4.6 水平线标签 —— <code>&lt;hr&gt;</code></h1>
                <div class="chapter-content">
                    <p>在网页设计中，我们经常需要<strong>在内容之间添加视觉分隔</strong>——比如文章的不同章节之间、主要区块之间、或者正文与页脚之间。在印刷时代，这通常由一条横线（分割线）来完成；在网页中，这个任务由 <code>&lt;hr&gt;</code> 标签承担。</p>

                    <h2>4.6.1 <code>&lt;hr&gt;</code> 标签的基本语法</h2>

        &lt;p&gt;这是正文的内容……&lt;/p&gt;</code></pre>
                    <p>在浏览器中，<code>&lt;hr&gt;</code> 会显示为一条默认样式的水平线（通常为灰色、带立体感的线条），将上下内容清晰地分隔开。</p>

                    <p>在这个例子中，<code>&lt;hr&gt;</code> 表示时间跳跃或主题切换，而不仅仅是一条装饰线。</p>

                    <h2>4.6.2 <code>&lt;hr&gt;</code> 的语义作用</h2>
                    <p>理解 <code>&lt;hr&gt;</code> 的语义对于编写高质量的 HTML 至关重要。<strong>不要仅仅把 <code>&lt;hr&gt;</code> 当作一条装饰线</strong>，而是要认识到它所表达的内容层面的含义。</p>

                    <p>在 HTML4 及更早版本中，<code>&lt;hr&gt;</code> 拥有一些样式属性，但在 HTML5 中这些属性已被<strong>废弃</strong>，不应再使用。它们完全可以用 CSS 替代。</p>

                        <tr><td><code>color</code></td><td>设置线条颜色</td><td><code>background-color: #ccc;</code> 或 <code>border-color: #ccc;</code></td></tr>
                        <tr><td><code>align</code></td><td>设置对齐方式（left/center/right）</td><td><code>margin-left: 0;</code> 或 <code>margin: 0 auto;</code></td></tr>
                        <tr><td><code>noshade</code></td><td>去掉立体阴影（纯色）</td><td>默认重置后即为纯色，无需额外属性</td></tr>

                    <h2>4.7.3 字体设置 —— <code>font-family</code></h2>

                    <h2>4.7.4 颜色设置 —— <code>color</code></h2>
                    <p><code>color</code> 属性用于设置文字颜色。CSS 支持多种颜色表示方式。</p>

                    <p><strong>1. 颜色名称（最直观，但颜色有限）</strong></p>
                    <pre><code>color: red;
        color: blue;
        color: darkgreen;

                    <p><strong>常用颜色名称</strong>：<code>red</code>、<code>blue</code>、<code>green</code>、<code>black</code>、<code>white</code>、<code>gray</code>、<code>orange</code>、<code>purple</code>、<code>pink</code>、<code>yellow</code>、<code>brown</code>、<code>coral</code>、<code>navy</code>、<code>olive</code>、<code>teal</code>、<code>violet</code> 等。</p>

                    <p><strong>2. 十六进制（最常用）</strong></p>
                    <pre><code>color: #ff0000;    /* 红色 */
        color: #00ff00;    /* 绿色 */
        color: #0000ff;    /* 蓝色 */
        color: #333333;    /* 深灰色 */
        color: #ffffff;    /* 白色 */
        color: #f5f3f0;    /* 浅灰米色 */</code></pre>
                    <ul>

                    </ul>

                    <pre><code>color: rgb(255, 0, 0);      /* 红色 */

                    <ul>

                        <li><code>S</code>（饱和度）：0%～100%。</li>
                        <li><code>L</code>（亮度）：0%（黑色）～100%（白色）。</li>

                        <tr><td>HSL</td><td>直观调整色相/亮度</td><td>需要生成色板或调色</td></tr>

                    <h2>4.7.5 字体大小设置 —— <code>font-size</code></h2>
                    <p><code>font-size</code> 用于设置文字的大小。它支持多种单位。</p>

                    <p><strong>常用单位</strong></p>
                    <table>
                        <tr><th>单位</th><th>说明</th><th>示例</th></tr>

                        <tr><td><code>em</code></td><td>相对单位，相对于父元素的字号</td><td><code>font-size: 1.2em;</code>（如果父元素是 16px，则结果为 19.2px）</td></tr>
                        <tr><td><code>rem</code></td><td>相对单位，相对于根元素（<code>&lt;html&gt;</code>）的字号</td><td><code>font-size: 1rem;</code>（根元素默认为 16px）</td></tr>
                        <tr><td><code>%</code>（百分比）</td><td>相对于父元素的字号</td><td><code>font-size: 120%;</code></td></tr>
                    </table>

                    <p><strong><code>px</code> vs <code>em</code> vs <code>rem</code></strong></p>
                    <table>
                        <tr><th>单位</th><th>相对基准</th><th>适用场景</th></tr>
                        <tr><td><code>px</code></td><td>固定像素值，不随父元素变化</td><td>需要精确控制的场景（如边框、小图标）</td></tr>
                        <tr><td><code>em</code></td><td>父元素的 <code>font-size</code></td><td>组件内部的相对缩放</td></tr>
                        <tr><td><code>rem</code></td><td>根元素（<code>&lt;html&gt;</code>）的 <code>font-size</code></td><td>全局统一的字号体系（推荐）</td></tr>
                    </table>
                    <div class="tip-box">
                        <p><strong>推荐做法</strong>：使用 <code>rem</code> 作为主要字号单位，便于整体缩放和适配。同时，在根元素（<code>&lt;html&gt;</code>）中设置基准字号，用户可以通过浏览器缩放或系统偏好调整。</p>
                    </div>
                    <pre><code>html {
            font-size: 16px;   /* 基准字号 */
        }

        body {
            font-size: 1rem;   /* 16px */
        }

        h1 {
            font-size: 2rem;   /* 32px */
        }

        p {
            font-size: 1rem;   /* 16px */
        }</code></pre>
                    <div class="tip-box">
                        <p><strong>💡 可访问性考虑</strong>：使用 <code>rem</code> 而非 <code>px</code>，可以让那些需要更大字体的用户在浏览器中调整文本大小，而不会破坏页面布局。</p>
                    </div>

                    <p><strong>✅ 新方法（HTML5 + CSS）</strong></p>

                    <h2>4.7.7 常见错误与最佳实践</h2>
                    <p><strong>常见错误</strong></p>
                    <table>
                        <tr><th>错误</th><th>问题</th><th>正确做法</th></tr>
                        <tr><td><strong>仍在使用 <code>&lt;font&gt;</code> 标签</strong></td><td>HTML5 已废弃，不符合标准</td><td>使用 CSS 替代</td></tr>
                        <tr><td><strong>在 HTML 中使用 <code>style</code> 属性写内联样式</strong></td><td>样式与结构混杂，难以维护</td><td>使用 <code>&lt;style&gt;</code> 或外部 CSS 文件</td></tr>
                        <tr><td><strong>只用颜色名称</strong></td><td>颜色选择有限，缺乏精确度</td><td>使用十六进制、RGB 或 HSL</td></tr>
                        <tr><td><strong>使用 <code>px</code> 控制字号</strong></td><td>不利于可访问性（用户无法缩放）</td><td>优先使用 <code>rem</code></td></tr>
                        <tr><td><strong>字体列表中只写一个字体</strong></td><td>如果该字体不存在，会回退到系统默认</td><td>使用字体栈（多个备选 + 通用族）</td></tr>
                        <tr><td><strong>忘记为中文设置字体</strong></td><td>英文字体可能不支持中文</td><td>在字体栈中加入中文字体</td></tr>
                    </table>

                    <p><strong>最佳实践总结</strong></p>
                    <ol>
                        <li><strong>永远不要使用 <code>&lt;font&gt;</code> 标签</strong>，它是历史的产物，不符合现代 Web 标准。</li>
                        <li><strong>使用 CSS 控制所有样式</strong>：<code>font-family</code>、<code>font-size</code>、<code>color</code> 等。</li>
                        <li><strong>使用 <code>rem</code> 作为字号单位</strong>，提升可访问性和可维护性。</li>
                        <li><strong>使用字体栈（font stack）</strong>：提供多个备选字体，最后以通用字体族结尾。</li>
                        <li><strong>使用语义化的类名</strong>，而非直接对标签设置样式（除非是全局基础样式）。</li>
                        <li><strong>优先使用十六进制或 HSL 表示颜色</strong>，兼容性好且易于调整。</li>
                        <li><strong>考虑可访问性</strong>：确保文字颜色与背景有足够的对比度（WCAG 推荐对比度不低于 4.5:1）。</li>
                        <li><strong>区分全局样式与局部样式</strong>：在 <code>body</code> 上设置全局字体和颜色，在特定元素上覆盖。</li>
                    </ol>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了字体与颜色的设置：</p>
                    <table>
                        <tr><th>要点</th><th>说明</th></tr>
                        <tr><td><strong><code>&lt;font&gt;</code> 标签</strong></td><td>已废弃，不应再使用。它曾用于控制字体、大小和颜色，但违反"结构与样式分离"原则。</td></tr>
                        <tr><td><strong>CSS <code>font-family</code></strong></td><td>控制字体，使用"字体栈"提供多个备选。</td></tr>
                        <tr><td><strong>CSS <code>font-size</code></strong></td><td>控制字号，推荐使用 <code>rem</code> 单位。</td></tr>
                        <tr><td><strong>CSS <code>color</code></strong></td><td>控制文字颜色，支持名称、十六进制、RGB/RGBA、HSL/HSLA。</td></tr>
                        <tr><td><strong>通用字体族</strong></td><td><code>serif</code>、<code>sans-serif</code>、<code>monospace</code>、<code>cursive</code>、<code>fantasy</code>。</td></tr>
                        <tr><td><strong>字体引入</strong></td><td>使用 Google Fonts 或 <code>@font-face</code> 引入自定义字体。</td></tr>
                        <tr><td><strong>可访问性</strong></td><td>使用 <code>rem</code>、保证对比度，让用户可以自由缩放。</td></tr>
                    </table>
                    <p><strong>核心认知</strong>：在 HTML5 中，<strong>结构与样式必须分离</strong>。字体和颜色的控制是 CSS 的职责，HTML 只负责内容的语义和结构。这一原则是现代 Web 开发的基石，也是你走向成熟开发者的必经之路。</p>

                    <p><strong>一、选择题</strong></p>
                    <ol>

                        <li>关于"字体栈"（font stack），以下说法正确的是（　）<br>A. 只写一个字体名即可 &nbsp;&nbsp; B. 浏览器会按顺序尝试，直到找到可用字体<br>C. 必须用双引号包裹所有字体名 &nbsp;&nbsp; D. 通用字体族应放在最前面</li>
                    </ol>
                    <p><strong>二、简答题</strong></p>

                if (currentChapterIndex > 0) goToChapter(currentChapterIndex - 1, true);
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                if (currentChapterIndex < allChapters.length - 1) goToChapter(currentChapterIndex + 1, true);
                e.preventDefault();
            }
        });

        themeToggle.addEventListener('click', toggleTheme);
        fontInc.addEventListener('click', function() { changeFontSize(2); });
        fontDec.addEventListener('click', function() { changeFontSize(-2); });

        document.getElementById('progressBar').addEventListener('click', function(e) {
            var rect = e.currentTarget.getBoundingClientRect();
            var percent = (e.clientX - rect.left) / rect.width;
            var scrollHeight = contentArea.scrollHeight - contentArea.clientHeight;
            contentArea.scrollTop = percent * scrollHeight;
        });

        // ============================================================
        // 6. 偏好恢复
        // ============================================================
        try {
            var savedTheme = localStorage.getItem('html-reader-theme');
            if (savedTheme === 'night') {
                isNight = true;
                document.body.classList.add('night-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            var savedFont = localStorage.getItem('html-reader-fontsize');
            if (savedFont) {
                fontSize = parseInt(savedFont, 10);
                if (fontSize >= 12 && fontSize <= 24) {
                    fontSizeDisplay.textContent = fontSize;
                }
            }
        } catch (e) {}

        function toggleTheme() {
            isNight = !isNight;
            document.body.classList.toggle('night-mode', isNight);
            themeToggle.innerHTML = isNight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            try {
                localStorage.setItem('html-reader-theme', isNight ? 'night' : 'day');
            } catch (e) {}
        }

        function changeFontSize(delta) {
            fontSize = Math.min(24, Math.max(12, fontSize + delta));
            fontSizeDisplay.textContent = fontSize;
            document.querySelectorAll('.chapter-content').forEach(function(el) {
                el.style.fontSize = fontSize + 'px';
            });
            try {
                localStorage.setItem('html-reader-fontsize', fontSize);
            } catch (e) {}
        }

        function openDrawer() {
            drawer.classList.add('open');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            drawer.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        function toggleDrawer() {
            if (drawer.classList.contains('open')) {
                closeDrawer();
            } else {
                openDrawer();
            }
        }

        // ============================================================
        // 7. 启动应用
        // ============================================================
        renderToc();
        restoreProgress();
        document.querySelectorAll('.chapter-content').forEach(function(el) {
            el.style.fontSize = fontSize + 'px';
        });

        // 触摸滑动翻页
        var touchStartX = 0,
            touchStartY = 0;
        contentArea.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        contentArea.addEventListener('touchend', function(e) {
            var dx = e.changedTouches[0].clientX - touchStartX;
            var dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                if (dx < 0 && currentChapterIndex < allChapters.length - 1) {
                    goToChapter(currentChapterIndex + 1, true);
                } else if (dx > 0 && currentChapterIndex > 0) {
                    goToChapter(currentChapterIndex - 1, true);
                }
            }
        }, { passive: true });

        console.log('📖 HTML阅读器已启动（两级目录，支持折叠）');
        console.log('总章节数：', allChapters.length);
    </script>
</body>
</html>
