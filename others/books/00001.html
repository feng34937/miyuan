                                    <tr><td><strong>每个页面限制</strong></td><td>只能有一个 <code>&lt;base&gt;</code>。</td></tr>
                                    <tr><td><strong>相对路径 vs 绝对路径</strong></td><td>只有相对路径受 <code>&lt;base&gt;</code> 影响；以 <code>/</code> 开头的绝对路径不受影响。</td></tr>
                                    <tr><td><strong>主要使用场景</strong></td><td>① 项目部署环境变化时的路径适配；② SPA 路由根路径配置；③ CMS 模板中的资源引用。</td></tr>
                                    <tr><td><strong>注意事项</strong></td><td>注意末尾的 <code>/</code>；锚点链接（<code>#</code>）可能受影响；避免空 <code>href</code> 或 <code>src</code>。</td></tr>
                                </table>
                                <p><strong>核心认知</strong>：<code>&lt;base&gt;</code> 是一个"全局配置"工具。它能让页面中所有相对路径的管理变得集中、高效，但也需要在使用时格外小心，避免误伤某些不需要被影响的路径。</p>

                                    <li>以下哪个路径不受 <code>&lt;base&gt;</code> 标签的影响？（　）<br>A. <code>images/photo.jpg</code> &nbsp;&nbsp; B. <code>./style.css</code><br>C. <code>/about.html</code> &nbsp;&nbsp; D. <code>../index.html</code></li>
                                    <li><code>&lt;base&gt;</code> 标签中，用于设置所有超链接默认打开方式的属性是（　）<br>A. <code>href</code> &nbsp;&nbsp; B. <code>src</code> &nbsp;&nbsp; C. <code>target</code> &nbsp;&nbsp; D. <code>rel</code></li>
                                </ol>
                                <p><strong>二、简答题</strong></p>
                                <ol>
                                    <li>假设你的网站首页 URL 是 <code>https://example.com/index.html</code>，你在 <code>&lt;head&gt;</code> 中设置了 <code>&lt;base href="/assets/"&gt;</code>。页面中有一个 <code>&lt;img src="logo.png"&gt;</code>，浏览器实际请求的 URL 是什么？</li>
                                    <li>在什么场景下使用 <code>&lt;base&gt;</code> 特别有价值？请至少举出两个场景。</li>
                                    <li>如果你在页面中既使用了 <code>&lt;base&gt;</code>，又希望某个 <code>&lt;a&gt;</code> 标签的锚点链接（如 <code>#top</code>）仍跳转到当前页面的顶部，应该怎么做？</li>
                                </ol>
                                <p><strong>三、上机实践</strong></p>

                            <h1>3.5 <code>&lt;link&gt;</code> 外部资源链接标记</h1>
                            <div class="chapter-content">
                                <p>在前几节中，我们已经多次提到了 <code>&lt;link&gt;</code> 标签——它出现在 <code>&lt;head&gt;</code> 中，用于引入外部 CSS 样式表或设置网站图标。但 <code>&lt;link&gt;</code> 的能力远不止于此，它还是页面性能优化、资源预加载、多端适配等高级功能的重要工具。</p>
                                <p>如果说 <code>&lt;meta&gt;</code> 是页面的"名片"，那 <code>&lt;link&gt;</code> 就是页面的"接线员"——它负责将页面与外部世界（样式文件、字体、图标、预加载资源等）连接起来。</p>

                                <h2>3.5.1 <code>&lt;link&gt;</code> 标签的基本语法</h2>
                                <p><code>&lt;link&gt;</code> 是一个<strong>单标签</strong>（自闭合标签），在 HTML5 中不需要写结束斜杠。其核心属性有两个：</p>
                                <ul>

                                    <li><code>href</code>（hypertext reference）：指定资源的 URL 地址。</li>
                                </ul>
                                <pre><code>&lt;link rel="关系类型" href="资源地址"&gt;</code></pre>

                                <p><strong>示例：</strong></p>
                                <pre><code>&lt;!-- 引入外部 CSS 样式表（最常用） --&gt;
        &lt;link rel="stylesheet" href="style.css"&gt;

        &lt;!-- 设置网站图标 --&gt;
        &lt;link rel="icon" href="favicon.ico"&gt;

                                <div class="tip-box">

                                <p>这是 <code>&lt;link&gt;</code> 最经典、最普遍的用法。通过将 CSS 样式独立为外部文件，可以实现<strong>样式与结构分离</strong>，让 HTML 代码更简洁，样式更易于维护和复用。</p>

                                <p><strong>1. 为什么要使用外部样式表？</strong></p>
                                <table>
                                    <tr><th>对比维度</th><th>外部样式表（<code>&lt;link&gt;</code>）</th><th>内部样式表（<code>&lt;style&gt;</code>）</th><th>行内样式（<code>style</code> 属性）</th></tr>
                                    <tr><td><strong>代码复用性</strong></td><td>一个 CSS 文件可被多个页面共用</td><td>仅当前页面可用</td><td>仅当前元素可用</td></tr>
                                    <tr><td><strong>可维护性</strong></td><td>集中管理，修改一处全局生效</td><td>修改需逐页处理</td><td>修改需逐个元素处理</td></tr>
                                    <tr><td><strong>缓存效率</strong></td><td>浏览器可缓存，减少重复加载</td><td>每次加载页面都需重新下载</td><td>每次加载页面都需重新下载</td></tr>

                                <p><strong>2. 引入多个样式表</strong></p>

                                <h2>3.5.4 核心作用三：资源预加载与性能优化</h2>
                                <p>在现代 Web 开发中，<code>&lt;link&gt;</code> 标签在<strong>页面性能优化</strong>方面扮演着越来越重要的角色。通过预加载、预连接、预取等技术，可以显著提升页面的加载速度和用户体验。</p>

                                <p><strong>1. <code>preload</code> —— 预加载关键资源</strong></p>
                                <p><code>preload</code> 告诉浏览器："这个资源非常重要，请尽快加载它"，即使 HTML 解析器还没解析到引用该资源的位置。</p>

                                <p><strong><code>as</code> 属性的常见值：</strong></p>

                                <p><strong>2. <code>preconnect</code> —— 预连接第三方源</strong></p>
                                <p><code>preconnect</code> 告诉浏览器："我很快就要向这个域名请求资源，请提前建立连接（DNS 解析、TCP 握手、TLS 协商）"。</p>

        &lt;link rel="preconnect" href="https://fonts.gstatic.com" crossorigin&gt;</code></pre>
                                <p>当页面需要向第三方域名（如 CDN、字体服务、API 服务）发送请求时，<code>preconnect</code> 可以将网络连接时间前置，减少用户等待时间。</p>

                                <p><strong>3. <code>dns-prefetch</code> —— 预解析 DNS</strong></p>
                                <p><code>dns-prefetch</code> 是 <code>preconnect</code> 的轻量版，只进行 DNS 解析，不建立完整连接。它的兼容性更好，适合用于相对不那么紧急的第三方域名。</p>
                                <pre><code>&lt;link rel="dns-prefetch" href="https://analytics.example.com"&gt;</code></pre>

                                <p><strong>4. <code>prefetch</code> —— 预取下一个页面可能需要资源</strong></p>
                                <p><code>prefetch</code> 告诉浏览器："用户可能即将访问另一个页面，请提前加载那个页面所需的资源"。</p>
                                <pre><code>&lt;!-- 预取下一页面的资源 --&gt;
        &lt;link rel="prefetch" href="next-page.html"&gt;
        &lt;link rel="prefetch" href="next-page-assets.js"&gt;</code></pre>
                                <p>与 <code>preload</code> 的区别在于：<code>preload</code> 用于<strong>当前页面</strong>的关键资源；<code>prefetch</code> 用于<strong>下一个页面</strong>可能需要的资源，其优先级较低，在空闲时间进行加载。</p>

                                <p><strong>5. <code>modulepreload</code> —— 预加载 ES Module</strong></p>
                                <p>用于预加载 JavaScript 模块（ES Modules），现代前端框架（如 Vue、React）的构建工具通常会生成这类标签。</p>
                                <pre><code>&lt;link rel="modulepreload" href="app.js"&gt;</code></pre>

                                <h2>3.5.5 其他常用的 <code>rel</code> 值</h2>
                                <table>
                                    <tr><th><code>rel</code> 值</th><th>作用</th><th>示例</th></tr>
                                    <tr><td><code>stylesheet</code></td><td>引入外部 CSS 样式表（最常用）</td><td><code>&lt;link rel="stylesheet" href="style.css"&gt;</code></td></tr>
                                    <tr><td><code>icon</code></td><td>设置网站图标</td><td><code>&lt;link rel="icon" href="favicon.ico"&gt;</code></td></tr>
                                    <tr><td><code>apple-touch-icon</code></td><td>苹果设备主屏幕图标</td><td><code>&lt;link rel="apple-touch-icon" href="icon.png"&gt;</code></td></tr>
                                    <tr><td><code>preload</code></td><td>预加载当前页面关键资源</td><td><code>&lt;link rel="preload" href="hero.jpg" as="image"&gt;</code></td></tr>
                                    <tr><td><code>preconnect</code></td><td>提前建立到第三方域的连接</td><td><code>&lt;link rel="preconnect" href="https://api.example.com"&gt;</code></td></tr>
                                    <tr><td><code>dns-prefetch</code></td><td>提前解析第三方域名的 DNS</td><td><code>&lt;link rel="dns-prefetch" href="https://cdn.example.com"&gt;</code></td></tr>
                                    <tr><td><code>prefetch</code></td><td>预取下一个页面可能需要的资源</td><td><code>&lt;link rel="prefetch" href="next-page.html"&gt;</code></td></tr>
                                    <tr><td><code>modulepreload</code></td><td>预加载 ES Module</td><td><code>&lt;link rel="modulepreload" href="app.js"&gt;</code></td></tr>
                                    <tr><td><code>canonical</code></td><td>指定规范化 URL（防止重复内容）</td><td><code>&lt;link rel="canonical" href="https://example.com/page"&gt;</code></td></tr>
                                    <tr><td><code>alternate</code></td><td>指定替代版本（如 RSS 订阅、多语言版本）</td><td><code>&lt;link rel="alternate" type="application/rss+xml" href="feed.xml"&gt;</code></td></tr>
                                    <tr><td><code>manifest</code></td><td>关联 Web App Manifest（PWA 技术）</td><td><code>&lt;link rel="manifest" href="manifest.json"&gt;</code></td></tr>
                                </table>

                                <p><strong><code>canonical</code> —— 规范化 URL</strong></p>
                                <p>当同一个页面有多个 URL 可以访问时（如带 <code>?utm_source=...</code> 参数、或 <code>www</code> 与 <code>https</code> 的不同组合），使用 <code>canonical</code> 告诉搜索引擎哪个是"标准"的 URL。</p>
                                <pre><code>&lt;link rel="canonical" href="https://example.com/blog/html-tutorial"&gt;</code></pre>
                                <p>这有助于避免搜索引擎因重复内容而降低排名。</p>

                                <p><strong><code>alternate</code> —— 替代版本</strong></p>
                                <ul>
                                    <li><strong>RSS 订阅源</strong>：</li>
                                </ul>
                                <pre><code>&lt;link rel="alternate" type="application/rss+xml" title="RSS 订阅" href="feed.xml"&gt;</code></pre>
                                <ul>
                                    <li><strong>多语言版本</strong>：</li>
                                </ul>
                                <pre><code>&lt;link rel="alternate" hreflang="en" href="https://example.com/en/"&gt;
        &lt;link rel="alternate" hreflang="zh-CN" href="https://example.com/zh/"&gt;</code></pre>

                                <h2>3.5.6 <code>&lt;link&gt;</code> 的常用属性一览</h2>
                                <table>
                                    <tr><th>属性</th><th>说明</th><th>示例</th></tr>
                                    <tr><td><code>rel</code></td><td><strong>必需</strong>。定义当前文档与资源的关系。</td><td><code>rel="stylesheet"</code></td></tr>
                                    <tr><td><code>href</code></td><td><strong>必需</strong>。指定资源的 URL 地址。</td><td><code>href="style.css"</code></td></tr>
                                    <tr><td><code>type</code></td><td>资源的 MIME 类型（通常可省略，由浏览器自动识别）。</td><td><code>type="text/css"</code></td></tr>
                                    <tr><td><code>sizes</code></td><td>指定图标尺寸（用于 <code>rel="icon"</code>）。</td><td><code>sizes="32x32"</code></td></tr>
                                    <tr><td><code>title</code></td><td>定义样式表的标题（用于备选样式表）。</td><td><code>title="默认主题"</code></td></tr>
                                    <tr><td><code>as</code></td><td>配合 <code>rel="preload"</code>，指定资源类型。</td><td><code>as="image"</code></td></tr>
                                    <tr><td><code>crossorigin</code></td><td>配置跨域请求（用于字体、模块等）。</td><td><code>crossorigin="anonymous"</code></td></tr>
                                    <tr><td><code>media</code></td><td>指定样式表适用的媒体类型或条件。</td><td><code>media="print"</code> 或 <code>media="(max-width: 768px)"</code></td></tr>
                                </table>

                                <p><strong><code>media</code> 属性示例</strong></p>
                                <p>你可以让某些 CSS 只在特定条件下生效，例如只在打印或移动端加载：</p>
                                <pre><code>&lt;!-- 只在打印时加载的样式 --&gt;
        &lt;link rel="stylesheet" href="print.css" media="print"&gt;

        &lt;!-- 只在移动端加载的样式 --&gt;
        &lt;link rel="stylesheet" href="mobile.css" media="(max-width: 768px)"&gt;</code></pre>

                                <h2>3.5.7 一个完整的 <code>&lt;head&gt;</code> 示例（含 <code>&lt;link&gt;</code>）</h2>
                                <p>综合前面几节的知识，一个配置完善的 <code>&lt;head&gt;</code> 可能包含以下 <code>&lt;link&gt;</code> 标签：</p>
                                <pre><code>&lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;
            &lt;title&gt;我的个人博客&lt;/title&gt;
            &lt;meta name="description" content="分享技术与生活的个人博客"&gt;

            &lt;!-- 网站图标 --&gt;
            &lt;link rel="icon" href="/favicon.ico" sizes="32x32"&gt;
            &lt;link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180"&gt;

            &lt;!-- 预连接到外部资源 --&gt;
            &lt;link rel="preconnect" href="https://fonts.googleapis.com"&gt;
            &lt;link rel="preconnect" href="https://fonts.gstatic.com" crossorigin&gt;

            &lt;!-- 预加载关键图片 --&gt;
            &lt;link rel="preload" href="/images/hero.jpg" as="image"&gt;

            &lt;!-- 外部样式表 --&gt;
            &lt;link rel="stylesheet" href="/css/reset.css"&gt;
            &lt;link rel="stylesheet" href="/css/style.css"&gt;

            &lt;!-- 规范化 URL --&gt;
            &lt;link rel="canonical" href="https://example.com/blog/hello-world"&gt;

            &lt;!-- RSS 订阅源 --&gt;
            &lt;link rel="alternate" type="application/rss+xml" title="RSS订阅" href="/feed.xml"&gt;
        &lt;/head&gt;</code></pre>

                                <p><strong>知识小结</strong></p>
                                <p>本节我们系统学习了 <code>&lt;link&gt;</code> 标签的多种用途：</p>
                                <table>
                                    <tr><th>用途</th><th>示例</th></tr>
                                    <tr><td><strong>引入 CSS 样式表</strong></td><td><code>&lt;link rel="stylesheet" href="style.css"&gt;</code></td></tr>
                                    <tr><td><strong>设置网站图标</strong></td><td><code>&lt;link rel="icon" href="favicon.ico"&gt;</code></td></tr>
                                    <tr><td><strong>预加载关键资源</strong></td><td><code>&lt;link rel="preload" href="hero.jpg" as="image"&gt;</code></td></tr>
                                    <tr><td><strong>预连接第三方域</strong></td><td><code>&lt;link rel="preconnect" href="https://api.example.com"&gt;</code></td></tr>
                                    <tr><td><strong>预解析 DNS</strong></td><td><code>&lt;link rel="dns-prefetch" href="https://cdn.example.com"&gt;</code></td></tr>
                                    <tr><td><strong>预取下一页资源</strong></td><td><code>&lt;link rel="prefetch" href="next-page.html"&gt;</code></td></tr>
                                    <tr><td><strong>规范化 URL</strong></td><td><code>&lt;link rel="canonical" href="https://example.com/page"&gt;</code></td></tr>
                                    <tr><td><strong>RSS 订阅</strong></td><td><code>&lt;link rel="alternate" type="application/rss+xml" href="feed.xml"&gt;</code></td></tr>
                                    <tr><td><strong>PWA Manifest</strong></td><td><code>&lt;link rel="manifest" href="manifest.json"&gt;</code></td></tr>
                                </table>
                                <p><strong>核心认知</strong>：<code>&lt;link&gt;</code> 是页面与外部资源之间的"桥梁"。无论是样式、图标，还是性能优化中的预加载与预连接，<code>&lt;link&gt;</code> 都发挥着关键作用。一个成熟的开发者，不仅要会用 <code>&lt;link rel="stylesheet"&gt;</code>，还应理解其他 <code>rel</code> 值在性能优化和用户体验提升中的价值。</p>

                                <p><strong>思考与练习</strong></p>
                                <p><strong>一、选择题</strong></p>
                                <ol>
                                    <li>以下哪个是最常用的 <code>&lt;link&gt;</code> 用途？（　）<br>A. 设置网站图标 &nbsp;&nbsp; B. 引入外部 CSS 样式表<br>C. 预加载资源 &nbsp;&nbsp; D. 预连接第三方域</li>
                                    <li>用于设置网站图标的 <code>rel</code> 值是（　）<br>A. <code>stylesheet</code> &nbsp;&nbsp; B. <code>icon</code> &nbsp;&nbsp; C. <code>preload</code> &nbsp;&nbsp; D. <code>alternate</code></li>
                                    <li>以下哪个标签用于告诉浏览器"请提前与这个域名建立网络连接"？（　）<br>A. <code>&lt;link rel="preload"&gt;</code> &nbsp;&nbsp; B. <code>&lt;link rel="preconnect"&gt;</code><br>C. <code>&lt;link rel="prefetch"&gt;</code> &nbsp;&nbsp; D. <code>&lt;link rel="dns-prefetch"&gt;</code></li>
                                    <li>如果你想在页面中引入一个外部 CSS 文件 <code>theme.css</code>，正确的写法是（　）<br>A. <code>&lt;style src="theme.css"&gt;</code> &nbsp;&nbsp; B. <code>&lt;link href="theme.css"&gt;</code><br>C. <code>&lt;link rel="stylesheet" href="theme.css"&gt;</code> &nbsp;&nbsp; D. <code>&lt;link rel="style" href="theme.css"&gt;</code></li>
                                    <li>以下哪个标签用于避免搜索引擎因重复内容而降低排名？（　）<br>A. <code>&lt;link rel="canonical"&gt;</code> &nbsp;&nbsp; B. <code>&lt;link rel="alternate"&gt;</code><br>C. <code>&lt;link rel="preload"&gt;</code> &nbsp;&nbsp; D. <code>&lt;link rel="manifest"&gt;</code></li>
                                </ol>
                                <p><strong>二、简答题</strong></p>
                                <ol>
                                    <li>为什么推荐使用外部样式表（通过 <code>&lt;link&gt;</code> 引入）而不是内部样式表（<code>&lt;style&gt;</code>）？请至少列出两个理由。</li>
                                    <li><code>preload</code> 和 <code>prefetch</code> 的主要区别是什么？各自在什么场景下使用？</li>
                                    <li>假设你的网站同一个页面有 <code>https://example.com</code> 和 <code>https://example.com/?ref=homepage</code> 两个访问路径，你该如何处理以防止搜索引擎判为重复内容？</li>
                                </ol>
                                <p><strong>三、上机实践</strong></p>
                                <ol>
                                    <li>创建一个简单的 HTML 页面，在 <code>&lt;head&gt;</code> 中通过 <code>&lt;link&gt;</code> 引入一个外部 CSS 文件（你可以创建一个简单的 <code>style.css</code> 文件，内容为 <code>body { background-color: #f0f0f0; }</code>），然后用浏览器打开，验证样式是否生效。</li>
                                    <li>为你的页面设置一个 favicon：可以从网上下载一个 <code>.ico</code> 或 <code>.png</code> 格式的图标文件，放到项目目录中，使用 <code>&lt;link rel="icon"&gt;</code> 引用它，刷新浏览器观察标签页的变化。</li>
                                    <li>在页面中添加 <code>&lt;link rel="preconnect" href="https://fonts.googleapis.com"&gt;</code>，然后打开浏览器的开发者工具（Network 面板），观察在加载页面时是否提前建立了连接。</li>
                                    <li>（选做）在页面中添加一个 <code>&lt;link rel="preload" as="image" href="..."&gt;</code>，预加载一张大图，然后使用 <code>&lt;img&gt;</code> 引用同一张图片。打开开发者工具的 Network 面板，观察图片的加载时机是否提前了。</li>
                                </ol>
                                <hr>
                                <p><strong>下节预告</strong>：3.6节将学习 <code>&lt;style&gt;</code> 样式标记，了解如何在 HTML 页面中直接编写 CSS 样式，以及与外部样式表的对比和选择策略。敬请期待！</p>
                            </div>
                        `

                content: `
                            <h1>3.6 <code>&lt;style&gt;</code> 样式标记</h1>
                            <div class="chapter-content">
                                <p>在前几节中，我们学习了如何通过 <code>&lt;link&gt;</code> 标签引入外部 CSS 文件来实现样式与结构的分离。但并不是所有场景都适合使用外部样式表——当样式仅针对单个页面、或需要快速测试样式效果时，<code>&lt;style&gt;</code> 标签提供了更直接的方式。</p>
                                <p><code>&lt;style&gt;</code> 标签允许你在 HTML 文档内部直接编写 CSS 代码。它是 <code>&lt;head&gt;</code> 中与样式相关的另一个重要成员，与 <code>&lt;link&gt;</code> 形成互补关系。</p>

                                <h2>3.6.1 <code>&lt;style&gt;</code> 标签的基本语法</h2>
                                <p><code>&lt;style&gt;</code> 是一个<strong>双标签</strong>，它包裹的 CSS 代码将作用于当前页面。</p>
                                <pre><code>&lt;style&gt;
            /* CSS 代码写在这里 */
            body {
                background-color: #f5f3f0;
                font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            }
            h1 {
                color: #2c3e50;
                font-size: 28px;
            }
        &lt;/style&gt;</code></pre>

                                <p><strong>位置要求</strong></p>
                                <p><code>&lt;style&gt;</code> 必须放在 <code>&lt;head&gt;</code> 内部。虽然在 HTML5 规范中，<code>&lt;style&gt;</code> 也可以放在 <code>&lt;body&gt;</code> 中，但<strong>强烈推荐统一放在 <code>&lt;head&gt;</code> 中</strong>，这样可以确保样式在页面内容渲染之前就被加载和应用，避免页面出现"闪烁"现象（先显示无样式的内容，再突然应用样式）。</p>
                                <pre><code>&lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;title&gt;我的页面&lt;/title&gt;

            &lt;!-- ✅ 推荐位置 --&gt;
            &lt;style&gt;
                /* 样式代码 */
            &lt;/style&gt;
        &lt;/head&gt;</code></pre>

                                <p><strong><code>type</code> 属性（已不再需要）</strong></p>
                                <p>在 HTML4 和 XHTML 时代，<code>&lt;style&gt;</code> 需要指定 <code>type="text/css"</code>：</p>
                                <pre><code>&lt;!-- 旧写法（已废弃） --&gt;
        &lt;style type="text/css"&gt;
            /* CSS 代码 */
        &lt;/style&gt;</code></pre>
                                <p>在 HTML5 中，<code>type</code> 属性不再是必需的，因为浏览器默认将 <code>&lt;style&gt;</code> 中的内容识别为 CSS。直接写 <code>&lt;style&gt;</code> 即可。</p>

                                <h2>3.6.2 为什么使用 <code>&lt;style&gt;</code> 内部样式表</h2>
                                <p><strong>1. 适用场景</strong></p>
                                <table>
                                    <tr><th>场景</th><th>说明</th><th>示例</th></tr>
                                    <tr><td><strong>单页面独有样式</strong></td><td>某些样式只在一个页面中使用，不值得单独创建一个 CSS 文件。</td><td>某个活动页的特殊装饰样式。</td></tr>
                                    <tr><td><strong>快速原型/测试</strong></td><td>在开发过程中快速验证样式效果，无需频繁切换文件。</td><td>调整某个元素的颜色或布局。</td></tr>
                                    <tr><td><strong>邮件模板</strong></td><td>HTML 邮件通常不支持外部样式表，只能使用内联样式或 <code>&lt;style&gt;</code>。</td><td>营销邮件、订阅通知。</td></tr>
                                    <tr><td><strong>内容管理系统（CMS）</strong></td><td>某些 CMS 主题允许在页面头部添加自定义样式。</td><td>WordPress 的"额外 CSS"功能。</td></tr>
                                    <tr><td><strong>样式覆盖</strong></td><td>需要覆盖外部样式表中的某些规则，且不想修改 CSS 文件。</td><td>临时修复某个样式问题。</td></tr>
                                </table>

                                <p><strong>2. 与 <code>&lt;link&gt;</code> 外部样式表的对比</strong></p>
                                <table>
                                    <tr><th>对比维度</th><th><code>&lt;style&gt;</code> 内部样式表</th><th><code>&lt;link&gt;</code> 外部样式表</th></tr>
                                    <tr><td><strong>复用性</strong></td><td>❌ 仅当前页面有效</td><td>✅ 多个页面可共用</td></tr>
                                    <tr><td><strong>可维护性</strong></td><td>❌ 样式散落在各页面中，修改需逐页处理</td><td>✅ 集中管理，修改一处全局生效</td></tr>
                                    <tr><td><strong>缓存效率</strong></td><td>❌ 每次加载页面都需重新下载样式代码</td><td>✅ 浏览器可缓存，减少重复加载</td></tr>
                                    <tr><td><strong>加载速度</strong></td><td>首次加载可能更快（无需额外 HTTP 请求）</td><td>首次加载需额外请求，但后续访问更快</td></tr>
                                    <tr><td><strong>代码整洁度</strong></td><td>HTML 中包含样式代码，职责不够分离</td><td>✅ 结构与样式分离，职责清晰</td></tr>
                                    <tr><td><strong>适用场景</strong></td><td>单页面独有样式、快速测试</td><td>多页面共享样式、生产环境项目</td></tr>
                                </table>
                                <div class="tip-box">
                                    <p><strong>🎯 推荐做法</strong>：在正式项目中，<strong>优先使用 <code>&lt;link&gt;</code> 引入外部样式表</strong>，将样式集中管理。<code>&lt;style&gt;</code> 仅用于页面独有样式或快速测试场景。</p>
                                </div>

                                <h2>3.6.3 <code>&lt;style&gt;</code> 的常用属性</h2>
                                <p><strong>1. <code>media</code> —— 指定样式适用的媒体类型或条件</strong></p>
                                <p><code>media</code> 属性允许你为不同的设备或场景定义不同的样式，这些样式只在特定条件下才会生效。</p>
                                <pre><code>&lt;!-- 只对屏幕显示生效（默认，通常可省略） --&gt;
        &lt;style media="screen"&gt;
            body { font-size: 16px; }
        &lt;/style&gt;

        &lt;!-- 只在打印时生效 --&gt;
        &lt;style media="print"&gt;
            body { font-size: 12pt; color: black; }
            .no-print { display: none; }
        &lt;/style&gt;

        &lt;!-- 只在屏幕宽度小于 768px 时生效（移动端） --&gt;
        &lt;style media="(max-width: 768px)"&gt;
            body { font-size: 14px; }
            .sidebar { display: none; }
        &lt;/style&gt;</code></pre>
                                <div class="tip-box">
                                    <p><strong>💡 与 <code>&lt;link&gt;</code> 的 <code>media</code> 属性类似</strong>：<code>&lt;link rel="stylesheet" href="print.css" media="print"&gt;</code> 和 <code>&lt;style media="print"&gt;</code> 的功能是一样的，区别只在于样式是写在外部文件还是内部。</p>
                                </div>

                                <p><strong>2. <code>scoped</code> —— 限制样式作用域（已废弃）</strong></p>
                                <p>在 HTML5 的早期版本中，<code>scoped</code> 属性曾被提议用于限制 <code>&lt;style&gt;</code> 的样式只作用于父元素及其子元素：</p>
                                <pre><code>&lt;!-- 已废弃的用法 --&gt;
        &lt;div&gt;
            &lt;style scoped&gt;
                p { color: red; }  /* 只影响这个 div 内的 p */
            &lt;/style&gt;
            &lt;p&gt;这段文字是红色的&lt;/p&gt;
        &lt;/div&gt;
        &lt;p&gt;这段文字不受影响&lt;/p&gt;</code></pre>
                                <p>但由于浏览器支持不佳、实现复杂等原因，<code>scoped</code> 属性已被<strong>废弃</strong>，不建议使用。现代开发中如需限制样式作用域，推荐使用 CSS Modules、Shadow DOM 或 BEM 命名规范等方案。</p>

                                <h2>3.6.4 <code>&lt;style&gt;</code> 与 <code>&lt;link&gt;</code> 的优先级</h2>
                                <p>在同一个页面中，如果同时存在 <code>&lt;style&gt;</code> 和 <code>&lt;link&gt;</code>，它们之间的优先级遵循 CSS 的<strong>层叠规则</strong>：</p>
                                <ol>
                                    <li><strong>后加载的样式优先级更高</strong>（当选择器权重相同时）。</li>
                                    <li>如果 <code>&lt;link&gt;</code> 引入的外部样式表在 <code>&lt;style&gt;</code> 之前加载，那么 <code>&lt;style&gt;</code> 中的规则会覆盖外部样式表中的同名规则。</li>
                                    <li>反之，如果 <code>&lt;style&gt;</code> 在前，<code>&lt;link&gt;</code> 在后，则外部样式表会覆盖内部样式。</li>
                                </ol>
                                <pre><code>&lt;head&gt;
            &lt;link rel="stylesheet" href="style.css"&gt;   &lt;!-- 先加载 --&gt;
            &lt;style&gt;
                /* 后加载，会覆盖 style.css 中相同选择器的样式 */
                h1 { color: red; }
            &lt;/style&gt;
        &lt;/head&gt;</code></pre>
                                <p>在这个例子中，<code>&lt;style&gt;</code> 中的 <code>h1 { color: red; }</code> 会覆盖 <code>style.css</code> 中可能存在的 <code>h1</code> 样式。</p>

                                <p><strong>推荐顺序</strong></p>
                                <p>在 <code>&lt;head&gt;</code> 中，推荐的样式引入顺序是：</p>
                                <ol>
                                    <li>外部样式表（<code>&lt;link&gt;</code>）—— 先加载基础样式</li>
                                    <li>内部样式表（<code>&lt;style&gt;</code>）—— 后加载页面独有样式，用于覆盖或补充</li>
                                </ol>
                                <p>这样可以让内部样式在需要时覆盖外部样式，同时保证通用样式被缓存复用。</p>

                                <h2>3.6.5 在 <code>&lt;style&gt;</code> 中编写 CSS 的注意事项</h2>
                                <p><strong>1. 语法错误会影响整个样式表</strong></p>
                                <p>如果 <code>&lt;style&gt;</code> 中的某一行 CSS 代码有语法错误（如缺少分号、括号不匹配），浏览器可能<strong>跳过后续所有样式</strong>，导致整个页面的样式失效。因此，务必确保 CSS 语法的正确性。</p>

                                <p><strong>2. 选择器命名冲突</strong></p>
                                <p>内部样式表中的选择器可能会与外部样式表发生冲突。为避免这个问题，建议使用更具针对性的选择器（如添加页面独有的类名前缀），或使用更具体的层级选择器。</p>

                                <p><strong>3. 避免使用 <code>@import</code> 在 <code>&lt;style&gt;</code> 中引入外部 CSS</strong></p>
                                <p>虽然你可以使用 <code>@import</code> 在 <code>&lt;style&gt;</code> 中引入外部 CSS 文件：</p>
                                <pre><code>&lt;style&gt;
            @import url("style.css");
        &lt;/style&gt;</code></pre>
                                <p>但<strong>不推荐这样做</strong>，因为 <code>@import</code> 会阻塞渲染，降低页面加载速度。相比之下，使用 <code>&lt;link&gt;</code> 引入外部 CSS 是更好的选择。</p>

                                <p><strong>4. 保持简洁</strong></p>
                                <p>内部样式表应该只包含当前页面<strong>独有的样式</strong>。通用的、全局的样式（如字体、颜色主题、布局框架）应该放在外部 CSS 文件中，以便复用和缓存。</p>

                                <h2>3.6.6 一个完整的示例</h2>
                                <p>下面是一个综合运用 <code>&lt;style&gt;</code> 和 <code>&lt;link&gt;</code> 的示例：</p>
                                <pre><code>&lt;!DOCTYPE html&gt;
        &lt;html lang="zh-CN"&gt;
        &lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;
            &lt;title&gt;我的个人博客 - 文章详情&lt;/title&gt;

            &lt;!-- 外部全局样式 --&gt;
            &lt;link rel="stylesheet" href="/css/global.css"&gt;
            &lt;link rel="stylesheet" href="/css/blog.css"&gt;

            &lt;!-- 本页面独有样式 --&gt;
            &lt;style&gt;
                /* 这篇文章特有的布局调整 */
                .article-content {
                    max-width: 720px;
                    margin: 0 auto;
                    padding: 20px;
                }

                /* 文章中的代码块特殊样式 */
                .article-content pre {
                    background: #2d2d2d;
                    color: #f8f8f2;
                    padding: 16px;
                    border-radius: 8px;
                    overflow-x: auto;
                }

                /* 仅在打印时隐藏侧边栏 */
                @media print {
                    .sidebar {
                        display: none;
                    }
                    .article-content {
                        max-width: 100%;
                    }
                }
            &lt;/style&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;div class="sidebar"&gt;侧边栏内容&lt;/div&gt;
            &lt;div class="article-content"&gt;
                &lt;h1&gt;HTML 入门教程&lt;/h1&gt;
                &lt;pre&gt;&lt;code&gt;&amp;lt;h1&amp;gt;Hello World&amp;lt;/h1&amp;gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;p&gt;文章正文内容...&lt;/p&gt;
            &lt;/div&gt;
        &lt;/body&gt;
        &lt;/html&gt;</code></pre>

                                <p><strong>知识小结</strong></p>
                                <p>本节我们学习了 <code>&lt;style&gt;</code> 样式标记：</p>
                                <table>
                                    <tr><th>要点</th><th>说明</th></tr>
                                    <tr><td><strong>位置</strong></td><td>通常放在 <code>&lt;head&gt;</code> 中，确保样式在渲染前加载。</td></tr>
                                    <tr><td><strong>作用</strong></td><td>在当前页面中直接编写 CSS 样式。</td></tr>
                                    <tr><td><strong>适用场景</strong></td><td>单页面独有样式、快速原型测试、HTML 邮件、CMS 自定义样式。</td></tr>
                                    <tr><td><strong>vs <code>&lt;link&gt;</code></strong></td><td><code>&lt;style&gt;</code> 适合单页独有样式；<code>&lt;link&gt;</code> 适合多页共享样式，更利于缓存和维护。</td></tr>
                                    <tr><td><strong>常用属性</strong></td><td><code>media</code> 可指定样式适用的设备或条件。</td></tr>
                                    <tr><td><strong>已废弃属性</strong></td><td><code>scoped</code> 已被废弃，不建议使用。</td></tr>
                                    <tr><td><strong>优先级规则</strong></td><td>后加载的样式覆盖先加载的（权重相同时），<code>&lt;style&gt;</code> 通常放在 <code>&lt;link&gt;</code> 之后。</td></tr>
                                </table>
                                <p><strong>核心认知</strong>：<code>&lt;style&gt;</code> 和 <code>&lt;link&gt;</code> 不是"二选一"的关系，而是互补的。在实际项目中，将通用样式放在外部 CSS 文件中，将页面独有样式放在 <code>&lt;style&gt;</code> 中，是一种常见且高效的做法。</p>

                                </ol>

                            <h1>3.7 <code>&lt;script&gt;</code> 脚本标记</h1>
                            <div class="chapter-content">
                                <p>在 <code>&lt;head&gt;</code> 的所有子标签中，<code>&lt;script&gt;</code> 是最特殊的一个——它不仅存放"数据"，更承载着页面的<strong>交互逻辑与动态行为</strong>。如果没有 <code>&lt;script&gt;</code>，网页将永远停留在"静态文档"的层面，无法响应用户的点击、输入、滚动，也无法与服务器进行数据通信。</p>
                                <p>如果说 HTML 是骨架，CSS 是皮肤，那 JavaScript 就是让页面"活起来"的神经系统。而 <code>&lt;script&gt;</code> 标签，正是将 JavaScript 引入 HTML 页面的"入口"。</p>

                                <h2>3.7.1 <code>&lt;script&gt;</code> 标签的基本用法</h2>
                                <p><code>&lt;script&gt;</code> 是一个<strong>双标签</strong>，用于在 HTML 页面中嵌入或引用 JavaScript 代码。</p>

                                <p><strong>1. 嵌入 JavaScript 代码（内部脚本）</strong></p>
                                <p>将 JavaScript 代码直接写在 <code>&lt;script&gt;</code> 和 <code>&lt;/script&gt;</code> 之间：</p>
                                <pre><code>&lt;script&gt;
            // 当用户点击页面时，弹出一个欢迎消息
            document.addEventListener('click', function() {
                alert('欢迎访问我的网站！');
            });

            // 在控制台输出信息
            console.log('页面已加载完成');
        &lt;/script&gt;</code></pre>

                                <p><strong>2. 引入外部 JavaScript 文件（外部脚本）</strong></p>
                                <p>通过 <code>src</code> 属性引用一个独立的 <code>.js</code> 文件：</p>
                                <pre><code>&lt;script src="js/main.js"&gt;&lt;/script&gt;</code></pre>
                                <p>外部脚本可以让 JavaScript 代码与 HTML 分离，便于维护、复用和缓存。</p>

                                <p><strong>3. 同时使用内嵌和外部</strong></p>
                                <p>一个页面可以有多个 <code>&lt;script&gt;</code> 标签，它们会按照在 HTML 中出现的顺序依次执行：</p>
                                <pre><code>&lt;script src="lib/jquery.js"&gt;&lt;/script&gt;   &lt;!-- 先加载外部库 --&gt;
        &lt;script src="js/app.js"&gt;&lt;/script&gt;      &lt;!-- 然后加载应用代码 --&gt;
        &lt;script&gt;
            // 最后执行内嵌代码
            console.log('所有脚本已加载完成');
        &lt;/script&gt;</code></pre>

                                <h2>3.7.2 <code>&lt;script&gt;</code> 应该放在哪里？</h2>
                                <p>这是初学者最常问的问题之一。<code>&lt;script&gt;</code> 的位置对页面的加载速度和用户体验有显著影响。</p>

                                <p><strong>传统做法：放在 <code>&lt;head&gt;</code> 中</strong></p>
                                <p>在早期的 Web 开发中，<code>&lt;script&gt;</code> 通常被放在 <code>&lt;head&gt;</code> 中：</p>
                                <pre><code>&lt;head&gt;
            &lt;script src="js/main.js"&gt;&lt;/script&gt;
        &lt;/head&gt;</code></pre>
                                <p><strong>问题</strong>：当浏览器解析到 <code>&lt;script&gt;</code> 标签时，会<strong>暂停</strong> HTML 的解析，先去下载并执行 JavaScript 代码，然后才继续解析后续的 HTML。如果脚本文件很大或网络较慢，用户会看到页面长时间空白（白屏），体验很差。</p>

                                <p><strong>现代推荐做法：放在 <code>&lt;body&gt;</code> 底部</strong></p>
                                <p>为了解决上述问题，现代开发通常将 <code>&lt;script&gt;</code> 标签放在 <code>&lt;body&gt;</code> 的<strong>最底部</strong>（即 <code>&lt;/body&gt;</code> 之前）：</p>
                                <pre><code>&lt;body&gt;
            &lt;!-- 页面所有内容 --&gt;
            &lt;h1&gt;欢迎来到我的网站&lt;/h1&gt;
            &lt;p&gt;页面内容...&lt;/p&gt;

            &lt;!-- 脚本放在底部 --&gt;
            &lt;script src="js/main.js"&gt;&lt;/script&gt;
        &lt;/body&gt;</code></pre>
                                <p><strong>优点</strong>：HTML 内容会先被解析和渲染，用户能更快看到页面内容，然后再加载和执行脚本，提升感知性能。</p>

                                <p><strong>使用 <code>defer</code> 和 <code>async</code> 属性</strong></p>
                                <p>除了调整位置，HTML5 还提供了 <code>defer</code> 和 <code>async</code> 属性，让你可以更精细地控制外部脚本的加载和执行时机。</p>

                                <h2>3.7.3 <code>defer</code> 与 <code>async</code> —— 异步加载脚本</h2>
                                <p>这两个属性只对外部脚本（即带有 <code>src</code> 属性的 <code>&lt;script&gt;</code>）有效。</p>
                                <table>
                                    <tr><th>属性</th><th>加载时机</th><th>执行时机</th><th>适用场景</th></tr>
                                    <tr><td><strong>无属性</strong>（默认）</td><td>立即加载，阻塞 HTML 解析</td><td>加载完成后立即执行</td><td>不推荐，除非脚本很小且必须立即执行</td></tr>
                                    <tr><td><strong><code>defer</code></strong></td><td>异步加载（不阻塞 HTML 解析）</td><td>HTML 解析完成后、<code>DOMContentLoaded</code> 事件前按顺序执行</td><td>适用于需要操作 DOM、且不依赖页面加载完成的脚本（如应用主逻辑）</td></tr>
                                    <tr><td><strong><code>async</code></strong></td><td>异步加载（不阻塞 HTML 解析）</td><td>加载完成后立即执行（不保证顺序）</td><td>适用于独立、不依赖其他脚本的模块（如统计代码、广告脚本）</td></tr>
                                </table>

                                <p><strong>1. <code>defer</code> —— 延迟执行</strong></p>
                                <pre><code>&lt;script src="js/main.js" defer&gt;&lt;/script&gt;
        &lt;script src="js/analytics.js" defer&gt;&lt;/script&gt;</code></pre>
                                <ul>
                                    <li>浏览器在后台异步下载脚本，同时继续解析 HTML。</li>
                                    <li>所有 <code>defer</code> 脚本会按照在 HTML 中出现的<strong>顺序</strong>执行（保证依赖关系）。</li>
                                    <li>执行时机在 HTML 解析完成之后、<code>DOMContentLoaded</code> 事件触发之前。</li>
                                </ul>
                                <p><strong>推荐</strong>：对于大多数应用脚本，<code>defer</code> 是首选，因为它既不阻塞渲染，又能保证执行顺序。</p>

                                <p><strong>2. <code>async</code> —— 异步执行</strong></p>
                                <pre><code>&lt;script src="js/ads.js" async&gt;&lt;/script&gt;
        &lt;script src="js/tracker.js" async&gt;&lt;/script&gt;</code></pre>
                                <ul>
                                    <li>浏览器在后台异步下载脚本，同时继续解析 HTML。</li>
                                    <li>脚本下载完成后<strong>立即执行</strong>，可能会阻塞 HTML 解析。</li>
                                    <li>多个 <code>async</code> 脚本的执行顺序<strong>无法保证</strong>（谁先下载完谁先执行）。</li>
                                </ul>
                                <p><strong>推荐</strong>：用于独立的第三方脚本（如 Google Analytics、广告代码、社交媒体插件），这些脚本不依赖其他脚本，也不操作页面 DOM。</p>

                                <p><strong>3. 对比总结</strong></p>
                                <pre><code>默认（无属性）： 加载 → 阻塞解析 → 执行 → 继续解析
        defer：         加载（不阻塞）→ 解析完成 → 按序执行
        async：         加载（不阻塞）→ 加载完成 → 立即执行（可能阻塞）</code></pre>
                                <div class="tip-box">
                                    <p><strong>💡 最佳实践</strong>：在 <code>&lt;head&gt;</code> 中放置带有 <code>defer</code> 属性的脚本，或在 <code>&lt;body&gt;</code> 底部放置普通脚本，两者都可以达到"不阻塞渲染"的效果。现代开发中，更推荐使用 <code>defer</code>，因为它能更好地保证执行顺序。</p>
                                </div>

                                <h2>3.7.4 脚本的加载与执行顺序</h2>
                                <p>了解脚本的加载和执行顺序，对于避免"未定义"错误至关重要。</p>

                                <p><strong>示例 1：多个脚本按顺序执行（无 defer/async）</strong></p>
                                <pre><code>&lt;script src="lib.js"&gt;&lt;/script&gt;   &lt;!-- 先下载并执行 lib.js --&gt;
        &lt;script src="app.js"&gt;&lt;/script&gt;   &lt;!-- 然后下载并执行 app.js --&gt;
        &lt;script&gt;
            // 最后执行内嵌代码
            console.log('所有脚本执行完毕');
        &lt;/script&gt;</code></pre>

                                <p><strong>示例 2：<code>defer</code> 保证顺序</strong></p>
                                <pre><code>&lt;script src="lib.js" defer&gt;&lt;/script&gt;
        &lt;script src="app.js" defer&gt;&lt;/script&gt;
        &lt;!-- 两个脚本异步下载，但 app.js 会在 lib.js 之后执行 --&gt;</code></pre>

                                <p><strong>示例 3：<code>async</code> 不保证顺序</strong></p>
                                <pre><code>&lt;script src="analytics.js" async&gt;&lt;/script&gt;
        &lt;script src="chat.js" async&gt;&lt;/script&gt;
        &lt;!-- analytics.js 和 chat.js 谁先下载完谁先执行，顺序不确定 --&gt;</code></pre>

                                <p><strong>示例 4：混合使用</strong></p>
                                <pre><code>&lt;script src="jquery.js" defer&gt;&lt;/script&gt;
        &lt;script src="app.js" defer&gt;&lt;/script&gt;
        &lt;script src="ads.js" async&gt;&lt;/script&gt;
        &lt;!-- jquery.js 和 app.js 按顺序延迟执行，ads.js 独立异步执行 --&gt;</code></pre>

                                <h2>3.7.5 <code>type</code> 属性与模块脚本</h2>
                                <p><strong>1. <code>type</code> 属性（传统）</strong></p>
                                <p>在 HTML4 和 XHTML 时代，<code>&lt;script&gt;</code> 需要指定 <code>type="text/javascript"</code>：</p>
                                <pre><code>&lt;script type="text/javascript" src="main.js"&gt;&lt;/script&gt;</code></pre>
                                <p>在 HTML5 中，<code>type</code> 不再是必需的，浏览器默认将 <code>&lt;script&gt;</code> 中的内容识别为 JavaScript。直接写 <code>&lt;script src="main.js"&gt;</code> 即可。</p>

                                <p><strong>2. ES Module —— <code>type="module"</code></strong></p>
                                <p>现代 JavaScript 支持 ES Module（ES6 模块），可以在浏览器中使用 <code>import</code> 和 <code>export</code> 语法。使用 <code>type="module"</code> 来标记模块脚本：</p>
                                <pre><code>&lt;script type="module"&gt;
            import { greet } from './utils.js';
            greet('Hello');
        &lt;/script&gt;</code></pre>
                                <p><strong>模块脚本的特殊行为</strong>：</p>
                                <ul>
                                    <li>默认具有 <strong><code>defer</code></strong> 行为（不阻塞渲染，延迟执行）。</li>
                                    <li>自动启用 <strong>严格模式</strong>（<code>"use strict"</code>）。</li>
                                    <li>模块内的变量和函数不会污染全局作用域。</li>
                                    <li>支持 <code>import</code> 和 <code>export</code> 语法。</li>
                                </ul>
                                <pre><code>&lt;script type="module" src="app.js"&gt;&lt;/script&gt;
        &lt;!-- app.js 中的代码会以模块方式执行，自动 defer --&gt;</code></pre>

                                <p><strong>3. <code>nomodule</code> —— 为旧浏览器提供降级方案</strong></p>
                                <p>对于不支持 ES Module 的旧浏览器，可以使用 <code>nomodule</code> 属性提供备选脚本：</p>
                                <pre><code>&lt;script type="module" src="app-modern.js"&gt;&lt;/script&gt;
        &lt;script nomodule src="app-legacy.js"&gt;&lt;/script&gt;</code></pre>
                                <p>现代浏览器会加载第一个（模块），忽略第二个；旧浏览器会忽略第一个，加载第二个。</p>

                                <h2>3.7.6 内联脚本与外部脚本的选择</h2>
                                <table>
                                    <tr><th>对比维度</th><th>内联脚本（<code>&lt;script&gt;</code> 内嵌）</th><th>外部脚本（<code>src</code>）</th></tr>
                                    <tr><td><strong>复用性</strong></td><td>❌ 仅当前页面可用</td><td>✅ 多页面可共用</td></tr>
                                    <tr><td><strong>可维护性</strong></td><td>❌ 代码与 HTML 混杂</td><td>✅ 代码分离，便于维护</td></tr>
                                    <tr><td><strong>缓存效率</strong></td><td>❌ 每次加载页面都要重新下载</td><td>✅ 浏览器可缓存</td></tr>
                                    <tr><td><strong>加载性能</strong></td><td>较小脚本可减少 HTTP 请求</td><td>较大脚本可并行加载</td></tr>
                                    <tr><td><strong>适用场景</strong></td><td>少量页面独有代码、配置数据</td><td>通用逻辑、大型应用代码</td></tr>
                                </table>
                                <p><strong>推荐做法</strong>：将通用的、较大的 JavaScript 代码放在外部文件中，通过 <code>&lt;script src="..."&gt;</code> 引入；将页面独有的、少量的脚本（如初始化数据、事件绑定）以内联方式写在 <code>&lt;body&gt;</code> 底部或使用 <code>defer</code>。</p>

                                <h2>3.7.7 常见错误与调试技巧</h2>
                                <p><strong>1. 错误：<code>xxx is not defined</code></strong></p>
                                <p>通常是因为脚本加载顺序不对，某个变量在被使用之前尚未定义。</p>
                                <p><strong>解决方法</strong>：检查 <code>&lt;script&gt;</code> 的顺序，确保依赖的库先加载。</p>

                                <p><strong>2. 错误：脚本未生效</strong></p>
                                <p>可能的原因：</p>
                                <ul>
                                    <li><code>src</code> 路径错误（检查文件名和目录层级）。</li>
                                    <li>脚本中有语法错误（查看浏览器控制台的报错信息）。</li>
                                    <li>脚本被浏览器的广告拦截器或安全策略阻止。</li>
                                </ul>

                                <p><strong>3. 调试技巧</strong></p>
                                <ul>
                                    <li><strong>浏览器控制台（Console）</strong>：按 <code>F12</code> 打开开发者工具，在 Console 面板中查看错误信息和日志输出。</li>
                                    <li><strong><code>console.log()</code></strong>：在关键位置输出变量值，帮助追踪代码执行流程。</li>
                                    <li><strong>断点调试</strong>：在 Sources 面板中设置断点，逐行执行代码。</li>
                                </ul>

                                <h2>3.7.8 一个完整的 <code>&lt;head&gt;</code> 示例（含 <code>&lt;script&gt;</code>）</h2>
                                <p>综合本章全部内容，一个配置完善的 <code>&lt;head&gt;</code> 最终版本如下：</p>
                                <pre><code>&lt;head&gt;
            &lt;!-- 1. 字符编码（第一位） --&gt;
            &lt;meta charset="utf-8"&gt;

            &lt;!-- 2. 移动端视口 --&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;

            &lt;!-- 3. 页面标题 --&gt;
            &lt;title&gt;我的个人博客 - 技术分享&lt;/title&gt;

            &lt;!-- 4. SEO 描述 --&gt;
            &lt;meta name="description" content="分享Web开发技术、读书笔记和生活感悟的个人博客。"&gt;

            &lt;!-- 5. 网站图标 --&gt;
            &lt;link rel="icon" href="/favicon.ico" sizes="32x32"&gt;
            &lt;link rel="apple-touch-icon" href="/apple-touch-icon.png"&gt;

            &lt;!-- 6. 预连接外部资源 --&gt;
            &lt;link rel="preconnect" href="https://fonts.googleapis.com"&gt;
            &lt;link rel="preconnect" href="https://fonts.gstatic.com" crossorigin&gt;

            &lt;!-- 7. 外部 CSS 样式表 --&gt;
            &lt;link rel="stylesheet" href="/css/reset.css"&gt;
            &lt;link rel="stylesheet" href="/css/style.css"&gt;

            &lt;!-- 8. 本页面独有样式 --&gt;

                .article-content { max-width: 720px; margin: 0 auto; }
            &lt;/style&gt;

            &lt;!-- 9. 外部 JavaScript（带 defer，不阻塞渲染） --&gt;
            &lt;script src="/js/lib/jquery.js" defer&gt;&lt;/script&gt;
            &lt;script src="/js/app.js" defer&gt;&lt;/script&gt;

            &lt;!-- 10. 第三方统计脚本（async，独立加载） --&gt;
            &lt;script src="https://www.googletagmanager.com/gtag/js" async&gt;&lt;/script&gt;
        &lt;/head&gt;</code></pre>

                                <p><strong>知识小结</strong></p>
                                <p>本节我们学习了 <code>&lt;script&gt;</code> 脚本标记：</p>
                                <table>
                                    <tr><th>要点</th><th>说明</th></tr>
                                    <tr><td><strong>两种用法</strong></td><td>内嵌代码（<code>&lt;script&gt;...&lt;/script&gt;</code>）和外部引用（<code>&lt;script src="..."&gt;</code>）</td></tr>
                                    <tr><td><strong>位置选择</strong></td><td>传统放在 <code>&lt;head&gt;</code> 会阻塞渲染；现代推荐放在 <code>&lt;body&gt;</code> 底部或使用 <code>defer</code>/<code>async</code></td></tr>
                                    <tr><td><strong><code>defer</code></strong></td><td>异步加载，HTML 解析完成后按顺序执行，不阻塞渲染。推荐用于应用主逻辑。</td></tr>
                                    <tr><td><strong><code>async</code></strong></td><td>异步加载，加载完成后立即执行，不保证顺序。推荐用于独立第三方脚本。</td></tr>
                                    <tr><td><strong><code>type="module"</code></strong></td><td>标记 ES Module 脚本，自动 defer，支持 <code>import</code>/<code>export</code>。</td></tr>
                                    <tr><td><strong><code>nomodule</code></strong></td><td>为旧浏览器提供降级方案。</td></tr>
                                    <tr><td><strong>最佳实践</strong></td><td>使用 <code>defer</code> 加载外部脚本，或将脚本放在 <code>&lt;body&gt;</code> 底部，确保良好的页面加载性能。</td></tr>
                                </table>
                                <p><strong>核心认知</strong>：<code>&lt;script&gt;</code> 标签是连接 HTML 与 JavaScript 的桥梁。理解其加载和执行机制，不仅能让你写出更可靠的代码，还能显著优化页面的加载速度和用户体验。</p>

                                <p><strong>思考与练习</strong></p>
                                <p><strong>一、选择题</strong></p>
                                <ol>
                                    <li>以下哪个属性可以让外部脚本异步加载，并在 HTML 解析完成后按顺序执行？（　）<br>A. <code>async</code> &nbsp;&nbsp; B. <code>defer</code> &nbsp;&nbsp; C. <code>type="module"</code> &nbsp;&nbsp; D. <code>nomodule</code></li>
                                    <li>以下哪个属性适用于独立的第三方脚本（如统计代码），且不保证执行顺序？（　）<br>A. <code>async</code> &nbsp;&nbsp; B. <code>defer</code> &nbsp;&nbsp; C. <code>type="module"</code> &nbsp;&nbsp; D. <code>nomodule</code></li>
                                    <li>为了不阻塞页面渲染，<code>&lt;script&gt;</code> 标签最推荐放在（　）<br>A. <code>&lt;head&gt;</code> 的最前面 &nbsp;&nbsp; B. <code>&lt;head&gt;</code> 的最后面<br>C. <code>&lt;body&gt;</code> 的最底部 &nbsp;&nbsp; D. <code>&lt;body&gt;</code> 的最顶部</li>
                                    <li>以下关于 ES Module（<code>type="module"</code>）的说法，正确的是（　）<br>A. 默认阻塞 HTML 解析 &nbsp;&nbsp; B. 默认具有 <code>defer</code> 行为<br>C. 不支持 <code>import</code> 语法 &nbsp;&nbsp; D. 必须在 <code>&lt;head&gt;</code> 中才能使用</li>
                                    <li>如果一个页面有多个 <code>async</code> 脚本，它们的执行顺序是（　）<br>A. 按照在 HTML 中出现的顺序执行 &nbsp;&nbsp; B. 随机执行<br>C. 谁先下载完谁先执行 &nbsp;&nbsp; D. 由浏览器决定，但保证与出现顺序一致</li>
                                </ol>
                                <p><strong>二、简答题</strong></p>
                                <ol>
                                    <li>为什么传统的将 <code>&lt;script&gt;</code> 放在 <code>&lt;head&gt;</code> 中的做法会影响页面加载速度？请解释其原理。</li>
                                    <li><code>defer</code> 和 <code>async</code> 的主要区别是什么？分别适用于什么场景？</li>
                                    <li>假设你正在开发一个电商网站，页面中需要引入：① 购物车逻辑（依赖 jQuery）；② 第三方流量统计脚本。你会如何为这两个脚本选择加载方式（<code>defer</code> / <code>async</code> / 无属性）？为什么？</li>
                                </ol>
                                <p><strong>三、上机实践</strong></p>
                                <ol>
                                    <li>创建一个 HTML 页面，在 <code>&lt;body&gt;</code> 底部添加一段内联 <code>&lt;script&gt;</code>，使用 <code>console.log()</code> 输出 "页面已加载"。</li>
                                    <li>创建一个 <code>test.js</code> 文件，内容为 <code>console.log('外部脚本执行了');</code>，然后在页面中通过 <code>&lt;script src="test.js" defer&gt;</code> 引入它。打开浏览器的开发者工具（Console 面板），观察输出的顺序。</li>
                                    <li>将 <code>defer</code> 改为 <code>async</code>，刷新页面多次，观察输出顺序是否有变化。</li>
                                    <li>（选做）在页面中添加一个 <code>&lt;script type="module"&gt;</code>，在其中使用 <code>import</code> 语法导入另一个模块（可以创建一个简单的模块文件），观察是否正常运行。</li>
                                </ol>
                                <hr>
                                <p><strong>本章总结</strong>：第3章我们系统学习了 HTML 头部标记，包括 <code>&lt;head&gt;</code> 概述、<code>&lt;title&gt;</code>、<code>&lt;meta&gt;</code>、<code>&lt;base&gt;</code>、<code>&lt;link&gt;</code>、<code>&lt;style&gt;</code> 和 <code>&lt;script&gt;</code>。这些标签虽然不直接显示在页面上，却共同构成了页面的"大脑"——决定了页面如何被浏览器解析、如何被搜索引擎理解、如何在社交平台分享、以及如何加载和执行外部资源。一个优秀的页面，必然有一个精心配置的 <code>&lt;head&gt;</code>。</p>

        const nextBtn = document.getElementById('nextChapter');

        // ============================================================
        // 3. 核心函数
        // ============================================================

        function renderChapter(index) {
            const chapter = allChapters[index];
            if (!chapter) return;
            chapterContainer.innerHTML = chapter.content;
            updateProgress();
            updateTocActive();
            prevBtn.disabled = (index === 0);
            nextBtn.disabled = (index === allChapters.length - 1);
            prevBtn.style.opacity = prevBtn.disabled ? '0.2' : '1';
            nextBtn.style.opacity = nextBtn.disabled ? '0.2' : '1';
        }

        function updateProgress() {
            const scrollTop = contentArea.scrollTop;
            const scrollHeight = contentArea.scrollHeight - contentArea.clientHeight;
            let percent = 0;
            if (scrollHeight > 0) {
                percent = (scrollTop / scrollHeight) * 100;
            }
            percent = Math.min(100, Math.max(0, percent));
            progressFill.style.width = percent + '%';
            progressText.textContent = Math.round(percent) + '%';
        }

        function renderToc() {
            tocList.innerHTML = '';
            allChapters.forEach((ch, idx) => {
                const li = document.createElement('li');
                li.className = 'toc-item';
                if (idx === currentChapterIndex) li.classList.add('active');

                const iconSpan = document.createElement('span');
                iconSpan.className = 'toc-icon';
                const iconName = ch.icon || (ch.id === 'preface' ? 'fa-feather-pointed' : 'fa-book');
                iconSpan.innerHTML = `<i class="fas ${iconName}"></i>`;

                const numSpan = document.createElement('span');
                numSpan.className = 'chapter-num';
                if (ch.id === 'preface') {
                    numSpan.textContent = '序';
                } else if (ch.id.startsWith('ch')) {
                    const num = ch.id.replace('ch', '');
                    if (num.includes('-')) {
                        numSpan.textContent = num;
                    } else {
                        numSpan.textContent = num;
                    }
                } else if (ch.id === 'appendix') {
                    numSpan.textContent = '附';
                } else {
                    numSpan.textContent = '';
                }

                const titleSpan = document.createElement('span');
                titleSpan.className = 'chapter-title-text';
                titleSpan.textContent = ch.title;

                li.appendChild(iconSpan);
                li.appendChild(numSpan);
                li.appendChild(titleSpan);

                if (ch.placeholder) {
                    const tag = document.createElement('span');
                    tag.className = 'status-tag';
                    tag.textContent = '敬请期待';
                    li.appendChild(tag);
                }

                li.addEventListener('click', () => {
                    closeDrawer();
                    goToChapter(idx, true);
                });

                tocList.appendChild(li);
            });
        }

        function updateTocActive() {
            const items = tocList.querySelectorAll('.toc-item');
            items.forEach((item, idx) => {
                item.classList.toggle('active', idx === currentChapterIndex);
            });
        }

        function goToChapter(index, scrollToTop = false) {
            if (index < 0 || index >= allChapters.length) return;
            currentChapterIndex = index;
            renderChapter(index);
            if (scrollToTop) {
                contentArea.scrollTop = 0;
            }
            saveProgress();
        }

        // ---- 进度记忆 ----
        function saveProgress() {
            try {
                const data = {
                    chapterIndex: currentChapterIndex,
                    scrollTop: contentArea.scrollTop,
                };
                localStorage.setItem('html-reader-progress', JSON.stringify(data));
            } catch (e) { /* ignore */ }
        }

        function loadProgress() {
            try {
                const raw = localStorage.getItem('html-reader-progress');
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (typeof data.chapterIndex === 'number' && data.chapterIndex >= 0 && data.chapterIndex < allChapters
                    .length) {
                    return data;
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        function restoreProgress() {
            const data = loadProgress();
            if (data) {
                currentChapterIndex = data.chapterIndex;
                renderChapter(currentChapterIndex);
                if (data.scrollTop !== undefined && data.scrollTop >= 0) {
                    requestAnimationFrame(() => {
                        contentArea.scrollTop = data.scrollTop;
                        updateProgress();
                    });
                }
            } else {
                // 默认从1.1开始（索引1）
                currentChapterIndex = 1;
                renderChapter(currentChapterIndex);
                contentArea.scrollTop = 0;
            }
        }

        let saveTimer = null;

        function handleScroll() {
            updateProgress();
            if (saveTimer) {
                clearTimeout(saveTimer);
            }
            saveTimer = setTimeout(() => {
                saveProgress();
                saveTimer = null;
            }, 300);
        }

        // ============================================================
        // 4. 事件绑定
        // ============================================================

        contentArea.addEventListener('scroll', handleScroll);

        menuBtn.addEventListener('click', toggleDrawer);
        drawerClose.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);

        prevBtn.addEventListener('click', () => {
            if (currentChapterIndex > 0) goToChapter(currentChapterIndex - 1, true);
        });
        nextBtn.addEventListener('click', () => {
            if (currentChapterIndex < allChapters.length - 1) goToChapter(currentChapterIndex + 1, true);
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowLeft') {
                if (currentChapterIndex > 0) goToChapter(currentChapterIndex - 1, true);
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                if (currentChapterIndex < allChapters.length - 1) goToChapter(currentChapterIndex + 1, true);
                e.preventDefault();
            }
        });

        themeToggle.addEventListener('click', toggleTheme);

        fontInc.addEventListener('click', () => changeFontSize(2));
        fontDec.addEventListener('click', () => changeFontSize(-2));

        document.getElementById('progressBar').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const scrollHeight = contentArea.scrollHeight - contentArea.clientHeight;
            contentArea.scrollTop = percent * scrollHeight;
        });

        // ============================================================
        // 5. 偏好恢复
        // ============================================================
        try {
            const savedTheme = localStorage.getItem('html-reader-theme');
            if (savedTheme === 'night') {
                isNight = true;
                document.body.classList.add('night-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            const savedFont = localStorage.getItem('html-reader-fontsize');
            if (savedFont) {
                fontSize = parseInt(savedFont, 10);
                if (fontSize >= 12 && fontSize <= 24) {
                    fontSizeDisplay.textContent = fontSize;
                }
            }
        } catch (e) {}

        function toggleTheme() {
            isNight = !isNight;
            document.body.classList.toggle('night-mode', isNight);
            themeToggle.innerHTML = isNight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            try {
                localStorage.setItem('html-reader-theme', isNight ? 'night' : 'day');
            } catch (e) {}
        }

        function changeFontSize(delta) {
            fontSize = Math.min(24, Math.max(12, fontSize + delta));
            fontSizeDisplay.textContent = fontSize;
            document.querySelectorAll('.chapter-content').forEach(el => {
                el.style.fontSize = fontSize + 'px';
            });
            try {
                localStorage.setItem('html-reader-fontsize', fontSize);
            } catch (e) {}
        }

        function openDrawer() {
            drawer.classList.add('open');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            drawer.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        function toggleDrawer() {
            if (drawer.classList.contains('open')) {
                closeDrawer();
            } else {
                openDrawer();
            }
        }

        // ============================================================
        // 6. 启动应用
        // ============================================================
        renderToc();
        restoreProgress();
        document.querySelectorAll('.chapter-content').forEach(el => {
            el.style.fontSize = fontSize + 'px';
        });

        // 触摸滑动翻页
        let touchStartX = 0,
            touchStartY = 0;
        contentArea.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        contentArea.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                if (dx < 0 && currentChapterIndex < allChapters.length - 1) {
                    goToChapter(currentChapterIndex + 1, true);
                } else if (dx > 0 && currentChapterIndex > 0) {
                    goToChapter(currentChapterIndex - 1, true);
                }
            }
        }, { passive: true });

        console.log('📖 HTML阅读器已更新：包含第3章全部内容 (3.1-3.7)');
        console.log('总章节数：', allChapters.length);
    </script>
</body>
</html>
