                <h1>7.6 表格的样式与属性</h1>
                <div class="chapter-content">
                    <p>在前五节中，我们系统学习了表格的HTML结构——从基本标签、表头标题、语义化分组，到行与列的合并、边距与间距的控制。你已经能够创建出结构完整、语义清晰的表格了。</p>
                    <p>但一个结构完美的表格，如果缺乏视觉设计，仍然可能难以阅读和理解。表格的样式设计，是让数据“开口说话”的关键一步——好的样式能让数据一目了然，坏的样式则会让读者望而生畏。</p>
                    <p>本节将全面讲解如何使用 CSS 为表格添加丰富的视觉效果，让表格不仅<strong>结构清晰</strong>，而且<strong>视觉优雅</strong>、<strong>易于阅读</strong>。</p>
                    <h2>7.6.1 表格样式设计的核心目标</h2>
                    <table>
                        <tr><th>目标</th><th>说明</th></tr>
                        <tr><td>可读性</td><td>数据容易辨认，不会让读者感到眼花缭乱。</td></tr>
                        <tr><td>层次感</td><td>表头、数据行、汇总行有明确的视觉区分。</td></tr>
                        <tr><td>引导性</td><td>用户的视线能自然地沿着行或列移动。</td></tr>
                        <tr><td>响应式</td><td>在不同屏幕尺寸下都能良好显示。</td></tr>
                    </table>
                    <h2>7.6.2 基础样式设置</h2>
                    <p><strong>1. 重置默认样式</strong></p>
                    <pre><code>table {
            border-collapse: collapse;
            width: 100%;
            font-family: inherit;
            font-size: 100%;
        }</code></pre>
                    <p><strong>2. 边框样式</strong></p>
                    <pre><code>th, td {
            border: 1px solid #ddd;
            padding: 10px 14px;
            text-align: left;
        }</code></pre>
                    <p><strong>3. 表头样式</strong></p>
                    <pre><code>th {
            background-color: #2c3e50;
            color: #ffffff;
            font-weight: 600;
        }</code></pre>
                    <h2>7.6.3 交替行背景（Zebra Striping）</h2>
                    <pre><code>tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }</code></pre>
                    <h2>7.6.4 悬停高亮（Hover Effect）</h2>
                    <pre><code>tbody tr:hover {
            background-color: #eef4f8;
            cursor: pointer;
        }</code></pre>
                    <h2>7.6.5 列样式</h2>
                    <pre><code>td:nth-child(2), th:nth-child(2) {
            text-align: right;
            font-weight: 600;
        }
        td:nth-child(3) {
            color: #e74c3c;
        }</code></pre>
                    <h2>7.6.6 脚注样式（<code>&lt;tfoot&gt;</code>）</h2>
                    <pre><code>tfoot {
            background-color: #f0f4f8;
            font-weight: 600;
            border-top: 2px solid #2c3e50;
        }</code></pre>
                    <h2>7.6.7 响应式表格</h2>
                    <p><strong>方案一：横向滚动（最简单）</strong></p>
                    <pre><code>.table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }</code></pre>
                    <p><strong>方案二：移动端卡片式布局（复杂但更友好）</strong></p>
                    <pre><code>@media (max-width: 640px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { display: none; }
            tr { margin-bottom: 16px; border: 1px solid #ddd; padding: 12px; }
            td { display: flex; justify-content: space-between; padding: 6px 0; border: none; }
            td::before { content: attr(data-label); font-weight: 600; color: #555; }
        }</code></pre>
                    <p>需要在每个 <code>&lt;td&gt;</code> 中添加 <code>data-label</code> 属性：<code>&lt;td data-label="姓名"&gt;张三&lt;/td&gt;</code></p>
                    <h2>7.6.8 完整的综合样式示例</h2>
                    <pre><code>&lt;!DOCTYPE html&gt;
        &lt;html lang="zh-CN"&gt;
        &lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;title&gt;表格样式综合示例&lt;/title&gt;
            &lt;style&gt;
                .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
                table { width: 100%; border-collapse: collapse; font-size: 15px; background: #fff; border-radius: 12px; overflow: hidden; }
                th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #edf2f7; }
                thead th { background-color: #2c3e50; color: #ffffff; font-weight: 600; font-size: 14px; letter-spacing: 0.3px; text-transform: uppercase; border-bottom: 2px solid #1a2632; }
                tbody tr:nth-child(even) { background-color: #f8fafc; }
                tbody tr:hover { background-color: #eef4f8; transition: background 0.15s ease; }
                td:nth-child(2), td:nth-child(3), td:nth-child(4) { text-align: right; font-variant-numeric: tabular-nums; }
                td:nth-child(3) { color: #27ae60; font-weight: 600; }
                tfoot td { background-color: #f0f4f8; font-weight: 700; border-top: 2px solid #2c3e50; }
                .table-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
                @media (max-width: 640px) {
                    table { font-size: 14px; }
                    th, td { padding: 8px 12px; }
                }
            &lt;/style&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;div class="table-title"&gt;📊 2026年各产品线销售报告 &lt;small&gt;单位：万元&lt;/small&gt;&lt;/div&gt;
            &lt;div class="table-wrapper"&gt;
                &lt;table&gt;
                    &lt;thead&gt;
                        &lt;tr&gt;
                            &lt;th&gt;产品线&lt;/th&gt;
                            &lt;th&gt;销售额&lt;/th&gt;
                            &lt;th&gt;利润&lt;/th&gt;
                            &lt;th&gt;利润率&lt;/th&gt;
                        &lt;/tr&gt;
                    &lt;/thead&gt;
                    &lt;tbody&gt;
                        &lt;tr&gt;&lt;td&gt;智能手机&lt;/td&gt;&lt;td&gt;1,200&lt;/td&gt;&lt;td&gt;300&lt;/td&gt;&lt;td&gt;25%&lt;/td&gt;&lt;/tr&gt;
                        &lt;tr&gt;&lt;td&gt;平板电脑&lt;/td&gt;&lt;td&gt;450&lt;/td&gt;&lt;td&gt;90&lt;/td&gt;&lt;td&gt;20%&lt;/td&gt;&lt;/tr&gt;
                    &lt;/tbody&gt;
                    &lt;tfoot&gt;
                        &lt;tr&gt;
                            &lt;td&gt;&lt;strong&gt;合计&lt;/strong&gt;&lt;/td&gt;
                            &lt;td&gt;&lt;strong&gt;1,650&lt;/strong&gt;&lt;/td&gt;
                            &lt;td&gt;&lt;strong&gt;390&lt;/strong&gt;&lt;/td&gt;
                            &lt;td&gt;&lt;strong&gt;23.6%&lt;/strong&gt;&lt;/td&gt;
                        &lt;/tr&gt;
                    &lt;/tfoot&gt;
                &lt;/table&gt;
            &lt;/div&gt;
        &lt;/body&gt;
        &lt;/html&gt;</code></pre>
                    <h2>7.6.9 常见错误与最佳实践</h2>
                    <table>
                        <tr><th>错误</th><th>正确做法</th></tr>
                        <tr><td>使用已废弃的 HTML 样式属性（如 <code>bgcolor</code>、<code>align</code>）</td><td>使用 CSS 替代</td></tr>
                        <tr><td>表格宽度固定为像素值</td><td>使用 <code>width: 100%</code> 配合 <code>max-width</code></td></tr>
                        <tr><td>忽略响应式设计</td><td>使用滚动容器或卡片式布局</td></tr>
                        <tr><td>颜色对比度不足</td><td>确保表头与数据有足够的对比度</td></tr>
                    </table>
                    <p><strong>最佳实践总结</strong></p>
                    <ul>
                        <li>使用 <code>border-collapse: collapse</code> 作为默认设置。</li>
                        <li>使用交替行背景（斑马条纹），提升长表格的可读性。</li>
                        <li>添加悬停高亮效果，增强交互反馈。</li>
                        <li>数字列右对齐，文本列左对齐。</li>
                        <li>使用 <code>rem</code> 或相对单位控制字号和间距。</li>
                        <li>为移动设备设计响应式方案，至少使用横向滚动容器。</li>
                        <li>保持样式简洁，不要过度装饰，让数据“说话”。</li>
                    </ul>
                    <p><strong>知识小结</strong></p>
                    <table>
                        <tr><th>样式技巧</th><th>CSS 实现</th><th>作用</th></tr>
                        <tr><td>合并边框</td><td><code>border-collapse: collapse</code></td><td>消除单元格间隙</td></tr>
                        <tr><td>交替行背景</td><td><code>tbody tr:nth-child(even)</code></td><td>提升长表格可读性</td></tr>
                        <tr><td>悬停高亮</td><td><code>tbody tr:hover</code></td><td>增强交互反馈</td></tr>
                        <tr><td>列样式</td><td><code>td:nth-child(n)</code></td><td>为特定列设置样式</td></tr>
                        <tr><td>脚注样式</td><td><code>tfoot</code> 加粗 + 顶部边框</td><td>突出汇总数据</td></tr>
                        <tr><td>响应式</td><td><code>overflow-x: auto</code> 或卡片式布局</td><td>在移动端正常显示</td></tr>
                    </table>
                    <p><strong>思考与练习</strong></p>
                    <p><strong>一、选择题</strong></p>
                    <ol>
                        <li>在 CSS 中，用于实现“交替行背景”的选择器是（　）<br>A. <code>tbody tr:first-child</code>   B. <code>tbody tr:nth-child(even)</code></li>
                        <li>为了让表格在移动设备上能横向滚动，应该（　）<br>A. 设置 <code>table { overflow-x: auto; }</code>   B. 将表格放在 <code>overflow-x: auto</code> 的容器中</li>
                    </ol>
                    <p><strong>二、简答题</strong></p>
                    <ol>
                        <li>交替行背景对提升表格可读性有什么帮助？</li>
                        <li>在移动端处理宽表格有哪几种常见方案？</li>
                    </ol>
                    <p><strong>三、上机实践</strong></p>
                    <ol>
                        <li>创建一个包含 8 行以上数据的表格，使用 CSS 实现：边框合并、交替行背景、悬停高亮、表头深色背景白色文字、数字列右对齐。</li>
                        <li>添加脚注（<code>&lt;tfoot&gt;</code>），包含“合计”行，脚注顶部边框加粗。</li>
                        <li>将表格放入 <code>overflow-x: auto</code> 的容器中，在手机上测试横向滚动效果。</li>
                    </ol>
                    <hr>
                    <p><strong>本章总结</strong>：第7章我们系统学习了表格的应用，从基本结构、表头与标题、语义化结构、行与列合并、边距与间距，到样式设计与响应式处理。表格是展示结构化数据的强大工具，掌握它们的全部细节，是每一个 Web 开发者的必备技能。</p>
                    <p><strong>下篇预告</strong>：第8章将学习 <strong>表单与用户交互（上）</strong>，敬请期待！</p>
                </div>
                `
            }
        ];

        // ============================================================
        // 占位章节（第8~28章、附录）
        // ============================================================
        var placeholderChapters = [
            { id: 'ch8', title: '第8章 表单与用户交互（上）', icon: 'fa-rectangle-ad' },
            { id: 'ch9', title: '第9章 表单与用户交互（下）', icon: 'fa-rectangle-ad' },
            { id: 'ch10', title: '第10章 语义化标签与网页结构', icon: 'fa-tags' },
            { id: 'ch11', title: '第11章 DIV+CSS布局基础', icon: 'fa-object-group' },
            { id: 'ch12', title: '第12章 CSS盒子模型与网页布局', icon: 'fa-cube' },
            { id: 'ch13', title: '第13章 Flexbox与Grid弹性布局', icon: 'fa-grid-2' },
            { id: 'ch14', title: '第14章 HTML5绘图——Canvas', icon: 'fa-palette' },
            { id: 'ch15', title: '第15章 SVG矢量图形', icon: 'fa-bezier-curve' },
            { id: 'ch16', title: '第16章 文件操作与拖放', icon: 'fa-file-arrow-up' },
            { id: 'ch17', title: '第17章 Web存储', icon: 'fa-database' },
            { id: 'ch18', title: '第18章 离线应用与缓存', icon: 'fa-wifi' },
            { id: 'ch19', title: '第19章 Web Workers多线程处理', icon: 'fa-microchip' },
            { id: 'ch20', title: '第20章 通信API', icon: 'fa-satellite' },
            { id: 'ch21', title: '第21章 获取地理位置信息', icon: 'fa-location-dot' },
            { id: 'ch22', title: '第22章 响应式网页设计', icon: 'fa-mobile-screen' },
            { id: 'ch23', title: '第23章 项目实战一：个人博客网站', icon: 'fa-blog' },
            { id: 'ch24', title: '第24章 项目实战二：企业官网', icon: 'fa-building' },
            { id: 'ch25', title: '第25章 项目实战三：在线教育平台首页', icon: 'fa-chalkboard-user' },
            { id: 'ch26', title: '第26章 项目实战四：电商购物网站', icon: 'fa-cart-shopping' },
            { id: 'ch27', title: '第27章 项目实战五：后台管理系统界面', icon: 'fa-screwdriver-wrench' },
            { id: 'ch28', title: '第28章 前端工程化与未来发展', icon: 'fa-rocket' },
            { id: 'appendix', title: '附录', icon: 'fa-paperclip' }
        ];

        // 合并所有章节（注意：第7章已包含在bookData中，不再从占位符添加）
        var allChapters = bookData.concat(placeholderChapters.map(function(p) {
            return {
                id: p.id,
                title: p.title,
                icon: p.icon,
                placeholder: true,
                content: '<h1>' + p.title + '</h1><div class="chapter-content"><div class="placeholder-box"><i class="fas ' + p.icon +
                    '"></i><p style="font-size: 1.4em; margin-bottom: 8px; font-weight: 400;">本章内容正在编写中...</p><p style="font-size: 0.9em; color: rgba(0,0,0,0.25);">敬请期待后续更新</p></div></div>'
            };
        }));

        allChapters.forEach(function(ch, idx) { ch.index = idx; });

        // ============================================================
        // 构建分组、渲染、交互（完整逻辑，与之前相同）
        // ============================================================
        function buildGroupedToc(chapters) {
            var groups = [];
            var chapterMap = {};
            chapters.forEach(function(ch, idx) {
                var id = ch.id;
                if (id === 'preface') {
                    groups.push({
                        type: 'special',
                        label: '前言',
                        icon: 'fa-feather-pointed',
                        items: [{ title: ch.title, index: idx, isPlaceholder: false }],
                        isPlaceholder: false,
                        isSpecial: true,
                        chapterNumber: 0
                    });
                } else if (id === 'appendix') {
                    groups.push({
                        type: 'special',
                        label: '附录',
                        icon: 'fa-paperclip',
                        items: [{ title: ch.title, index: idx, isPlaceholder: ch.placeholder || false }],
                        isPlaceholder: ch.placeholder || false,
                        isSpecial: true,
                        chapterNumber: 99
                    });
                } else if (id.startsWith('ch')) {
                    var num;
                    if (id.includes('-')) {
                        num = parseInt(id.split('-')[0].replace('ch', ''), 10);
                    } else {
                        num = parseInt(id.replace('ch', ''), 10);
                    }
                    if (!chapterMap[num]) {
                        chapterMap[num] = {
                            chapterNumber: num,
                            label: '第' + num + '章',
                            icon: 'fa-book',
                            items: [],
                            isPlaceholder: true,
                            isSpecial: false
                        };
                    }
                    if (id.includes('-')) {
                        chapterMap[num].items.push({
                            title: ch.title,
                            index: idx,
                            isPlaceholder: ch.placeholder || false
                        });
                        chapterMap[num].isPlaceholder = false;
                    } else {
                        chapterMap[num].singleIndex = idx;
                    }
                }
            });
            var sortedKeys = Object.keys(chapterMap).map(Number).sort(function(a, b) { return a - b; });
            sortedKeys.forEach(function(key) {
                groups.push(chapterMap[key]);
            });
            return groups;
        }

        var groupedToc = buildGroupedToc(allChapters);

        // DOM 引用
        var contentArea = document.getElementById('contentArea');
        var chapterContainer = document.getElementById('chapterContainer');
        var progressFill = document.getElementById('progressFill');
        var progressText = document.getElementById('progressText');
        var tocList = document.getElementById('tocList');
        var drawer = document.getElementById('drawer');
        var overlay = document.getElementById('drawerOverlay');
        var menuBtn = document.getElementById('menuBtn');
        var drawerClose = document.getElementById('drawerClose');
        var themeToggle = document.getElementById('themeToggle');
        var fontInc = document.getElementById('fontInc');
        var fontDec = document.getElementById('fontDec');
        var fontSizeDisplay = document.getElementById('fontSizeDisplay');
        var prevBtn = document.getElementById('prevChapter');
        var nextBtn = document.getElementById('nextChapter');

        var currentChapterIndex = 0;
        var fontSize = 16;
        var isNight = false;

        function renderChapter(index) {
            var chapter = allChapters[index];
            if (!chapter) return;
            chapterContainer.innerHTML = chapter.content;
            updateProgress();
            updateTocActive();
            prevBtn.disabled = (index === 0);
            nextBtn.disabled = (index === allChapters.length - 1);
            prevBtn.style.opacity = prevBtn.disabled ? '0.2' : '1';
            nextBtn.style.opacity = nextBtn.disabled ? '0.2' : '1';
        }

        function updateProgress() {
            var scrollTop = contentArea.scrollTop;
            var scrollHeight = contentArea.scrollHeight - contentArea.clientHeight;
            var percent = 0;
            if (scrollHeight > 0) {
                percent = (scrollTop / scrollHeight) * 100;
            }
            percent = Math.min(100, Math.max(0, percent));
            progressFill.style.width = percent + '%';
            progressText.textContent = Math.round(percent) + '%';
        }

        function renderToc() {
            tocList.innerHTML = '';
            groupedToc.forEach(function(group) {
                var hasChildren = group.items && group.items.length > 0;
                var isSpecial = group.isSpecial || false;
                var groupDiv = document.createElement('div');
                groupDiv.className = 'toc-group';
                if (!hasChildren && !isSpecial) {
                    groupDiv.classList.add('no-children');
                }
                groupDiv.dataset.collapsed = 'false';
                groupDiv.dataset.label = group.label;

                var header = document.createElement('div');
                header.className = 'toc-group-header';
                var iconSpan = document.createElement('span');
                iconSpan.className = 'group-icon';
                iconSpan.innerHTML = '<i class="fas ' + (group.icon || 'fa-book') + '"></i>';
                header.appendChild(iconSpan);
                var labelSpan = document.createElement('span');
                labelSpan.className = 'group-label';
                labelSpan.textContent = group.label;
                header.appendChild(labelSpan);

                if (hasChildren) {
                    var toggleSpan = document.createElement('span');
                    toggleSpan.className = 'group-toggle';
                    toggleSpan.innerHTML = '<i class="fas fa-chevron-down"></i>';
                    header.appendChild(toggleSpan);
                }

                header.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (hasChildren) {
                        var isCollapsed = groupDiv.dataset.collapsed === 'true';
                        groupDiv.dataset.collapsed = isCollapsed ? 'false' : 'true';
                        groupDiv.classList.toggle('collapsed', !isCollapsed);
                        saveGroupState(group.label, !isCollapsed);
                    } else {
                        if (group.singleIndex !== undefined) {
                            goToChapter(group.singleIndex, true);
                            closeDrawer();
                        } else if (group.isSpecial && group.items.length === 1) {
                            goToChapter(group.items[0].index, true);
                            closeDrawer();
                        }
                    }
                });

                groupDiv.appendChild(header);

                if (hasChildren) {
                    var subList = document.createElement('ul');
                    subList.className = 'toc-sub-list';
                    group.items.forEach(function(item) {
                        var li = document.createElement('li');
                        li.className = 'toc-sub-item';
                        if (item.index === currentChapterIndex) {
                            li.classList.add('active');
                        }
                        var numSpan = document.createElement('span');
                        numSpan.className = 'sub-num';
                        var match = item.title.match(/^(\d+\.\d+)/);
                        numSpan.textContent = match ? match[1] : '';
                        li.appendChild(numSpan);
                        var titleSpan = document.createElement('span');
                        titleSpan.className = 'sub-title';
                        titleSpan.textContent = item.title;
                        li.appendChild(titleSpan);
                        if (item.isPlaceholder) {
                            var tag = document.createElement('span');
                            tag.className = 'status-tag';
                            tag.textContent = '敬请期待';
                            li.appendChild(tag);
                        }
                        li.addEventListener('click', function(e) {
                            e.stopPropagation();
                            goToChapter(item.index, true);
                            closeDrawer();
                        });
                        subList.appendChild(li);
                    });
                    groupDiv.appendChild(subList);
                }
                tocList.appendChild(groupDiv);
            });
            restoreGroupStates();
        }

        function saveGroupState(label, collapsed) {
            try {
                var key = 'toc-group-states';
                var states = JSON.parse(localStorage.getItem(key) || '{}');
                states[label] = collapsed;
                localStorage.setItem(key, JSON.stringify(states));
            } catch (e) {}
        }

        function restoreGroupStates() {
            try {
                var key = 'toc-group-states';
                var states = JSON.parse(localStorage.getItem(key) || '{}');
                var groups = document.querySelectorAll('.toc-group');
                groups.forEach(function(groupDiv) {
                    var label = groupDiv.dataset.label;
                    if (label && states.hasOwnProperty(label) && groupDiv.querySelector('.toc-sub-list')) {
                        var collapsed = states[label];
                        if (collapsed) {
                            groupDiv.dataset.collapsed = 'true';
                            groupDiv.classList.add('collapsed');
                        } else {
                            groupDiv.dataset.collapsed = 'false';
                            groupDiv.classList.remove('collapsed');
                        }
                    }
                });
            } catch (e) {}
        }

        function updateTocActive() {
            var currentTitle = allChapters[currentChapterIndex] ? allChapters[currentChapterIndex].title : '';
            if (currentTitle) {
                var allItems = tocList.querySelectorAll('.toc-sub-item');
                allItems.forEach(function(item) {
                    var titleSpan = item.querySelector('.sub-title');
                    if (titleSpan && titleSpan.textContent === currentTitle) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
        }

        function goToChapter(index, scrollToTop) {
            if (index < 0 || index >= allChapters.length) return;
            currentChapterIndex = index;
            renderChapter(index);
            if (scrollToTop) {
                contentArea.scrollTop = 0;
            }
            saveProgress();
            updateTocActive();
        }

        function saveProgress() {
            try {
                var data = {
                    chapterIndex: currentChapterIndex,
                    scrollTop: contentArea.scrollTop
                };
                localStorage.setItem('html-reader-progress', JSON.stringify(data));
            } catch (e) {}
        }

        function loadProgress() {
            try {
                var raw = localStorage.getItem('html-reader-progress');
                if (!raw) return null;
                var data = JSON.parse(raw);
                if (typeof data.chapterIndex === 'number' && data.chapterIndex >= 0 && data.chapterIndex < allChapters
                    .length) {
                    return data;
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        function restoreProgress() {
            var data = loadProgress();
            if (data) {
                currentChapterIndex = data.chapterIndex;
                renderChapter(currentChapterIndex);
                if (data.scrollTop !== undefined && data.scrollTop >= 0) {
                    requestAnimationFrame(function() {
                        contentArea.scrollTop = data.scrollTop;
                        updateProgress();
                    });
                }
            } else {
                currentChapterIndex = 1;
                renderChapter(currentChapterIndex);
                contentArea.scrollTop = 0;
            }
            setTimeout(updateTocActive, 50);
        }

        var saveTimer = null;

        function handleScroll() {
            updateProgress();
            if (saveTimer) {
                clearTimeout(saveTimer);
            }
            saveTimer = setTimeout(function() {
                saveProgress();
                saveTimer = null;
            }, 300);
        }

        contentArea.addEventListener('scroll', handleScroll);
        menuBtn.addEventListener('click', toggleDrawer);
        drawerClose.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);

        prevBtn.addEventListener('click', function() {
            if (currentChapterIndex > 0) goToChapter(currentChapterIndex - 1, true);
        });
        nextBtn.addEventListener('click', function() {
            if (currentChapterIndex < allChapters.length - 1) goToChapter(currentChapterIndex + 1, true);
        });

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowLeft') {
                if (currentChapterIndex > 0) goToChapter(currentChapterIndex - 1, true);
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                if (currentChapterIndex < allChapters.length - 1) goToChapter(currentChapterIndex + 1, true);
                e.preventDefault();
            }
        });

        themeToggle.addEventListener('click', toggleTheme);
        fontInc.addEventListener('click', function() { changeFontSize(2); });
        fontDec.addEventListener('click', function() { changeFontSize(-2); });

        document.getElementById('progressBar').addEventListener('click', function(e) {
            var rect = e.currentTarget.getBoundingClientRect();
            var percent = (e.clientX - rect.left) / rect.width;
            var scrollHeight = contentArea.scrollHeight - contentArea.clientHeight;
            contentArea.scrollTop = percent * scrollHeight;
        });

        try {
            var savedTheme = localStorage.getItem('html-reader-theme');
            if (savedTheme === 'night') {
                isNight = true;
                document.body.classList.add('night-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            var savedFont = localStorage.getItem('html-reader-fontsize');
            if (savedFont) {
                fontSize = parseInt(savedFont, 10);
                if (fontSize >= 12 && fontSize <= 24) {
                    fontSizeDisplay.textContent = fontSize;
                }
            }
        } catch (e) {}

        function toggleTheme() {
            isNight = !isNight;
            document.body.classList.toggle('night-mode', isNight);
            themeToggle.innerHTML = isNight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            try {
                localStorage.setItem('html-reader-theme', isNight ? 'night' : 'day');
            } catch (e) {}
        }

        function changeFontSize(delta) {
            fontSize = Math.min(24, Math.max(12, fontSize + delta));
            fontSizeDisplay.textContent = fontSize;
            document.querySelectorAll('.chapter-content').forEach(function(el) {
                el.style.fontSize = fontSize + 'px';
            });
            try {
                localStorage.setItem('html-reader-fontsize', fontSize);
            } catch (e) {}
        }

        function openDrawer() {
            drawer.classList.add('open');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            drawer.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        function toggleDrawer() {
            if (drawer.classList.contains('open')) {
                closeDrawer();
            } else {
                openDrawer();
            }
        }

        // 启动
        renderToc();
        restoreProgress();
        document.querySelectorAll('.chapter-content').forEach(function(el) {
            el.style.fontSize = fontSize + 'px';
        });

        var touchStartX = 0,
            touchStartY = 0;
        contentArea.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        contentArea.addEventListener('touchend', function(e) {
            var dx = e.changedTouches[0].clientX - touchStartX;
            var dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                if (dx < 0 && currentChapterIndex < allChapters.length - 1) {
                    goToChapter(currentChapterIndex + 1, true);
                } else if (dx > 0 && currentChapterIndex > 0) {
                    goToChapter(currentChapterIndex - 1, true);
                }
            }
        }, { passive: true });

        console.log('📖 HTML阅读器已启动（包含第1~7章完整内容，第8~28章及附录为占位）');
        console.log('总章节数：', allChapters.length);
    </script>
</body>
</html>
