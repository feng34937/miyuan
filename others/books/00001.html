<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《HTML由入门到精通》阅读器</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f3f0;
            color: #333;
            overflow: hidden;
            height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        body.night-mode {
            background: #1a1a1a;
            color: #ccc;
        }

        body.night-mode .reader-header {
            background: rgba(30, 30, 30, 0.65);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        body.night-mode .reader-header h1 {
            color: #e0e0e0;
        }
        body.night-mode .reader-footer {
            background: rgba(30, 30, 30, 0.65);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        body.night-mode .reader-footer button {
            color: #ccc;
        }
        body.night-mode .reader-footer button:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        body.night-mode .progress-bar {
            background: rgba(255, 255, 255, 0.15);
        }
        body.night-mode .progress-fill {
            background: #6a8caf;
        }
        body.night-mode .content-area {
            background: #1a1a1a;
        }
        body.night-mode .chapter-title {
            color: #e8e8e8;
        }
        body.night-mode .chapter-content {
            color: #c8c8c8;
        }
        body.night-mode .chapter-content h1,
        body.night-mode .chapter-content h2,
        body.night-mode .chapter-content h3 {
            color: #e0e0e0;
        }
        body.night-mode .chapter-content code {
            background: #2d2d2d;
            color: #e6c07b;
        }
        body.night-mode .chapter-content pre {
            background: #2d2d2d;
            border-left-color: #6a8caf;
        }
        body.night-mode .chapter-content table {
            border-color: #444;
        }
        body.night-mode .chapter-content th,
        body.night-mode .chapter-content td {
            border-color: #444;
        }
        body.night-mode .chapter-content blockquote {
            border-left-color: #6a8caf;
            background: #2a2a2a;
        }
        body.night-mode .chapter-content .tip-box {
            background: #2a3a3a;
            border-left-color: #6a8caf;
        }
        body.night-mode .chapter-content .tip-box strong {
            color: #8ab4d6;
        }
        body.night-mode .drawer-overlay {
            background: rgba(0, 0, 0, 0.6);
        }

        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 0 !important;
        }
        .drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: -340px;
            width: 320px;
            height: 100%;
            z-index: 1001;
            transition: left 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto;
            padding: 24px 0 40px 0;
            background: rgba(255, 255, 255, 0.58);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-right: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border-radius: 0 !important;
        }
        body.night-mode .drawer {
            background: rgba(30, 30, 30, 0.70);
            backdrop-filter: blur(40px) saturate(160%);
            -webkit-backdrop-filter: blur(40px) saturate(160%);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }
        .drawer.open {
            left: 0;
        }
        .drawer::-webkit-scrollbar {
            width: 3px;
        }
        .drawer::-webkit-scrollbar-track {
            background: transparent;
        }
        .drawer::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }
        body.night-mode .drawer::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
        }

        .drawer-title {
            font-size: 20px;
            font-weight: 600;
            padding: 0 20px 18px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1a1a1a;
            letter-spacing: 0.5px;
        }
        body.night-mode .drawer-title {
            color: #e0e0e0;
            border-bottom-color: rgba(255, 255, 255, 0.06);
        }
        .drawer-title i {
            margin-right: 10px;
            color: #3b7cb8;
            font-size: 22px;
        }
        body.night-mode .drawer-title i {
            color: #6a8caf;
        }
        .drawer-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: rgba(0, 0, 0, 0.4);
            padding: 0 8px;
            transition: color 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .drawer-close:hover {
            background: rgba(0, 0, 0, 0.06);
            color: rgba(0, 0, 0, 0.7);
        }
        body.night-mode .drawer-close {
            color: rgba(255, 255, 255, 0.4);
        }
        body.night-mode .drawer-close:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
        }

        /* 两级目录样式 */
        .toc-list {
            list-style: none;
            padding: 8px 12px 20px 12px;
            margin: 0;
        }

        .toc-group {
            margin-bottom: 2px;
            border-radius: 12px;
            overflow: hidden;
            transition: background 0.2s;
        }
        .toc-group:hover {
            background: rgba(0, 0, 0, 0.02);
        }
        body.night-mode .toc-group:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .toc-group-header {
            display: flex;
            align-items: center;
            padding: 10px 16px 10px 20px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.8);
            user-select: none;
        }
        body.night-mode .toc-group-header {
            color: rgba(255, 255, 255, 0.8);
        }
        .toc-group-header:hover {
            background: rgba(0, 0, 0, 0.04);
        }
        body.night-mode .toc-group-header:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .toc-group-header .group-icon {
            margin-right: 12px;
            font-size: 16px;
            color: #3b7cb8;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }
        body.night-mode .toc-group-header .group-icon {
            color: #6a8caf;
        }

        .toc-group-header .group-label {
            flex: 1;
            font-size: 15px;
        }

        .toc-group-header .group-toggle {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.3);
            padding: 0 4px;
            transition: transform 0.3s;
            flex-shrink: 0;
            margin-left: 8px;
        }
        body.night-mode .toc-group-header .group-toggle {
            color: rgba(255, 255, 255, 0.25);
        }
        .toc-group.collapsed .group-toggle {
            transform: rotate(180deg);
        }

        .toc-sub-list {
            list-style: none;
            padding: 0 0 6px 0;
            margin: 0;
            overflow: hidden;
            max-height: 2000px;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            opacity: 1;
        }
        .toc-group.collapsed .toc-sub-list {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .toc-sub-item {
            padding: 8px 16px 8px 52px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.65);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            position: relative;
        }
        body.night-mode .toc-sub-item {
            color: rgba(255, 255, 255, 0.6);
        }
        .toc-sub-item:hover {
            background: rgba(0, 0, 0, 0.04);
            color: rgba(0, 0, 0, 0.85);
        }
        body.night-mode .toc-sub-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.8);
        }
        .toc-sub-item .sub-num {
            display: inline-block;
            width: 28px;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.3);
            margin-right: 8px;
            flex-shrink: 0;
            text-align: right;
        }
        body.night-mode .toc-sub-item .sub-num {
            color: rgba(255, 255, 255, 0.2);
        }
        .toc-sub-item .sub-title {
            flex: 1;
            line-height: 1.3;
        }
        .toc-sub-item .status-tag {
            margin-left: 8px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.25);
            background: rgba(0, 0, 0, 0.06);
            padding: 1px 10px;
            border-radius: 12px;
            flex-shrink: 0;
        }
        body.night-mode .toc-sub-item .status-tag {
            color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }
        .toc-sub-item.active {
            background: rgba(59, 124, 184, 0.12);
            color: #1a1a1a;
            font-weight: 500;
        }
        body.night-mode .toc-sub-item.active {
            background: rgba(106, 140, 175, 0.15);
            color: #e8e8e8;
        }
        .toc-sub-item.active .sub-num {
            color: #3b7cb8;
        }
        body.night-mode .toc-sub-item.active .sub-num {
            color: #8ab4d6;
        }

        .toc-group.no-children .toc-group-header {
            padding-right: 20px;
        }
        .toc-group.no-children .group-toggle {
            display: none;
        }
        .toc-group.no-children .toc-sub-list {
            display: none;
        }

        /* 阅读器布局 */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 820px;
            margin: 0 auto;
            position: relative;
            background: #f5f3f0;
            transition: background 0.3s;
            border-radius: 0 !important;
        }
        body.night-mode .app-container {
            background: #1a1a1a;
        }

        .reader-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
            height: 60px;
            border-radius: 0 !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        body.night-mode .reader-header {
            background: rgba(30, 30, 30, 0.55);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .reader-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            color: rgba(0, 0, 0, 0.5);
            transition: color 0.2s, background 0.2s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(0, 0, 0, 0.8);
        }
        body.night-mode .menu-btn {
            color: rgba(255, 255, 255, 0.4);
        }
        body.night-mode .menu-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
        }

        .reader-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            transition: color 0.3s;
            letter-spacing: 0.5px;
        }
        body.night-mode .reader-header h1 {
            color: #e0e0e0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-right button {
            background: none;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 18px;
            cursor: pointer;
            color: rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-right button:hover {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(0, 0, 0, 0.8);
        }
        body.night-mode .header-right button {
            color: rgba(255, 255, 255, 0.4);
        }
        body.night-mode .header-right button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
        }

        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 20px;
            padding: 2px 4px;
        }
        body.night-mode .font-size-controls {
            background: rgba(255, 255, 255, 0.04);
        }
        .font-size-controls button {
            width: 32px;
            height: 32px;
            font-size: 14px;
            border-radius: 50%;
            color: rgba(0, 0, 0, 0.5);
        }
        body.night-mode .font-size-controls button {
            color: rgba(255, 255, 255, 0.4);
        }
        .font-size-controls .size-display {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.4);
            min-width: 32px;
            text-align: center;
            font-weight: 500;
        }
        body.night-mode .font-size-controls .size-display {
            color: rgba(255, 255, 255, 0.3);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 30px 40px 30px;
            background: #fcfaf8;
            transition: background 0.3s, padding 0.3s;
            scroll-behavior: smooth;
            line-height: 1.8;
            border-radius: 0 !important;
        }
        body.night-mode .content-area {
            background: #1e1e1e;
        }

        .chapter-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .chapter-content {
            font-size: 16px;
            color: #333;
            transition: color 0.3s, font-size 0.2s;
        }
        .chapter-content p {
            margin-bottom: 1.2em;
        }
        .chapter-content h1,
        .chapter-content h2,
        .chapter-content h3 {
            margin-top: 1.6em;
            margin-bottom: 0.6em;
            font-weight: 600;
        }
        .chapter-content h1 {
            font-size: 1.8em;
        }
        .chapter-content h2 {
            font-size: 1.4em;
        }
        .chapter-content h3 {
            font-size: 1.2em;
        }
        .chapter-content ul,
        .chapter-content ol {
            margin: 0.8em 0 1em 1.8em;
        }
        .chapter-content li {
            margin-bottom: 0.3em;
        }
        .chapter-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            font-size: 0.95em;
        }
        .chapter-content th,
        .chapter-content td {
            border: 1px solid #d0d0d0;
            padding: 8px 12px;
            text-align: left;
        }
        .chapter-content th {
            background: #f0f0f0;
            font-weight: 600;
        }
        body.night-mode .chapter-content th {
            background: #2a2a2a;
        }
        .chapter-content code {
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            background: #f0f0f0;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            color: #c7254e;
        }
        body.night-mode .chapter-content code {
            background: #2d2d2d;
            color: #e6c07b;
        }
        .chapter-content pre {
            background: #f6f6f6;
            padding: 16px 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 0.9em;
            line-height: 1.6;
            border-left: 4px solid #3b7cb8;
            margin: 1em 0;
        }
        body.night-mode .chapter-content pre {
            background: #2d2d2d;
            border-left-color: #6a8caf;
        }
        .chapter-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .chapter-content blockquote {
            border-left: 4px solid #3b7cb8;
            padding: 0.8em 1.2em;
            background: #f9f9f9;
            margin: 1em 0;
            border-radius: 0 8px 8px 0;
        }
        body.night-mode .chapter-content blockquote {
            background: #2a2a2a;
            border-left-color: #6a8caf;
        }
        .chapter-content .tip-box {
            background: #f0f7ff;
            border-left: 4px solid #3b7cb8;
            padding: 0.8em 1.2em;
            margin: 1em 0;
            border-radius: 0 8px 8px 0;
        }
        body.night-mode .chapter-content .tip-box {
            background: #2a3a4a;
        }
        .chapter-content .tip-box strong {
            color: #1a5c9a;
        }
        .chapter-content hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 2em 0;
        }
        .chapter-content .placeholder-box {
            background: rgba(0, 0, 0, 0.02);
            border: 2px dashed rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            color: rgba(0, 0, 0, 0.3);
            font-size: 1.2em;
            margin: 2em 0;
            backdrop-filter: blur(4px);
        }
        body.night-mode .chapter-content .placeholder-box {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.2);
        }
        .chapter-content .placeholder-box i {
            font-size: 3em;
            margin-bottom: 16px;
            display: block;
            color: rgba(0, 0, 0, 0.12);
        }
        body.night-mode .chapter-content .placeholder-box i {
            color: rgba(255, 255, 255, 0.08);
        }

        .reader-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
            height: 56px;
            border-radius: 0 !important;
            box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.5);
        }
        body.night-mode .reader-footer {
            background: rgba(30, 30, 30, 0.55);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.04);
        }
        .reader-footer .progress-info {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.35);
            min-width: 60px;
            font-weight: 500;
        }
        body.night-mode .reader-footer .progress-info {
            color: rgba(255, 255, 255, 0.25);
        }
        .progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 4px;
            margin: 0 16px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
        }
        .progress-bar:hover {
            height: 5px;
        }
        body.night-mode .progress-bar {
            background: rgba(255, 255, 255, 0.08);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #3b7cb8;
            border-radius: 4px;
            transition: width 0.1s;
        }
        .footer-controls {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .footer-controls button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-controls button:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(0, 0, 0, 0.7);
        }
        .footer-controls button:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        body.night-mode .footer-controls button {
            color: rgba(255, 255, 255, 0.3);
        }
        body.night-mode .footer-controls button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 640px) {
            .reader-header h1 {
                font-size: 16px;
            }
            .content-area {
                padding: 16px 16px 30px 16px;
            }
            .drawer {
                width: 290px;
                left: -310px;
                padding: 20px 0 30px 0;
            }
            .drawer.open {
                left: 0;
            }
            .reader-footer .progress-info {
                font-size: 12px;
                min-width: 50px;
            }
            .header-right .theme-toggle {
                font-size: 16px;

                <h1>1.3 什么是HTML</h1>
                <div class="chapter-content">
                    <p>通过前两节的学习，我们已经知道HTML是Web前端的三大核心技术之一，负责网页的结构和内容。但HTML究竟是一门什么样的"语言"？它从哪里来，又将向何处去？本节我们将追本溯源，系统地回答这些问题。</p>

                    <h2>1.3.1 HTML的基本概念</h2>
                    <p><strong>HTML</strong> 是 <strong>HyperText Markup Language</strong> 的缩写，中文译为 <strong>"超文本标记语言"</strong> 。我们从它的名字入手，逐一拆解其含义：</p>
                    <ul>
                        <li><strong>标记（Markup）</strong>：HTML通过一系列预先定义好的 <strong>"标签"（Tag）</strong> 来"标记"文本内容，告诉浏览器这段文字是标题、那段文字是段落、某处需要插入一张图片。这些标签本身不会在页面上显示，它们就像剧本中的"舞台提示"——指导浏览器如何将内容呈现给观众。</li>
                        <li><strong>超文本（HyperText）</strong>：普通的文本（如TXT文档）是线性的、只读的。而"超文本"超越了普通文本的限制——它可以通过 <strong>超链接（Hyperlink）</strong> 将不同的页面、不同的网站、甚至不同的媒体（图片、视频、音频）连接在一起，形成一个纵横交错的、非线性的信息网络。这正是万维网（WWW）的精髓所在。</li>
                    </ul>
                    <p>因此，HTML的本质是一种 <strong>描述性标记语言</strong>，而非编程语言。它没有复杂的逻辑运算和流程控制，它的核心任务就是：<strong>用标签告诉浏览器"内容是什么"以及"内容如何结构化"</strong>。</p>
                    <p><strong>HTML的基本语法结构</strong></p>
                    <p>一个HTML元素（Element）通常由三部分组成：</p>
                    <ol>
                        <li><strong>开始标签（Start Tag）</strong>：如 <code>&lt;p&gt;</code></li>
                        <li><strong>内容（Content）</strong>：如 "这是一段文字"</li>
                        <li><strong>结束标签（End Tag）</strong>：如 <code>&lt;/p&gt;</code></li>
                    </ol>
                    <p>完整写法为：<code>&lt;p&gt;这是一段文字&lt;/p&gt;</code></p>
                    <p>此外，标签上还可以添加 <strong>属性（Attribute）</strong> ，用来为元素提供额外的信息。属性写在开始标签中，采用 <code>属性名="属性值"</code> 的格式：</p>
                    <p><strong>示例1-4：带属性的HTML元素</strong></p>
                    <pre><code>&lt;!-- 不带属性 --&gt;
        &lt;a&gt;点击这里&lt;/a&gt;

        &lt;!-- 带 href 属性，指定链接的目标地址 --&gt;
        &lt;a href="https://www.example.com"&gt;点击这里访问示例网站&lt;/a&gt;

        &lt;!-- 带多个属性 --&gt;
        &lt;a href="https://www.example.com" target="_blank" title="前往示例网站"&gt;
            点击这里访问示例网站
        &lt;/a&gt;</code></pre>
                    <p>在上面的例子中，<code>href</code>（链接地址）、<code>target</code>（打开方式）、<code>title</code>（提示文本）都是 <code>&lt;a&gt;</code> 标签的属性，它们让这个超链接具备了完整的跳转功能。</p>

                    </div>

                    <h2>1.3.2 HTML的发展历史</h2>
                    <p>了解HTML的发展历程，有助于我们理解这门语言的设计哲学和演进方向。HTML从诞生至今，主要经历了以下几个重要的版本阶段：</p>
                    <table>
                        <tr><th>版本/时间</th><th>重要里程碑</th><th>主要特点</th></tr>
                        <tr><td><strong>HTML 1.0</strong>（1991年）</td><td>蒂姆·伯纳斯-李定义了最早的HTML标签。</td><td>仅包含约20个标签（标题、段落、超链接等），纯文本排版，无表格、无图像、无样式。这是万维网的"史前时代"。</td></tr>
                        <tr><td><strong>HTML 2.0</strong>（1995年）</td><td>IETF（互联网工程任务组）发布正式标准。</td><td>加入了表单（Form）和表格（Table）的支持，让网页具备了初步的交互和数据提交能力。网页开始"活"起来。</td></tr>
                        <tr><td><strong>HTML 3.2</strong>（1997年）</td><td>W3C（万维网联盟）接管HTML标准化工作。</td><td>引入了更多样式属性（如字体、颜色）、<code>&lt;applet&gt;</code> 支持Java小程序，并开始支持简单的CSS。但此时网页布局严重依赖表格嵌套，非常混乱。</td></tr>
                        <tr><td><strong>HTML 4.01</strong>（1999年）</td><td>经典的成熟版本，长期统治Web世界。</td><td>彻底将样式剥离到CSS中，强调"结构与样式分离"。增加了 <code>&lt;div&gt;</code>、<code>&lt;span&gt;</code> 等通用容器，以及更强大的表单功能。这个版本是21世纪前十年Web开发的基石。</td></tr>
                        <tr><td><strong>XHTML 1.0</strong>（2000年）</td><td>结合XML的严格语法规则。</td><td>要求标签必须闭合、属性必须加引号、标签名必须小写（语法极严）。虽然提高了代码规范性，但因为太过严厉，在执行中导致大量兼容性问题，最终未能成为主流。</td></tr>
                        <tr><td><strong>HTML5</strong>（2014年正式推荐标准）</td><td><strong>Web开发的"分水岭"</strong>。</td><td>革命性的版本。不再基于SGML（标准通用标记语言），拥有独立的语法规范。新增了大量语义标签、多媒体支持（音视频）、图形绘制（Canvas）、本地存储、离线应用等。<strong>彻底终结了Flash、Silverlight等第三方插件的时代</strong>。</td></tr>
                    </table>
                    <p><strong>一个关键的时间点</strong>：2004年至2009年间，WHATWG（网页超文本应用技术工作小组）与W3C在HTML发展方向上产生分歧——W3C主张走向严格的XHTML 2.0（但过于理想化，脱离实际），而WHATWG主张在现有HTML 4.01基础上渐进增强、向后兼容。最终，WHATWG的路线取得了胜利，其成果便是今天的 <strong>HTML5</strong>。这充分说明：<strong>一项技术能否被广泛接纳，不在于它是否"纯粹"或"理论完美"，而在于它是否解决了开发者的真实痛点、是否兼容了已有的大量网页。</strong></p>

                    <h2>1.3.3 HTML5的新特性与优势</h2>
                    <p>HTML5并不是在HTML 4.01基础上的"小修小补"，而是一次 <strong>颠覆性的升级</strong>。如果说HTML 4.01时代网页是"静态文档"，那么HTML5时代的网页则是"富应用平台"。</p>
                    <p>HTML5的核心设计理念是 <strong>"一切从简，兼容为王"</strong> ——减少对外部插件（如Flash）的依赖，让浏览器原生能力更强大，同时确保所有新特性在不支持的旧浏览器上能"优雅降级"（即不报错，只是功能缺失）。</p>
                    <p>以下是HTML5带来的几项最核心的新特性与优势：</p>
                    <p><strong>1. 新增了大量语义化标签——让网页"有血有肉有骨架"</strong></p>
                    <p>在HTML 4时代，开发者几乎用 <code>&lt;div&gt;</code> 和 <code>&lt;span&gt;</code> 来搭建一切页面结构（俗称"DIV+CSS"布局）。这导致搜索引擎爬虫很难理解页面区块的含义（全是 <code>&lt;div&gt;</code>，谁知道哪里是导航栏、哪里是页脚？）。</p>
                    <p>HTML5新增了专门的语义标签来明确页面结构：</p>
                    <table>
                        <tr><th>HTML4写法（无语义）</th><th>HTML5写法（有语义）</th><th>表达含义</th></tr>
                        <tr><td><code>&lt;div id="header"&gt;</code></td><td><code>&lt;header&gt;</code></td><td>页面头部</td></tr>
                        <tr><td><code>&lt;div id="nav"&gt;</code></td><td><code>&lt;nav&gt;</code></td><td>导航区域</td></tr>
                        <tr><td><code>&lt;div id="main"&gt;</code></td><td><code>&lt;main&gt;</code></td><td>页面主体内容</td></tr>
                        <tr><td><code>&lt;div id="article"&gt;</code></td><td><code>&lt;article&gt;</code></td><td>独立文章/内容块</td></tr>
                        <tr><td><code>&lt;div id="sidebar"&gt;</code></td><td><code>&lt;aside&gt;</code></td><td>侧边栏/附属信息</td></tr>
                        <tr><td><code>&lt;div id="footer"&gt;</code></td><td><code>&lt;footer&gt;</code></td><td>页面底部</td></tr>
                    </table>
                    <p>语义化不仅提升了代码的可读性，更重要的是 <strong>极大地改善了SEO（搜索引擎优化）</strong>，让搜索引擎能够更准确地抓取网页的核心内容，同时也有利于屏幕阅读器等辅助设备为视障人士提供服务。</p>

                    <p><strong>2. 原生多媒体支持——让Flash"退休"</strong></p>
                    <p>在HTML5之前，在网页中嵌入视频和音频是一件极其痛苦的事情——你必须依赖第三方插件（如Adobe Flash、Windows Media Player）。这不仅存在巨大的安全漏洞风险，而且在移动端（iPhone/iPad）根本无法运行。</p>
                    <p>HTML5提供了 <code>&lt;video&gt;</code> 和 <code>&lt;audio&gt;</code> 标签，让浏览器原生支持多媒体播放：</p>
                    <pre><code>&lt;video src="movie.mp4" controls width="600"&gt;
        您的浏览器不支持视频播放，请升级浏览器。
        &lt;/video&gt;

        &lt;audio src="music.mp3" controls&gt;
        您的浏览器不支持音频播放。
        &lt;/audio&gt;</code></pre>
                    <p><code>controls</code> 属性让浏览器自动显示播放/暂停、进度条、音量等控件，用户体验统一且流畅。</p>

                    <p><strong>3. Canvas与SVG——强大的绘图能力</strong></p>
                    <p>HTML5的 <code>&lt;canvas&gt;</code> 标签提供了一个"画布"，开发者可以通过JavaScript在画布上动态绘制图形、图表、动画，甚至开发完整的网页游戏（如经典的《2048》或《植物大战僵尸》的HTML5版本）。</p>
                    <p>同时，SVG（可缩放矢量图形）也在HTML5中得到了原生支持，适合绘制图标、LOGO等需要高清缩放（如高清屏适配）的矢量图形。</p>
                    <p>（这两项技术我们将在本书第三篇的<strong>第14章</strong>和<strong>第15章</strong>中深入讲解。）</p>

                    <p><strong>4. 客户端数据存储——不再只依赖Cookie</strong></p>
                    <p>以往的Web存储只能依赖 <code>Cookie</code>，但Cookie有大小限制（仅4KB左右）且每次HTTP请求都会携带，严重影响网络传输效率。</p>
                    <p>HTML5提供了全新的存储方案：</p>
                    <ul>
                        <li><strong>localStorage</strong>：无过期时间的持久存储，容量约5~10MB，适合存储用户偏好设置、浏览记录等。</li>
                        <li><strong>sessionStorage</strong>：会话级存储，关闭浏览器标签页即清除。</li>
                        <li><strong>IndexedDB</strong>：一个完整的事务型数据库系统，适合在客户端存储大量结构化数据（如离线版邮件客户端、笔记应用等）。</li>
                    </ul>
                    <p>这让 <strong>"离线Web应用"（PWA）</strong> 成为可能——即用户即使在网络断开的情况下，依然可以打开网页并查看之前缓存的全部内容。</p>

                    <p><strong>5. 强大的表单控件与验证</strong></p>
                    <p>HTML5对表单进行了大刀阔斧的增强，新增了多种输入类型和属性：</p>
                    <ul>
                        <li>新的输入类型：<code>type="email"</code>（邮箱）、<code>type="url"</code>（网址）、<code>type="date"</code>（日期）、<code>type="color"</code>（颜色选择器）、<code>type="range"</code>（滑块）等，让移动端键盘自动弹出对应虚拟键盘（如输入邮箱时弹出"@"键）。</li>
                        <li>新的验证属性：<code>required</code>（必填）、<code>pattern</code>（正则匹配）、<code>min</code>/<code>max</code>（数值范围），大幅减少了前端表单验证对JavaScript的依赖。</li>
                    </ul>

                    <p><strong>6. 地理定位（Geolocation）与设备能力</strong></p>
                    <p>HTML5允许网页通过 <code>Geolocation API</code> 获取用户的地理位置（经度/纬度），这在LBS（基于位置的服务）应用中极其重要，如外卖配送跟踪、附近门店查找、运动轨迹记录等。此外，HTML5还可以访问设备的摄像头、麦克风（通过 <code>getUserMedia</code> API），为Web视频会议、在线直播等应用提供了底层支撑。</p>

                    <p><strong>7. 通信能力的飞跃</strong></p>
                    <ul>
                        <li><strong>WebSocket</strong>：实现了浏览器与服务器之间的全双工实时通信，是开发在线聊天室、股票行情推送、多人在线游戏等"实时Web应用"的核心技术。</li>
                        <li><strong>Server-Sent Events (SSE)</strong>：允许服务器主动向浏览器推送数据（如新闻推送、赛事比分），比传统的"轮询"方式更高效。</li>
                    </ul>

                    <p><strong>发展启示录</strong></p>
                    <p>回顾HTML的演进史，我们不难发现一条清晰的规律：<strong>HTML发展的核心驱动力，始终是"让Web变得更强大、更易用、更开放"</strong> 。从纯文本到图文并茂，从静态展示到动态交互，从依赖插件到原生支持，每一步都在降低开发门槛、提升用户体验、拓宽Web的应用边界。</p>
                    <p>正如万维网发明者蒂姆·伯纳斯-李爵士所期望的那样——<strong>"Web是为所有人服务的。"</strong> HTML5正是这一理念的完美践行者，它让Web不再只是"可阅读的文档"，而是"可交互的操作系统级平台"。</p>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们系统地学习了HTML的基本概念和发展历史：</p>
                    <ol>
                        <li><strong>HTML</strong> 是"超文本标记语言"，通过 <strong>标签（Tag）</strong> 和 <strong>属性（Attribute）</strong> 来描述网页的结构和内容。它是描述性语言，而非编程语言。</li>
                        <li>HTML的发展经历了 <strong>1.0→2.0→3.2→4.01→XHTML→HTML5</strong> 的演进历程。HTML5是迄今为止最成功、应用最广泛的版本。</li>
                        <li><strong>HTML5的核心优势</strong>包括：语义化标签、原生多媒体（音视频）、Canvas/SVG绘图、客户端存储（localStorage等）、强大的表单控件、地理位置定位以及WebSocket等高级通信能力。</li>
                        <li>HTML5的设计哲学是 <strong>"兼容优先，渐进增强"</strong>，旨在构建一个不依赖第三方插件的、开放、强大的Web应用平台。</li>

                        <tr><td><strong>IE10 / IE11</strong></td><td>支持大部分特性</td><td>对HTML5的支持有显著提升，但仍有部分限制。</td></tr>
                        <tr><td><strong>旧版Edge（EdgeHTML内核）</strong></td><td>支持大部分特性</td><td>不如基于Chromium的新版Edge完善。</td></tr>
                    </table>
                    <p>好消息是，微软早已停止对IE系列的主流支持，全球范围内使用IE的用户比例已极低。但在某些<strong>企业内网、政府网站、教育系统</strong>等特定场景中，旧版IE可能仍在服役——如果你的项目面向这类用户，就需要认真对待兼容性问题。</p>
                    <p><strong>3. 移动端浏览器——支持良好</strong></p>
                    <p>移动端的情况比想象中更乐观：<strong>iOS Safari、Android Chrome以及大多数基于Chromium或WebKit的移动浏览器，对HTML5的支持都非常好</strong>。这主要得益于：</p>
                    <ul>
                        <li>移动端浏览器的更新周期通常较短，新版本的普及速度较快。</li>
                        <li>苹果和谷歌都积极推动HTML5在移动端的落地，以替代对Flash等插件的依赖。</li>
                    </ul>

                    <h2>1.4.3 如何查询具体特性的浏览器支持情况</h2>
                    <p>在实际开发中，你经常会遇到这样的问题："我想用 <code>&lt;datalist&gt;</code> 做输入建议，Safari支持吗？""<code>localStorage</code> 在IE11上能用吗？"——这时就需要借助专业的查询工具。</p>
                    <p><strong>工具一：Can I use（最常用）</strong></p>
                    <p><strong>Can I use</strong>（https://caniuse.com）是前端开发领域<strong>最权威的浏览器兼容性查询网站</strong>。它提供了实时更新的浏览器支持数据，覆盖HTML、CSS、JavaScript、Web API等几乎所有前端技术。</p>
                    <p><strong>使用方法</strong>：在搜索框中输入你想查询的特性名称（如 <code>video</code>、<code>localStorage</code>、<code>flexbox</code>、<code>datalist</code> 等），页面会以表格形式展示该特性在各浏览器及各版本中的支持状态——绿色代表支持，红色代表不支持，黄色代表部分支持。</p>
                    <div class="tip-box">
                        <p><strong>💡 给初学者的建议</strong>：把 <strong>Can I use</strong> 加入你的浏览器书签。在未来的开发中，每当你想使用一个不太确定兼容性的HTML5特性时，先上去查一查——这会帮你避免无数"为什么我的页面在某某浏览器上显示不正常"的困惑。</p>
                    </div>
                    <p><strong>工具二：MDN Web Docs</strong></p>
                    <p><strong>MDN Web Docs</strong>（https://developer.mozilla.org）是Mozilla维护的Web技术权威文档库。在每一个HTML标签、属性或API的页面底部，都有一张<strong>"浏览器兼容性"表格</strong>，清晰列出了该特性在各主流浏览器中的支持版本。MDN的数据与Can I use相互补充，同样值得信赖。</p>
                    <p><strong>工具三：手动代码检测</strong></p>
                    <p>除了查表，你还可以在代码中<strong>直接检测</strong>浏览器是否支持某个特性：</p>
                    <pre><code>// 检测 localStorage 是否可用
        if (typeof localStorage !== 'undefined') {
            // 安全使用 localStorage
            localStorage.setItem('key', 'value');
        } else {
            // 降级方案：使用 Cookie 或其他方式
            console.log('当前浏览器不支持 localStorage');
        }

        // 检测地理定位 API 是否可用
        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                console.log('纬度：' + pos.coords.latitude);
            });
        } else {
            alert('您的浏览器不支持地理定位功能');
        }

        // 检测 Canvas 是否可用
        if (!!document.createElement('canvas').getContext) {
            // 可以使用 Canvas 绘图
        } else {
            // 提供降级方案
        }</code></pre>
                    <p>这种"<strong>特性检测（Feature Detection）</strong>"是前端开发中处理兼容性的<strong>黄金法则</strong>——不要猜测用户用什么浏览器，而是直接检测"这个功能在用户的浏览器中是否可用"。</p>

                    <h2>1.4.4 处理兼容性问题的常用策略</h2>
                    <p>当某个HTML5特性在目标用户的浏览器中不被支持时，我们该怎么办？以下是业界通行的几种策略：</p>
                    <p><strong>策略一：渐进增强（Progressive Enhancement）</strong></p>
                    <p><strong>核心理念</strong>：先为所有浏览器提供<strong>最基本的功能</strong>（使用最基础的HTML标签），然后为支持新特性的浏览器<strong>逐步增加更丰富的体验</strong>。</p>
                    <p><strong>示例</strong>：使用 <code>&lt;video&gt;</code> 标签播放视频时，在标签内部提供降级文本：</p>
                    <pre><code>&lt;video controls width="600"&gt;
        &lt;source src="movie.mp4" type="video/mp4"&gt;
        &lt;source src="movie.ogg" type="video/ogg"&gt;
        &lt;!-- 以下内容在不支持 video 的浏览器中显示 --&gt;
        &lt;p&gt;您的浏览器不支持HTML5视频播放，请升级浏览器。
        &lt;a href="movie.mp4"&gt;点击此处下载视频文件&lt;/a&gt;&lt;/p&gt;
        &lt;/video&gt;</code></pre>
                    <p>在支持 <code>&lt;video&gt;</code> 的浏览器中，用户看到的是精美的视频播放器；在不支持的浏览器中，用户至少能看到一段提示文字和一个下载链接——<strong>功能可能不完整，但不会"坏掉"</strong>。</p>
                    <p><strong>策略二：Polyfill（垫片）</strong></p>
                    <p><strong>Polyfill</strong> 是一段JavaScript代码，它的作用是：<strong>如果浏览器原生不支持某个新特性，就用JavaScript模拟实现该功能</strong>。</p>
                    <p><strong>经典案例</strong>：旧版IE（IE9及以下）无法识别HTML5的新语义标签（如 <code>&lt;header&gt;</code>、<code>&lt;nav&gt;</code>、<code>&lt;article&gt;</code> 等），会导致这些标签无法被正确渲染。开发者可以使用 <strong>html5shiv</strong> 这个Polyfill来解决：</p>
                    <pre><code>&lt;!-- 仅在 IE9 及以下版本中加载 html5shiv --&gt;
        &lt;!--[if lt IE 9]&gt;
            &lt;script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"&gt;&lt;/script&gt;
        &lt;![endif]--&gt;</code></pre>
                    <p>这段代码的意思是："如果用户的浏览器是IE9或更早版本，就加载html5shiv脚本，让这些旧浏览器也能识别HTML5的新标签。"——这是<strong>条件注释（Conditional Comment）</strong> 的用法，是专门为IE设计的HTML语法。</p>
                    <p><strong>策略三：优雅降级（Graceful Degradation）</strong></p>
                    <p><strong>核心理念</strong>：先为现代浏览器开发<strong>完整功能</strong>的版本，然后确保在旧浏览器中<strong>功能虽有缩减但依然可用且不报错</strong>。</p>
                    <p>渐进增强和优雅降级是两种互补的思路——前者"从下往上"构建，后者"从上往下"兼容。在实际开发中，<strong>渐进增强是更被推崇的实践</strong>，因为它天然保证了所有用户都能获得最基本的可用体验。</p>
                    <p><strong>策略四：提示用户升级浏览器</strong></p>
                    <p>对于实在无法兼容的极端情况（如用户仍在使用IE8），最务实的做法是<strong>友好地提示用户升级浏览器</strong>：</p>
                    <pre><code>&lt;!--[if lt IE 9]&gt;
        &lt;p style="color: red; font-size: 18px; padding: 20px; background: #ffeeee;"&gt;
            您的浏览器版本过低，无法正常访问本网站。
            请升级到 &lt;a href="https://www.microsoft.com/edge"&gt;Microsoft Edge&lt;/a&gt;
            或 &lt;a href="https://www.google.com/chrome/"&gt;Google Chrome&lt;/a&gt;。
        &lt;/p&gt;
        &lt;![endif]--&gt;</code></pre>

                    <h2>1.4.5 现代开发的新趋势：Baseline（广泛可用功能）</h2>
                    <p>2025年以来，Web开发社区提出了一项名为 <strong>"Baseline（基准）"</strong> 的新倡议。其核心理念是：</p>
                    <p><strong>当一个Web功能被所有主流浏览器（Chrome、Firefox、Safari、Edge）都支持时，它就进入了"Baseline Widely Available"（广泛可用）状态</strong>。开发者可以<strong>放心大胆地使用</strong>这些功能，无需担心兼容性问题。</p>
                    <p>截至2026年，已有<strong>超过500项Web功能</strong>被标记为"Baseline Widely Available"——这其中包括了绝大部分HTML5的核心特性。换句话说，<strong>对于现代Web开发而言，兼容性问题正在逐年减少</strong>。</p>
                    <div class="tip-box">
                        <p><strong>🎯 对初学者的建议</strong>：在学习阶段，请放心使用本书中讲解的所有HTML5特性——只要你在Chrome、Firefox、Edge或Safari的最新版本中测试，它们都能正常工作。当你将来进入实际项目开发时，再根据项目的目标用户群体，有针对性地处理兼容性问题即可。</p>
                    </div>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了各浏览器对HTML5的支持情况及相关应对策略：</p>
                    <ol>
                        <li><strong>HTML5已成行业标准</strong>，全球约95%的浏览器已支持HTML5。但"支持HTML5"是一个笼统的说法——具体到每个特性和API，支持情况可能不同。</li>
                        <li><strong>现代浏览器</strong>（Chrome、Firefox、Edge、Safari、Opera）<strong>完全支持</strong>HTML5核心特性；<strong>旧版IE</strong>（尤其是IE8及更早版本）支持非常有限；<strong>移动端浏览器</strong>支持情况普遍良好。</li>
                        <li>查询具体特性的兼容性，可使用 <strong>Can I use</strong>（https://caniuse.com）或 <strong>MDN Web Docs</strong>。</li>
                        <li>处理兼容性问题的常用策略包括：<strong>渐进增强</strong>（先基础后增强）、<strong>Polyfill</strong>（用JS模拟缺失功能）、<strong>优雅降级</strong>（先完整后精简）和<strong>提示用户升级浏览器</strong>。</li>
                        <li><strong>Baseline（广泛可用功能）</strong> 是近年来兴起的新标准——当一个功能被所有主流浏览器支持后，开发者即可放心使用。</li>
                    </ol>

                    <p><strong>思考与练习</strong></p>
                    <p><strong>一、选择题</strong></p>
                    <ol>

                        <li>在HTML中嵌入视频时，为保证在不支持 <code>&lt;video&gt;</code> 标签的浏览器中也能提供基本的可用体验，可以在 <code>&lt;video&gt;</code> 标签内部放置（　）<br>A. 另一个 <code>&lt;video&gt;</code> 标签 &nbsp;&nbsp; B. 一段提示文字或下载链接<br>C. 一个 <code>&lt;script&gt;</code> 标签 &nbsp;&nbsp; D. 一个 <code>&lt;style&gt;</code> 标签</li>
                    </ol>
                    <p><strong>二、简答题</strong></p>
                    <ol>
                        <li>为什么说"95%的浏览器支持HTML5"这个说法是笼统的？请结合HTML5包含多项独立特性这一事实进行解释。</li>

                <h1>2.1 第一个HTML页面</h1>

                    <p>在第1章中，我们已经完成了开发环境的搭建——安装了VS Code和Live Server插件，并体验了通过"!"快捷键生成HTML模板、使用Live Server预览页面的过程。但那时我们只是快速体验，并未深入理解每个部分的含义。</p>
                    <p>现在，让我们放慢脚步，从最基础的方式开始：<strong>手工编写一个HTML文件，并用浏览器打开它</strong>。这一过程将帮助你建立对HTML文件本质的直观认识，为后续深入学习打下坚实基础。</p>

                    <h2>2.1.1 手工编写HTML文件</h2>
                    <p>HTML文件本质上是<strong>纯文本文件</strong>，只是它的扩展名为 <code>.html</code>（或 <code>.htm</code>）。你可以使用任何文本编辑器来创建它——哪怕是操作系统自带的记事本（Notepad）。不过，为了更好的编码体验，我们依然推荐使用VS Code。</p>
                    <p>下面，我们将完全手动地编写一个最简单的HTML页面，不借助任何自动生成功能。</p>

                    <p><strong>第1步：创建文件</strong></p>
                    <ol>
                        <li>在电脑的任意位置（例如桌面），新建一个文件夹，命名为 <code>my-first-html</code>。</li>
                        <li>进入该文件夹，<strong>右键 → 新建 → 文本文档</strong>（Windows）或使用VS Code新建文件。</li>
                        <li>将新建的文件重命名为 <code>index.html</code>。<strong>注意</strong>：文件名后缀必须是 <code>.html</code>，而不是 <code>.txt</code>。如果系统不显示文件扩展名，请先在文件夹选项中勾选"显示文件扩展名"。</li>

                        "index"是Web服务器默认的首页文件名。当用户访问一个网站目录（如 <code>https://example.com/</code>）而不指定具体文件时，服务器会自动寻找 <code>index.html</code> 并返回给浏览器。虽然我们本地打开时文件名可以任意，但养成使用 <code>index.html</code> 的习惯是良好的实践。</p>
                    </div>

                    <p><strong>第2步：输入HTML代码</strong></p>
                    <p>用VS Code（或记事本）打开 <code>index.html</code>，输入以下内容：</p>
                    <pre><code>&lt;!DOCTYPE html&gt;
        &lt;html&gt;
        &lt;head&gt;
            &lt;title&gt;我的第一个网页&lt;/title&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;h1&gt;你好，HTML世界！&lt;/h1&gt;
            &lt;p&gt;这是我亲手编写的第一个HTML页面。&lt;/p&gt;
        &lt;/body&gt;
        &lt;/html&gt;</code></pre>
                    <p><strong>请务必逐字逐句地手动输入</strong>，不要复制粘贴。手动输入能帮助你熟悉标签的结构和拼写，同时加深记忆。</p>

                    <p><strong>第3步：保存文件</strong></p>
                    <p>按下 <code>Ctrl + S</code>（Windows）或 <code>Cmd + S</code>（macOS）保存文件。此时，你的文件夹中应该多了一个 <code>index.html</code> 文件。</p>

                    <h2>2.1.2 使用浏览器浏览HTML文件</h2>
                    <p>编写完HTML文件后，我们来看看它在浏览器中的效果。</p>

                    <p>恭喜你！你已经成功创建并运行了人生中的第一个HTML页面。</p>

                    <p><strong>方法二：从浏览器中打开</strong></p>
                    <p>你也可以先打开浏览器，然后通过菜单栏的 <strong>文件 → 打开文件</strong>（或直接按 <code>Ctrl + O</code>），选择 <code>index.html</code> 文件，同样可以查看效果。</p>

                    <p><strong>方法三：使用VS Code的Live Server（推荐）</strong></p>
                    <p>虽然现在我们已经有了文件，但每次修改后需要手动刷新浏览器才能看到变化。使用Live Server可以自动刷新，极大提高效率。</p>
                    <ol>
                        <li>在VS Code中打开 <code>index.html</code>。</li>
                        <li>右键点击编辑区域，选择 <strong>"Open with Live Server"</strong>。</li>

                    </ol>

                    <p><strong>观察浏览器地址栏</strong></p>
                    <p>注意，当你双击文件打开时，浏览器地址栏显示的是以 <code>file:///</code> 开头的本地文件路径，例如：<br>
                    <code>file:///C:/Users/YourName/Desktop/my-first-html/index.html</code><br>

                <h1>2.3 HTML基本语法规则</h1>
                <div class="chapter-content">
                    <p>在前两节中，我们已经接触了一些HTML标签，并编写了完整的页面。但你可能对标签的写法、属性的格式、注释的添加等细节还不太清楚。本节将系统讲解HTML的基本语法规则——这些规则是你编写任何HTML页面都必须遵循的"语言规范"。</p>
                    <p>掌握这些规则后，你不仅能看懂别人的代码，更能写出规范、整洁、易于维护的HTML代码。</p>

                    <h2>2.3.1 标签与元素</h2>
                    <p><strong>1. 标签的分类：双标签与单标签</strong></p>
                    <p>HTML中的标签按结构分为两类：<strong>双标签</strong>和<strong>单标签</strong>。</p>
                    <ul>
                        <li><strong>双标签（闭合标签）</strong>：由开始标签和结束标签组成，中间包裹内容。结束标签在标签名前加一个斜杠 <code>/</code>。</li>
                    </ul>
                    <pre><code>&lt;标签名&gt;内容&lt;/标签名&gt;</code></pre>
                    <p>常见双标签示例：</p>
                    <pre><code>&lt;h1&gt;这是一级标题&lt;/h1&gt;
        &lt;p&gt;这是一个段落。&lt;/p&gt;
        &lt;div&gt;这是一个容器。&lt;/div&gt;
        &lt;a href="https://example.com"&gt;这是一个链接&lt;/a&gt;</code></pre>
                    <ul>
                        <li><strong>单标签（自闭合标签）</strong>：只有开始标签，没有结束标签。它们在HTML5中不需要写斜杠（虽然写斜杠也兼容，但官方推荐不写）。</li>
                    </ul>
                    <pre><code>&lt;标签名&gt;</code></pre>
                    <p>常见单标签示例：</p>
                    <pre><code>&lt;br&gt;          &lt;!-- 换行 --&gt;

        &lt;meta charset="utf-8"&gt;            &lt;!-- 元数据 --&gt;

                    <div class="tip-box">
                        <p><strong>💡 历史遗留</strong>：在XHTML中，单标签要求以 <code>/&gt;</code> 结尾（如 <code>&lt;br /&gt;</code>），但在HTML5中不再强制。本书推荐使用简洁写法，不加斜杠。</p>
                    </div>

                    <p><strong>2. 元素的组成部分</strong></p>
                    <p>一个完整的HTML<strong>元素（Element）</strong>由三部分组成：</p>
                    <ol>
                        <li><strong>开始标签（Start Tag）</strong>：如 <code>&lt;p&gt;</code></li>
                        <li><strong>内容（Content）</strong>：开始标签和结束标签之间的文本或其他元素</li>
                        <li><strong>结束标签（End Tag）</strong>：如 <code>&lt;/p&gt;</code></li>

                    <p>示例：</p>

                    <p>有些元素的内容可以是其他元素（即嵌套），例如：</p>

            &lt;h1&gt;标题&lt;/h1&gt;
            &lt;p&gt;段落内容&lt;/p&gt;
        &lt;/div&gt;</code></pre>

                    <p><strong>3. 元素的嵌套与层级</strong></p>
                    <p>HTML允许标签相互嵌套，形成树形结构。嵌套时必须遵循<strong>"正确嵌套"</strong>原则：后开的标签必须先关。</p>
                    <p><strong>正确示例</strong>：</p>
                    <pre><code>&lt;p&gt;&lt;strong&gt;加粗文字&lt;/strong&gt;&lt;/p&gt;</code></pre>

                    <p>浏览器可能会尝试纠错，但强烈不推荐依赖这种行为。始终确保标签正确嵌套。</p>

                    <h2>2.3.2 标签属性</h2>
                    <p>属性（Attribute）为HTML元素提供额外的信息或配置。它们写在开始标签中，采用 <code>属性名="属性值"</code> 的键值对形式。</p>
                    <p><strong>1. 基本写法</strong></p>
                    <pre><code>&lt;标签名 属性名="属性值"&gt;内容&lt;/标签名&gt;</code></pre>

                    <ul>

                        <li><code>target</code> 属性指定打开方式（<code>_blank</code> 表示在新窗口打开）。</li>
                    </ul>

                    <p><strong>2. 多个属性</strong></p>
                    <p>一个标签可以有多个属性，用空格分隔，顺序无关：</p>
                    <pre><code>&lt;img src="logo.png" alt="网站Logo" width="200" height="100"&gt;</code></pre>

                    <p><strong>3. 属性值的引号</strong></p>

                <h1>2.4 HTML特殊符号与转义字符</h1>
                <div class="chapter-content">
                    <p>在HTML中，有些字符具有特殊含义，它们是HTML语法的一部分。例如，<code>&lt;</code> 和 <code>&gt;</code> 用于标记标签，<code>&amp;</code> 用于表示字符实体。如果你希望在页面中直接显示这些字符本身（而不是被浏览器解析为标签或实体），就需要使用<strong>转义字符（Escape Characters）</strong>，也称为<strong>字符实体（Character Entities）</strong>。</p>

                    <h2>2.4.1 什么是字符实体</h2>
                    <p>字符实体是一种以 <code>&amp;</code> 开头、以 <code>;</code> 结尾的特殊编码，用于表示那些在HTML中有特殊含义或无法直接键入的字符。</p>

                    <pre><code>&amp;实体名称;</code></pre>

                    <p>例如：</p>
                    <ul>
                        <li><code>&amp;lt;</code> 表示小于号 <code>&lt;</code></li>
                        <li><code>&amp;gt;</code> 表示大于号 <code>&gt;</code></li>
                        <li><code>&amp;amp;</code> 表示和号 <code>&amp;</code></li>
                        <li><code>&amp;copy;</code> 表示版权符号 <code>©</code></li>
                        <li><code>&amp;#169;</code> 也是版权符号（十进制数字编码）</li>

                    <p>以下四个字符在HTML中具有特殊含义，<strong>必须使用字符实体</strong>才能在页面中正常显示它们本身：</p>

                        <tr><td><code>"</code></td><td><code>&amp;quot;</code></td><td><code>&amp;#34;</code></td><td>双引号，常用于属性值</td></tr>
                        <tr><td><code>'</code></td><td><code>&amp;apos;</code></td><td><code>&amp;#39;</code></td><td>单引号（在HTML中较少用，但在XHTML中需要）</td></tr>
                    </table>

                    <pre><code>&amp;lt;p&amp;gt;这是一个段落&amp;lt;/p&amp;gt;</code></pre>
                    <p>这样浏览器就会显示为：</p>

                    <pre><code>AT&amp;amp;T</code></pre>
                    <p>显示结果为 <code>AT&amp;T</code>。</p>

                    <p><strong>关于标签顺序的建议</strong></p>

                <h1>3.4 <code>&lt;base&gt;</code> 基底网址标记</h1>
                <div class="chapter-content">
                    <p>在 <code>&lt;head&gt;</code> 的所有子标签中，<code>&lt;base&gt;</code> 可能是最"低调"的一个——它不像 <code>&lt;title&gt;</code> 那样人人必需，也不像 <code>&lt;meta&gt;</code> 那样功能繁多。但如果你理解了它的作用，就会发现在某些场景下，<code>&lt;base&gt;</code> 能帮你避免大量重复的工作，让页面中所有相对路径的管理变得异常简单。</p>
                    <p><code>&lt;base&gt;</code> 标签的作用可以用一句话概括：<strong>为页面中所有的相对路径 URL 提供一个"基准地址"</strong>。</p>

                    <h2>3.4.1 什么是 <code>&lt;base&gt;</code> 标签</h2>
                    <p><code>&lt;base&gt;</code> 是一个<strong>单标签</strong>，用于设置页面中所有相对路径的<strong>基础 URL</strong>。当浏览器在页面中遇到一个相对路径（如 <code>images/photo.jpg</code> 或 <code>./style.css</code>）时，它会将 <code>&lt;base&gt;</code> 中指定的 URL 作为"前缀"，拼接成完整的绝对路径。</p>

                    <p><strong>基本语法</strong></p>
                    <pre><code>&lt;base href="基准URL"&gt;</code></pre>

                    <p><strong>示例：</strong></p>
                    <pre><code>&lt;head&gt;
            &lt;base href="https://example.com/my-project/"&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;img src="images/logo.png"&gt;   &lt;!-- 实际请求：https://example.com/my-project/images/logo.png --&gt;
            &lt;a href="about.html"&gt;关于我们&lt;/a&gt;  &lt;!-- 实际请求：https://example.com/my-project/about.html --&gt;
            &lt;link rel="stylesheet" href="css/style.css"&gt;  &lt;!-- 实际请求：https://example.com/my-project/css/style.css --&gt;
        &lt;/body&gt;</code></pre>
                    <div class="tip-box">
                        <p><strong>💡 注意</strong>：<code>&lt;base&gt;</code> 必须在 <code>&lt;head&gt;</code> 中，且<strong>必须放在所有使用相对路径的标签之前</strong>（通常紧跟在 <code>&lt;meta charset&gt;</code> 和 <code>&lt;title&gt;</code> 之后）。如果放在这些标签之后，可能无法生效。</p>
                    </div>

                    <p><strong>可选属性：<code>target</code></strong></p>
                    <p>除了 <code>href</code>，<code>&lt;base&gt;</code> 还可以通过 <code>target</code> 属性设置页面中所有超链接的默认打开方式：</p>
                    <pre><code>&lt;base href="https://example.com/" target="_blank"&gt;</code></pre>
                    <p>这样页面中所有的 <code>&lt;a&gt;</code> 标签都会默认在新窗口/新标签页中打开，除非个别链接显式指定了不同的 <code>target</code>。</p>

                    <h2>3.4.2 为什么需要 <code>&lt;base&gt;</code></h2>
                    <p>在没有 <code>&lt;base&gt;</code> 的情况下，浏览器使用<strong>当前页面的 URL 作为基准</strong>来解析相对路径。例如：</p>
                    <ul>
                        <li>当前页面：<code>https://example.com/products/index.html</code></li>
                        <li>相对路径：<code>images/photo.jpg</code></li>
                        <li>实际请求：<code>https://example.com/products/images/photo.jpg</code></li>
                    </ul>
                    <p>这个行为大多数时候没有问题。但在以下场景中，<code>&lt;base&gt;</code> 能派上大用场：</p>

                    <p><strong>1. 项目文件结构迁移或部署环境变化</strong></p>
                    <p>假设你的项目在本地开发时放在 <code>/my-project/</code> 目录下，而部署到服务器后放在了 <code>/</code>（根目录）或 <code>/v2/</code> 目录下。如果不使用 <code>&lt;base&gt;</code>，你需要修改所有 HTML 文件中涉及路径的地方——这既繁琐又容易遗漏。</p>
                    <p>使用 <code>&lt;base&gt;</code>，你只需要修改一处：</p>
                    <pre><code>&lt;!-- 开发环境 --&gt;
        &lt;base href="/my-project/"&gt;

        &lt;!-- 生产环境 --&gt;
        &lt;base href="/"&gt;</code></pre>
                    <p>页面中所有相对路径（如 <code>images/logo.png</code>）都会自动适配新的基准地址。</p>

                    <p><strong>2. 单页应用（SPA）中的路由管理</strong></p>
                    <p>在 Vue.js、React 等前端框架构建的单页应用中，<code>&lt;base&gt;</code> 经常用于配置路由的根路径：</p>
                    <pre><code>&lt;base href="/app/"&gt;</code></pre>
                    <p>这告诉路由系统所有路径都从 <code>/app/</code> 开始，便于应用部署在子目录中。</p>

                    <p><strong>3. 内容管理系统（CMS）中的动态页面</strong></p>
                    <p>如果你开发一个 CMS 主题或模板，页面可能被放在不同的目录层级中（如 <code>https://example.com/</code> 或 <code>https://example.com/blog/post/</code>）。使用 <code>&lt;base&gt;</code> 可以让模板中的资源引用（图片、CSS、JS）始终保持正确，而不必担心页面所在的目录深度。</p>

                    <h2>3.4.3 使用 <code>&lt;base&gt;</code> 的注意事项</h2>
                    <p><code>&lt;base&gt;</code> 虽然方便，但使用不当也可能带来麻烦。以下是几个关键的注意事项：</p>

                    <p><strong>1. 每个页面只能有一个 <code>&lt;base&gt;</code></strong></p>
                    <p>一个 HTML 文档中<strong>只能出现一个 <code>&lt;base&gt;</code> 标签</strong>。如果写了多个，浏览器通常只会使用第一个。</p>

                    <p><strong>2. 必须放在 <code>&lt;head&gt;</code> 中，且在使用相对路径的标签之前</strong></p>
                    <p><code>&lt;base&gt;</code> 必须放在 <code>&lt;head&gt;</code> 内部，并且必须放在任何可能使用相对路径的标签（如 <code>&lt;link&gt;</code>、<code>&lt;script&gt;</code>、<code>&lt;img&gt;</code>、<code>&lt;a&gt;</code> 等）<strong>之前</strong>。通常的建议位置是：</p>
                    <pre><code>&lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;
            &lt;title&gt;页面标题&lt;/title&gt;

            &lt;!-- ✅ 在这里放置 <base> --&gt;
            &lt;base href="https://example.com/my-project/"&gt;

            &lt;!-- 之后的所有相对路径都会基于此基准 --&gt;
            &lt;link rel="stylesheet" href="css/style.css"&gt;
            &lt;script src="js/app.js"&gt;&lt;/script&gt;
        &lt;/head&gt;</code></pre>

                    <p><strong>3. 对"页面内锚点"的影响</strong></p>
                    <p><code>&lt;base&gt;</code> 会影响 <code>href</code> 以 <code>#</code> 开头的锚点链接。例如：</p>
                    <pre><code>&lt;base href="https://example.com/"&gt;
        &lt;a href="#section1"&gt;跳转到第一节&lt;/a&gt;</code></pre>
                    <p>浏览器会解析为 <code>https://example.com/#section1</code>，而不是当前页面的 <code>#section1</code>。如果这不是你想要的行为，可以在锚点链接中显式使用当前页面的完整路径或使用 JavaScript 处理。</p>

                    <p><strong>4. 对空 <code>href</code> 或 <code>src</code> 的影响</strong></p>
                    <p>如果 <code>&lt;a&gt;</code> 的 <code>href</code> 为空字符串 <code>""</code>，或者 <code>&lt;img&gt;</code> 的 <code>src</code> 为空，浏览器会使用 <code>&lt;base&gt;</code> 的 <code>href</code> 作为请求地址。这可能导致意外请求到基准 URL。因此，<strong>不要在 <code>&lt;base&gt;</code> 存在的情况下使用空的 <code>href</code> 或 <code>src</code></strong>。</p>

                    <p><strong>5. 与 JavaScript 的交互</strong></p>
                    <p>JavaScript 中通过 <code>document.baseURI</code> 可以获取当前页面中 <code>&lt;base&gt;</code> 设置的基准 URL：</p>
                    <pre><code>console.log(document.baseURI);  // 输出：https://example.com/my-project/</code></pre>
                    <p>如果你使用 AJAX 请求或动态创建元素，注意 <code>baseURI</code> 可能影响相对路径的解析。</p>

                    <h2>3.4.4 <code>&lt;base&gt;</code> 与 <code>&lt;link&gt;</code>、<code>&lt;script&gt;</code> 的路径解析</h2>
                    <p>为了更好地理解 <code>&lt;base&gt;</code> 的作用，下面通过一个完整的示例来说明：</p>
                    <p>假设你的页面 URL 是：<code>https://example.com/blog/2026/06/index.html</code></p>

                    <p><strong>不使用 <code>&lt;base&gt;</code></strong></p>
                    <pre><code>&lt;head&gt;
            &lt;title&gt;我的博客&lt;/title&gt;
            &lt;link rel="stylesheet" href="style.css"&gt;
            &lt;!-- 实际请求：https://example.com/blog/2026/06/style.css --&gt;

        &lt;body&gt;

            &lt;!-- 实际请求：https://example.com/blog/2026/about.html --&gt;
        &lt;/body&gt;</code></pre>

                    <p><strong>使用 <code>&lt;base&gt;</code></strong></p>
                    <pre><code>&lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;title&gt;我的博客&lt;/title&gt;
            &lt;base href="https://example.com/assets/"&gt;
            &lt;link rel="stylesheet" href="style.css"&gt;
            &lt;!-- 实际请求：https://example.com/assets/style.css --&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;img src="images/logo.png"&gt;
            &lt;!-- 实际请求：https://example.com/assets/images/logo.png --&gt;
            &lt;a href="/about.html"&gt;关于&lt;/a&gt;
            &lt;!-- 注意：以 "/" 开头的路径是绝对路径，不受 <base> 影响 --&gt;
            &lt;!-- 实际请求：https://example.com/about.html --&gt;
        &lt;/body&gt;</code></pre>

                        <tr><td><code>preconnect</code></td><td>提前建立到第三方域的连接</td><td><code>&lt;link rel="preconnect" href="https://api.example.com"&gt;</code></td></tr>
                        <tr><td><code>dns-prefetch</code></td><td>提前解析第三方域名的 DNS</td><td><code>&lt;link rel="dns-prefetch" href="https://cdn.example.com"&gt;</code></td></tr>
                        <tr><td><code>prefetch</code></td><td>预取下一个页面可能需要的资源</td><td><code>&lt;link rel="prefetch" href="next-page.html"&gt;</code></td></tr>
                        <tr><td><code>modulepreload</code></td><td>预加载 ES Module</td><td><code>&lt;link rel="modulepreload" href="app.js"&gt;</code></td></tr>
                        <tr><td><code>canonical</code></td><td>指定规范化 URL（防止重复内容）</td><td><code>&lt;link rel="canonical" href="https://example.com/page"&gt;</code></td></tr>
                        <tr><td><code>alternate</code></td><td>指定替代版本（如 RSS 订阅、多语言版本）</td><td><code>&lt;link rel="alternate" type="application/rss+xml" href="feed.xml"&gt;</code></td></tr>
                        <tr><td><code>manifest</code></td><td>关联 Web App Manifest（PWA 技术）</td><td><code>&lt;link rel="manifest" href="manifest.json"&gt;</code></td></tr>
                    </table>

                    <p><strong><code>canonical</code> —— 规范化 URL</strong></p>
                    <p>当同一个页面有多个 URL 可以访问时（如带 <code>?utm_source=...</code> 参数、或 <code>www</code> 与 <code>https</code> 的不同组合），使用 <code>canonical</code> 告诉搜索引擎哪个是"标准"的 URL。</p>
                    <pre><code>&lt;link rel="canonical" href="https://example.com/blog/html-tutorial"&gt;</code></pre>
                    <p>这有助于避免搜索引擎因重复内容而降低排名。</p>

                    <p><strong><code>alternate</code> —— 替代版本</strong></p>
                    <ul>
                        <li><strong>RSS 订阅源</strong>：</li>
                    </ul>
                    <pre><code>&lt;link rel="alternate" type="application/rss+xml" title="RSS 订阅" href="feed.xml"&gt;</code></pre>
                    <ul>
                        <li><strong>多语言版本</strong>：</li>
                    </ul>
                    <pre><code>&lt;link rel="alternate" hreflang="en" href="https://example.com/en/"&gt;
        &lt;link rel="alternate" hreflang="zh-CN" href="https://example.com/zh/"&gt;</code></pre>

                    <h2>3.5.6 <code>&lt;link&gt;</code> 的常用属性一览</h2>
                    <table>
                        <tr><th>属性</th><th>说明</th><th>示例</th></tr>
                        <tr><td><code>rel</code></td><td><strong>必需</strong>。定义当前文档与资源的关系。</td><td><code>rel="stylesheet"</code></td></tr>
                        <tr><td><code>href</code></td><td><strong>必需</strong>。指定资源的 URL 地址。</td><td><code>href="style.css"</code></td></tr>
                        <tr><td><code>type</code></td><td>资源的 MIME 类型（通常可省略，由浏览器自动识别）。</td><td><code>type="text/css"</code></td></tr>
                        <tr><td><code>sizes</code></td><td>指定图标尺寸（用于 <code>rel="icon"</code>）。</td><td><code>sizes="32x32"</code></td></tr>
                        <tr><td><code>title</code></td><td>定义样式表的标题（用于备选样式表）。</td><td><code>title="默认主题"</code></td></tr>
                        <tr><td><code>as</code></td><td>配合 <code>rel="preload"</code>，指定资源类型。</td><td><code>as="image"</code></td></tr>
                        <tr><td><code>crossorigin</code></td><td>配置跨域请求（用于字体、模块等）。</td><td><code>crossorigin="anonymous"</code></td></tr>
                        <tr><td><code>media</code></td><td>指定样式表适用的媒体类型或条件。</td><td><code>media="print"</code> 或 <code>media="(max-width: 768px)"</code></td></tr>
                    </table>

                    <p><strong><code>media</code> 属性示例</strong></p>
                    <p>你可以让某些 CSS 只在特定条件下生效，例如只在打印或移动端加载：</p>
                    <pre><code>&lt;!-- 只在打印时加载的样式 --&gt;
        &lt;link rel="stylesheet" href="print.css" media="print"&gt;

        &lt;!-- 只在移动端加载的样式 --&gt;
        &lt;link rel="stylesheet" href="mobile.css" media="(max-width: 768px)"&gt;</code></pre>

                    <h2>3.5.7 一个完整的 <code>&lt;head&gt;</code> 示例（含 <code>&lt;link&gt;</code>）</h2>
                    <p>综合前面几节的知识，一个配置完善的 <code>&lt;head&gt;</code> 可能包含以下 <code>&lt;link&gt;</code> 标签：</p>
                    <pre><code>&lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;
            &lt;title&gt;我的个人博客&lt;/title&gt;
            &lt;meta name="description" content="分享技术与生活的个人博客"&gt;

            &lt;!-- 网站图标 --&gt;
            &lt;link rel="icon" href="/favicon.ico" sizes="32x32"&gt;
            &lt;link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180"&gt;

            &lt;!-- 预连接到外部资源 --&gt;
            &lt;link rel="preconnect" href="https://fonts.googleapis.com"&gt;
            &lt;link rel="preconnect" href="https://fonts.gstatic.com" crossorigin&gt;

            &lt;!-- 预加载关键图片 --&gt;
            &lt;link rel="preload" href="/images/hero.jpg" as="image"&gt;

            &lt;!-- 外部样式表 --&gt;
            &lt;link rel="stylesheet" href="/css/reset.css"&gt;
            &lt;link rel="stylesheet" href="/css/style.css"&gt;

            &lt;!-- 规范化 URL --&gt;
            &lt;link rel="canonical" href="https://example.com/blog/hello-world"&gt;

            &lt;!-- RSS 订阅源 --&gt;
            &lt;link rel="alternate" type="application/rss+xml" title="RSS订阅" href="/feed.xml"&gt;
        &lt;/head&gt;</code></pre>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们系统学习了 <code>&lt;link&gt;</code> 标签的多种用途：</p>
                    <table>
                        <tr><th>用途</th><th>示例</th></tr>
                        <tr><td><strong>引入 CSS 样式表</strong></td><td><code>&lt;link rel="stylesheet" href="style.css"&gt;</code></td></tr>
                        <tr><td><strong>设置网站图标</strong></td><td><code>&lt;link rel="icon" href="favicon.ico"&gt;</code></td></tr>
                        <tr><td><strong>预加载关键资源</strong></td><td><code>&lt;link rel="preload" href="hero.jpg" as="image"&gt;</code></td></tr>
                        <tr><td><strong>预连接第三方域</strong></td><td><code>&lt;link rel="preconnect" href="https://api.example.com"&gt;</code></td></tr>
                        <tr><td><strong>预解析 DNS</strong></td><td><code>&lt;link rel="dns-prefetch" href="https://cdn.example.com"&gt;</code></td></tr>
                        <tr><td><strong>预取下一页资源</strong></td><td><code>&lt;link rel="prefetch" href="next-page.html"&gt;</code></td></tr>
                        <tr><td><strong>规范化 URL</strong></td><td><code>&lt;link rel="canonical" href="https://example.com/page"&gt;</code></td></tr>
                        <tr><td><strong>RSS 订阅</strong></td><td><code>&lt;link rel="alternate" type="application/rss+xml" href="feed.xml"&gt;</code></td></tr>
                        <tr><td><strong>PWA Manifest</strong></td><td><code>&lt;link rel="manifest" href="manifest.json"&gt;</code></td></tr>
                    </table>
                    <p><strong>核心认知</strong>：<code>&lt;link&gt;</code> 是页面与外部资源之间的"桥梁"。无论是样式、图标，还是性能优化中的预加载与预连接，<code>&lt;link&gt;</code> 都发挥着关键作用。一个成熟的开发者，不仅要会用 <code>&lt;link rel="stylesheet"&gt;</code>，还应理解其他 <code>rel</code> 值在性能优化和用户体验提升中的价值。</p>

                    <p><strong>思考与练习</strong></p>
                    <p><strong>一、选择题</strong></p>

                        <li>以下哪个标签用于避免搜索引擎因重复内容而降低排名？（　）<br>A. <code>&lt;link rel="canonical"&gt;</code> &nbsp;&nbsp; B. <code>&lt;link rel="alternate"&gt;</code><br>C. <code>&lt;link rel="preload"&gt;</code> &nbsp;&nbsp; D. <code>&lt;link rel="manifest"&gt;</code></li>

            content: `
                <h1>3.6 <code>&lt;style&gt;</code> 样式标记</h1>
                <div class="chapter-content">
                    <p>在前几节中，我们学习了如何通过 <code>&lt;link&gt;</code> 标签引入外部 CSS 文件来实现样式与结构的分离。但并不是所有场景都适合使用外部样式表——当样式仅针对单个页面、或需要快速测试样式效果时，<code>&lt;style&gt;</code> 标签提供了更直接的方式。</p>
                    <p><code>&lt;style&gt;</code> 标签允许你在 HTML 文档内部直接编写 CSS 代码。它是 <code>&lt;head&gt;</code> 中与样式相关的另一个重要成员，与 <code>&lt;link&gt;</code> 形成互补关系。</p>

                    <h2>3.6.1 <code>&lt;style&gt;</code> 标签的基本语法</h2>
                    <p><code>&lt;style&gt;</code> 是一个<strong>双标签</strong>，它包裹的 CSS 代码将作用于当前页面。</p>
                    <pre><code>&lt;style&gt;
            /* CSS 代码写在这里 */
            body {
                background-color: #f5f3f0;
                font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            }
            h1 {
                color: #2c3e50;
                font-size: 28px;
            }
        &lt;/style&gt;</code></pre>

                    <p><strong>位置要求</strong></p>
                    <p><code>&lt;style&gt;</code> 必须放在 <code>&lt;head&gt;</code> 内部。虽然在 HTML5 规范中，<code>&lt;style&gt;</code> 也可以放在 <code>&lt;body&gt;</code> 中，但<strong>强烈推荐统一放在 <code>&lt;head&gt;</code> 中</strong>，这样可以确保样式在页面内容渲染之前就被加载和应用，避免页面出现"闪烁"现象（先显示无样式的内容，再突然应用样式）。</p>
                    <pre><code>&lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;title&gt;我的页面&lt;/title&gt;

            &lt;!-- ✅ 推荐位置 --&gt;
            &lt;style&gt;
                /* 样式代码 */
            &lt;/style&gt;
        &lt;/head&gt;</code></pre>

                    <p><strong><code>type</code> 属性（已不再需要）</strong></p>
                    <p>在 HTML4 和 XHTML 时代，<code>&lt;style&gt;</code> 需要指定 <code>type="text/css"</code>：</p>
                    <pre><code>&lt;!-- 旧写法（已废弃） --&gt;
        &lt;style type="text/css"&gt;
            /* CSS 代码 */
        &lt;/style&gt;</code></pre>
                    <p>在 HTML5 中，<code>type</code> 属性不再是必需的，因为浏览器默认将 <code>&lt;style&gt;</code> 中的内容识别为 CSS。直接写 <code>&lt;style&gt;</code> 即可。</p>

                    <h2>3.6.2 为什么使用 <code>&lt;style&gt;</code> 内部样式表</h2>
                    <p><strong>1. 适用场景</strong></p>
                    <table>
                        <tr><th>场景</th><th>说明</th><th>示例</th></tr>
                        <tr><td><strong>单页面独有样式</strong></td><td>某些样式只在一个页面中使用，不值得单独创建一个 CSS 文件。</td><td>某个活动页的特殊装饰样式。</td></tr>
                        <tr><td><strong>快速原型/测试</strong></td><td>在开发过程中快速验证样式效果，无需频繁切换文件。</td><td>调整某个元素的颜色或布局。</td></tr>
                        <tr><td><strong>邮件模板</strong></td><td>HTML 邮件通常不支持外部样式表，只能使用内联样式或 <code>&lt;style&gt;</code>。</td><td>营销邮件、订阅通知。</td></tr>
                        <tr><td><strong>内容管理系统（CMS）</strong></td><td>某些 CMS 主题允许在页面头部添加自定义样式。</td><td>WordPress 的"额外 CSS"功能。</td></tr>
                        <tr><td><strong>样式覆盖</strong></td><td>需要覆盖外部样式表中的某些规则，且不想修改 CSS 文件。</td><td>临时修复某个样式问题。</td></tr>
                    </table>

                    <p><strong>2. 与 <code>&lt;link&gt;</code> 外部样式表的对比</strong></p>
                    <table>
                        <tr><th>对比维度</th><th><code>&lt;style&gt;</code> 内部样式表</th><th><code>&lt;link&gt;</code> 外部样式表</th></tr>
                        <tr><td><strong>复用性</strong></td><td>❌ 仅当前页面有效</td><td>✅ 多个页面可共用</td></tr>
                        <tr><td><strong>可维护性</strong></td><td>❌ 样式散落在各页面中，修改需逐页处理</td><td>✅ 集中管理，修改一处全局生效</td></tr>
                        <tr><td><strong>缓存效率</strong></td><td>❌ 每次加载页面都需重新下载样式代码</td><td>✅ 浏览器可缓存，减少重复加载</td></tr>
                        <tr><td><strong>加载速度</strong></td><td>首次加载可能更快（无需额外 HTTP 请求）</td><td>首次加载需额外请求，但后续访问更快</td></tr>
                        <tr><td><strong>代码整洁度</strong></td><td>HTML 中包含样式代码，职责不够分离</td><td>✅ 结构与样式分离，职责清晰</td></tr>
                        <tr><td><strong>适用场景</strong></td><td>单页面独有样式、快速测试</td><td>多页面共享样式、生产环境项目</td></tr>
                    </table>
                    <div class="tip-box">
                        <p><strong>🎯 推荐做法</strong>：在正式项目中，<strong>优先使用 <code>&lt;link&gt;</code> 引入外部样式表</strong>，将样式集中管理。<code>&lt;style&gt;</code> 仅用于页面独有样式或快速测试场景。</p>
                    </div>

                    <h2>3.6.3 <code>&lt;style&gt;</code> 的常用属性</h2>
                    <p><strong>1. <code>media</code> —— 指定样式适用的媒体类型或条件</strong></p>
                    <p><code>media</code> 属性允许你为不同的设备或场景定义不同的样式，这些样式只在特定条件下才会生效。</p>
                    <pre><code>&lt;!-- 只对屏幕显示生效（默认，通常可省略） --&gt;
        &lt;style media="screen"&gt;
            body { font-size: 16px; }
        &lt;/style&gt;

        &lt;!-- 只在打印时生效 --&gt;
        &lt;style media="print"&gt;
            body { font-size: 12pt; color: black; }

        &lt;/style&gt;

        &lt;!-- 只在屏幕宽度小于 768px 时生效（移动端） --&gt;
        &lt;style media="(max-width: 768px)"&gt;
            body { font-size: 14px; }
            .sidebar { display: none; }
        &lt;/style&gt;</code></pre>
                    <div class="tip-box">
                        <p><strong>💡 与 <code>&lt;link&gt;</code> 的 <code>media</code> 属性类似</strong>：<code>&lt;link rel="stylesheet" href="print.css" media="print"&gt;</code> 和 <code>&lt;style media="print"&gt;</code> 的功能是一样的，区别只在于样式是写在外部文件还是内部。</p>
                    </div>

                    <p><strong>2. <code>scoped</code> —— 限制样式作用域（已废弃）</strong></p>
                    <p>在 HTML5 的早期版本中，<code>scoped</code> 属性曾被提议用于限制 <code>&lt;style&gt;</code> 的样式只作用于父元素及其子元素：</p>
                    <pre><code>&lt;!-- 已废弃的用法 --&gt;

            &lt;style scoped&gt;
                p { color: red; }  /* 只影响这个 div 内的 p */
            &lt;/style&gt;
            &lt;p&gt;这段文字是红色的&lt;/p&gt;
        &lt;/div&gt;
        &lt;p&gt;这段文字不受影响&lt;/p&gt;</code></pre>
                    <p>但由于浏览器支持不佳、实现复杂等原因，<code>scoped</code> 属性已被<strong>废弃</strong>，不建议使用。现代开发中如需限制样式作用域，推荐使用 CSS Modules、Shadow DOM 或 BEM 命名规范等方案。</p>

                    <h2>3.6.4 <code>&lt;style&gt;</code> 与 <code>&lt;link&gt;</code> 的优先级</h2>
                    <p>在同一个页面中，如果同时存在 <code>&lt;style&gt;</code> 和 <code>&lt;link&gt;</code>，它们之间的优先级遵循 CSS 的<strong>层叠规则</strong>：</p>
                    <ol>
                        <li><strong>后加载的样式优先级更高</strong>（当选择器权重相同时）。</li>
                        <li>如果 <code>&lt;link&gt;</code> 引入的外部样式表在 <code>&lt;style&gt;</code> 之前加载，那么 <code>&lt;style&gt;</code> 中的规则会覆盖外部样式表中的同名规则。</li>
                        <li>反之，如果 <code>&lt;style&gt;</code> 在前，<code>&lt;link&gt;</code> 在后，则外部样式表会覆盖内部样式。</li>
                    </ol>
                    <pre><code>&lt;head&gt;
            &lt;link rel="stylesheet" href="style.css"&gt;   &lt;!-- 先加载 --&gt;
            &lt;style&gt;
                /* 后加载，会覆盖 style.css 中相同选择器的样式 */
                h1 { color: red; }
            &lt;/style&gt;
        &lt;/head&gt;</code></pre>
                    <p>在这个例子中，<code>&lt;style&gt;</code> 中的 <code>h1 { color: red; }</code> 会覆盖 <code>style.css</code> 中可能存在的 <code>h1</code> 样式。</p>

                    <p><strong>推荐顺序</strong></p>
                    <p>在 <code>&lt;head&gt;</code> 中，推荐的样式引入顺序是：</p>
                    <ol>
                        <li>外部样式表（<code>&lt;link&gt;</code>）—— 先加载基础样式</li>
                        <li>内部样式表（<code>&lt;style&gt;</code>）—— 后加载页面独有样式，用于覆盖或补充</li>
                    </ol>
                    <p>这样可以让内部样式在需要时覆盖外部样式，同时保证通用样式被缓存复用。</p>

                    <h2>3.6.5 在 <code>&lt;style&gt;</code> 中编写 CSS 的注意事项</h2>
                    <p><strong>1. 语法错误会影响整个样式表</strong></p>
                    <p>如果 <code>&lt;style&gt;</code> 中的某一行 CSS 代码有语法错误（如缺少分号、括号不匹配），浏览器可能<strong>跳过后续所有样式</strong>，导致整个页面的样式失效。因此，务必确保 CSS 语法的正确性。</p>

                    <p><strong>2. 选择器命名冲突</strong></p>
                    <p>内部样式表中的选择器可能会与外部样式表发生冲突。为避免这个问题，建议使用更具针对性的选择器（如添加页面独有的类名前缀），或使用更具体的层级选择器。</p>

                    <p><strong>3. 避免使用 <code>@import</code> 在 <code>&lt;style&gt;</code> 中引入外部 CSS</strong></p>
                    <p>虽然你可以使用 <code>@import</code> 在 <code>&lt;style&gt;</code> 中引入外部 CSS 文件：</p>
                    <pre><code>&lt;style&gt;
            @import url("style.css");
        &lt;/style&gt;</code></pre>
                    <p>但<strong>不推荐这样做</strong>，因为 <code>@import</code> 会阻塞渲染，降低页面加载速度。相比之下，使用 <code>&lt;link&gt;</code> 引入外部 CSS 是更好的选择。</p>

                    <p><strong>4. 保持简洁</strong></p>
                    <p>内部样式表应该只包含当前页面<strong>独有的样式</strong>。通用的、全局的样式（如字体、颜色主题、布局框架）应该放在外部 CSS 文件中，以便复用和缓存。</p>

                    <h2>3.6.6 一个完整的示例</h2>
                    <p>下面是一个综合运用 <code>&lt;style&gt;</code> 和 <code>&lt;link&gt;</code> 的示例：</p>
                    <pre><code>&lt;!DOCTYPE html&gt;
        &lt;html lang="zh-CN"&gt;
        &lt;head&gt;
            &lt;meta charset="utf-8"&gt;
            &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;
            &lt;title&gt;我的个人博客 - 文章详情&lt;/title&gt;

            &lt;!-- 外部全局样式 --&gt;
            &lt;link rel="stylesheet" href="/css/global.css"&gt;
            &lt;link rel="stylesheet" href="/css/blog.css"&gt;

            &lt;!-- 本页面独有样式 --&gt;
            &lt;style&gt;
                /* 这篇文章特有的布局调整 */
                .article-content {
                    max-width: 720px;
                    margin: 0 auto;
                    padding: 20px;
                }

                /* 文章中的代码块特殊样式 */
                .article-content pre {
                    background: #2d2d2d;
                    color: #f8f8f2;
                    padding: 16px;
                    border-radius: 8px;
                    overflow-x: auto;
                }

                /* 仅在打印时隐藏侧边栏 */
                @media print {
                    .sidebar {
                        display: none;
                    }
                    .article-content {
                        max-width: 100%;
                    }
                }
            &lt;/style&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;div class="sidebar"&gt;侧边栏内容&lt;/div&gt;
            &lt;div class="article-content"&gt;
                &lt;h1&gt;HTML 入门教程&lt;/h1&gt;
                &lt;pre&gt;&lt;code&gt;&amp;lt;h1&amp;gt;Hello World&amp;lt;/h1&amp;gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;p&gt;文章正文内容...&lt;/p&gt;
            &lt;/div&gt;
        &lt;/body&gt;
        &lt;/html&gt;</code></pre>

                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了 <code>&lt;style&gt;</code> 样式标记：</p>
                    <table>
                        <tr><th>要点</th><th>说明</th></tr>
                        <tr><td><strong>位置</strong></td><td>通常放在 <code>&lt;head&gt;</code> 中，确保样式在渲染前加载。</td></tr>
                        <tr><td><strong>作用</strong></td><td>在当前页面中直接编写 CSS 样式。</td></tr>
                        <tr><td><strong>适用场景</strong></td><td>单页面独有样式、快速原型测试、HTML 邮件、CMS 自定义样式。</td></tr>

                        <tr><td><strong>常用属性</strong></td><td><code>media</code> 可指定样式适用的设备或条件。</td></tr>
                        <tr><td><strong>已废弃属性</strong></td><td><code>scoped</code> 已被废弃，不建议使用。</td></tr>
                        <tr><td><strong>优先级规则</strong></td><td>后加载的样式覆盖先加载的（权重相同时），<code>&lt;style&gt;</code> 通常放在 <code>&lt;link&gt;</code> 之后。</td></tr>
                    </table>
                    <p><strong>核心认知</strong>：<code>&lt;style&gt;</code> 和 <code>&lt;link&gt;</code> 不是"二选一"的关系，而是互补的。在实际项目中，将通用样式放在外部 CSS 文件中，将页面独有样式放在 <code>&lt;style&gt;</code> 中，是一种常见且高效的做法。</p>

                    </ol>

                <div class="chapter-content">
                    <p>在 <code>&lt;head&gt;</code> 的所有子标签中，<code>&lt;script&gt;</code> 是最特殊的一个——它不仅存放"数据"，更承载着页面的<strong>交互逻辑与动态行为</strong>。如果没有 <code>&lt;script&gt;</code>，网页将永远停留在"静态文档"的层面，无法响应用户的点击、输入、滚动，也无法与服务器进行数据通信。</p>
                    <p>如果说 HTML 是骨架，CSS 是皮肤，那 JavaScript 就是让页面"活起来"的神经系统。而 <code>&lt;script&gt;</code> 标签，正是将 JavaScript 引入 HTML 页面的"入口"。</p>

                    <h2>3.7.1 <code>&lt;script&gt;</code> 标签的基本用法</h2>
                    <p><code>&lt;script&gt;</code> 是一个<strong>双标签</strong>，用于在 HTML 页面中嵌入或引用 JavaScript 代码。</p>

                    <p><strong>1. 嵌入 JavaScript 代码（内部脚本）</strong></p>

            // 当用户点击页面时，弹出一个欢迎消息

                alert('欢迎访问我的网站！');
            });

            // 在控制台输出信息

                    <p><strong>传统做法：放在 <code>&lt;head&gt;</code> 中</strong></p>
                    <p>在早期的 Web 开发中，<code>&lt;script&gt;</code> 通常被放在 <code>&lt;head&gt;</code> 中：</p>

            &lt;script src="js/main.js"&gt;&lt;/script&gt;
        &lt;/head&gt;</code></pre>

            &lt;!-- 页面所有内容 --&gt;
            &lt;h1&gt;欢迎来到我的网站&lt;/h1&gt;
            &lt;p&gt;页面内容...&lt;/p&gt;

            &lt;!-- 脚本放在底部 --&gt;
            &lt;script src="js/main.js"&gt;&lt;/script&gt;
        &lt;/body&gt;</code></pre>
                    <p><strong>优点</strong>：HTML 内容会先被解析和渲染，用户能更快看到页面内容，然后再加载和执行脚本，提升感知性能。</p>

                    <p><strong>使用 <code>defer</code> 和 <code>async</code> 属性</strong></p>
                    <p>除了调整位置，HTML5 还提供了 <code>defer</code> 和 <code>async</code> 属性，让你可以更精细地控制外部脚本的加载和执行时机。</p>

                    <h2>3.7.3 <code>defer</code> 与 <code>async</code> —— 异步加载脚本</h2>
                    <p>这两个属性只对外部脚本（即带有 <code>src</code> 属性的 <code>&lt;script&gt;</code>）有效。</p>
                    <table>
                        <tr><th>属性</th><th>加载时机</th><th>执行时机</th><th>适用场景</th></tr>
                        <tr><td><strong>无属性</strong>（默认）</td><td>立即加载，阻塞 HTML 解析</td><td>加载完成后立即执行</td><td>不推荐，除非脚本很小且必须立即执行</td></tr>
                        <tr><td><strong><code>defer</code></strong></td><td>异步加载（不阻塞 HTML 解析）</td><td>HTML 解析完成后、<code>DOMContentLoaded</code> 事件前按顺序执行</td><td>适用于需要操作 DOM、且不依赖页面加载完成的脚本（如应用主逻辑）</td></tr>
                        <tr><td><strong><code>async</code></strong></td><td>异步加载（不阻塞 HTML 解析）</td><td>加载完成后立即执行（不保证顺序）</td><td>适用于独立、不依赖其他脚本的模块（如统计代码、广告脚本）</td></tr>

                    <p><strong>1. <code>defer</code> —— 延迟执行</strong></p>

                    <p><strong>2. <code>async</code> —— 异步执行</strong></p>
                    <pre><code>&lt;script src="js/ads.js" async&gt;&lt;/script&gt;
