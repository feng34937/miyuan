<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《HTML由入门到精通》阅读器</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f3f0;
            color: #333;
            overflow: hidden;
            height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        body.night-mode {
            background: #1a1a1a;
            color: #ccc;
        }
        body.night-mode .reader-header {
            background: rgba(30, 30, 30, 0.65);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        body.night-mode .reader-header h1 {
            color: #e0e0e0;
        }
        body.night-mode .reader-footer {
            background: rgba(30, 30, 30, 0.65);
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        body.night-mode .reader-footer button {
            color: #ccc;
        }
        body.night-mode .reader-footer button:hover {
            background: rgba(255,255,255,0.08);
        }
        body.night-mode .progress-bar {
            background: rgba(255,255,255,0.15);
        }
        body.night-mode .progress-fill {
            background: #6a8caf;
        }
        body.night-mode .content-area {
            background: #1a1a1a;
        }
        body.night-mode .chapter-title {
            color: #e8e8e8;
        }
        body.night-mode .chapter-content {
            color: #c8c8c8;
        }
        body.night-mode .chapter-content h1,
        body.night-mode .chapter-content h2,
        body.night-mode .chapter-content h3 {
            color: #e0e0e0;
        }
        body.night-mode .chapter-content code {
            background: #2d2d2d;
            color: #e6c07b;
        }
        body.night-mode .chapter-content pre {
            background: #2d2d2d;
            border-left-color: #6a8caf;
        }
        body.night-mode .chapter-content table {
            border-color: #444;
        }
        body.night-mode .chapter-content th,
        body.night-mode .chapter-content td {
            border-color: #444;
        }
        body.night-mode .chapter-content blockquote {
            border-left-color: #6a8caf;
            background: #2a2a2a;
        }
        body.night-mode .chapter-content .tip-box {
            background: #2a3a3a;
            border-left-color: #6a8caf;
        }
        body.night-mode .chapter-content .tip-box strong {
            color: #8ab4d6;
        }
        body.night-mode .drawer-overlay {
            background: rgba(0,0,0,0.6);
        }

        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 0 !important;
        }
        .drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .drawer {
            position: fixed;
            top: 0;
            left: -340px;
            width: 320px;
            height: 100%;
            z-index: 1001;
            transition: left 0.4s cubic-bezier(0.32,0.72,0,1);
            overflow-y: auto;
            padding: 24px 0 40px 0;
            background: rgba(255,255,255,0.58);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-right: 1px solid rgba(255,255,255,0.35);
            box-shadow: 0 0 40px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
            border-radius: 0 !important;
        }
        body.night-mode .drawer {
            background: rgba(30,30,30,0.70);
            backdrop-filter: blur(40px) saturate(160%);
            -webkit-backdrop-filter: blur(40px) saturate(160%);
            border-right: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 0 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .drawer.open {
            left: 0;
        }
        .drawer::-webkit-scrollbar { width: 3px; }
        .drawer::-webkit-scrollbar-track { background: transparent; }
        .drawer::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        body.night-mode .drawer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

        .drawer-title {
            font-size: 20px;
            font-weight: 600;
            padding: 0 20px 18px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1a1a1a;
            letter-spacing: 0.5px;
        }
        body.night-mode .drawer-title {
            color: #e0e0e0;
            border-bottom-color: rgba(255,255,255,0.06);
        }
        .drawer-title i {
            margin-right: 10px;
            color: #3b7cb8;
            font-size: 22px;
        }
        body.night-mode .drawer-title i {
            color: #6a8caf;
        }
        .drawer-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: rgba(0,0,0,0.4);
            padding: 0 8px;
            transition: color 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .drawer-close:hover {
            background: rgba(0,0,0,0.06);
            color: rgba(0,0,0,0.7);
        }
        body.night-mode .drawer-close {
            color: rgba(255,255,255,0.4);
        }
        body.night-mode .drawer-close:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
        }

        /* 两级目录样式 */
        .toc-list {
            list-style: none;
            padding: 8px 12px 20px 12px;
            margin: 0;
        }
        .toc-group {
            margin-bottom: 2px;
            border-radius: 12px;
            overflow: hidden;
            transition: background 0.2s;
        }
        .toc-group:hover {
            background: rgba(0,0,0,0.02);
        }
        body.night-mode .toc-group:hover {
            background: rgba(255,255,255,0.02);
        }
        .toc-group-header {
            display: flex;
            align-items: center;
            padding: 10px 16px 10px 20px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            font-weight: 500;
            color: rgba(0,0,0,0.8);
            user-select: none;
        }
        body.night-mode .toc-group-header {
            color: rgba(255,255,255,0.8);
        }
        .toc-group-header:hover {
            background: rgba(0,0,0,0.04);
        }
        body.night-mode .toc-group-header:hover {
            background: rgba(255,255,255,0.04);
        }
        .toc-group-header .group-icon {
            margin-right: 12px;
            font-size: 16px;
            color: #3b7cb8;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }
        body.night-mode .toc-group-header .group-icon {
            color: #6a8caf;
        }
        .toc-group-header .group-label {
            flex: 1;
            font-size: 15px;
        }
        .toc-group-header .group-toggle {
            font-size: 14px;
            color: rgba(0,0,0,0.3);
            padding: 0 4px;
            transition: transform 0.3s;
            flex-shrink: 0;
            margin-left: 8px;
        }
        body.night-mode .toc-group-header .group-toggle {
            color: rgba(255,255,255,0.25);
        }
        .toc-group.collapsed .group-toggle {
            transform: rotate(180deg);
        }
        .toc-sub-list {
            list-style: none;
            padding: 0 0 6px 0;
            margin: 0;
            overflow: hidden;
            max-height: 2000px;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            opacity: 1;
        }
        .toc-group.collapsed .toc-sub-list {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .toc-sub-item {
            padding: 8px 16px 8px 52px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: rgba(0,0,0,0.65);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            position: relative;
        }
        body.night-mode .toc-sub-item {
            color: rgba(255,255,255,0.6);
        }
        .toc-sub-item:hover {
            background: rgba(0,0,0,0.04);
            color: rgba(0,0,0,0.85);
        }
        body.night-mode .toc-sub-item:hover {
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.8);
        }
        .toc-sub-item .sub-num {
            display: inline-block;
            width: 28px;
            font-size: 12px;
            color: rgba(0,0,0,0.3);
            margin-right: 8px;
            flex-shrink: 0;
            text-align: right;
        }
        body.night-mode .toc-sub-item .sub-num {
            color: rgba(255,255,255,0.2);
        }
        .toc-sub-item .sub-title {
            flex: 1;
            line-height: 1.3;
        }
        .toc-sub-item .status-tag {
            margin-left: 8px;
            font-size: 11px;
            color: rgba(0,0,0,0.25);
            background: rgba(0,0,0,0.06);
            padding: 1px 10px;
            border-radius: 12px;
            flex-shrink: 0;
        }
        body.night-mode .toc-sub-item .status-tag {
            color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
        }
        .toc-sub-item.active {
            background: rgba(59,124,184,0.12);
            color: #1a1a1a;
            font-weight: 500;
        }
        body.night-mode .toc-sub-item.active {
            background: rgba(106,140,175,0.15);
            color: #e8e8e8;
        }
        .toc-sub-item.active .sub-num {
            color: #3b7cb8;
        }
        body.night-mode .toc-sub-item.active .sub-num {
            color: #8ab4d6;
        }
        .toc-group.no-children .toc-group-header {
            padding-right: 20px;
        }
        .toc-group.no-children .group-toggle {
            display: none;
        }
        .toc-group.no-children .toc-sub-list {
            display: none;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 820px;
            margin: 0 auto;
            position: relative;
            background: #f5f3f0;
            transition: background 0.3s;
            border-radius: 0 !important;
        }
        body.night-mode .app-container {
            background: #1a1a1a;
        }

        .reader-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
            height: 60px;
            border-radius: 0 !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
        }
        body.night-mode .reader-header {
            background: rgba(30,30,30,0.55);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .reader-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            color: rgba(0,0,0,0.5);
            transition: color 0.2s, background 0.2s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover {
            background: rgba(0,0,0,0.05);
            color: rgba(0,0,0,0.8);
        }
        body.night-mode .menu-btn {
            color: rgba(255,255,255,0.4);
        }
        body.night-mode .menu-btn:hover {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
        }
        .reader-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            transition: color 0.3s;
            letter-spacing: 0.5px;
        }
        body.night-mode .reader-header h1 {
            color: #e0e0e0;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-right button {
            background: none;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 18px;
            cursor: pointer;
            color: rgba(0,0,0,0.5);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-right button:hover {
            background: rgba(0,0,0,0.05);
            color: rgba(0,0,0,0.8);
        }
        body.night-mode .header-right button {
            color: rgba(255,255,255,0.4);
        }
        body.night-mode .header-right button:hover {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
        }
        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(0,0,0,0.04);
            border-radius: 20px;
            padding: 2px 4px;
        }
        body.night-mode .font-size-controls {
            background: rgba(255,255,255,0.04);
        }
        .font-size-controls button {
            width: 32px;
            height: 32px;
            font-size: 14px;
            border-radius: 50%;
            color: rgba(0,0,0,0.5);
        }
        body.night-mode .font-size-controls button {
            color: rgba(255,255,255,0.4);
        }
        .font-size-controls .size-display {
            font-size: 13px;
            color: rgba(0,0,0,0.4);
            min-width: 32px;
            text-align: center;
            font-weight: 500;
        }
        body.night-mode .font-size-controls .size-display {
            color: rgba(255,255,255,0.3);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 30px 40px 30px;
            background: #fcfaf8;
            transition: background 0.3s, padding 0.3s;
            scroll-behavior: smooth;
            line-height: 1.8;
            border-radius: 0 !important;
        }
        body.night-mode .content-area {
            background: #1e1e1e;
        }
        .chapter-container {
            max-width: 700px;
            margin: 0 auto;
        }
        .chapter-content {
            font-size: 16px;
            color: #333;
            transition: color 0.3s, font-size 0.2s;
        }
        .chapter-content p {
            margin-bottom: 1.2em;
        }
        .chapter-content h1, .chapter-content h2, .chapter-content h3 {
            margin-top: 1.6em;
            margin-bottom: 0.6em;
            font-weight: 600;
        }
        .chapter-content h1 { font-size: 1.8em; }
        .chapter-content h2 { font-size: 1.4em; }
        .chapter-content h3 { font-size: 1.2em; }
        .chapter-content ul, .chapter-content ol {
            margin: 0.8em 0 1em 1.8em;
        }
        .chapter-content li {
            margin-bottom: 0.3em;
        }
        .chapter-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            font-size: 0.95em;
        }
        .chapter-content th, .chapter-content td {
            border: 1px solid #d0d0d0;
            padding: 8px 12px;
            text-align: left;
        }
        .chapter-content th {
            background: #f0f0f0;
            font-weight: 600;
        }
        body.night-mode .chapter-content th {
            background: #2a2a2a;
        }
        .chapter-content code {
            font-family: "SF Mono","Menlo","Consolas",monospace;
            background: #f0f0f0;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            color: #c7254e;
        }
        body.night-mode .chapter-content code {
            background: #2d2d2d;
            color: #e6c07b;
        }
        .chapter-content pre {
            background: #f6f6f6;
            padding: 16px 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 0.9em;
            line-height: 1.6;
            border-left: 4px solid #3b7cb8;
            margin: 1em 0;
        }
        body.night-mode .chapter-content pre {
            background: #2d2d2d;
            border-left-color: #6a8caf;
        }
        .chapter-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .chapter-content blockquote {
            border-left: 4px solid #3b7cb8;
            padding: 0.8em 1.2em;
            background: #f9f9f9;
            margin: 1em 0;
            border-radius: 0 8px 8px 0;
        }
        body.night-mode .chapter-content blockquote {
            background: #2a2a2a;
            border-left-color: #6a8caf;
        }
        .chapter-content .tip-box {
            background: #f0f7ff;
            border-left: 4px solid #3b7cb8;
            padding: 0.8em 1.2em;
            margin: 1em 0;
            border-radius: 0 8px 8px 0;
        }
        body.night-mode .chapter-content .tip-box {
            background: #2a3a4a;
        }
        .chapter-content .tip-box strong {
            color: #1a5c9a;
        }
        .chapter-content hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 2em 0;
        }
        .chapter-content .placeholder-box {
            background: rgba(0,0,0,0.02);
            border: 2px dashed rgba(0,0,0,0.1);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            color: rgba(0,0,0,0.3);
            font-size: 1.2em;
            margin: 2em 0;
            backdrop-filter: blur(4px);
        }
        body.night-mode .chapter-content .placeholder-box {
            background: rgba(255,255,255,0.02);
            border-color: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.2);
        }
        .chapter-content .placeholder-box i {
            font-size: 3em;
            margin-bottom: 16px;
            display: block;
            color: rgba(0,0,0,0.12);
        }
        body.night-mode .chapter-content .placeholder-box i {
            color: rgba(255,255,255,0.08);
        }

        .reader-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-top: 1px solid rgba(0,0,0,0.04);
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
            height: 56px;
            border-radius: 0 !important;
            box-shadow: inset 0 -1px 0 rgba(255,255,255,0.5);
        }
        body.night-mode .reader-footer {
            background: rgba(30,30,30,0.55);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-top: 1px solid rgba(255,255,255,0.04);
            box-shadow: inset 0 -1px 0 rgba(255,255,255,0.04);
        }
        .reader-footer .progress-info {
            font-size: 13px;
            color: rgba(0,0,0,0.35);
            min-width: 60px;
            font-weight: 500;
        }
        body.night-mode .reader-footer .progress-info {
            color: rgba(255,255,255,0.25);
        }
        .progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(0,0,0,0.08);
            border-radius: 4px;
            margin: 0 16px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
        }
        .progress-bar:hover {
            height: 5px;
        }
        body.night-mode .progress-bar {
            background: rgba(255,255,255,0.08);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #3b7cb8;
            border-radius: 4px;
            transition: width 0.1s;
        }
        .footer-controls {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .footer-controls button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-controls button:hover:not(:disabled) {
            background: rgba(0,0,0,0.05);
            color: rgba(0,0,0,0.7);
        }
        .footer-controls button:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        body.night-mode .footer-controls button {
            color: rgba(255,255,255,0.3);
        }
        body.night-mode .footer-controls button:hover:not(:disabled) {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
        }

        @media (max-width: 640px) {
            .reader-header h1 { font-size: 16px; }
            .content-area { padding: 16px 16px 30px 16px; }
            .drawer { width: 290px; left: -310px; padding: 20px 0 30px 0; }
            .drawer.open { left: 0; }
            .reader-footer .progress-info { font-size: 12px; min-width: 50px; }
            .header-right .theme-toggle { font-size: 16px; }
            .menu-btn { font-size: 20px; width: 36px; height: 36px; }
            .font-size-controls button { width: 28px; height: 28px; font-size: 12px; }
            .font-size-controls .size-display { min-width: 26px; font-size: 12px; }
            .toc-sub-item { padding-left: 36px; }

                <h1>1.3 什么是HTML</h1>
                <div class="chapter-content">
                    <p>通过前两节的学习，我们已经知道HTML是Web前端的三大核心技术之一，负责网页的结构和内容。但HTML究竟是一门什么样的"语言"？它从哪里来，又将向何处去？本节我们将追本溯源，系统地回答这些问题。</p>
                    <h2>1.3.1 HTML的基本概念</h2>
                    <p><strong>HTML</strong> 是 <strong>HyperText Markup Language</strong> 的缩写，中文译为 <strong>"超文本标记语言"</strong> 。我们从它的名字入手，逐一拆解其含义：</p>
                    <ul>
                        <li><strong>标记（Markup）</strong>：HTML通过一系列预先定义好的 <strong>"标签"（Tag）</strong> 来"标记"文本内容，告诉浏览器这段文字是标题、那段文字是段落、某处需要插入一张图片。这些标签本身不会在页面上显示，它们就像剧本中的"舞台提示"——指导浏览器如何将内容呈现给观众。</li>
                        <li><strong>超文本（HyperText）</strong>：普通的文本（如TXT文档）是线性的、只读的。而"超文本"超越了普通文本的限制——它可以通过 <strong>超链接（Hyperlink）</strong> 将不同的页面、不同的网站、甚至不同的媒体（图片、视频、音频）连接在一起，形成一个纵横交错的、非线性的信息网络。这正是万维网（WWW）的精髓所在。</li>
                    </ul>
                    <p>因此，HTML的本质是一种 <strong>描述性标记语言</strong>，而非编程语言。它没有复杂的逻辑运算和流程控制，它的核心任务就是：<strong>用标签告诉浏览器"内容是什么"以及"内容如何结构化"</strong>。</p>
                    <p><strong>HTML的基本语法结构</strong></p>
                    <p>一个HTML元素（Element）通常由三部分组成：</p>
                    <ol>
                        <li><strong>开始标签（Start Tag）</strong>：如 <code>&lt;p&gt;</code></li>
                        <li><strong>内容（Content）</strong>：如 "这是一段文字"</li>
                        <li><strong>结束标签（End Tag）</strong>：如 <code>&lt;/p&gt;</code></li>
                    </ol>
                    <p>完整写法为：<code>&lt;p&gt;这是一段文字&lt;/p&gt;</code></p>
                    <p>此外，标签上还可以添加 <strong>属性（Attribute）</strong> ，用来为元素提供额外的信息。属性写在开始标签中，采用 <code>属性名="属性值"</code> 的格式：</p>
                    <p><strong>示例1-4：带属性的HTML元素</strong></p>
                    <pre><code>&lt;!-- 不带属性 --&gt;
        &lt;a&gt;点击这里&lt;/a&gt;

        &lt;!-- 带 href 属性，指定链接的目标地址 --&gt;
        &lt;a href="https://www.example.com"&gt;点击这里访问示例网站&lt;/a&gt;

        &lt;!-- 带多个属性 --&gt;
        &lt;a href="https://www.example.com" target="_blank" title="前往示例网站"&gt;
            点击这里访问示例网站
        &lt;/a&gt;</code></pre>
                    <p>在上面的例子中，<code>href</code>（链接地址）、<code>target</code>（打开方式）、<code>title</code>（提示文本）都是 <code>&lt;a&gt;</code> 标签的属性，它们让这个超链接具备了完整的跳转功能。</p>
                    <div class="tip-box">
                        <p><strong>💡 常识补充</strong>：HTML标签是<strong>不区分大小写</strong>的，<code>&lt;P&gt;</code> 和 <code>&lt;p&gt;</code> 在浏览器中效果相同。但按照业界规范，<strong>所有标签和属性名一律使用小写字母</strong>，这是一种良好的编码习惯，也是W3C的官方推荐。</p>
                    </div>
                    <h2>1.3.2 HTML的发展历史</h2>
                    <p>了解HTML的发展历程，有助于我们理解这门语言的设计哲学和演进方向。HTML从诞生至今，主要经历了以下几个重要的版本阶段：</p>
                    <table>
                        <tr><th>版本/时间</th><th>重要里程碑</th><th>主要特点</th></tr>
                        <tr><td><strong>HTML 1.0</strong>（1991年）</td><td>蒂姆·伯纳斯-李定义了最早的HTML标签。</td><td>仅包含约20个标签（标题、段落、超链接等），纯文本排版，无表格、无图像、无样式。这是万维网的"史前时代"。</td></tr>
                        <tr><td><strong>HTML 2.0</strong>（1995年）</td><td>IETF（互联网工程任务组）发布正式标准。</td><td>加入了表单（Form）和表格（Table）的支持，让网页具备了初步的交互和数据提交能力。网页开始"活"起来。</td></tr>
                        <tr><td><strong>HTML 3.2</strong>（1997年）</td><td>W3C（万维网联盟）接管HTML标准化工作。</td><td>引入了更多样式属性（如字体、颜色）、<code>&lt;applet&gt;</code> 支持Java小程序，并开始支持简单的CSS。但此时网页布局严重依赖表格嵌套，非常混乱。</td></tr>
                        <tr><td><strong>HTML 4.01</strong>（1999年）</td><td>经典的成熟版本，长期统治Web世界。</td><td>彻底将样式剥离到CSS中，强调"结构与样式分离"。增加了 <code>&lt;div&gt;</code>、<code>&lt;span&gt;</code> 等通用容器，以及更强大的表单功能。这个版本是21世纪前十年Web开发的基石。</td></tr>
                        <tr><td><strong>XHTML 1.0</strong>（2000年）</td><td>结合XML的严格语法规则。</td><td>要求标签必须闭合、属性必须加引号、标签名必须小写（语法极严）。虽然提高了代码规范性，但因为太过严厉，在执行中导致大量兼容性问题，最终未能成为主流。</td></tr>
                        <tr><td><strong>HTML5</strong>（2014年正式推荐标准）</td><td><strong>Web开发的"分水岭"</strong>。</td><td>革命性的版本。不再基于SGML（标准通用标记语言），拥有独立的语法规范。新增了大量语义标签、多媒体支持（音视频）、图形绘制（Canvas）、本地存储、离线应用等。<strong>彻底终结了Flash、Silverlight等第三方插件的时代</strong>。</td></tr>
                    </table>
                    <p><strong>一个关键的时间点</strong>：2004年至2009年间，WHATWG（网页超文本应用技术工作小组）与W3C在HTML发展方向上产生分歧——W3C主张走向严格的XHTML 2.0（但过于理想化，脱离实际），而WHATWG主张在现有HTML 4.01基础上渐进增强、向后兼容。最终，WHATWG的路线取得了胜利，其成果便是今天的 <strong>HTML5</strong>。这充分说明：<strong>一项技术能否被广泛接纳，不在于它是否"纯粹"或"理论完美"，而在于它是否解决了开发者的真实痛点、是否兼容了已有的大量网页。</strong></p>
                    <h2>1.3.3 HTML5的新特性与优势</h2>
                    <p>HTML5并不是在HTML 4.01基础上的"小修小补"，而是一次 <strong>颠覆性的升级</strong>。如果说HTML 4.01时代网页是"静态文档"，那么HTML5时代的网页则是"富应用平台"。</p>
                    <p>HTML5的核心设计理念是 <strong>"一切从简，兼容为王"</strong> ——减少对外部插件（如Flash）的依赖，让浏览器原生能力更强大，同时确保所有新特性在不支持的旧浏览器上能"优雅降级"（即不报错，只是功能缺失）。</p>
                    <p>以下是HTML5带来的几项最核心的新特性与优势：</p>
                    <p><strong>1. 新增了大量语义化标签——让网页"有血有肉有骨架"</strong></p>
                    <p>在HTML 4时代，开发者几乎用 <code>&lt;div&gt;</code> 和 <code>&lt;span&gt;</code> 来搭建一切页面结构（俗称"DIV+CSS"布局）。这导致搜索引擎爬虫很难理解页面区块的含义（全是 <code>&lt;div&gt;</code>，谁知道哪里是导航栏、哪里是页脚？）。</p>
                    <p>HTML5新增了专门的语义标签来明确页面结构：</p>
                    <table>
                        <tr><th>HTML4写法（无语义）</th><th>HTML5写法（有语义）</th><th>表达含义</th></tr>
                        <tr><td><code>&lt;div id="header"&gt;</code></td><td><code>&lt;header&gt;</code></td><td>页面头部</td></tr>
                        <tr><td><code>&lt;div id="nav"&gt;</code></td><td><code>&lt;nav&gt;</code></td><td>导航区域</td></tr>
                        <tr><td><code>&lt;div id="main"&gt;</code></td><td><code>&lt;main&gt;</code></td><td>页面主体内容</td></tr>
                        <tr><td><code>&lt;div id="article"&gt;</code></td><td><code>&lt;article&gt;</code></td><td>独立文章/内容块</td></tr>
                        <tr><td><code>&lt;div id="sidebar"&gt;</code></td><td><code>&lt;aside&gt;</code></td><td>侧边栏/附属信息</td></tr>
                        <tr><td><code>&lt;div id="footer"&gt;</code></td><td><code>&lt;footer&gt;</code></td><td>页面底部</td></tr>
                    </table>
                    <p>语义化不仅提升了代码的可读性，更重要的是 <strong>极大地改善了SEO（搜索引擎优化）</strong>，让搜索引擎能够更准确地抓取网页的核心内容，同时也有利于屏幕阅读器等辅助设备为视障人士提供服务。</p>
                    <p><strong>2. 原生多媒体支持——让Flash"退休"</strong></p>
                    <p>在HTML5之前，在网页中嵌入视频和音频是一件极其痛苦的事情——你必须依赖第三方插件（如Adobe Flash、Windows Media Player）。这不仅存在巨大的安全漏洞风险，而且在移动端（iPhone/iPad）根本无法运行。</p>
                    <p>HTML5提供了 <code>&lt;video&gt;</code> 和 <code>&lt;audio&gt;</code> 标签，让浏览器原生支持多媒体播放：</p>
                    <pre><code>&lt;video src="movie.mp4" controls width="600"&gt;
        您的浏览器不支持视频播放，请升级浏览器。
        &lt;/video&gt;

        &lt;audio src="music.mp3" controls&gt;
        您的浏览器不支持音频播放。
        &lt;/audio&gt;</code></pre>
                    <p><code>controls</code> 属性让浏览器自动显示播放/暂停、进度条、音量等控件，用户体验统一且流畅。</p>
                    <p><strong>3. Canvas与SVG——强大的绘图能力</strong></p>
                    <p>HTML5的 <code>&lt;canvas&gt;</code> 标签提供了一个"画布"，开发者可以通过JavaScript在画布上动态绘制图形、图表、动画，甚至开发完整的网页游戏（如经典的《2048》或《植物大战僵尸》的HTML5版本）。</p>
                    <p>同时，SVG（可缩放矢量图形）也在HTML5中得到了原生支持，适合绘制图标、LOGO等需要高清缩放（如高清屏适配）的矢量图形。</p>
                    <p>（这两项技术我们将在本书第三篇的<strong>第14章</strong>和<strong>第15章</strong>中深入讲解。）</p>
                    <p><strong>4. 客户端数据存储——不再只依赖Cookie</strong></p>
                    <p>以往的Web存储只能依赖 <code>Cookie</code>，但Cookie有大小限制（仅4KB左右）且每次HTTP请求都会携带，严重影响网络传输效率。</p>
                    <p>HTML5提供了全新的存储方案：</p>
                    <ul>
                        <li><strong>localStorage</strong>：无过期时间的持久存储，容量约5~10MB，适合存储用户偏好设置、浏览记录等。</li>
                        <li><strong>sessionStorage</strong>：会话级存储，关闭浏览器标签页即清除。</li>
                        <li><strong>IndexedDB</strong>：一个完整的事务型数据库系统，适合在客户端存储大量结构化数据（如离线版邮件客户端、笔记应用等）。</li>
                    </ul>
                    <p>这让 <strong>"离线Web应用"（PWA）</strong> 成为可能——即用户即使在网络断开的情况下，依然可以打开网页并查看之前缓存的全部内容。</p>
                    <p><strong>5. 强大的表单控件与验证</strong></p>
                    <p>HTML5对表单进行了大刀阔斧的增强，新增了多种输入类型和属性：</p>
                    <ul>
                        <li>新的输入类型：<code>type="email"</code>（邮箱）、<code>type="url"</code>（网址）、<code>type="date"</code>（日期）、<code>type="color"</code>（颜色选择器）、<code>type="range"</code>（滑块）等，让移动端键盘自动弹出对应虚拟键盘（如输入邮箱时弹出"@"键）。</li>
                        <li>新的验证属性：<code>required</code>（必填）、<code>pattern</code>（正则匹配）、<code>min</code>/<code>max</code>（数值范围），大幅减少了前端表单验证对JavaScript的依赖。</li>
                    </ul>
                    <p><strong>6. 地理定位（Geolocation）与设备能力</strong></p>
                    <p>HTML5允许网页通过 <code>Geolocation API</code> 获取用户的地理位置（经度/纬度），这在LBS（基于位置的服务）应用中极其重要，如外卖配送跟踪、附近门店查找、运动轨迹记录等。此外，HTML5还可以访问设备的摄像头、麦克风（通过 <code>getUserMedia</code> API），为Web视频会议、在线直播等应用提供了底层支撑。</p>
                    <p><strong>7. 通信能力的飞跃</strong></p>
                    <ul>
                        <li><strong>WebSocket</strong>：实现了浏览器与服务器之间的全双工实时通信，是开发在线聊天室、股票行情推送、多人在线游戏等"实时Web应用"的核心技术。</li>
                        <li><strong>Server-Sent Events (SSE)</strong>：允许服务器主动向浏览器推送数据（如新闻推送、赛事比分），比传统的"轮询"方式更高效。</li>
                    </ul>
                    <p><strong>发展启示录</strong></p>
                    <p>回顾HTML的演进史，我们不难发现一条清晰的规律：<strong>HTML发展的核心驱动力，始终是"让Web变得更强大、更易用、更开放"</strong> 。从纯文本到图文并茂，从静态展示到动态交互，从依赖插件到原生支持，每一步都在降低开发门槛、提升用户体验、拓宽Web的应用边界。</p>
                    <p>正如万维网发明者蒂姆·伯纳斯-李爵士所期望的那样——<strong>"Web是为所有人服务的。"</strong> HTML5正是这一理念的完美践行者，它让Web不再只是"可阅读的文档"，而是"可交互的操作系统级平台"。</p>
                    <p><strong>知识小结</strong></p>
                    <p>本节我们系统地学习了HTML的基本概念和发展历史：</p>
                    <ol>
                        <li><strong>HTML</strong> 是"超文本标记语言"，通过 <strong>标签（Tag）</strong> 和 <strong>属性（Attribute）</strong> 来描述网页的结构和内容。它是描述性语言，而非编程语言。</li>
                        <li>HTML的发展经历了 <strong>1.0→2.0→3.2→4.01→XHTML→HTML5</strong> 的演进历程。HTML5是迄今为止最成功、应用最广泛的版本。</li>
                        <li><strong>HTML5的核心优势</strong>包括：语义化标签、原生多媒体（音视频）、Canvas/SVG绘图、客户端存储（localStorage等）、强大的表单控件、地理位置定位以及WebSocket等高级通信能力。</li>
                        <li>HTML5的设计哲学是 <strong>"兼容优先，渐进增强"</strong>，旨在构建一个不依赖第三方插件的、开放、强大的Web应用平台。</li>
                    </ol>

                        <tr><td><strong>旧版Edge（EdgeHTML内核）</strong></td><td>支持大部分特性</td><td>不如基于Chromium的新版Edge完善。</td></tr>
                    </table>
                    <p>好消息是，微软早已停止对IE系列的主流支持，全球范围内使用IE的用户比例已极低。但在某些<strong>企业内网、政府网站、教育系统</strong>等特定场景中，旧版IE可能仍在服役——如果你的项目面向这类用户，就需要认真对待兼容性问题。</p>
                    <p><strong>3. 移动端浏览器——支持良好</strong></p>
                    <p>移动端的情况比想象中更乐观：<strong>iOS Safari、Android Chrome以及大多数基于Chromium或WebKit的移动浏览器，对HTML5的支持都非常好</strong>。这主要得益于：</p>
                    <ul>
                        <li>移动端浏览器的更新周期通常较短，新版本的普及速度较快。</li>
                        <li>苹果和谷歌都积极推动HTML5在移动端的落地，以替代对Flash等插件的依赖。</li>
                    </ul>
                    <h2>1.4.3 如何查询具体特性的浏览器支持情况</h2>
                    <p>在实际开发中，你经常会遇到这样的问题："我想用 <code>&lt;datalist&gt;</code> 做输入建议，Safari支持吗？""<code>localStorage</code> 在IE11上能用吗？"——这时就需要借助专业的查询工具。</p>
                    <p><strong>工具一：Can I use（最常用）</strong></p>
                    <p><strong>Can I use</strong>（https://caniuse.com）是前端开发领域<strong>最权威的浏览器兼容性查询网站</strong>。它提供了实时更新的浏览器支持数据，覆盖HTML、CSS、JavaScript、Web API等几乎所有前端技术。</p>
                    <p><strong>使用方法</strong>：在搜索框中输入你想查询的特性名称（如 <code>video</code>、<code>localStorage</code>、<code>flexbox</code>、<code>datalist</code> 等），页面会以表格形式展示该特性在各浏览器及各版本中的支持状态——绿色代表支持，红色代表不支持，黄色代表部分支持。</p>
                    <div class="tip-box">
                        <p><strong>💡 给初学者的建议</strong>：把 <strong>Can I use</strong> 加入你的浏览器书签。在未来的开发中，每当你想使用一个不太确定兼容性的HTML5特性时，先上去查一查——这会帮你避免无数"为什么我的页面在某某浏览器上显示不正常"的困惑。</p>
                    </div>
                    <p><strong>工具二：MDN Web Docs</strong></p>
                    <p><strong>MDN Web Docs</strong>（https://developer.mozilla.org）是Mozilla维护的Web技术权威文档库。在每一个HTML标签、属性或API的页面底部，都有一张<strong>"浏览器兼容性"表格</strong>，清晰列出了该特性在各主流浏览器中的支持版本。MDN的数据与Can I use相互补充，同样值得信赖。</p>
                    <p><strong>工具三：手动代码检测</strong></p>
                    <pre><code>// 检测 localStorage 是否可用
        if (typeof localStorage !== 'undefined') {
            localStorage.setItem('key', 'value');
        } else {
            console.log('当前浏览器不支持 localStorage');
        }
        // 检测地理定位 API 是否可用
        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                console.log('纬度：' + pos.coords.latitude);
            });
        } else {
            alert('您的浏览器不支持地理定位功能');
        }</code></pre>
                    <p>这种"<strong>特性检测（Feature Detection）</strong>"是前端开发中处理兼容性的<strong>黄金法则</strong>——不要猜测用户用什么浏览器，而是直接检测"这个功能在用户的浏览器中是否可用"。</p>
                    <h2>1.4.4 处理兼容性问题的常用策略</h2>
                    <p><strong>策略一：渐进增强（Progressive Enhancement）</strong></p>
                    <p><strong>核心理念</strong>：先为所有浏览器提供<strong>最基本的功能</strong>（使用最基础的HTML标签），然后为支持新特性的浏览器<strong>逐步增加更丰富的体验</strong>。</p>
                    <pre><code>&lt;video controls width="600"&gt;
        &lt;source src="movie.mp4" type="video/mp4"&gt;
        &lt;p&gt;您的浏览器不支持HTML5视频播放，请升级浏览器。
        &lt;a href="movie.mp4"&gt;点击此处下载视频文件&lt;/a&gt;&lt;/p&gt;
        &lt;/video&gt;</code></pre>
                    <p><strong>策略二：Polyfill（垫片）</strong></p>
                    <p><strong>Polyfill</strong> 是一段JavaScript代码，它的作用是：<strong>如果浏览器原生不支持某个新特性，就用JavaScript模拟实现该功能</strong>。</p>
                    <p><strong>经典案例</strong>：旧版IE（IE9及以下）无法识别HTML5的新语义标签（如 <code>&lt;header&gt;</code>、<code>&lt;nav&gt;</code>、<code>&lt;article&gt;</code> 等），会导致这些标签无法被正确渲染。开发者可以使用 <strong>html5shiv</strong> 这个Polyfill来解决：</p>
                    <pre><code>&lt;!--[if lt IE 9]&gt;
            &lt;script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"&gt;&lt;/script&gt;
        &lt;![endif]--&gt;</code></pre>
                    <p><strong>策略三：优雅降级（Graceful Degradation）</strong></p>
                    <p>先为现代浏览器开发<strong>完整功能</strong>的版本，然后确保在旧浏览器中<strong>功能虽有缩减但依然可用且不报错</strong>。</p>
                    <p><strong>策略四：提示用户升级浏览器</strong></p>
                    <pre><code>&lt;!--[if lt IE 9]&gt;
        &lt;p style="color: red; font-size: 18px; padding: 20px; background: #ffeeee;"&gt;
            您的浏览器版本过低，无法正常访问本网站。
            请升级到 &lt;a href="https://www.microsoft.com/edge"&gt;Microsoft Edge&lt;/a&gt;
            或 &lt;a href="https://www.google.com/chrome/"&gt;Google Chrome&lt;/a&gt;。
        &lt;/p&gt;
        &lt;![endif]--&gt;</code></pre>
                    <h2>1.4.5 现代开发的新趋势：Baseline（广泛可用功能）</h2>
                    <p>2025年以来，Web开发社区提出了一项名为 <strong>"Baseline（基准）"</strong> 的新倡议。其核心理念是：</p>
                    <p><strong>当一个Web功能被所有主流浏览器（Chrome、Firefox、Safari、Edge）都支持时，它就进入了"Baseline Widely Available"（广泛可用）状态</strong>。开发者可以<strong>放心大胆地使用</strong>这些功能，无需担心兼容性问题。</p>
                    <p>截至2026年，已有<strong>超过500项Web功能</strong>被标记为"Baseline Widely Available"——这其中包括了绝大部分HTML5的核心特性。换句话说，<strong>对于现代Web开发而言，兼容性问题正在逐年减少</strong>。</p>
                    <div class="tip-box">
                        <p><strong>🎯 对初学者的建议</strong>：在学习阶段，请放心使用本书中讲解的所有HTML5特性——只要你在Chrome、Firefox、Edge或Safari的最新版本中测试，它们都能正常工作。当你将来进入实际项目开发时，再根据项目的目标用户群体，有针对性地处理兼容性问题即可。</p>
                    </div>
                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了各浏览器对HTML5的支持情况及相关应对策略：</p>
                    <ol>
                        <li><strong>HTML5已成行业标准</strong>，全球约95%的浏览器已支持HTML5。但"支持HTML5"是一个笼统的说法——具体到每个特性和API，支持情况可能不同。</li>
                        <li><strong>现代浏览器</strong>（Chrome、Firefox、Edge、Safari、Opera）<strong>完全支持</strong>HTML5核心特性；<strong>旧版IE</strong>（尤其是IE8及更早版本）支持非常有限；<strong>移动端浏览器</strong>支持情况普遍良好。</li>
                        <li>查询具体特性的兼容性，可使用 <strong>Can I use</strong>（https://caniuse.com）或 <strong>MDN Web Docs</strong>。</li>
                        <li>处理兼容性问题的常用策略包括：<strong>渐进增强</strong>（先基础后增强）、<strong>Polyfill</strong>（用JS模拟缺失功能）、<strong>优雅降级</strong>（先完整后精简）和<strong>提示用户升级浏览器</strong>。</li>
                        <li><strong>Baseline（广泛可用功能）</strong> 是近年来兴起的新标准——当一个功能被所有主流浏览器支持后，开发者即可放心使用。</li>
                    </ol>

                    <p>现在，让我们放慢脚步，从最基础的方式开始：<strong>手工编写一个HTML文件，并用浏览器打开它</strong>。这一过程将帮助你建立对HTML文件本质的直观认识，为后续深入学习打下坚实基础。</p>
                    <h2>2.1.1 手工编写HTML文件</h2>
                    <p>HTML文件本质上是<strong>纯文本文件</strong>，只是它的扩展名为 <code>.html</code>（或 <code>.htm</code>）。你可以使用任何文本编辑器来创建它——哪怕是操作系统自带的记事本（Notepad）。不过，为了更好的编码体验，我们依然推荐使用VS Code。</p>

                    <ol>
                        <li>在电脑的任意位置（例如桌面），新建一个文件夹，命名为 <code>my-first-html</code>。</li>
                        <li>进入该文件夹，<strong>右键 → 新建 → 文本文档</strong>（Windows）或使用VS Code新建文件。</li>

        &lt;html&gt;

            &lt;title&gt;我的第一个网页&lt;/title&gt;
        &lt;/head&gt;
        &lt;body&gt;
            &lt;h1&gt;你好，HTML世界！&lt;/h1&gt;

        &lt;/body&gt;

                    <p><strong>常见问题：乱码怎么办？</strong></p>

                    <p><strong>思考与练习</strong></p>

                    </ul>
                    <pre><code>&lt;标签名&gt;内容&lt;/标签名&gt;</code></pre>
                    <p>常见双标签示例：</p>
                    <pre><code>&lt;h1&gt;这是一级标题&lt;/h1&gt;
        &lt;p&gt;这是一个段落。&lt;/p&gt;
        &lt;div&gt;这是一个容器。&lt;/div&gt;
        &lt;a href="https://example.com"&gt;这是一个链接&lt;/a&gt;</code></pre>
                    <ul>
                        <li><strong>单标签（自闭合标签）</strong>：只有开始标签，没有结束标签。它们在HTML5中不需要写斜杠（虽然写斜杠也兼容，但官方推荐不写）。</li>
                    </ul>
                    <pre><code>&lt;标签名&gt;</code></pre>
                    <p>常见单标签示例：</p>
                    <pre><code>&lt;br&gt;          &lt;!-- 换行 --&gt;
        &lt;hr&gt;          &lt;!-- 水平分割线 --&gt;
        &lt;img src="photo.jpg" alt="照片"&gt;  &lt;!-- 图片 --&gt;
        &lt;input type="text"&gt;               &lt;!-- 输入框 --&gt;
        &lt;meta charset="utf-8"&gt;            &lt;!-- 元数据 --&gt;
        &lt;link rel="stylesheet" href="style.css"&gt;  &lt;!-- 外部资源 --&gt;</code></pre>
                    <div class="tip-box">
                        <p><strong>💡 历史遗留</strong>：在XHTML中，单标签要求以 <code>/&gt;</code> 结尾（如 <code>&lt;br /&gt;</code>），但在HTML5中不再强制。本书推荐使用简洁写法，不加斜杠。</p>
                    </div>
                    <p><strong>2. 元素的组成部分</strong></p>
                    <p>一个完整的HTML<strong>元素（Element）</strong>由三部分组成：</p>
                    <ol>
                        <li><strong>开始标签（Start Tag）</strong>：如 <code>&lt;p&gt;</code></li>
                        <li><strong>内容（Content）</strong>：开始标签和结束标签之间的文本或其他元素</li>
                        <li><strong>结束标签（End Tag）</strong>：如 <code>&lt;/p&gt;</code></li>
                    </ol>
                    <p>示例：</p>
                    <pre><code>&lt;p&gt;这是一段文字。&lt;/p&gt;</code></pre>
                    <ul>
                        <li><code>开始标签</code>：<code>&lt;p&gt;</code></li>
                        <li><code>内容</code>：<code>这是一段文字。</code></li>
                        <li><code>结束标签</code>：<code>&lt;/p&gt;</code></li>
                    </ul>
                    <p>有些元素的内容可以是其他元素（即嵌套），例如：</p>
                    <pre><code>&lt;div&gt;
            &lt;h1&gt;标题&lt;/h1&gt;
            &lt;p&gt;段落内容&lt;/p&gt;
        &lt;/div&gt;</code></pre>
                    <p><strong>3. 元素的嵌套与层级</strong></p>
                    <p>HTML允许标签相互嵌套，形成树形结构。嵌套时必须遵循<strong>"正确嵌套"</strong>原则：后开的标签必须先关。</p>
                    <p><strong>正确示例</strong>：</p>
                    <pre><code>&lt;p&gt;&lt;strong&gt;加粗文字&lt;/strong&gt;&lt;/p&gt;</code></pre>
                    <p><strong>错误示例</strong>（交叉嵌套）：</p>
                    <pre><code>&lt;p&gt;&lt;strong&gt;加粗文字&lt;/p&gt;&lt;/strong&gt;   &lt;!-- 错误！ --&gt;</code></pre>
                    <p>浏览器可能会尝试纠错，但强烈不推荐依赖这种行为。始终确保标签正确嵌套。</p>
                    <h2>2.3.2 标签属性</h2>
                    <p>属性（Attribute）为HTML元素提供额外的信息或配置。它们写在开始标签中，采用 <code>属性名="属性值"</code> 的键值对形式。</p>
                    <p><strong>1. 基本写法</strong></p>
                    <pre><code>&lt;标签名 属性名="属性值"&gt;内容&lt;/标签名&gt;</code></pre>
                    <p>示例：</p>
                    <pre><code>&lt;a href="https://www.example.com" target="_blank"&gt;访问示例网站&lt;/a&gt;</code></pre>
                    <ul>
                        <li><code>href</code> 属性指定链接目标地址。</li>
                        <li><code>target</code> 属性指定打开方式（<code>_blank</code> 表示在新窗口打开）。</li>
                    </ul>
                    <p><strong>2. 多个属性</strong></p>
                    <p>一个标签可以有多个属性，用空格分隔，顺序无关：</p>
                    <pre><code>&lt;img src="logo.png" alt="网站Logo" width="200" height="100"&gt;</code></pre>
                    <p><strong>3. 属性值的引号</strong></p>
                    <p>属性值可以用双引号或单引号包裹，通常使用双引号。如果属性值本身包含双引号，则用单引号：</p>
                    <pre><code>&lt;p title="他说：'你好！'"&gt;段落文字&lt;/p&gt;</code></pre>
                    <p><strong>4. 布尔属性</strong></p>
                    <p>有些属性不需要值，它们只有"存在"和"不存在"两种状态，称为<strong>布尔属性（Boolean Attributes）</strong>。在HTML5中，布尔属性可以只写属性名，无需赋值。</p>
                    <p>常见布尔属性：</p>
                    <ul>
                        <li><code>disabled</code>：禁用表单元素</li>
                        <li><code>checked</code>：复选框/单选框默认选中</li>
                        <li><code>readonly</code>：只读</li>
                        <li><code>required</code>：必填</li>
                        <li><code>hidden</code>：隐藏元素</li>
                    </ul>
                    <p>示例：</p>
                    <pre><code>&lt;input type="checkbox" checked&gt;   &lt;!-- 默认勾选 --&gt;
        &lt;input type="text" disabled&gt;      &lt;!-- 禁用输入 --&gt;
        &lt;button disabled&gt;点击&lt;/button&gt;    &lt;!-- 禁用按钮 --&gt;</code></pre>
                    <p>你也可以显式赋值为空字符串或属性名本身（但规范推荐只写属性名）。</p>
                    <p><strong>5. 全局属性 vs 特定属性</strong></p>
                    <ul>
                        <li><strong>全局属性</strong>：适用于所有HTML元素的属性，如 <code>id</code>、<code>class</code>、<code>style</code>、<code>title</code>、<code>data-*</code> 等。</li>
                        <li><strong>特定属性</strong>：只适用于特定标签，如 <code>&lt;img&gt;</code> 的 <code>src</code> 和 <code>alt</code>，<code>&lt;a&gt;</code> 的 <code>href</code> 等。</li>
                    </ul>
                    <h2>2.3.3 注释的写法</h2>
                    <p>注释是代码中对开发人员有意义的说明文字，不会被浏览器显示给用户。在团队协作和长期维护中，注释是必不可少的。</p>
                    <p><strong>1. 基本语法</strong></p>
                    <pre><code>&lt;!-- 这里写注释内容 --&gt;</code></pre>
                    <p>示例：</p>
                    <pre><code>&lt;!-- 这是页面头部区域 --&gt;
        &lt;header&gt;
            &lt;h1&gt;我的网站&lt;/h1&gt;
        &lt;/header&gt;

        &lt;!-- 导航菜单 --&gt;
        &lt;nav&gt;
            &lt;a href="/"&gt;首页&lt;/a&gt;
            &lt;a href="/about"&gt;关于&lt;/a&gt;
        &lt;/nav&gt;</code></pre>
                    <p><strong>2. 注释的作用</strong></p>
                    <ul>
                        <li>解释代码的意图和功能</li>
                        <li>标注待完成的任务（TODO）</li>
                        <li>临时注释掉部分代码以进行调试</li>
                    </ul>
                    <pre><code>&lt;!-- TODO: 添加搜索功能 --&gt;</code></pre>
                    <p><strong>3. 注意事项</strong></p>
                    <ul>
                        <li>注释<strong>不能嵌套</strong>。即注释中不能再包含 <code>&lt;!--</code>。</li>
                    </ul>
                    <pre><code>&lt;!-- 外层注释 &lt;!-- 内层注释 --&gt; 外层注释结束 --&gt;   &lt;!-- 错误！ --&gt;</code></pre>
                    <ul>
                        <li>注释可以跨越多行，但建议保持简洁，避免过度注释（好的代码应该自解释）。</li>
                    </ul>
                    <h2>2.3.4 大小写敏感性</h2>
                    <p>HTML标签名和属性名<strong>不区分大小写</strong>。<code>&lt;P&gt;</code> 和 <code>&lt;p&gt;</code> 在浏览器中效果相同，<code>&lt;a HREF="..."&gt;</code> 也是合法的。</p>
                    <p>但是，<strong>强烈建议全部使用小写</strong>。原因：</p>
                    <ol>
                        <li><strong>规范推荐</strong>：W3C推荐使用小写标签和属性名。</li>
                        <li><strong>可读性</strong>：统一小写让代码更整洁、易读。</li>
                        <li><strong>XHTML兼容</strong>：如果将来需要转换为XHTML，小写是强制要求。</li>
                        <li><strong>团队协作</strong>：大多数项目都遵循小写约定。</li>
                    </ol>
                    <p>因此，本书所有示例都使用小写标签和属性名。</p>
                    <h2>2.3.5 空白字符与换行的处理</h2>
                    <p>在HTML中，多个连续的空格、制表符、换行符在浏览器渲染时都会被<strong>合并为一个空格</strong>。这称为"空白折叠（Whitespace Collapsing）"。</p>
                    <p>例如，以下代码：</p>
                    <pre><code>&lt;p&gt;这     是    一段        文字。&lt;/p&gt;</code></pre>
                    <p>在浏览器中显示为：</p>
                    <pre><code>这是一段文字。</code></pre>
                    <p>如果希望保留空白和换行，可以使用 <code>&lt;pre&gt;</code>（预格式化文本）标签：</p>
                    <pre><code>&lt;pre&gt;
            第一行
            第二行
                缩进的第三行
        &lt;/pre&gt;</code></pre>
                    <p>或者使用CSS的 <code>white-space</code> 属性来控制。</p>
                    <p><strong>换行</strong></p>
                    <p>在HTML源代码中换行，不会在页面中产生换行效果。要换行，必须使用 <code>&lt;br&gt;</code> 标签：</p>
                    <pre><code>&lt;p&gt;第一行&lt;br&gt;第二行&lt;/p&gt;</code></pre>
                    <p><strong>常见错误提示</strong></p>
                    <p><strong>错误1：忘记闭合标签</strong></p>
                    <pre><code>&lt;p&gt;这是一个段落</code></pre>
                    <p>浏览器可能仍会渲染，但后续内容可能会意外地包含在 <code>&lt;p&gt;</code> 中。始终记得添加闭合标签。</p>
                    <p><strong>错误2：属性值缺少引号</strong></p>
                    <pre><code>&lt;a href=https://example.com&gt;链接&lt;/a&gt;</code></pre>
                    <p>浏览器通常能解析，但如果属性值包含空格或特殊字符，就会出错。始终使用引号包裹属性值。</p>
                    <p><strong>错误3：标签交叉嵌套</strong></p>
                    <pre><code>&lt;b&gt;&lt;i&gt;文字&lt;/b&gt;&lt;/i&gt;   &lt;!-- 错误 --&gt;</code></pre>
                    <p>应改为：</p>
                    <pre><code>&lt;b&gt;&lt;i&gt;文字&lt;/i&gt;&lt;/b&gt;</code></pre>
                    <p><strong>错误4：在HTML中写中文注释时忘记使用正确的编码</strong></p>
                    <p>如果页面字符集未设置为UTF-8，注释中的中文可能变为乱码。解决方法：在 <code>&lt;head&gt;</code> 中添加 <code>&lt;meta charset="utf-8"&gt;</code>。</p>
                    <p><strong>知识小结</strong></p>
                    <p>本节我们学习了HTML的基本语法规则：</p>
                    <table>
                        <tr><th>规则</th><th>说明</th></tr>
                        <tr><td><strong>双标签</strong></td><td>由开始标签和结束标签组成，如 <code>&lt;p&gt;...&lt;/p&gt;</code></td></tr>
                        <tr><td><strong>单标签</strong></td><td>只有开始标签，如 <code>&lt;br&gt;</code>、<code>&lt;img&gt;</code></td></tr>
                        <tr><td><strong>属性</strong></td><td>写在开始标签中，格式为 <code>属性名="属性值"</code></td></tr>
                        <tr><td><strong>布尔属性</strong></td><td>只写属性名即可，如 <code>checked</code>、<code>disabled</code></td></tr>
                        <tr><td><strong>注释</strong></td><td><code>&lt;!-- 注释内容 --&gt;</code>，不能嵌套</td></tr>
                        <tr><td><strong>大小写</strong></td><td>不区分，但推荐全部小写</td></tr>
                        <tr><td><strong>空白处理</strong></td><td>多个连续空白合并为一个空格</td></tr>
                        <tr><td><strong>换行</strong></td><td>使用 <code>&lt;br&gt;</code> 标签强制换行</td></tr>
                    </table>
                    <p><strong>思考与练习</strong></p>

                    <h2>3.1.1 什么是 <code>&lt;head&gt;</code> 标签</h2>

                    <p>在上一节中，我们认识了 <code>&lt;head&gt;</code> 头部信息的重要性。而在 <code>&lt;head&gt;</code> 所包含的所有子标签中，<strong><code>&lt;title&gt;</code> 是唯一一个"必需"的标签</strong>——没有它，你的HTML页面就不算一个完整规范的页面。</p>
                    <p><code>&lt;title&gt;</code> 标签虽然只有短短一行，却承载着极其重要的使命：它不仅决定了用户在浏览器标签页上看到的名字，更深刻影响着搜索引擎的收录与排名。可以说，<strong><code>&lt;title&gt;</code> 是页面在数字世界中的"名字"和"第一印象"</strong>。</p>

                    <pre><code>&lt;title&gt;页面标题文字&lt;/title&gt;</code></pre>
                    <p>它必须被放置在 <code>&lt;head&gt;</code> 标签内部，通常位于字符编码（<code>&lt;meta charset&gt;</code>）和视口设置（<code>&lt;meta name="viewport"&gt;</code>）之后，但在其他 <code>&lt;meta&gt;</code> 标签或 <code>&lt;link&gt;</code> 标签之前。</p>
                    <p><strong>每个页面只能有一个 <code>&lt;title&gt;</code></strong></p>
                    <p>在一个HTML文档中，<strong>只能出现一个 <code>&lt;title&gt;</code> 标签</strong>。</p>

                    <p><strong>作用一：浏览器标签页/标题栏显示</strong></p>
                    <ul>

                    <p><strong>4. 品牌名称的放置</strong></p>

                    <p><strong>6. 准确反映页面内容</strong></p>

                    <p>在HTML源代码中按回车换行，浏览器并不会在页面中产生换行效果。要在段落内强制换行，需要使用 <code>&lt;br&gt;</code> 标签。</p>

                <h1>7.1 表格的基本结构 —— <code>&lt;table&gt;</code>、<code>&lt;tr&gt;</code>、<code>&lt;td&gt;</code></h1>
                <div class="chapter-content">
                    <p>在前几章中，我们学习了如何组织文本、列表、多媒体等内容。但在网页中，还有一类非常常见且重要的数据展示方式——<strong>表格</strong>。表格用于展示<strong>结构化数据</strong>，例如统计报表、课程表、价格对比、产品参数等。它让数据以行和列的形式呈现，清晰直观，便于用户快速阅读和比较。</p>
                    <p>在 HTML 中，表格由一系列标签组成，其中最核心的三个是：</p>
                    <ul>
                        <li><code>&lt;table&gt;</code>：定义表格容器。</li>
                        <li><code>&lt;tr&gt;</code>（table row）：定义表格中的一行。</li>
                        <li><code>&lt;td&gt;</code>（table data）：定义行中的一个单元格（数据）。</li>
                    </ul>
                    <h2>7.1.1 表格的基本语法</h2>
                    <p>一个最简单的表格至少包含一个 <code>&lt;table&gt;</code> 标签、一行（<code>&lt;tr&gt;</code>）和一个单元格（<code>&lt;td&gt;</code>）。</p>
                    <pre><code>&lt;table&gt;
            &lt;tr&gt;
                &lt;td&gt;单元格内容&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <p><strong>示例：一个简单的 2×2 表格</strong></p>
                    <pre><code>&lt;table&gt;
            &lt;tr&gt;
                &lt;td&gt;姓名&lt;/td&gt;
                &lt;td&gt;年龄&lt;/td&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;张三&lt;/td&gt;

            &lt;/tr&gt;

                &lt;td&gt;李四&lt;/td&gt;
                &lt;td&gt;32&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <p>在浏览器中，默认情况下表格没有边框，单元格之间会有一些间距。我们可以通过添加 <code>border</code> 属性（或 CSS）来显示边框，以便更清楚地看到表格结构。</p>
                    <pre><code>&lt;table border="1"&gt;

                &lt;td&gt;姓名&lt;/td&gt;
                &lt;td&gt;年龄&lt;/td&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;张三&lt;/td&gt;
                &lt;td&gt;28&lt;/td&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;李四&lt;/td&gt;
                &lt;td&gt;32&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <div class="tip-box"><p><strong>💡 注意</strong>：<code>border</code> 属性在 HTML5 中仍然可用，但更推荐使用 CSS 来控制表格样式，以实现更丰富的设计。我们将在后续小节中详细讲解。</p></div>
                    <h2>7.1.2 表格的结构层次</h2>
                    <p>一个完整的表格由多个行（<code>&lt;tr&gt;</code>）组成，每行又由多个单元格（<code>&lt;td&gt;</code>）组成。表格的列数由每一行中单元格的数量决定（通常要求各行的单元格数量一致，否则会出现合并问题）。</p>
                    <ul>
                        <li><strong>行（Row）</strong>：由 <code>&lt;tr&gt;</code> 标签定义，水平方向。</li>
                        <li><strong>列（Column）</strong>：由每行中的 <code>&lt;td&gt;</code> 数量决定，垂直方向。</li>
                    </ul>
                    <p>例如，一个 3 行 2 列的表格，每行都有 2 个 <code>&lt;td&gt;</code>。</p>
                    <pre><code>&lt;table border="1"&gt;

                    <h2>7.1.3 表头单元格 —— <code>&lt;th&gt;</code></h2>
                    <p>在表格中，通常第一行或第一列用于表示数据的“标题”或“表头”。HTML 提供了 <code>&lt;th&gt;</code>（table header）标签来专门表示表头单元格。它与 <code>&lt;td&gt;</code> 的用法基本相同，但有以下区别：</p>
                    <ul>
                        <li>浏览器默认将 <code>&lt;th&gt;</code> 中的文本<strong>加粗并居中</strong>显示。</li>

                    </ul>

                &lt;th&gt;姓名&lt;/th&gt;

            &lt;/tr&gt;

                &lt;td&gt;28&lt;/td&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;李四&lt;/td&gt;
                &lt;td&gt;32&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <p>使用 <code>&lt;th&gt;</code> 能让表格的结构更清晰，对搜索引擎和屏幕阅读器也更友好。</p>

                    <p>默认情况下，表格是没有边框的，单元格之间也有一定的间距（<code>cellspacing</code>）和边距（<code>cellpadding</code>）。为了便于观察，我们通常会添加边框。</p>
                    <p>使用 CSS 边框（推荐）：</p>
                    <pre><code>&lt;style&gt;

                    <h2>7.1.5 表格的标题 —— <code>&lt;caption&gt;</code></h2>
                    <p>表格可以有一个标题，用于描述表格的主题或内容。<code>&lt;caption&gt;</code> 标签应紧跟在 <code>&lt;table&gt;</code> 开始标签之后。</p>

            &lt;caption&gt;员工基本信息表&lt;/caption&gt;
            &lt;tr&gt;
                &lt;th&gt;姓名&lt;/th&gt;
                &lt;th&gt;年龄&lt;/th&gt;
            &lt;/tr&gt;

                &lt;td&gt;张三&lt;/td&gt;

            &lt;/tr&gt;

                    <p>浏览器默认将 <code>&lt;caption&gt;</code> 居中显示在表格上方。你也可以通过 CSS 调整其位置和样式。</p>
                    <h2>7.1.6 一个完整的表格示例</h2>
                    <pre><code>&lt;!DOCTYPE html&gt;
        &lt;html lang="zh-CN"&gt;
        &lt;head&gt;
            &lt;meta charset="utf-8"&gt;

                &lt;/tr&gt;

                    &lt;td&gt;橙子&lt;/td&gt;
                    &lt;td&gt;4.20&lt;/td&gt;
                    &lt;td&gt;95&lt;/td&gt;
                &lt;/tr&gt;
            &lt;/table&gt;
        &lt;/body&gt;
        &lt;/html&gt;</code></pre>
                    <h2>7.1.7 常见错误与最佳实践</h2>
                    <table>

                <h1>7.2 表头与标题 —— <code>&lt;th&gt;</code> 和 <code>&lt;caption&gt;</code></h1>
                <div class="chapter-content">
                    <p>在上一节中，我们学习了表格的基本结构——<code>&lt;table&gt;</code>、<code>&lt;tr&gt;</code>、<code>&lt;td&gt;</code>。一个表格中，数据单元格（<code>&lt;td&gt;</code>）承载着实际的数据内容，但仅有数据是不够的——<strong>我们需要告诉用户和机器：每一列或每一行的数据代表什么</strong>。</p>
                    <p>这正是 <code>&lt;th&gt;</code> 和 <code>&lt;caption&gt;</code> 的职责所在。它们为表格提供了“上下文”和“身份标识”，让表格从一堆数字和文字，变成一个有结构、可理解的数据集。</p>
                    <h2>7.2.1 <code>&lt;th&gt;</code> —— 表头单元格</h2>
                    <p><code>&lt;th&gt;</code> 是 <strong>Table Header（表头）</strong> 的缩写，用于定义表格中作为标题的单元格。它和 <code>&lt;td&gt;</code> 用法完全相同，但语义和默认样式不同。</p>
                    <pre><code>&lt;table border="1"&gt;
            &lt;tr&gt;
                &lt;th&gt;姓名&lt;/th&gt;
                &lt;th&gt;年龄&lt;/th&gt;
                &lt;th&gt;城市&lt;/th&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;张三&lt;/td&gt;
                &lt;td&gt;28&lt;/td&gt;
                &lt;td&gt;北京&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <p><strong>与 <code>&lt;td&gt;</code> 的主要区别</strong></p>
                    <table>
                        <tr><th>对比维度</th><th><code>&lt;th&gt;</code></th><th><code>&lt;td&gt;</code></th></tr>
                        <tr><td>语义</td><td>表示“表头/标题”</td><td>表示“数据”</td></tr>
                        <tr><td>默认样式</td><td>加粗、居中</td><td>普通字体、左对齐（文本）或右对齐（数字）</td></tr>
                        <tr><td>可访问性</td><td>屏幕阅读器会朗读“列标题”或“行标题”</td><td>仅朗读数据内容</td></tr>

                    <p><strong>行表头与列表头</strong></p>
                    <p><code>&lt;th&gt;</code> 既可以用于列标题（表头在第一行），也可以用于行标题（表头在第一列）。</p>

            &lt;tr&gt;

            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;苹果&lt;/td&gt;
                &lt;td&gt;¥5.00&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>

                &lt;td&gt;¥5.00&lt;/td&gt;
                &lt;td&gt;120&lt;/td&gt;
            &lt;/tr&gt;

                    <h2>7.2.2 <code>scope</code> 属性 —— 明确表头的作用范围</h2>
                    <p>当表格结构较为复杂时，浏览器和屏幕阅读器可能无法自动判断一个 <code>&lt;th&gt;</code> 是列标题还是行标题。<code>scope</code> 属性正是为了解决这个问题而设计的。</p>
                    <p><strong>常用值</strong></p>

                        <tr><th>值</th><th>含义</th><th>适用场景</th></tr>
                        <tr><td><code>col</code></td><td>该表头是<strong>列</strong>的标题</td><td>表头在表格顶部，描述一列数据</td></tr>
                        <tr><td><code>row</code></td><td>该表头是<strong>行</strong>的标题</td><td>表头在表格左侧，描述一行数据</td></tr>

                        <tr><td><code>rowgroup</code></td><td>该表头是<strong>一组行</strong>的标题</td><td>用于复杂的多行分组</td></tr>
                    </table>
                    <p><strong>示例：使用 <code>scope</code> 属性</strong></p>
                    <pre><code>&lt;table border="1"&gt;
            &lt;tr&gt;
                &lt;th scope="col"&gt;姓名&lt;/th&gt;
                &lt;th scope="col"&gt;年龄&lt;/th&gt;
                &lt;th scope="col"&gt;城市&lt;/th&gt;
            &lt;/tr&gt;

                &lt;th scope="row"&gt;张三&lt;/th&gt;

                &lt;td&gt;北京&lt;/td&gt;
            &lt;/tr&gt;
            &lt;tr&gt;

                &lt;td&gt;32&lt;/td&gt;
                &lt;td&gt;上海&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <div class="tip-box"><p><strong>💡 为什么 <code>scope</code> 很重要？</strong> 对于视力正常的用户，通过视觉位置就能判断表头的作用范围。但屏幕阅读器用户无法“看到”这个位置关系，<code>scope</code> 属性明确告诉辅助技术：“这个表头描述的是这一列”或“这个表头描述的是这一行”，从而让视障用户正确理解表格结构。</p></div>
                    <h2>7.2.3 复杂表头 —— 多级表头</h2>
                    <p>在实际应用中，表格的列可能有层级关系，例如“第一季度”下面分为“1月”、“2月”、“3月”。这时需要使用多个 <code>&lt;th&gt;</code> 行来构建多级表头。</p>
                    <pre><code>&lt;table border="1"&gt;
            &lt;tr&gt;
                &lt;th rowspan="2"&gt;产品&lt;/th&gt;
                &lt;th colspan="3"&gt;2026年销售数据（万元）&lt;/th&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;th&gt;第一季度&lt;/th&gt;
                &lt;th&gt;第二季度&lt;/th&gt;
                &lt;th&gt;第三季度&lt;/th&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;th&gt;产品A&lt;/th&gt;
                &lt;td&gt;120&lt;/td&gt;
                &lt;td&gt;135&lt;/td&gt;
                &lt;td&gt;150&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <h2>7.2.4 <code>&lt;caption&gt;</code> —— 表格的标题</h2>
                    <p><code>&lt;caption&gt;</code> 标签用于为表格提供一个<strong>标题或描述</strong>。它必须紧跟在 <code>&lt;table&gt;</code> 开始标签之后。</p>
                    <pre><code>&lt;table border="1"&gt;
            &lt;caption&gt;员工基本信息表&lt;/caption&gt;
            &lt;tr&gt;
                &lt;th&gt;姓名&lt;/th&gt;
                &lt;th&gt;年龄&lt;/th&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;张三&lt;/td&gt;
                &lt;td&gt;28&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <p><strong>通过 CSS 定位 <code>&lt;caption&gt;</code></strong></p>
                    <pre><code>caption {
            caption-side: bottom;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 8px;
        }</code></pre>
                    <div class="tip-box"><p><strong>💡 注意</strong>：每个表格<strong>只能有一个 <code>&lt;caption&gt;</code></strong>。如果表格不需要标题，可以省略。</p></div>
                    <h2>7.2.5 表头与标题的配合使用</h2>
                    <p>一个结构清晰、语义完整的表格，应该同时包含 <code>&lt;caption&gt;</code> 和带有 <code>scope</code> 属性的 <code>&lt;th&gt;</code>。</p>
                    <pre><code>&lt;table&gt;
            &lt;caption&gt;2026年各季度销售业绩对比&lt;/caption&gt;
            &lt;thead&gt;
                &lt;tr&gt;
                    &lt;th scope="col"&gt;产品线&lt;/th&gt;
                    &lt;th scope="col"&gt;Q1&lt;/th&gt;
                    &lt;th scope="col"&gt;Q2&lt;/th&gt;
                    &lt;th scope="col"&gt;Q3&lt;/th&gt;
                &lt;/tr&gt;
            &lt;/thead&gt;
            &lt;tbody&gt;
                &lt;tr&gt;
                    &lt;th scope="row"&gt;智能手机&lt;/th&gt;
                    &lt;td&gt;120&lt;/td&gt;
                    &lt;td&gt;135&lt;/td&gt;
                    &lt;td&gt;150&lt;/td&gt;
                &lt;/tr&gt;
            &lt;/tbody&gt;
        &lt;/table&gt;</code></pre>
                    <h2>7.2.6 常见错误与最佳实践</h2>
                    <table>
                        <tr><th>错误</th><th>正确做法</th></tr>
                        <tr><td>用 <code>&lt;td&gt;</code> 代替 <code>&lt;th&gt;</code> 做表头</td><td>使用 <code>&lt;th&gt;</code> 标记所有表头</td></tr>
                        <tr><td>省略 <code>scope</code> 属性</td><td>为 <code>&lt;th&gt;</code> 添加 <code>scope="col"</code> 或 <code>scope="row"</code></td></tr>
                        <tr><td>多个 <code>&lt;caption&gt;</code></td><td>只保留一个 <code>&lt;caption&gt;</code></td></tr>
                        <tr><td><code>&lt;caption&gt;</code> 位置错误</td><td><code>&lt;caption&gt;</code> 必须紧跟在 <code>&lt;table&gt;</code> 开始标签之后</td></tr>
                    </table>
                    <p><strong>最佳实践总结</strong></p>
                    <ul>
                        <li>始终使用 <code>&lt;th&gt;</code> 表示表头，不要用 <code>&lt;td&gt;</code> 加粗来替代。</li>
                        <li>为每个 <code>&lt;th&gt;</code> 添加 <code>scope</code> 属性，明确其作用范围。</li>
                        <li>为表格添加 <code>&lt;caption&gt;</code>，简要描述表格内容。</li>
                        <li>保持表格结构清晰，表头行与数据行的单元格数量对齐。</li>
                    </ul>
                    <p><strong>知识小结</strong></p>

                <h1>7.3 表格的语义化结构 —— <code>&lt;thead&gt;</code>、<code>&lt;tbody&gt;</code>、<code>&lt;tfoot&gt;</code></h1>
                <div class="chapter-content">
                    <p>在上一节中，我们学习了 <code>&lt;th&gt;</code> 和 <code>&lt;caption&gt;</code>，它们为表格提供了“表头”和“标题”，让表格有了语义的“外壳”。但对于一个包含大量数据行的表格，仅仅有表头和标题是不够的——<strong>表格的主体部分（数据行）和脚注部分（汇总行）也需要有明确的语义区分</strong>。</p>
                    <p>HTML5 为此引入了三个重要的语义化标签：</p>
                    <ul>
                        <li><code>&lt;thead&gt;</code>（Table Head）：定义表格的<strong>表头区域</strong>（通常包含列标题）。</li>
                        <li><code>&lt;tbody&gt;</code>（Table Body）：定义表格的<strong>主体区域</strong>（包含实际数据行）。</li>
                        <li><code>&lt;tfoot&gt;</code>（Table Foot）：定义表格的<strong>脚注区域</strong>（通常包含汇总、合计等）。</li>
                    </ul>
                    <h2>7.3.1 为什么需要语义化结构</h2>
                    <p><strong>问题：没有语义化标签的表格</strong></p>
                    <pre><code>&lt;table&gt;
            &lt;tr&gt;
                &lt;th&gt;产品&lt;/th&gt;
                &lt;th&gt;销售额&lt;/th&gt;
                &lt;th&gt;利润&lt;/th&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;产品A&lt;/td&gt;
                &lt;td&gt;¥120万&lt;/td&gt;
                &lt;td&gt;¥30万&lt;/td&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;产品B&lt;/td&gt;
                &lt;td&gt;¥80万&lt;/td&gt;
                &lt;td&gt;¥20万&lt;/td&gt;
            &lt;/tr&gt;
            &lt;tr&gt;
                &lt;td&gt;&lt;strong&gt;合计&lt;/strong&gt;&lt;/td&gt;
                &lt;td&gt;&lt;strong&gt;¥400万&lt;/strong&gt;&lt;/td&gt;
                &lt;td&gt;&lt;strong&gt;¥100万&lt;/strong&gt;&lt;/td&gt;
            &lt;/tr&gt;
        &lt;/table&gt;</code></pre>
                    <p><strong>解决：使用语义化结构</strong></p>
                    <pre><code>&lt;table&gt;
            &lt;thead&gt;
                &lt;tr&gt;
                    &lt;th&gt;产品&lt;/th&gt;
                    &lt;th&gt;销售额&lt;/th&gt;
                    &lt;th&gt;利润&lt;/th&gt;
                &lt;/tr&gt;
            &lt;/thead&gt;
            &lt;tbody&gt;

                    &lt;td&gt;&lt;strong&gt;¥400万&lt;/strong&gt;&lt;/td&gt;
                    &lt;td&gt;&lt;strong&gt;¥100万&lt;/strong&gt;&lt;/td&gt;
                &lt;/tr&gt;
            &lt;/tfoot&gt;
        &lt;/table&gt;</code></pre>
                    <h2>7.3.2 <code>&lt;thead&gt;</code> —— 表头区域</h2>
                    <p><code>&lt;thead&gt;</code> 用于包裹表格的<strong>表头行</strong>，通常包含列标题（<code>&lt;th&gt;</code>）。</p>
                    <ul>
                        <li><strong>语义明确</strong>：告诉浏览器和屏幕阅读器：“这是表格的头部区域。”</li>
                        <li><strong>支持多行表头</strong>：可以包含多个 <code>&lt;tr&gt;</code>，适用于多级表头。</li>
                        <li><strong>唯一性</strong>：一个表格中<strong>只能有一个 <code>&lt;thead&gt;</code></strong>。</li>
                    </ul>
                    <pre><code>&lt;table&gt;
            &lt;thead&gt;
                &lt;tr&gt;
                    &lt;th&gt;列1&lt;/th&gt;
                    &lt;th&gt;列2&lt;/th&gt;
                &lt;/tr&gt;
            &lt;/thead&gt;
        &lt;/table&gt;</code></pre>
                    <h2>7.3.3 <code>&lt;tbody&gt;</code> —— 主体区域</h2>
                    <p><code>&lt;tbody&gt;</code> 用于包裹表格的<strong>数据行</strong>，即表格的实际内容。它是表格中<strong>最主要</strong>的部分。</p>
                    <ul>
                        <li><strong>可以有多个 <code>&lt;tbody&gt;</code></strong>：当表格数据有逻辑分组时，可以使用多个 <code>&lt;tbody&gt;</code>（例如按年份、按地区分组）。</li>
                        <li><strong>提升可访问性</strong>：屏幕阅读器可以识别不同的 <code>&lt;tbody&gt;</code> 分组。</li>

                    &lt;td&gt;¥30万&lt;/td&gt;
                &lt;/tr&gt;
            &lt;/tbody&gt;
        &lt;/table&gt;</code></pre>
                    <h2>7.3.4 <code>&lt;tfoot&gt;</code> —— 脚注区域</h2>
                    <p><code>&lt;tfoot&gt;</code> 用于包裹表格的<strong>脚注行</strong>，通常包含汇总、合计、平均值等总结性数据。</p>
                    <ul>
                        <li><strong>语义明确</strong>：表示“这是表格的汇总/总结区域”。</li>

                    </ul>

                    <pre><code>&lt;table&gt;
            &lt;thead&gt;...&lt;/thead&gt;
            &lt;tbody&gt;...&lt;/tbody&gt;

        &lt;/table&gt;</code></pre>
                    <h2>7.3.5 完整的语义化表格示例</h2>
                    <pre><code>&lt;!DOCTYPE html&gt;
        &lt;html lang="zh-CN"&gt;
        &lt;head&gt;

                    &lt;/tr&gt;
                &lt;/tfoot&gt;
            &lt;/table&gt;
        &lt;/body&gt;
        &lt;/html&gt;</code></pre>
                    <h2>7.3.6 多个 <code>&lt;tbody&gt;</code> 的应用</h2>
                    <p>当表格数据需要按逻辑分组时，可以使用多个 <code>&lt;tbody&gt;</code>。</p>

            &lt;/tbody&gt;
            &lt;tfoot&gt;...&lt;/tfoot&gt;
        &lt;/table&gt;</code></pre>
                    <h2>7.3.7 常见错误与最佳实践</h2>

                    </table>
                    <p><strong>最佳实践总结</strong></p>
                    <ul>
                        <li>始终使用 <code>&lt;thead&gt;</code>、<code>&lt;tbody&gt;</code> 和 <code>&lt;tfoot&gt;</code> 来组织表格结构。</li>
                        <li>将列标题放在 <code>&lt;thead&gt;</code> 中，数据行放在 <code>&lt;tbody&gt;</code> 中，汇总行放在 <code>&lt;tfoot&gt;</code> 中。</li>
                        <li>当数据有逻辑分组时，使用多个 <code>&lt;tbody&gt;</code> 来提升可读性。</li>

                    <p><strong>知识小结</strong></p>
                    <table>

                    <p><strong>思考与练习</strong></p>

                        <li>在 HTML 中，用于定义表格主体数据区域的标签是（　）<br>A. <code>&lt;thead&gt;</code>   B. <code>&lt;tbody&gt;</code>   C. <code>&lt;tfoot&gt;</code></li>
